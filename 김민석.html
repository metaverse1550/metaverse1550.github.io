<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Drift Racing - Extreme Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Inter', sans-serif; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; color: white; }
        .menu-overlay { pointer-events: auto; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); }
        #warning-box { transition: opacity 0.3s; opacity: 0; font-weight: 800; text-shadow: 0 0 10px red; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <!-- UI Layer -->
    <div class="ui-layer" id="ui-layer">
        <div class="flex justify-between w-full font-bold text-xl shadow-lg">
            <div class="bg-black/50 p-2 rounded">Stage: <span id="val-stage">1</span></div>
            <div id="warning-box" class="bg-red-900/80 px-4 py-2 rounded text-red-200 animate-pulse">! 길을 잘못 들었습니다 !</div>
            <div class="bg-black/50 p-2 rounded">Time: <span id="val-time">0</span>s</div>
        </div>
    </div>

    <!-- Menus -->
    <div id="menu-screen" class="menu-overlay absolute inset-0 flex items-center justify-center">
        <div class="text-center text-white p-8 max-w-lg">
            <h1 class="text-5xl font-black mb-6 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">COSMIC DRIFT</h1>
            <p class="mb-8 text-gray-400">경로를 따라 완벽하게 한 바퀴를 도세요!</p>
            <button onclick="if(window.game) window.game.startRace()" class="px-10 py-4 bg-blue-600 rounded-full text-2xl font-bold hover:bg-blue-500 transition-all">START MISSION</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        friction: 0.95,
        turnSpeed: 0.08,
        accel: 0.3,
        maxSpeed: 8,
        trackWidth: 60,
        timeLimit: 45
    };

    class Vec { constructor(x, y) { this.x = x; this.y = y; } }

    class Game {
        constructor() {
            this.canvas = document.getElementById('gameCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.state = 'MENU';
            this.stage = 1;
            this.time = CONFIG.timeLimit;
            this.player = { pos: new Vec(0, 0), angle: 0, speed: 0 };
            this.keys = {};
            this.trackPath = [];
            this.sparks = [];
            this.viewTransform = { scale: 1, offsetX: 0, offsetY: 0 };
            this.currentSegment = 0; // 내비게이션용 진행 상태
            this.offTrackCounter = 0;
            this.initEvents();
            this.loop();
        }

        initEvents() {
            window.addEventListener('keydown', e => this.keys[e.code] = true);
            window.addEventListener('keyup', e => this.keys[e.code] = false);
            window.addEventListener('resize', () => this.resize());
            this.resize();
        }

        resize() { 
            this.canvas.width = window.innerWidth; 
            this.canvas.height = window.innerHeight; 
            if(this.trackPath.length > 0) this.fitTrackToScreen();
        }

        generateTrack(stage) {
            this.trackPath = [];
            let segments = 80 + (stage * 40);
            let x = 0, y = 0;
            let angle = 0;
            
            // 더 꼬불꼬불한 트랙 생성
            for(let i=0; i<segments; i++) {
                angle += Math.sin(i * 0.05) * (0.2 + stage * 0.1);
                x += Math.cos(angle) * 30;
                y += Math.sin(angle) * 30;
                this.trackPath.push(new Vec(x, y));
            }
            
            CONFIG.trackWidth = Math.max(10, 50 - (stage * 10)); 
            this.fitTrackToScreen();
            this.resetPlayerToStart();
        }

        fitTrackToScreen() {
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            this.trackPath.forEach(p => {
                minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
                minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
            });

            const padding = 100;
            const w = (maxX - minX) || 1;
            const h = (maxY - minY) || 1;
            
            this.viewTransform.scale = Math.min((this.canvas.width - padding) / w, (this.canvas.height - padding) / h);
            this.viewTransform.offsetX = (this.canvas.width - (w * this.viewTransform.scale)) / 2 - (minX * this.viewTransform.scale);
            this.viewTransform.offsetY = (this.canvas.height - (h * this.viewTransform.scale)) / 2 - (minY * this.viewTransform.scale);
        }

        resetPlayerToStart() {
            this.player.pos = new Vec(this.trackPath[0].x, this.trackPath[0].y);
            this.player.angle = Math.atan2(this.trackPath[1].y - this.trackPath[0].y, this.trackPath[1].x - this.trackPath[0].x);
            this.player.speed = 0;
            this.currentSegment = 0;
            this.offTrackCounter = 0;
        }

        update() {
            if (this.state !== 'RACING') return;

            this.time -= 1/60;
            document.getElementById('val-time').innerText = Math.floor(this.time);
            if(this.time <= 0) this.gameOver();

            if (this.keys['ArrowUp'] || this.keys['KeyW']) this.player.speed = Math.min(this.player.speed + CONFIG.accel, CONFIG.maxSpeed);
            if (this.keys['ArrowDown'] || this.keys['KeyS']) this.player.speed = Math.max(this.player.speed - CONFIG.accel, -2);
            if (this.keys['ArrowLeft'] || this.keys['KeyA']) this.player.angle -= CONFIG.turnSpeed;
            if (this.keys['ArrowRight'] || this.keys['KeyD']) this.player.angle += CONFIG.turnSpeed;

            this.player.speed *= CONFIG.friction;
            this.player.pos.x += Math.cos(this.player.angle) * this.player.speed;
            this.player.pos.y += Math.sin(this.player.angle) * this.player.speed;

            this.checkTrack();
            this.checkProgress();
            this.updateSparks();
        }

        checkProgress() {
            let p = this.player.pos;
            let closestIdx = 0;
            let minDist = Infinity;

            for(let i=0; i<this.trackPath.length; i++) {
                let d = Math.hypot(p.x - this.trackPath[i].x, p.y - this.trackPath[i].y);
                if(d < minDist) { minDist = d; closestIdx = i; }
            }

            // 경로 역주행/이탈 감지
            const warnBox = document.getElementById('warning-box');
            if (closestIdx < this.currentSegment - 5) {
                warnBox.style.opacity = '1';
                warnBox.innerText = "! 길을 잘못 들었습니다 !";
            } else if (minDist > CONFIG.trackWidth * 2) {
                warnBox.style.opacity = '1';
                warnBox.innerText = "! 경로를 이탈했습니다 !";
                this.offTrackCounter++;
            } else {
                warnBox.style.opacity = '0';
                this.offTrackCounter = 0;
                if(closestIdx > this.currentSegment) this.currentSegment = closestIdx;
            }

            // 강제 복귀
            if(this.offTrackCounter > 100) {
                this.resetPlayerToStart();
                this.offTrackCounter = 0;
            }

            if(this.currentSegment >= this.trackPath.length - 5) this.nextStage();
        }

        checkTrack() {
            let p = this.player.pos;
            let closestDist = Infinity;
            let closestPoint = new Vec(0, 0);

            for(let i=0; i<this.trackPath.length - 1; i++) {
                let v = this.trackPath[i];
                let w = this.trackPath[i+1];
                let l2 = (v.x-w.x)**2 + (v.y-w.y)**2;
                let t = ((p.x-v.x)*(w.x-v.x) + (p.y-v.y)*(w.y-v.y)) / l2;
                t = Math.max(0, Math.min(1, t));
                let proj = new Vec(v.x + t*(w.x-v.x), v.y + t*(w.y-v.y));
                let dist = Math.hypot(p.x - proj.x, p.y - proj.y);
                
                if(dist < closestDist) { closestDist = dist; closestPoint = proj; }
            }

            if(closestDist > CONFIG.trackWidth) {
                this.player.pos.x = closestPoint.x + (p.x - closestPoint.x) * (CONFIG.trackWidth / closestDist);
                this.player.pos.y = closestPoint.y + (p.y - closestPoint.y) * (CONFIG.trackWidth / closestDist);
                this.player.speed *= 0.1; 
                this.addSpark(p.x, p.y, 5); 
            }
        }

        addSpark(x, y, count = 3) {
            for(let i=0; i<count; i++) {
                this.sparks.push({ x, y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, life: 1.0 });
            }
        }

        updateSparks() {
            this.sparks.forEach(s => { s.x += s.vx; s.y += s.vy; s.life -= 0.05; });
            this.sparks = this.sparks.filter(s => s.life > 0);
        }

        draw() {
            this.ctx.fillStyle = '#050505';
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            if (this.trackPath.length > 0) {
                this.ctx.save();
                this.ctx.translate(this.viewTransform.offsetX, this.viewTransform.offsetY);
                this.ctx.scale(this.viewTransform.scale, this.viewTransform.scale);

                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = CONFIG.trackWidth * 2;
                this.ctx.lineCap = 'round';
                this.ctx.beginPath();
                this.ctx.moveTo(this.trackPath[0].x, this.trackPath[0].y);
                this.trackPath.forEach(p => this.ctx.lineTo(p.x, p.y));
                this.ctx.stroke();

                this.ctx.save();
                this.ctx.translate(this.player.pos.x, this.player.pos.y);
                this.ctx.rotate(this.player.angle);
                this.ctx.fillStyle = '#3b82f6';
                this.ctx.fillRect(-15, -10, 30, 20);
                this.ctx.restore();

                this.sparks.forEach(s => {
                    this.ctx.fillStyle = `rgba(255, 165, 0, ${s.life})`;
                    this.ctx.beginPath(); this.ctx.arc(s.x, s.y, 2, 0, Math.PI*2); this.ctx.fill();
                });
                this.ctx.restore();
            }
        }

        startRace() {
            this.state = 'RACING';
            this.stage = 1;
            this.time = CONFIG.timeLimit;
            this.generateTrack(this.stage);
            document.getElementById('menu-screen').classList.add('hidden');
        }

        nextStage() {
            this.stage++;
            if(this.stage > 3) {
                alert("축하합니다! 모든 미션을 완료했습니다.");
                this.state = 'MENU';
                document.getElementById('menu-screen').classList.remove('hidden');
            } else {
                this.time = CONFIG.timeLimit;
                this.generateTrack(this.stage);
                document.getElementById('val-stage').innerText = this.stage;
            }
        }

        gameOver() {
            this.state = 'MENU';
            document.getElementById('menu-screen').classList.remove('hidden');
        }

        loop() {
            this.update();
            this.draw();
            requestAnimationFrame(() => this.loop());
        }
    }

    window.onload = () => { window.game = new Game(); };
</script>
</body>
</html>
