<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네온 블록 블래스트 (Neon Block Blast)</title>
    <!-- Tailwind CSS (UI 및 레이아웃 용도) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Prettify typography) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #0f172a;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }
        /* 캔버스 하이라이트 및 부드러운 전환 효과 */
        canvas {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 16px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 text-slate-100">

    <!-- 메인 게임 컨테이너 -->
    <div class="relative flex flex-col items-center max-w-lg w-full">
        
        <!-- 상단 헤더 / 정보 표시 UI -->
        <div class="w-full flex items-center justify-between mb-4 px-2">
            <div class="flex flex-col">
                <h1 class="text-2xl md:text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500">
                    BLOCK BLAST
                </h1>
                <p class="text-xs text-slate-400 font-semibold tracking-widest">NEON EDITION</p>
            </div>
            
            <div class="flex gap-2">
                <!-- 힌트 버튼 -->
                <button id="hint-btn" class="px-3 py-2 bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all rounded-lg border border-slate-700 flex items-center gap-1.5 text-xs font-bold text-amber-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                    </svg>
                    힌트 (H)
                </button>
                <!-- 일시정지 버튼 -->
                <button id="pause-btn" class="p-2 bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all rounded-lg border border-slate-700 text-slate-300">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 점수 및 콤보 보드 -->
        <div class="w-full grid grid-cols-3 gap-2 mb-4">
            <div class="bg-slate-900/80 border border-slate-800 p-2.5 rounded-xl text-center backdrop-blur-sm shadow-inner">
                <div class="text-[10px] text-slate-500 font-bold tracking-wider">SCORE</div>
                <div id="score-val" class="text-xl font-extrabold text-white">0</div>
            </div>
            <div class="bg-slate-900/80 border border-slate-800 p-2.5 rounded-xl text-center backdrop-blur-sm shadow-inner relative overflow-hidden">
                <div class="text-[10px] text-slate-500 font-bold tracking-wider">COMBO</div>
                <div id="combo-val" class="text-xl font-extrabold text-cyan-400 transition-all duration-300">0</div>
                <!-- 콤보 게이지 바 -->
                <div id="combo-bar" class="absolute bottom-0 left-0 h-1 bg-cyan-400 transition-all duration-300 w-0"></div>
            </div>
            <div class="bg-slate-900/80 border border-slate-800 p-2.5 rounded-xl text-center backdrop-blur-sm shadow-inner">
                <div class="text-[10px] text-slate-500 font-bold tracking-wider">BEST</div>
                <div id="best-val" class="text-xl font-extrabold text-fuchsia-400">0</div>
            </div>
        </div>

        <!-- 게임 캔버스 컨테이너 (정사각형 및 고정 비율) -->
        <div class="relative w-full aspect-[4/5] bg-slate-950 rounded-2xl overflow-hidden border-2 border-slate-800 shadow-2xl">
            <canvas id="gameCanvas" class="w-full h-full block bg-slate-950"></canvas>

            <!-- 일시정지 오버레이 -->
            <div id="pause-overlay" class="hidden absolute inset-0 bg-slate-950/80 backdrop-blur-md flex flex-col items-center justify-center z-10">
                <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl max-w-xs w-full text-center shadow-2xl scale-95 transition-all duration-300">
                    <h2 class="text-2xl font-black text-slate-100 mb-6 tracking-wide">PAUSED</h2>
                    <button id="resume-btn" class="w-full mb-3 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 font-bold text-white rounded-xl shadow-lg shadow-cyan-500/20 active:scale-95 transition-all">
                        계속하기
                    </button>
                    <button id="restart-pause-btn" class="w-full py-3 bg-slate-800 hover:bg-slate-700 font-bold text-slate-300 rounded-xl border border-slate-700 active:scale-95 transition-all">
                        처음부터 다시
                    </button>
                </div>
            </div>

            <!-- 게임오버 오버레이 -->
            <div id="gameover-overlay" class="hidden absolute inset-0 bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center z-10">
                <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl max-w-xs w-full text-center shadow-2xl scale-95 transition-all duration-300">
                    <div class="text-red-500 mb-3 flex justify-center">
                        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-black text-red-500 tracking-wide mb-1">GAME OVER</h2>
                    <p class="text-slate-400 text-sm mb-6">배치할 공간이 더 이상 없습니다!</p>
                    
                    <div class="bg-slate-950/50 p-4 rounded-xl border border-slate-800 mb-6 text-left space-y-2">
                        <div class="flex justify-between text-xs text-slate-400">
                            <span>최종 점수:</span>
                            <span id="final-score-val" class="font-bold text-white text-sm">0</span>
                        </div>
                        <div class="flex justify-between text-xs text-slate-400">
                            <span>최고 점수:</span>
                            <span id="final-best-val" class="font-bold text-fuchsia-400 text-sm">0</span>
                        </div>
                    </div>

                    <button id="restart-btn" class="w-full py-3 bg-gradient-to-r from-fuchsia-500 to-pink-600 hover:from-fuchsia-400 hover:to-pink-500 font-bold text-white rounded-xl shadow-lg shadow-fuchsia-500/20 active:scale-95 transition-all">
                        다시 도전하기
                    </button>
                </div>
            </div>
        </div>

        <!-- 하단 단축키 가이드 -->
        <div class="w-full text-center mt-3 text-[11px] text-slate-500 font-medium">
            <span class="mx-2">단축키: <b>H</b> (힌트)</span>
            <span class="mx-2"><b>P</b> (일시정지)</span>
            <span class="mx-2"><b>R</b> (재시작)</span>
        </div>
    </div>

    <!-- 스크립트 영역 -->
    <script>
        // --- 1. Sound (구조 설계 및 오디오 합성 기능 구현) ---
        // 파일 없이도 작동할 수 있도록 HTML5 Web Audio API를 사용해 사운드 이펙트를 동적으로 직접 합성합니다.
        class SoundSystem {
            constructor() {
                this.ctx = null;
                this.isMuted = false;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            playSelect() {
                this.init(); if (this.isMuted || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.1);

                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);

                osc.start();
                osc.stop(this.ctx.currentTime + 0.12);
            }

            playPlace() {
                this.init(); if (this.isMuted || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.setValueAtTime(350, this.ctx.currentTime + 0.05);

                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);

                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            }

            playClear(comboCount = 1) {
                this.init(); if (this.isMuted || !this.ctx) return;
                const now = this.ctx.currentTime;
                const baseFreq = 440 + (comboCount * 110);
                
                // 메인 화음 3개 쌓기 (아르페지오 느낌 생성)
                [0, 4, 7].forEach((semi, idx) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);

                    osc.type = 'sine';
                    const freq = baseFreq * Math.pow(1.059463, semi);
                    osc.frequency.setValueAtTime(freq, now + idx * 0.04);
                    
                    gain.gain.setValueAtTime(0.05, now + idx * 0.04);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.04 + 0.3);

                    osc.start(now + idx * 0.04);
                    osc.stop(now + idx * 0.04 + 0.35);
                });
            }

            playGameOver() {
                this.init(); if (this.isMuted || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, this.ctx.currentTime + 0.8);

                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.85);

                osc.start();
                osc.stop(this.ctx.currentTime + 0.85);
            }

            playHint() {
                this.init(); if (this.isMuted || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, this.ctx.currentTime); // D5
                osc.frequency.setValueAtTime(880.00, this.ctx.currentTime + 0.08); // A5

                gain.gain.setValueAtTime(0.06, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2);

                osc.start();
                osc.stop(this.ctx.currentTime + 0.2);
            }
        }

        const Sound = new SoundSystem();

        // --- 2. 블록 팔레트 정의 (폴리오미노 도형 정보) ---
        const BLOCK_SHAPES = [
            // 1칸 (Dot)
            { shape: [[1]], color: '#f43f5e', name: 'dot' },
            // 2칸 (I-2)
            { shape: [[1, 1]], color: '#3b82f6', name: 'i2' },
            { shape: [[1], [1]], color: '#3b82f6', name: 'i2_v' },
            // 3칸 (I-3)
            { shape: [[1, 1, 1]], color: '#06b6d4', name: 'i3' },
            { shape: [[1], [1], [1]], color: '#06b6d4', name: 'i3_v' },
            // 3칸 (L-small)
            { shape: [[1, 1], [1, 0]], color: '#10b981', name: 'v3' },
            { shape: [[1, 1], [0, 1]], color: '#10b981', name: 'v3_r1' },
            { shape: [[1, 0], [1, 1]], color: '#10b981', name: 'v3_r2' },
            { shape: [[0, 1], [1, 1]], color: '#10b981', name: 'v3_r3' },
            // 4칸 (O-Square)
            { shape: [[1, 1], [1, 1]], color: '#eab308', name: 'o' },
            // 4칸 (I-4)
            { shape: [[1, 1, 1, 1]], color: '#ec4899', name: 'i4' },
            { shape: [[1], [1], [1], [1]], color: '#ec4899', name: 'i4_v' },
            // 4칸 (L-normal)
            { shape: [[1, 0, 0], [1, 1, 1]], color: '#8b5cf6', name: 'l4' },
            { shape: [[1, 1, 1], [1, 0, 0]], color: '#8b5cf6', name: 'l4_r1' },
            { shape: [[1, 1], [0, 1], [0, 1]], color: '#8b5cf6', name: 'l4_r2' },
            { shape: [[1, 1], [1, 0], [1, 0]], color: '#8b5cf6', name: 'l4_r3' },
            // 4칸 (T)
            { shape: [[1, 1, 1], [0, 1, 0]], color: '#f97316', name: 't4' },
            { shape: [[0, 1, 0], [1, 1, 1]], color: '#f97316', name: 't4_r1' },
            { shape: [[1, 0], [1, 1], [1, 0]], color: '#f97316', name: 't4_r2' },
            { shape: [[0, 1], [1, 1], [0, 1]], color: '#f97316', name: 't4_r3' },
            // 5칸 (I-5)
            { shape: [[1, 1, 1, 1, 1]], color: '#a855f7', name: 'i5' },
            { shape: [[1], [1], [1], [1], [1]], color: '#a855f7', name: 'i5_v' },
            // 5칸 (U)
            { shape: [[1, 0, 1], [1, 1, 1]], color: '#14b8a6', name: 'u5' },
            // 5칸 (Big L)
            { shape: [[1, 0, 0], [1, 0, 0], [1, 1, 1]], color: '#f43f5e', name: 'l5' },
            { shape: [[1, 1, 1], [0, 0, 1], [0, 0, 1]], color: '#f43f5e', name: 'l5_r1' },
            // 9칸 (3x3 Square)
            { shape: [[1, 1, 1], [1, 1, 1], [1, 1, 1]], color: '#3b82f6', name: 'sq9' }
        ];

        // --- 3. Collision Detection (충돌 및 배치 유효성 검사 모듈) ---
        class CollisionDetector {
            static canPlaceAt(board, blockShape, startRow, startCol) {
                const rows = blockShape.length;
                const cols = blockShape[0].length;

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (blockShape[r][c] !== 0) {
                            const boardRow = startRow + r;
                            const boardCol = startCol + c;

                            // 보드 경계 검사
                            if (boardRow < 0 || boardRow >= board.size || boardCol < 0 || boardCol >= board.size) {
                                return false;
                            }
                            // 기존 블록 충돌 검사
                            if (board.grid[boardRow][boardCol] !== null) {
                                return false;
                            }
                        }
                    }
                }
                return true;
            }

            // 블록이 보드에 안착될 그리드 스냅 포지션(Row, Col)을 계산
            static getSnapGridPosition(board, blockScreenX, blockScreenY, cellSize, boardX, boardY) {
                // 블록의 드래그 핸들 지점을 기준으로 스냅 영역 산출 (어느 정도 중심을 고려한 세련된 스냅)
                const relativeX = blockScreenX - boardX;
                const relativeY = blockScreenY - boardY;

                const col = Math.round(relativeX / cellSize);
                const row = Math.round(relativeY / cellSize);

                return { row, col };
            }
        }

        // --- 4. Board (8x8 메인 퍼즐 판 클래스) ---
        class Board {
            constructor(size = 8) {
                this.size = size;
                this.grid = Array(size).fill(null).map(() => Array(size).fill(null));
                this.gridAnim = Array(size).fill(null).map(() => Array(size).fill(0)); // 입체적 등장을 위한 스케일 배율
            }

            clear() {
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        this.grid[r][c] = null;
                        this.gridAnim[r][c] = 0;
                    }
                }
            }

            placeBlock(blockShape, startRow, startCol, color) {
                const rows = blockShape.length;
                const cols = blockShape[0].length;

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (blockShape[r][c] !== 0) {
                            const boardRow = startRow + r;
                            const boardCol = startCol + c;
                            this.grid[boardRow][boardCol] = { color, opacity: 1, scale: 0.1 };
                        }
                    }
                }
            }

            // 완성된 가로/세로 줄 제거 판정
            checkAndClearLines() {
                let fullRows = [];
                let fullCols = [];

                // 가로줄 검사
                for (let r = 0; r < this.size; r++) {
                    let isRowFull = true;
                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] === null) {
                            isRowFull = false;
                            break;
                        }
                    }
                    if (isRowFull) fullRows.push(r);
                }

                // 세로줄 검사
                for (let c = 0; c < this.size; c++) {
                    let isColFull = true;
                    for (let r = 0; r < this.size; r++) {
                        if (this.grid[r][c] === null) {
                            isColFull = false;
                            break;
                        }
                    }
                    if (isColFull) fullCols.push(c);
                }

                return { rows: fullRows, cols: fullCols };
            }

            // 실제 그리드 데이터에서 특정 줄 비우기
            clearLines(rows, cols) {
                rows.forEach(r => {
                    for (let c = 0; c < this.size; c++) {
                        this.grid[r][c] = null;
                    }
                });

                cols.forEach(c => {
                    for (let r = 0; r < this.size; r++) {
                        this.grid[r][c] = null;
                    }
                });
            }
        }

        // --- 5. Block (드래그 가능한 핸드 덱 블록 클래스) ---
        class Block {
            constructor(id, data, index, maxSlots = 3) {
                this.id = id;
                this.shape = data.shape;
                this.color = data.color;
                this.name = data.name;
                
                // 덱 안에서의 기준 위치 설계
                this.deckIndex = index;
                this.maxSlots = maxSlots;
                
                // 화면 렌더링용 변수들
                this.x = 0; // 동적 계산
                this.y = 0;
                this.targetX = 0;
                this.targetY = 0;
                
                this.width = 0;
                this.height = 0;
                this.isDragged = false;
                this.dragOffsetX = 0;
                this.dragOffsetY = 0;
                
                this.scale = 0.5; // 슬롯에 위치할 때는 원래 크기보다 조금 귀엽게 축소
                this.opacity = 0; // 등장 트랜지션
                this.isUsed = false;

                // 생성 시 초기 등장 애니메이션 적용
                setTimeout(() => {
                    this.scale = 0.65;
                }, 50);
            }

            // 덱 내 슬롯 좌표 자동 계산
            updatePosition(deckAreaY, deckHeight, cellWidth, canvasWidth) {
                if (this.isUsed) return;

                const slotWidth = canvasWidth / this.maxSlots;
                const slotCenterX = (this.deckIndex * slotWidth) + (slotWidth / 2);
                const slotCenterY = deckAreaY + (deckHeight / 2);

                const shapeRows = this.shape.length;
                const shapeCols = this.shape[0].length;
                this.width = shapeCols * cellWidth;
                this.height = shapeRows * cellWidth;

                if (!this.isDragged) {
                    // 원래 위치 타겟 설정
                    this.targetX = slotCenterX - (this.width * this.scale) / 2;
                    this.targetY = slotCenterY - (this.height * this.scale) / 2;

                    // 스무스하게 원래 위치로 롤백 애니메이션
                    this.x += (this.targetX - this.x) * 0.25;
                    this.y += (this.targetY - this.y) * 0.25;
                    this.scale += (0.65 - this.scale) * 0.15;
                    this.opacity += (1 - this.opacity) * 0.15;
                } else {
                    // 드래그 중에는 스케일이 1에 가깝게 확대되어 격자에 잘 매칭되도록 연출
                    this.scale += (0.95 - this.scale) * 0.25;
                    this.opacity = 0.85; // 반투명 연출
                }
            }

            // 해당 마우스 위치가 드래그 가능한 블록 영역 내부인지 검사
            containsPoint(mx, my) {
                if (this.isUsed) return false;
                const currentWidth = this.width * this.scale;
                const currentHeight = this.height * this.scale;
                return (
                    mx >= this.x &&
                    mx <= this.x + currentWidth &&
                    my >= this.y &&
                    my <= this.y + currentHeight
                );
            }
        }

        // --- 6. Effect (이펙트 & 특수 연출 관리 클래스) ---
        class EffectSystem {
            constructor() {
                this.particles = [];
                this.combos = [];
                this.screenShakes = 0;
            }

            // 줄 파괴 시 다채로운 색감의 반짝이 파티클 스폰
            spawnClearParticles(x, y, color) {
                const count = 8 + Math.floor(Math.random() * 6);
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 6;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        size: 3 + Math.random() * 5,
                        color: color,
                        alpha: 1.0,
                        decay: 0.02 + Math.random() * 0.03,
                        rotation: Math.random() * Math.PI,
                        rotSpeed: (Math.random() - 0.5) * 0.2
                    });
                }
            }

            // 콤보 발생 시 떠오르는 역동적인 텍스트 효과
            spawnComboText(x, y, text) {
                this.combos.push({
                    x: x,
                    y: y,
                    text: text,
                    alpha: 1.0,
                    scale: 0.8,
                    vy: -1.8,
                    maxLife: 50,
                    life: 50
                });
                this.screenShakes = 6; // 화면 흔들림 이펙트 트리거
            }

            update() {
                // 파티클 물리 적용
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.98; // 마찰력
                    p.vy *= 0.98;
                    p.alpha -= p.decay;
                    p.rotation += p.rotSpeed;
                    if (p.alpha <= 0) {
                        this.particles.splice(i, 1);
                    }
                }

                // 콤보 텍스트 연출 적용
                for (let i = this.combos.length - 1; i >= 0; i--) {
                    const c = this.combos[i];
                    c.y += c.vy;
                    c.life--;
                    c.scale = 0.8 + (1.0 - c.life / c.maxLife) * 0.4;
                    c.alpha = c.life / c.maxLife;
                    if (c.life <= 0) {
                        this.combos.splice(i, 1);
                    }
                }

                // 화면 흔들림 감쇠
                if (this.screenShakes > 0) {
                    this.screenShakes *= 0.85;
                    if (this.screenShakes < 0.1) this.screenShakes = 0;
                }
            }

            draw(ctx) {
                // 파티클 그리기 (글로우 효과 부여)
                ctx.save();
                this.particles.forEach(p => {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 10;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                });
                ctx.restore();

                // 콤보 텍스트 렌더링
                ctx.save();
                this.combos.forEach(c => {
                    ctx.globalAlpha = c.alpha;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    // 네온 효과 레이어
                    ctx.shadowColor = '#06b6d4';
                    ctx.shadowBlur = 15;
                    ctx.font = `900 ${Math.floor(24 * c.scale)}px 'Noto Sans KR'`;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(c.text, c.x, c.y);

                    ctx.font = `900 ${Math.floor(24 * c.scale)}px 'Noto Sans KR'`;
                    ctx.strokeStyle = '#0891b2';
                    ctx.lineWidth = 3;
                    ctx.strokeText(c.text, c.x, c.y);
                });
                ctx.restore();
            }
        }

        // --- 7. Main Game (전체 게임 제어 및 루프 오케스트레이션) ---
        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');

                this.score = 0;
                this.bestScore = parseInt(localStorage.getItem('block_blast_best') || '0', 10);
                this.combo = 0;
                this.comboTimer = 0; // 콤보 유효 프레임 카운터
                this.maxComboTime = 480; // 약 8초 (60fps 기준)
                
                this.board = new Board(8);
                this.blocks = [];
                this.draggedBlock = null;

                this.isPaused = false;
                this.isGameOver = false;

                // 디바이스별 스케일 맞춤형 해상도 설정
                this.width = 400;
                this.height = 500;
                
                // 가로 너비에 따른 반응형 셀 사이즈 정의
                this.cellSize = 42;
                this.boardSizePx = this.cellSize * this.board.size;
                
                // 여백 기반 보드 중앙 배열
                this.boardX = (this.width - this.boardSizePx) / 2;
                this.boardY = 35; // 상부 마진

                // 하단 덱 영역 정의
                this.deckAreaY = this.boardY + this.boardSizePx + 15;
                this.deckHeight = this.height - this.deckAreaY - 15;

                this.effects = new EffectSystem();
                this.hintAnimationTimer = 0;
                this.activeHint = null; // 활성화된 추천 경로 구조

                this.initEvents();
                this.resizeCanvas();
                this.startNewGame();
            }

            // 고해상도 레티나 디스플레이 및 화면 자동 스케일 조절
            resizeCanvas() {
                const rect = this.canvas.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                this.canvas.width = rect.width * dpr;
                this.canvas.height = rect.height * dpr;
                this.ctx.scale(dpr, dpr);

                // 내부 버추얼 좌표계 고정
                this.virtualWidth = rect.width;
                this.virtualHeight = rect.height;

                // 스케일에 맞춰 게임 요소들 비례 재조정
                this.cellSize = (this.virtualWidth * 0.9) / this.board.size;
                this.boardSizePx = this.cellSize * this.board.size;
                this.boardX = (this.virtualWidth - this.boardSizePx) / 2;
                this.boardY = 24; 

                this.deckAreaY = this.boardY + this.boardSizePx + 20;
                this.deckHeight = this.virtualHeight - this.deckAreaY - 15;
            }

            startNewGame() {
                this.score = 0;
                this.combo = 0;
                this.comboTimer = 0;
                this.isPaused = false;
                this.isGameOver = false;
                this.board.clear();
                this.blocks = [];
                this.activeHint = null;
                this.generateNewDeck();
                this.updateUI();
                
                // 오버레이 제거
                document.getElementById('gameover-overlay').classList.add('hidden');
                document.getElementById('pause-overlay').classList.add('hidden');
            }

            // 3개의 새로운 랜덤 덱 블록 구성
            generateNewDeck() {
                this.blocks = [];
                for (let i = 0; i < 3; i++) {
                    const randomType = BLOCK_SHAPES[Math.floor(Math.random() * BLOCK_SHAPES.length)];
                    // 깊은 복사를 수행하여 인스턴스간 혼선 회피
                    const blockData = {
                        shape: randomType.shape.map(row => [...row]),
                        color: randomType.color,
                        name: randomType.name
                    };
                    const newBlock = new Block(Date.now() + i, blockData, i, 3);
                    
                    // 등장 연출 원점 설정 (화면 바깥에서 부드럽게 상승하며 생성되게 함)
                    const slotWidth = this.virtualWidth / 3;
                    newBlock.x = (i * slotWidth) + (slotWidth / 2) - 20;
                    newBlock.y = this.virtualHeight + 50;

                    this.blocks.push(newBlock);
                }
                
                // 덱 생성 시 즉시 가능한 자리가 있는지 체크하여 바로 불가능할 때 조기 게임오버 방지
                this.checkGameOverCondition();
            }

            // 입력 이벤트 (마우스 및 모바일 터치 통합)
            initEvents() {
                const getEventCoords = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    let clientX, clientY;
                    if (e.touches && e.touches.length > 0) {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }
                    return {
                        x: clientX - rect.left,
                        y: clientY - rect.top
                    };
                };

                const handleStart = (e) => {
                    if (this.isPaused || this.isGameOver) return;
                    Sound.init(); // 사운드 초기화 액티브
                    const coords = getEventCoords(e);
                    
                    // 드래그 중인 상태가 아닐 때만 타겟 검색
                    if (!this.draggedBlock) {
                        // 덱 내에서 탭한 블록 탐색
                        for (let i = 0; i < this.blocks.length; i++) {
                            const b = this.blocks[i];
                            if (!b.isUsed && b.containsPoint(coords.x, coords.y)) {
                                this.draggedBlock = b;
                                b.isDragged = true;
                                
                                // 마우스 포인트 대비 블록 상대 오프셋 설정
                                b.dragOffsetX = coords.x - b.x;
                                b.dragOffsetY = coords.y - b.y;

                                Sound.playSelect();
                                this.activeHint = null; // 터치 시 힌트 강조 해제
                                break;
                            }
                        }
                    }
                };

                const handleMove = (e) => {
                    if (this.isPaused || this.isGameOver || !this.draggedBlock) return;
                    e.preventDefault(); // 화면 스크롤 금지
                    const coords = getEventCoords(e);

                    // 마우스 좌표에 부드럽게 맞추기
                    this.draggedBlock.x = coords.x - this.draggedBlock.dragOffsetX;
                    this.draggedBlock.y = coords.y - this.draggedBlock.dragOffsetY;
                };

                const handleEnd = () => {
                    if (!this.draggedBlock) return;

                    const b = this.draggedBlock;
                    b.isDragged = false;

                    // 보드의 그리드 스냅 연산
                    const { row, col } = CollisionDetector.getSnapGridPosition(
                        this.board,
                        b.x,
                        b.y,
                        this.cellSize,
                        this.boardX,
                        this.boardY
                    );

                    // 배치 유효성 체크
                    if (CollisionDetector.canPlaceAt(this.board, b.shape, row, col)) {
                        // 보드에 블록 박아넣기
                        this.board.placeBlock(b.shape, row, col, b.color);
                        b.isUsed = true;
                        
                        // 사운드
                        Sound.playPlace();

                        // 블록 배치 성공 스코어 점수 가산 (블록 타일 개수만큼)
                        let placedTiles = 0;
                        b.shape.forEach(r => r.forEach(v => { if (v > 0) placedTiles++; }));
                        this.addScore(placedTiles);

                        // 배치 직후 제거 행/열 판정 진행
                        this.processLinesRemoval(row, col, b.shape);

                        // 사용한 블록 리스트에서 소거 처리 예정 검사
                        this.checkDeckProgression();
                    } else {
                        // 배치 실패 시 제자리로 통 튕겨가게 플래그 초기화
                        b.isDragged = false;
                    }

                    this.draggedBlock = null;
                };

                // 데스크탑 마우스 바인딩
                this.canvas.addEventListener('mousedown', handleStart);
                window.addEventListener('mousemove', handleMove);
                window.addEventListener('mouseup', handleEnd);

                // 모바일 터치 바인딩
                this.canvas.addEventListener('touchstart', handleStart, { passive: false });
                window.addEventListener('touchmove', handleMove, { passive: false });
                window.addEventListener('touchend', handleEnd);

                // 리사이즈 처리
                window.addEventListener('resize', () => this.resizeCanvas());

                // 외부 UI 버튼 매핑
                document.getElementById('pause-btn').addEventListener('click', () => this.togglePause());
                document.getElementById('resume-btn').addEventListener('click', () => this.togglePause());
                document.getElementById('restart-btn').addEventListener('click', () => this.startNewGame());
                document.getElementById('restart-pause-btn').addEventListener('click', () => this.startNewGame());
                
                // 힌트 버튼 트리거
                document.getElementById('hint-btn').addEventListener('click', () => this.triggerHint());

                // 키보드 핫키 지원
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'p' || e.key === 'P' || e.key === 'ㅔ') {
                        this.togglePause();
                    } else if (e.key === 'r' || e.key === 'R' || e.key === 'ㄱ') {
                        this.startNewGame();
                    } else if (e.key === 'h' || e.key === 'H' || e.key === 'ㅗ') {
                        this.triggerHint();
                    }
                });
            }

            // 덱 소진 및 자동 갱신 관리
            checkDeckProgression() {
                const allUsed = this.blocks.every(b => b.isUsed);
                if (allUsed) {
                    this.generateNewDeck();
                } else {
                    // 남은 블록이 하나라도 있을 때, 게임 오버 트리거 유무 체크
                    this.checkGameOverCondition();
                }
            }

            // 완성된 줄 폭파 가동 및 콤보 갱신
            processLinesRemoval() {
                const { rows, cols } = this.board.checkAndClearLines();
                const totalClearedLines = rows.length + cols.length;

                if (totalClearedLines > 0) {
                    // 콤보 증가 및 게이지 타이머 리셋
                    this.combo++;
                    this.comboTimer = this.maxComboTime;

                    // 줄 파괴 애니메이션 이펙트 시동
                    rows.forEach(r => {
                        const cy = this.boardY + (r * this.cellSize) + (this.cellSize / 2);
                        for (let c = 0; c < this.board.size; c++) {
                            const cx = this.boardX + (c * this.cellSize) + (this.cellSize / 2);
                            this.effects.spawnClearParticles(cx, cy, '#06b6d4');
                        }
                    });

                    cols.forEach(c => {
                        const cx = this.boardX + (c * this.cellSize) + (this.cellSize / 2);
                        for (let r = 0; r < this.board.size; r++) {
                            const cy = this.boardY + (r * this.cellSize) + (this.cellSize / 2);
                            this.effects.spawnClearParticles(cx, cy, '#f43f5e');
                        }
                    });

                    // 점수 공식: (지운 라인수 * 100) * 콤보 가중치 + 멀티라인 보너스
                    const baseLineScore = totalClearedLines * 100;
                    const comboBonus = this.combo;
                    const multiBonus = totalClearedLines > 1 ? (totalClearedLines - 1) * 50 : 0;
                    const gainedScore = (baseLineScore * comboBonus) + multiBonus;

                    this.addScore(gainedScore);

                    // 콤보 특수 연출 텍스트
                    const comboX = this.virtualWidth / 2;
                    const comboY = this.boardY + (this.boardSizePx / 2);
                    const label = this.combo > 1 ? `${this.combo} COMBO! (+${gainedScore})` : `LINE CLEAR! (+${gainedScore})`;
                    this.effects.spawnComboText(comboX, comboY, label);

                    // 줄 정리 효과음
                    Sound.playClear(this.combo);

                    // 실제 보드 그리드에서 정리
                    this.board.clearLines(rows, cols);
                }
            }

            // 점수 획득 및 로컬스토리지 최고 점수 기록 보존
            addScore(pts) {
                this.score += pts;
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('block_blast_best', this.bestScore.toString());
                }
                this.updateUI();
            }

            updateUI() {
                document.getElementById('score-val').innerText = this.score;
                document.getElementById('best-val').innerText = this.bestScore;
                document.getElementById('combo-val').innerText = `${this.combo}x`;
                
                // 콤보 누적 수준에 따른 다이내믹 컬러링
                const comboValEl = document.getElementById('combo-val');
                if (this.combo > 4) {
                    comboValEl.className = "text-xl font-extrabold text-amber-400 animate-bounce";
                } else if (this.combo > 1) {
                    comboValEl.className = "text-xl font-extrabold text-cyan-400";
                } else {
                    comboValEl.className = "text-xl font-extrabold text-slate-400";
                }
            }

            // 일시정지 분기 제어
            togglePause() {
                if (this.isGameOver) return;
                this.isPaused = !this.isPaused;
                const overlay = document.getElementById('pause-overlay');
                if (this.isPaused) {
                    overlay.classList.remove('hidden');
                } else {
                    overlay.classList.add('hidden');
                }
            }

            // 인공지능 기반 블록 추천 힌트 알고리즘
            triggerHint() {
                if (this.isPaused || this.isGameOver || this.activeHint) return;

                // 덱에 있는 블록들을 점검하여 최상의 배치 좌표를 역추적
                let bestMove = null;
                let highestScoreRating = -1;

                // 살아있는 블록 선별
                const aliveBlocks = this.blocks.filter(b => !b.isUsed);

                for (let b of aliveBlocks) {
                    for (let r = 0; r < this.board.size; r++) {
                        for (let c = 0; c < this.board.size; c++) {
                            if (CollisionDetector.canPlaceAt(this.board, b.shape, r, c)) {
                                // 임시 배치 후 클리어될 기대 줄 가치 환산
                                let rating = this.evaluatePositionRating(b.shape, r, c);
                                if (rating > highestScoreRating) {
                                    highestScoreRating = rating;
                                    bestMove = { block: b, row: r, col: c };
                                }
                            }
                        }
                    }
                }

                if (bestMove) {
                    this.activeHint = bestMove;
                    this.hintAnimationTimer = 0;
                    Sound.playHint();
                }
            }

            // 배치 자리가 우수하고 라인을 많이 지울 수 있는지 예측 레이팅 연산 함수
            evaluatePositionRating(shape, r, c) {
                let rating = 0;
                
                // 기본 보정: 가장자리나 하단 구석에 맞물릴수록 격자가 정돈되므로 가산점 부여
                const centerOffset = Math.abs(r - 3.5) + Math.abs(c - 3.5);
                rating += centerOffset * 1.5; // 외곽 지향 가중치

                // 임시로 가로/세로 완성 가능성 연산
                // (실제 데이터 훼손 없이 가상 누적 검사)
                const rows = shape.length;
                const cols = shape[0].length;
                
                // 가상 그리드 맵
                let simulatedRowCounts = Array(8).fill(0);
                let simulatedColCounts = Array(8).fill(0);

                // 현재 보드 점유 정보 누적
                for (let rIdx = 0; rIdx < 8; rIdx++) {
                    for (let cIdx = 0; cIdx < 8; cIdx++) {
                        if (this.board.grid[rIdx][cIdx] !== null) {
                            simulatedRowCounts[rIdx]++;
                            simulatedColCounts[cIdx]++;
                        }
                    }
                }

                // 가상 블록 투척
                for (let shapeR = 0; shapeR < rows; shapeR++) {
                    for (let shapeC = 0; shapeC < cols; shapeC++) {
                        if (shape[shapeR][shapeC] !== 0) {
                            const targetR = r + shapeR;
                            const targetC = c + shapeC;
                            if (targetR < 8 && targetC < 8) {
                                simulatedRowCounts[targetR]++;
                                simulatedColCounts[targetC]++;
                            }
                        }
                    }
                }

                // 한 줄 클리어가 완성된 상태라면 대폭 상승
                simulatedRowCounts.forEach(count => { if (count === 8) rating += 100; });
                simulatedColCounts.forEach(count => { if (count === 8) rating += 100; });

                return rating;
            }

            // 현재 가지고 있는 블록 중 하나라도 배치가 가능한 공간이 존재하는지 검증
            checkGameOverCondition() {
                const aliveBlocks = this.blocks.filter(b => !b.isUsed);
                if (aliveBlocks.length === 0) return; // 모든 덱을 소진하여 새로 가동할 때는 체크 바이패스

                let anyPlacementPossible = false;

                for (let b of aliveBlocks) {
                    for (let r = 0; r < this.board.size; r++) {
                        for (let c = 0; c < this.board.size; c++) {
                            if (CollisionDetector.canPlaceAt(this.board, b.shape, r, c)) {
                                anyPlacementPossible = true;
                                break;
                            }
                        }
                        if (anyPlacementPossible) break;
                    }
                    if (anyPlacementPossible) break;
                }

                if (!anyPlacementPossible) {
                    this.triggerGameOver();
                }
            }

            triggerGameOver() {
                this.isGameOver = true;
                Sound.playGameOver();
                
                // 최고 점수 오버레이 반영
                document.getElementById('final-score-val').innerText = this.score;
                document.getElementById('final-best-val').innerText = this.bestScore;
                
                document.getElementById('gameover-overlay').classList.remove('hidden');
            }

            // 매 프레임 업데이트 연산
            update() {
                if (this.isPaused || this.isGameOver) return;

                // 콤보 타이머 차감 및 제어
                if (this.comboTimer > 0) {
                    this.comboTimer--;
                    const comboPercent = (this.comboTimer / this.maxComboTime) * 100;
                    document.getElementById('combo-bar').style.width = `${comboPercent}%`;
                    if (this.comboTimer === 0) {
                        this.combo = 0; // 연속 콤보 타이머 소멸로 인한 리셋
                        this.updateUI();
                    }
                } else {
                    document.getElementById('combo-bar').style.width = '0%';
                }

                // 덱 블록 위치 갱신
                this.blocks.forEach(b => b.updatePosition(this.deckAreaY, this.deckHeight, this.cellSize, this.virtualWidth));

                // 이펙트 엔진 가동
                this.effects.update();

                // 힌트 깜빡임 연출 타이머 누적
                if (this.activeHint) {
                    this.hintAnimationTimer += 0.05;
                }
            }

            // 최적화된 60FPS 캔버스 렌더링
            draw() {
                this.ctx.clearRect(0, 0, this.virtualWidth, this.virtualHeight);

                // 화면 흔들림 연출 오프셋 적용
                this.ctx.save();
                if (this.effects.screenShakes > 0) {
                    const dx = (Math.random() - 0.5) * this.effects.screenShakes;
                    const dy = (Math.random() - 0.5) * this.effects.screenShakes;
                    this.ctx.translate(dx, dy);
                }

                // 1. 그리드 백그라운드 디자인 판 그리기
                this.drawBoardBackground();

                // 2. 힌트 포지션 강조 그리기 (가이드라인)
                this.drawActiveHint();

                // 3. 드래그 중인 임시 배치 가이드 투영
                this.drawPlacementPreview();

                // 4. 안착 완료된 보드 블록 고해상도 드로잉
                this.drawBoardBlocks();

                // 5. 이펙트 파티클 및 콤보 텍스트 투사
                this.effects.draw(this.ctx);

                // 6. 하단 덱 블록들 그리기
                this.drawDeckBlocks();

                this.ctx.restore();
            }

            // 고품격 격자 보드판 백그라운드 렌더러
            drawBoardBackground() {
                this.ctx.save();
                // 네온 경계 이너 섀도우 박스
                this.ctx.fillStyle = '#0f172a'; // 다크 슬레이트 백그라운드
                this.ctx.fillRect(this.boardX, this.boardY, this.boardSizePx, this.boardSizePx);

                // 전체 아웃라인 테두리 가이드
                this.ctx.strokeStyle = '#1e293b';
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(this.boardX, this.boardY, this.boardSizePx, this.boardSizePx);

                // 고정 격자 칸 그리기
                for (let r = 0; r < this.board.size; r++) {
                    for (let c = 0; c < this.board.size; c++) {
                        const cellX = this.boardX + (c * this.cellSize);
                        const cellY = this.boardY + (r * this.cellSize);
                        
                        // 칸 테두리 및 은은한 채움
                        this.ctx.strokeStyle = '#1e293b';
                        this.ctx.lineWidth = 1;
                        this.ctx.strokeRect(cellX + 1.5, cellY + 1.5, this.cellSize - 3, this.cellSize - 3);

                        // 잔잔한 격자 도트 센터 연출
                        this.ctx.fillStyle = '#334155';
                        this.ctx.beginPath();
                        this.ctx.arc(cellX + this.cellSize / 2, cellY + this.cellSize / 2, 1.5, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                }
                this.ctx.restore();
            }

            // 안착된 보드 상의 블록 렌더링 (그라데이션 및 입체 네온 섀도우)
            drawBoardBlocks() {
                this.ctx.save();
                for (let r = 0; r < this.board.size; r++) {
                    for (let c = 0; c < this.board.size; c++) {
                        const cell = this.board.grid[r][c];
                        if (cell !== null) {
                            const cellX = this.boardX + (c * this.cellSize);
                            const cellY = this.boardY + (r * this.cellSize);
                            
                            this.drawNeonBlockCell(
                                cellX + 1.5, 
                                cellY + 1.5, 
                                this.cellSize - 3, 
                                cell.color, 
                                1.0
                            );
                        }
                    }
                }
                this.ctx.restore();
            }

            // 단일 격자 전용 입체 둥근 네온 블록 세포 묘사기
            drawNeonBlockCell(x, y, size, color, alpha = 1.0, isPreview = false, isBlocked = false) {
                this.ctx.save();
                this.ctx.globalAlpha = alpha;
                const radius = 6; // 부드러운 라운드 처리

                // 블록 가득 채우기 그라디언트
                const grad = this.ctx.createLinearGradient(x, y, x + size, y + size);
                if (isBlocked) {
                    grad.addColorStop(0, '#ef4444');
                    grad.addColorStop(1, '#991b1b');
                } else {
                    grad.addColorStop(0, color);
                    // 약간 어두운 조화 색상 유도
                    grad.addColorStop(1, this.adjustColorBrightness(color, -40));
                }

                // 둥근 사각형 경로 생성
                this.ctx.beginPath();
                this.ctx.moveTo(x + radius, y);
                this.ctx.lineTo(x + size - radius, y);
                this.ctx.quadraticCurveTo(x + size, y, x + size, y + radius);
                this.ctx.lineTo(x + size, y + size - radius);
                this.ctx.quadraticCurveTo(x + size, y + size, x + size - radius, y + size);
                this.ctx.lineTo(x + radius, y + size);
                this.ctx.quadraticCurveTo(x, y + size, x, y + size - radius);
                this.ctx.lineTo(x, y + radius);
                this.ctx.quadraticCurveTo(x, y, x + radius, y);
                this.ctx.closePath();

                if (!isPreview) {
                    // 실제 안착 블록은 고급스러운 네온 광원 추가
                    this.ctx.shadowColor = color;
                    this.ctx.shadowBlur = 8;
                }

                this.ctx.fillStyle = grad;
                this.ctx.fill();

                // 안쪽 비스듬한 베벨 하이라이트 라인
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
                this.ctx.lineWidth = 1.5;
                this.ctx.stroke();

                this.ctx.restore();
            }

            // 드래그 조작 중에 닿은 타겟 위치 실시간 충돌 피드백 오버레이
            drawPlacementPreview() {
                if (!this.draggedBlock) return;

                const b = this.draggedBlock;
                const { row, col } = CollisionDetector.getSnapGridPosition(
                    this.board,
                    b.x,
                    b.y,
                    this.cellSize,
                    this.boardX,
                    this.boardY
                );

                const shapeRows = b.shape.length;
                const shapeCols = b.shape[0].length;

                // 유효 배치 여부 최종 점검
                const isValid = CollisionDetector.canPlaceAt(this.board, b.shape, row, col);

                this.ctx.save();
                for (let r = 0; r < shapeRows; r++) {
                    for (let c = 0; c < shapeCols; c++) {
                        if (b.shape[r][c] !== 0) {
                            const gridR = row + r;
                            const gridC = col + c;

                            // 보드 영역 내부인 경우에만 프리뷰 가이드 표시
                            if (gridR >= 0 && gridR < this.board.size && gridC >= 0 && gridC < this.board.size) {
                                const px = this.boardX + (gridC * this.cellSize) + 1.5;
                                const py = this.boardY + (gridR * this.cellSize) + 1.5;
                                const size = this.cellSize - 3;

                                if (isValid) {
                                    // 배치 가능할 시 반투명 강조 표시
                                    this.drawNeonBlockCell(px, py, size, b.color, 0.45, true);
                                } else {
                                    // 배치 불가 시 새빨간 비활성 표시
                                    this.drawNeonBlockCell(px, py, size, '#ef4444', 0.5, true, true);
                                }
                            }
                        }
                    }
                }
                this.ctx.restore();
            }

            // 힌트 추천 점멸 효과 적용 레이아웃
            drawActiveHint() {
                if (!this.activeHint) return;

                const b = this.activeHint.block;
                const startRow = this.activeHint.row;
                const startCol = this.activeHint.col;

                if (b.isUsed) {
                    this.activeHint = null; // 사용 완료 시 소거
                    return;
                }

                const shapeRows = b.shape.length;
                const shapeCols = b.shape[0].length;

                // 서서히 깜빡이는 알파 파형 구성
                const pulseAlpha = 0.2 + Math.abs(Math.sin(this.hintAnimationTimer)) * 0.45;

                this.ctx.save();
                for (let r = 0; r < shapeRows; r++) {
                    for (let c = 0; c < shapeCols; c++) {
                        if (b.shape[r][c] !== 0) {
                            const gridR = startRow + r;
                            const gridC = startCol + c;
                            const px = this.boardX + (gridC * this.cellSize) + 1.5;
                            const py = this.boardY + (gridR * this.cellSize) + 1.5;
                            const size = this.cellSize - 3;

                            // 화려한 힌트 보더 테두리 강조 연출
                            this.ctx.globalAlpha = pulseAlpha;
                            this.ctx.fillStyle = '#f59e0b'; // 황금빛 호박색 가이드
                            this.ctx.shadowColor = '#f59e0b';
                            this.ctx.shadowBlur = 12;

                            // 둥근 사각형 베이스
                            this.ctx.beginPath();
                            this.ctx.roundRect(px, py, size, size, 6);
                            this.ctx.fill();
                        }
                    }
                }
                this.ctx.restore();
            }

            // 하단 대기 슬롯 덱 렌더링
            drawDeckBlocks() {
                this.ctx.save();
                this.blocks.forEach(b => {
                    if (b.isUsed) return;

                    const shapeRows = b.shape.length;
                    const shapeCols = b.shape[0].length;
                    const blockCellSize = this.cellSize * b.scale;

                    // 덱 슬롯 백그라운드 홀더 가이드 (은은하게 라인 배치)
                    if (!b.isDragged) {
                        const slotWidth = this.virtualWidth / b.maxSlots;
                        const slotCenterX = (b.deckIndex * slotWidth) + (slotWidth / 2);
                        const slotCenterY = this.deckAreaY + (this.deckHeight / 2);
                        
                        this.ctx.save();
                        this.ctx.strokeStyle = 'rgba(30, 41, 59, 0.4)';
                        this.ctx.lineWidth = 1.5;
                        this.ctx.beginPath();
                        this.ctx.arc(slotCenterX, slotCenterY, 35, 0, Math.PI * 2);
                        this.ctx.stroke();
                        this.ctx.restore();
                    }

                    // 개별 서브 셀 그리기
                    for (let r = 0; r < shapeRows; r++) {
                        for (let c = 0; c < shapeCols; c++) {
                            if (b.shape[r][c] !== 0) {
                                const cx = b.x + (c * blockCellSize);
                                const cy = b.y + (r * blockCellSize);
                                const size = blockCellSize - (1.5 * b.scale);

                                // 드래그 시에는 꼬리 그림자 살짝 연출
                                if (b.isDragged) {
                                    this.ctx.save();
                                    this.ctx.shadowColor = 'rgba(0,0,0,0.5)';
                                    this.ctx.shadowBlur = 15;
                                    this.ctx.shadowOffsetY = 12;
                                }

                                this.drawNeonBlockCell(cx, cy, size, b.color, b.opacity);

                                if (b.isDragged) {
                                    this.ctx.restore();
                                }
                            }
                        }
                    }
                });
                this.ctx.restore();
            }

            // 보색 및 어두운 섀도우를 연산하기 위한 간편한 헥스컬러 보정기
            adjustColorBrightness(hex, percent) {
                let num = parseInt(hex.replace("#",""), 16),
                amt = Math.round(2.55 * percent),
                R = (num >> 16) + amt,
                G = (num >> 8 & 0x00FF) + amt,
                B = (num & 0x0000FF) + amt;
                return "#" + (0x1000000 + (R<255?R<0?0:R:255)*0x10000 + (G<255?G<0?0:G:255)*0x100 + (B<255?B<0?0:B:255)).toString(16).slice(1);
            }
        }

        // --- 8. Initialization (게임 구동부) ---
        window.onload = function() {
            const Game = new GameEngine();

            // 프레임 애니메이션 루프 가동
            function gameLoop() {
                Game.update();
                Game.draw();
                requestAnimationFrame(gameLoop);
            }
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
