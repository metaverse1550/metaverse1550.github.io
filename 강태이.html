<!DOCTYPE html>
<html lang="ko">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버섯 왕국 어드벤처</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {

</head>

// 사운드 (Web Audio API - 단순한 신디사이저음 생성, 외부 파일 X)
const AudioContext = window.AudioContext || window.webkitAudioContext;
const actx = new AudioContext();

const apiKey = ""; // API Key (환경 주입)
async function fetchGeminiWithRetry(prompt, retries = 5) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
    const systemInstruction = `You are an expert 2D platformer level designer. Create a custom level map based on the user's theme request.
Output MUST be a JSON object containing "theme" ("sky", "underground", or "castle") and "map" (an array of exactly 11 strings).
Each string in the "map" array must be exactly 64 characters long.
Valid characters:
' ' = empty air
'#' = unbreakable ground
'B' = breakable brick
'?' = coin block
'M' = mushroom/powerup block
'p' = pipe
'g' = goomba enemy
'=' = lava
'P' = player start position (MUST have exactly ONE 'P', preferably on row 9, col 2)
'F' = flagpole/goal (MUST have exactly ONE 'F', preferably on row 9, col 60)

Rules:
- Row 10 (the 11th string, index 10) should mostly be '#' or '=' to prevent falling.
- Ensure the level is playable and beatable.
- Do NOT use characters outside the valid list.`;

    const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] },
        generationConfig: { 
            responseMimeType: "application/json",
            responseSchema: {
                type: "OBJECT",
                properties: {
                    theme: { type: "STRING" },
                    map: { type: "ARRAY", items: { type: "STRING" } }
                }
            }
        }
    };
    let delay = 1000;
    for (let i = 0; i < retries; i++) {
        try {
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) throw new Error('Network error');
            const data = await response.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        } catch (e) {
            if (i === retries - 1) throw e;
            await new Promise(res => setTimeout(res, delay));
            delay *= 2;
        }
    }
}

function playSound(type) {
    if (actx.state === 'suspended') actx.resume();
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain);
    gain.connect(actx.destination);
    
    const now = actx.currentTime;
    
    if (type === 'jump') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'coin') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(987.77, now); // B5
        osc.frequency.setValueAtTime(1318.51, now + 0.1); // E6
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'powerup') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.linearRampToValueAtTime(600, now + 0.4);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
    } else if (type === 'stomp') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'break') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(100, now);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    }
}

// g=굼바, k=엉금엉금, p=뻐끔플라워 파이프, P=플레이어 시작, T=파이프(지하행), t=파이프(출구), X=보스, = =용암
// F=깃대(도착)

/**
 * ==========================================
 * 엔티티 클래스 (플레이어, 적, 아이템 등)
 * ==========================================
 */
class AABB {
    constructor(x, y, w, h) {
        this.x = x; this.y = y; this.w = w; this.h = h;
    }
    intersects(other) {
        return this.x < other.x + other.w && this.x + this.w > other.x &&
               this.y < other.y + other.h && this.y + this.h > other.y;
    }
}

class GameObject extends AABB {
    constructor(x, y, w, h) {
        super(x, y, w, h);
        this.vx = 0; this.vy = 0;
        this.active = true;
        this.facingRight = true;
    }
    update(dt) {}
    draw(ctx, cameraX, cameraY) {}
}

class Player extends GameObject {
    constructor(x, y) {
        super(x, y, TILE_SIZE * 0.7, TILE_SIZE * 0.9);
        this.state = 0; // 0: Small, 1: Super, 2: Fire
        this.speed = 4;
        this.jumpForce = -12;
        this.grounded = false;
        this.invulnerableTimer = 0;
        this.animTimer = 0;
        this.dead = false;
        this.won = false;
        this.crouching = false;
    }

    setState(newState) {
        if (newState > this.state) playSound('powerup');
        this.state = newState;
        // 크기 변경 로직
        const oldY = this.y + this.h;
        if (this.state === 0) {
            this.h = TILE_SIZE * 0.9;
        } else {
            this.h = TILE_SIZE * 1.8;
        }
        this.y = oldY - this.h; // 발 위치 고정
        Game.score += 1000;
    }

    damage() {
        if (this.invulnerableTimer > 0) return;
        if (this.state > 0) {
            this.setState(0);
            this.invulnerableTimer = 120; // 2초 무적
            playSound('break');
        } else {
            this.die();
        }
    }

    die() {
        if(this.dead) return;
        this.dead = true;
        this.vy = -10;
        this.active = false; // 물리 무시
        Game.lives--;
        playSound('break');
        setTimeout(() => Game.restartLevel(), 2000);
    }

    update(dt) {
        if (this.dead) {
            this.y += this.vy;
            this.vy += GRAVITY;
            return;
        }
        if (this.won) return;

        if (this.invulnerableTimer > 0) this.invulnerableTimer--;

        // 입력 처리 (관성 적용)
        let accel = 0.5;
        let friction = 0.8;

        if (Input.isDown('ArrowLeft') || Input.isDown('KeyA')) {
            this.vx -= accel;
            this.facingRight = false;
        } else if (Input.isDown('ArrowRight') || Input.isDown('KeyD')) {
            this.vx += accel;
            this.facingRight = true;
        } else {
            this.vx *= friction;
        }

        // 최대 속도 제한
        if (Math.abs(this.vx) > this.speed) {
            this.vx = Math.sign(this.vx) * this.speed;
        }
        if (Math.abs(this.vx) < 0.1) this.vx = 0;

        // 점프
        const jumpKey = Input.isDown('Space') || Input.isDown('KeyZ') || Input.isDown('ArrowUp') || Input.isDown('KeyW');
        if (jumpKey && this.grounded) {
            this.vy = this.jumpForce;
            this.grounded = false;
            playSound('jump');
        }
        
        // 가변 점프 (버튼을 떼면 중력 증가)
        if (!jumpKey && this.vy < 0) {
            this.vy += GRAVITY * 1.5;
        }

        // 파이어볼 발사
        if ((Input.isDown('KeyX') || Input.isDown('ShiftLeft')) && this.state === 2) {
            if (!this.fireCooldown) {
                Game.entities.push(new Fireball(this.x + (this.facingRight ? this.w : -16), this.y + 16, this.facingRight));
                this.fireCooldown = 20;
                playSound('stomp');
            }
        }
        if (this.fireCooldown > 0) this.fireCooldown--;

        // 물리 업데이트 및 충돌
        this.vy += GRAVITY;
        if (this.vy > MAX_FALL_SPEED) this.vy = MAX_FALL_SPEED;

        this.x += this.vx;
        Game.level.handleCollisions(this, 'x');
        
        this.y += this.vy;
        this.grounded = false;
        Game.level.handleCollisions(this, 'y');

        // 화면 아래로 추락
        if (this.y > canvas.height) {
            this.die();
        }

        // 애니메이션 타이머
        if (Math.abs(this.vx) > 0) this.animTimer += dt;
        else this.animTimer = 0;
    }

    draw(ctx, cx, cy) {
        if (this.invulnerableTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0) return; // 깜빡임

        ctx.save();
        ctx.translate(Math.floor(this.x - cx + this.w/2), Math.floor(this.y - cy));
        if (!this.facingRight) ctx.scale(-1, 1);

        const shirtColor = this.state === 2 ? COLORS.marioFire : COLORS.marioShirt;
        const pantsColor = this.state === 2 ? COLORS.marioShirt : COLORS.marioOveralls;
        const skinColor = COLORS.marioSkin;
        
        const w = this.w;
        const h = this.h;
        const isWalking = this.animTimer > 0 && this.grounded;
        const walkFrame = isWalking ? Math.floor(this.animTimer * 10) % 2 : 0;

        // 단순화된 픽셀풍 그리기 (좌우 대칭 기준)
        if (this.state === 0) {
            // 스몰 마리오
            // 모자
            ctx.fillStyle = shirtColor;
            ctx.fillRect(-w/2 + 4, 0, w-4, 8);
            ctx.fillRect(-w/2, 8, w+4, 4);
            // 얼굴
            ctx.fillStyle = skinColor;
            ctx.fillRect(-w/2 + 4, 12, w-8, 12);
            // 눈, 코 (검은색/살색 진한 톤 대체)
            ctx.fillStyle = '#000';
            ctx.fillRect(w/2 - 8, 12, 4, 8); // 눈
            // 몸통
            ctx.fillStyle = shirtColor;
            ctx.fillRect(-w/2 + 4, 24, w-8, 12);
            // 멜빵
            ctx.fillStyle = pantsColor;
            ctx.fillRect(-w/2 + 8, 24, w-16, 16);
            // 팔
            ctx.fillStyle = skinColor;
            if (isWalking && walkFrame === 0) {
                ctx.fillRect(w/2 - 4, 24, 8, 8); // 앞팔
            } else {
                ctx.fillRect(-w/2 - 4, 24, 8, 8); // 뒷팔
            }
            // 다리
            ctx.fillStyle = pantsColor;
            if (isWalking && walkFrame === 0) {
                ctx.fillRect(-w/2 + 4, 36, 8, 10);
            } else if (isWalking && walkFrame === 1) {
                ctx.fillRect(w/2 - 12, 36, 8, 10);
            } else {
                ctx.fillRect(-w/2 + 2, 36, 8, 10);
                ctx.fillRect(w/2 - 10, 36, 8, 10);
            }
        } else {
            // 슈퍼/파이어 마리오 (키가 큼)
            ctx.fillStyle = shirtColor;
            ctx.fillRect(-w/2 + 4, 0, w-4, 10); // 모자
            ctx.fillRect(-w/2, 10, w+4, 4);
            
            ctx.fillStyle = skinColor;
            ctx.fillRect(-w/2 + 4, 14, w-8, 16); // 얼굴
            ctx.fillStyle = '#000';
            ctx.fillRect(w/2 - 8, 16, 4, 8); // 눈
            
            ctx.fillStyle = shirtColor;
            ctx.fillRect(-w/2 + 2, 30, w-4, 20); // 상체
            
            ctx.fillStyle = pantsColor;
            ctx.fillRect(-w/2 + 6, 30, w-12, 26); // 멜빵
            
            ctx.fillStyle = skinColor;
            ctx.fillRect(w/2 - 4, 35, 10, 10); // 손
            
            ctx.fillStyle = pantsColor;
            if (isWalking && walkFrame === 0) {
                ctx.fillRect(-w/2 + 4, 56, 10, 16);
            } else if (isWalking && walkFrame === 1) {
                ctx.fillRect(w/2 - 14, 56, 10, 16);
            } else {
                ctx.fillRect(-w/2, 56, 12, 16);
                ctx.fillRect(w/2 - 12, 56, 12, 16);
            }
        }
        ctx.restore();
    }
}

class Fireball extends GameObject {
    constructor(x, y, facingRight) {
        super(x, y, 10, 10);
        this.vx = facingRight ? 7 : -7;
        this.vy = 0;
        this.bounceCount = 0;
    }
    update(dt) {
        this.vy += GRAVITY;
        this.x += this.vx;
        if(Game.level.isSolid(this.x, this.y + this.h/2) || Game.level.isSolid(this.x + this.w, this.y + this.h/2)) {
            this.active = false; Game.addParticle(this.x, this.y, COLORS.marioFire);
        }
        this.y += this.vy;
        if(Game.level.isSolid(this.x + this.w/2, this.y + this.h)) {
            this.y = Math.floor((this.y + this.h)/TILE_SIZE) * TILE_SIZE - this.h;
            this.vy = -6; // 바운스
        }
        if (this.y > canvas.height) this.active = false;
    }
    draw(ctx, cx, cy) {
        ctx.fillStyle = (Math.floor(Date.now() / 50) % 2 === 0) ? COLORS.marioFire : COLORS.brick;
        ctx.beginPath();
        ctx.arc(this.x - cx + this.w/2, this.y - cy + this.h/2, this.w/2, 0, Math.PI*2);
        ctx.fill();
    }
}

class Enemy extends GameObject {
    constructor(x, y, w, h) {
        super(x, y, w, h);
        this.vx = -1.5;
        this.type = 'goomba';
        this.animTimer = 0;
        this.squished = false;
        this.squishTimer = 0;
    }
    update(dt) {
        if (this.squished) {
            this.squishTimer--;
            if (this.squishTimer <= 0) this.active = false;
            return;
        }

        // 화면 안에 들어왔을 때만 움직임 활성화 (최적화)
        if (this.x < Game.camera.x + canvas.width + TILE_SIZE*2 && this.x > Game.camera.x - TILE_SIZE*2) {
            this.vy += GRAVITY;
            if(this.vy > MAX_FALL_SPEED) this.vy = MAX_FALL_SPEED;
            
            this.x += this.vx;
            // 벽 충돌 반전
            if (Game.level.isSolid(this.x, this.y + this.h/2) || Game.level.isSolid(this.x + this.w, this.y + this.h/2)) {
                this.vx *= -1;
            }
            
            this.y += this.vy;
            Game.level.handleCollisions(this, 'y');

            this.animTimer += dt;
        }
    }
    draw(ctx, cx, cy) {
        if(this.squished) {
            ctx.fillStyle = COLORS.goomba;
            ctx.fillRect(this.x - cx, this.y - cy + this.h/2, this.w, this.h/2);
            return;
        }
        
        ctx.save();
        ctx.translate(this.x - cx + this.w/2, this.y - cy);
        
        // 굼바 그리기
        ctx.fillStyle = COLORS.goomba;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(this.w/2, this.h/2);
        ctx.lineTo(this.w/2, this.h);
        ctx.lineTo(-this.w/2, this.h);
        ctx.lineTo(-this.w/2, this.h/2);
        ctx.fill();
        
        // 눈
        ctx.fillStyle = 'white';
        ctx.fillRect(-6, 8, 4, 8);
        ctx.fillRect(2, 8, 4, 8);
        ctx.fillStyle = 'black';
        ctx.fillRect(-4, 10, 2, 4);
        ctx.fillRect(4, 10, 2, 4);

        // 발 애니메이션
        ctx.fillStyle = 'black';
        const frame = Math.floor(this.animTimer * 5) % 2;
        if (frame === 0) {
            ctx.fillRect(-this.w/2, this.h-4, 10, 4);
            ctx.fillRect(this.w/2 - 10, this.h-4, 10, 4);
        } else {
            ctx.fillRect(-this.w/2 + 4, this.h-4, 10, 4);
            ctx.fillRect(this.w/2 - 14, this.h-4, 10, 4);
        }

        ctx.restore();
    }
    stomp() {
        this.squished = true;
        this.squishTimer = 30;
        this.vx = 0;
        Game.score += 100;
        playSound('stomp');
    }
}

class Boss extends Enemy {
    constructor(x, y) {
        super(x, y, TILE_SIZE*1.5, TILE_SIZE*1.5);
        this.hp = 3;
        this.vx = -1;
        this.fireTimer = 0;
        this.type = 'boss';
    }
    update(dt) {
        if(this.hp <= 0) return;
        super.update(dt); // 기본 이동/중력
        
        // 패턴: 앞뒤로 이동 및 점프
        if (Math.random() < 0.01 && this.vy === 0) this.vy = -8;
        if (this.x < Game.camera.x + 200) this.vx = 1;
        if (this.x > Game.camera.x + 600) this.vx = -1;

        // 불 뿜기
        this.fireTimer++;
        if (this.fireTimer > 150) {
            this.fireTimer = 0;
            const fire = new Fireball(this.x, this.y + this.h/2, false);
            fire.vx = -5; // 보스 불은 더 빠름
            Game.entities.push(fire);
            playSound('break');
        }
    }
    draw(ctx, cx, cy) {
        if(this.hp <= 0) return;
        ctx.fillStyle = COLORS.koopaShell; // 초록 껍질
        ctx.beginPath();
        ctx.arc(this.x - cx + this.w/2, this.y - cy + this.h/2, this.w/2, Math.PI, 0);
        ctx.fill();
        
        ctx.fillStyle = COLORS.koopaSkin; // 노란 몸
        ctx.fillRect(this.x - cx + 4, this.y - cy + this.h/2, this.w - 8, this.h/2);
        
        // 가시
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.moveTo(this.x-cx+this.w/2, this.y-cy); ctx.lineTo(this.x-cx+this.w/2-5, this.y-cy-10); ctx.lineTo(this.x-cx+this.w/2+5, this.y-cy-10); ctx.fill();
    }
    stomp() {
        this.hp--;
        playSound('stomp');
        if (this.hp <= 0) {
            this.active = false;
            Game.score += 5000;
            Game.levelComplete();
        }
    }
}

class Item extends GameObject {
    constructor(x, y, type) {
        super(x, y, TILE_SIZE, TILE_SIZE);
        this.type = type; // 'mushroom', 'flower', 'coin'
        this.vy = -4; // 등장할 때 살짝 위로
        if(type === 'coin') {
            this.vy = -8;
            this.vx = 0;
            Game.addCoin(1);
            playSound('coin');
        } else {
            this.vx = 2; // 버섯은 오른쪽으로 이동
            if (type === 'flower') this.vx = 0; // 꽃은 고정
            playSound('powerup');
        }
        this.spawnY = y;
    }
    update(dt) {
        this.vy += GRAVITY;
        if(this.type !== 'coin') {
            this.x += this.vx;
            if (Game.level.isSolid(this.x, this.y + this.h/2) || Game.level.isSolid(this.x + this.w, this.y + this.h/2)) {
                this.vx *= -1;
            }
        }
        
        this.y += this.vy;
        
        if (this.type === 'coin' && this.y > this.spawnY) {
            this.active = false; // 동전은 떨어지면 사라짐
            Game.score += 100;
        } else if (this.type !== 'coin') {
            Game.level.handleCollisions(this, 'y');
        }
    }
    draw(ctx, cx, cy) {
        const px = this.x - cx; const py = this.y - cy;
        if (this.type === 'mushroom') {
            ctx.fillStyle = COLORS.mushroomSpot;
            ctx.beginPath(); ctx.arc(px+20, py+15, 15, Math.PI, 0); ctx.fill();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(px+10, py+10, 4, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(px+30, py+10, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = COLORS.mushroomBody;
            ctx.fillRect(px+10, py+15, 20, 15);
        } else if (this.type === 'flower') {
            ctx.fillStyle = COLORS.fireFlower;
            ctx.beginPath(); ctx.arc(px+20, py+15, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(px+20, py+15, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'green'; ctx.fillRect(px+18, py+27, 4, 13);
        } else if (this.type === 'coin') {
            ctx.fillStyle = COLORS.coin;
            ctx.beginPath(); ctx.ellipse(px+20, py+20, 10 * (Math.abs(Math.sin(Date.now()/150))), 15, 0, 0, Math.PI*2); ctx.fill();
        }
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.vx = (Math.random()-0.5)*10; this.vy = (Math.random()-1)*10;
        this.color = color; this.life = 30;
    }
    update() {
        this.x += this.vx; this.y += this.vy; this.vy += GRAVITY; this.life--;
    }
    draw(ctx, cx, cy) {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - cx, this.y - cy, 6, 6);
    }
}

class Scenery {
    static drawCloud(ctx, x, y, size) {
        ctx.fillStyle = COLORS.cloudBody;
        // 구름 덩어리들 그리기
        ctx.fillRect(x, y, size*3, size);
        ctx.fillRect(x+size*0.5, y-size*0.5, size*2, size);
        ctx.fillRect(x+size, y-size, size, size);
        // 검은색 테두리 효과를 원한다면 여기에 추가 구현 가능
    }

    static drawBush(ctx, x, y, size) {
         ctx.fillStyle = COLORS.bushGreen;
         ctx.beginPath();
         ctx.arc(x, y, size, Math.PI, 0);
         ctx.arc(x+size, y, size*1.2, Math.PI, 0);
         ctx.arc(x+size*2, y, size, Math.PI, 0);
         ctx.fill();
    }
    
    static drawHill(ctx, x, y, size) {
        ctx.fillStyle = COLORS.hillGreen;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + size, y - size);
        ctx.lineTo(x + size * 2, y);
        ctx.fill();
        // 산 점박이 무늬
        ctx.fillStyle = '#000';
        ctx.fillRect(x + size*0.5, y - size*0.2, 4, 4);
        ctx.fillRect(x + size, y - size*0.5, 4, 4);
        ctx.fillRect(x + size*1.5, y - size*0.3, 4, 4);
    }
}

/**
 * ==========================================
 * 레벨 관리자
 * ==========================================
 */
class Level {
    constructor(worldStr) {
        this.worldStr = worldStr;
        const data = LevelData[worldStr] || LevelData["1-1"]; // 없으면 1-1 로드
        this.theme = data.theme;
        this.time = data.time;
        this.grid = [];
        this.width = 0;
        this.height = data.map.length;
        
        this.parseMap(data.map);
    }

    parseMap(mapArray) {
        Game.entities = [];
        this.grid = [];
        this.width = mapArray[0].length;
        
        for (let y = 0; y < mapArray.length; y++) {
            this.grid[y] = [];
            for (let x = 0; x < mapArray[y].length; x++) {
                const char = mapArray[y][x];
                this.grid[y][x] = char;
                
                const px = x * TILE_SIZE; const py = y * TILE_SIZE;
                if (char === 'P') {
                    Game.player = new Player(px, py);
                    this.grid[y][x] = ' '; // 빈 공간으로 변경
                } else if (char === 'g') {
                    Game.entities.push(new Enemy(px, py + TILE_SIZE - 30, 30, 30));
                    this.grid[y][x] = ' ';
                } else if (char === 'X') {
                    Game.entities.push(new Boss(px, py - TILE_SIZE*0.5));
                    this.grid[y][x] = ' ';
                } else if (char === 'C') {
                     // 허공에 있는 코인
                }
            }
        }
    }

    getBlock(tx, ty) {
        if (tx < 0 || tx >= this.width || ty < 0 || ty >= this.height) return ' ';
        return this.grid[ty][tx];
    }
    setBlock(tx, ty, val) {
        if (tx >= 0 && tx < this.width && ty >= 0 && ty < this.height) this.grid[ty][tx] = val;
    }

    isSolid(x, y) {
        const tx = Math.floor(x / TILE_SIZE);
        const ty = Math.floor(y / TILE_SIZE);
        const block = this.getBlock(tx, ty);
        return ['#', 'B', '?', 'M', 'F', 'p', 'T', 't', '='].includes(block);
    }

    handleCollisions(obj, axis) {
        const tx1 = Math.floor(obj.x / TILE_SIZE);
        const tx2 = Math.floor((obj.x + obj.w - 1) / TILE_SIZE);
        const ty1 = Math.floor(obj.y / TILE_SIZE);
        const ty2 = Math.floor((obj.y + obj.h - 1) / TILE_SIZE);

        for (let y = ty1; y <= ty2; y++) {
            for (let x = tx1; x <= tx2; x++) {
                const block = this.getBlock(x, y);
                if (['#', 'B', '?', 'M', 'F', 'p', 'T', 't', '='].includes(block)) {
                    if (block === '=') { // 용암
                        if (obj instanceof Player) obj.die();
                        continue;
                    }

                    if (axis === 'x') {
                        if (obj.vx > 0) { obj.x = x * TILE_SIZE - obj.w; } // 우측 충돌
                        else if (obj.vx < 0) { obj.x = (x + 1) * TILE_SIZE; } // 좌측 충돌
                        obj.vx = 0;
                    } else if (axis === 'y') {
                        if (obj.vy > 0) { // 바닥 착지
                            obj.y = y * TILE_SIZE - obj.h;
                            obj.vy = 0;
                            if (obj instanceof Player) obj.grounded = true;
                            
                            // 파이프 진입 로직 (아래 화살표 누를 때)
                            if (obj instanceof Player && block === 'T' && Input.isDown('ArrowDown')) {
                                Game.loadLevel("1-2"); // 지하 맵으로 이동
                            }
                        } else if (obj.vy < 0) { // 천장(블록 아래) 충돌
                            obj.y = (y + 1) * TILE_SIZE;
                            obj.vy = 0;
                            
                            if (obj instanceof Player) {
                                this.hitBlock(x, y, block, obj);
                            }
                        }
                    }
                } else if (block === 'C') {
                    // 코인 획득
                    this.setBlock(x, y, ' ');
                    Game.addCoin(1);
                    Game.score += 100;
                    playSound('coin');
                } else if (block === 'F') {
                    // 깃대 (클리어)
                    if (obj instanceof Player && !obj.won) {
                        Game.levelComplete();
                    }
                }
            }
        }
    }

    hitBlock(x, y, block, player) {
        if (block === '?') {
            this.setBlock(x, y, 'E'); // 빈 상자(Empty)로 변경
            Game.entities.push(new Item(x * TILE_SIZE, y * TILE_SIZE, 'coin'));
        } else if (block === 'M') {
            this.setBlock(x, y, 'E');
            Game.entities.push(new Item(x * TILE_SIZE, y * TILE_SIZE - TILE_SIZE, 'mushroom'));
        } else if (block === 'F') {
            this.setBlock(x, y, 'E');
            Game.entities.push(new Item(x * TILE_SIZE, y * TILE_SIZE - TILE_SIZE, player.state > 0 ? 'flower' : 'mushroom'));
        } else if (block === 'B') {
            if (player.state > 0) { // 슈퍼 상태 이상이면 파괴
                this.setBlock(x, y, ' ');
                playSound('break');
                // 파티클 생성
                for(let i=0; i<4; i++) Game.addParticle(x*TILE_SIZE+20, y*TILE_SIZE+20, COLORS.brick);
                Game.score += 50;
            } else {
                playSound('stomp'); // 튕기는 소리
            }
        }
    }

    draw(ctx, cx, cy) {
        // 배경색
        ctx.fillStyle = COLORS[this.theme] || COLORS.sky;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (this.theme === 'sky') {
            // 패럴랙스 느낌의 배경 요소 (간단히 하드코딩)
            for(let i=0; i<this.width/20; i++) {
                const baseX = i * 800 - cx * 0.5; // 배경은 카메라보다 천천히 이동
                
                Scenery.drawHill(ctx, baseX + 100, canvas.height - TILE_SIZE*2, 80);
                Scenery.drawHill(ctx, baseX + 500, canvas.height - TILE_SIZE*2, 40);
                
                Scenery.drawCloud(ctx, baseX + 150, 100, 30);
                Scenery.drawCloud(ctx, baseX + 400, 150, 20);
                Scenery.drawCloud(ctx, baseX + 650, 80, 40);
                
                Scenery.drawBush(ctx, baseX + 300, canvas.height - TILE_SIZE*2, 20);
                Scenery.drawBush(ctx, baseX + 700, canvas.height - TILE_SIZE*2, 30);
            }
        }

        const startCol = Math.max(0, Math.floor(cx / TILE_SIZE));
        const endCol = Math.min(this.width, startCol + Math.ceil(canvas.width / TILE_SIZE) + 1);

        for (let y = 0; y < this.height; y++) {
            for (let x = startCol; x < endCol; x++) {
                const block = this.grid[y][x];
                const px = Math.floor(x * TILE_SIZE - cx);
                const py = Math.floor(y * TILE_SIZE - cy);

                if (block === ' ' || block === 'C') continue; // C는 따로 그림

                if (block === '#') {
                    ctx.fillStyle = (this.theme === 'underground') ? '#004080' : COLORS.ground;
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                    // 바닥 패턴
                    ctx.fillStyle = '#000'; ctx.fillRect(px, py, TILE_SIZE, 2); ctx.fillRect(px+TILE_SIZE-2, py, 2, TILE_SIZE);
                } else if (block === 'B') {
                    ctx.fillStyle = COLORS.brick;
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#000'; // 벽돌 선
                    ctx.fillRect(px, py+TILE_SIZE/2, TILE_SIZE, 2);
                    ctx.fillRect(px+TILE_SIZE/2, py, 2, TILE_SIZE/2);
                    ctx.fillRect(px+TILE_SIZE/4, py+TILE_SIZE/2, 2, TILE_SIZE/2);
                } else if (block === '?' || block === 'M' || block === 'F') {
                    ctx.fillStyle = COLORS.question;
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                    // 깜빡이는 물음표 애니메이션
                    if (Math.floor(Date.now() / 300) % 2 === 0) {
                        ctx.fillStyle = '#c84c0c';
                        ctx.fillRect(px+14, py+8, 12, 4); ctx.fillRect(px+22, py+12, 4, 8); ctx.fillRect(px+18, py+20, 4, 4); ctx.fillRect(px+18, py+28, 4, 4);
                    }
                } else if (block === 'E') {
                    ctx.fillStyle = COLORS.emptyQuestion;
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#000'; ctx.fillRect(px, py, TILE_SIZE, 2); ctx.fillRect(px, py, 2, TILE_SIZE);
                } else if (block === 'p' || block === 'T' || block === 't') {
                    ctx.fillStyle = COLORS.pipe; // 파이프
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#000'; ctx.fillRect(px, py, TILE_SIZE, 2); ctx.fillRect(px, py, 2, TILE_SIZE);
                    if (y>0 && ['p','T','t'].includes(this.grid[y-1][x])) { /* 상단 캡 연결부 처리 생략 */ } 
                    else {
                        // 파이프 캡
                        ctx.fillRect(px-2, py, TILE_SIZE+4, 16);
                        ctx.fillStyle = COLORS.pipe; ctx.fillRect(px-1, py+1, TILE_SIZE+2, 14);
                    }
                } else if (block === '=') { // 용암
                    ctx.fillStyle = COLORS.lava;
                    const yOffset = Math.sin(Date.now()/200 + x) * 5;
                    ctx.fillRect(px, py + 10 + yOffset, TILE_SIZE, TILE_SIZE);
                } else if (block === 'F') { // 깃대
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(px + TILE_SIZE/2 - 2, py, 4, TILE_SIZE);
                    if (y === this.height - 3) { // 깃발
                        ctx.fillStyle = 'green';
                        ctx.beginPath(); ctx.moveTo(px+TILE_SIZE/2, py); ctx.lineTo(px-20, py+10); ctx.lineTo(px+TILE_SIZE/2, py+20); ctx.fill();
                    }
                }

                // 따로 처리하는 타일 (코인 등)
                if (this.grid[y][x] === 'C') {
                    ctx.fillStyle = COLORS.coin;
                    ctx.beginPath(); ctx.ellipse(px+TILE_SIZE/2, py+TILE_SIZE/2, 10 * (Math.abs(Math.sin(Date.now()/150))), 15, 0, 0, Math.PI*2); ctx.fill();
                }
            }
        }
    }
}

/**
 * ==========================================
 * 메인 게임 루프 및 관리자
 * ==========================================
 */
const Game = {
    state: 'menu', // menu, playing, dead, clear
    score: 0,
    coins: 0,
    lives: 3,
    world: 1,
    stage: 1,
    time: 400,
    timerInterval: null,
    
    player: null,
    level: null,
    entities: [],
    particles: [],
    
    camera: { x: 0, y: 0 },
    lastTime: 0,

    init() {
        this.state = 'menu';
        this.loadLevel('title'); // 타이틀 배경용 빈 레벨 로드
        
        this.updateUI();
        document.getElementById('btn-start').addEventListener('click', () => {
            if (actx.state === 'suspended') actx.resume();
            this.startGame();
        });
        document.getElementById('btn-editor').addEventListener('click', () => {
            this.startEditor();
        });

        // AI 레벨 생성 버튼 이벤트
        document.getElementById('btn-ai-level').addEventListener('click', () => {
            if (actx.state === 'suspended') actx.resume();
            document.getElementById('ai-modal').classList.remove('hidden');
            document.getElementById('ai-prompt-input').value = "";
            document.getElementById('ai-loading').classList.add('hidden');
        });
        document.getElementById('btn-cancel-ai').addEventListener('click', () => {
            document.getElementById('ai-modal').classList.add('hidden');
        });
        document.getElementById('btn-generate-ai').addEventListener('click', () => {
            this.generateAILevel();
        });
        
        requestAnimationFrame(t => this.loop(t));
    },

    async generateAILevel() {
        const promptInput = document.getElementById('ai-prompt-input').value;
        if (!promptInput.trim()) return;
        
        const loadingEl = document.getElementById('ai-loading');
        const generateBtn = document.getElementById('btn-generate-ai');
        
        loadingEl.innerText = "✨ AI IS THINKING...";
        loadingEl.classList.remove('hidden');
        generateBtn.disabled = true;
        
        try {
            const generatedData = await fetchGeminiWithRetry(promptInput);
            
            // 검증 및 적용
            if (generatedData && generatedData.map && generatedData.map.length === 11) {
                LevelData["AI-1"] = {
                    theme: generatedData.theme || 'sky',
                    time: 400,
                    map: generatedData.map
                };
                
                document.getElementById('ai-modal').classList.add('hidden');
                
                // AI 맵으로 게임 시작
                this.score = 0; this.coins = 0; this.lives = 3; 
                this.world = "AI"; this.stage = 1;
                this.loadLevel("AI-1");
                this.state = 'playing';
                document.getElementById('message-screen').classList.add('hidden');
            } else {
                loadingEl.innerText = "맵 생성에 실패했습니다. 프롬프트를 바꿔보세요.";
            }
        } catch (e) {
            loadingEl.innerText = "오류가 발생했습니다. 다시 시도해주세요.";
            console.error(e);
        } finally {
            generateBtn.disabled = false;
        }
    },

    startGame() {
        this.score = 0; this.coins = 0; this.lives = 3; this.world = 1; this.stage = 1;
        this.loadLevel(`${this.world}-${this.stage}`);
        this.state = 'playing';
        document.getElementById('message-screen').classList.add('hidden');
    },

    loadLevel(levelStr) {
        this.level = new Level(levelStr);
        this.time = this.level.time;
        this.camera.x = 0;
        this.camera.y = 0; //(this.level.height * TILE_SIZE) - canvas.height;
        this.particles = [];
        
        clearInterval(this.timerInterval);
        this.timerInterval = setInterval(() => {
            if (this.state === 'playing' && !this.player.won) {
                this.time--;
                if (this.time <= 0) {
                    this.player.die();
                }
                this.updateUI();
            }
        }, 1000); // 1초 = 게임 시간 1
        
        // 월드/스테이지 표시 업데이트
        const parts = levelStr.split('-');
        if(parts.length === 2) {
            this.world = parseInt(parts[0]);
            this.stage = parseInt(parts[1]);
        }
        this.updateUI();
    },

    restartLevel() {
        if (this.lives > 0) {
            this.loadLevel(`${this.world}-${this.stage}`);
            this.state = 'playing';
        } else {
            this.gameOver();
        }
    },

    levelComplete() {
        this.player.won = true;
        this.player.vx = 0; this.player.vy = 0;
        playSound('powerup');
        
        // 남은 시간 점수 환산
        let countInterval = setInterval(() => {
            if(this.time > 0) {
                this.time--;
                this.score += 50;
                this.updateUI();
                playSound('stomp'); // 틱 소리 대체
            } else {
                clearInterval(countInterval);
                setTimeout(() => this.nextLevel(), 2000);
            }
        }, 20);
    },

    nextLevel() {
        if (this.world === "AI") {
            // AI 모드 클리어 시 게임 오버 처리(타이틀로)
            this.gameOver();
            return;
        }
        
        this.stage++;
        if (this.stage > 4) {
            this.stage = 1;
            this.world++;
        }
        // 저장
        if (this.world > Storage.saveData.highestWorld || (this.world === Storage.saveData.highestWorld && this.stage > Storage.saveData.highestStage)) {
            Storage.saveData.highestWorld = this.world;
            Storage.saveData.highestStage = this.stage;
            Storage.save();
        }
        
        const nextMap = `${this.world}-${this.stage}`;
        // 실제 데이터가 없으면 1-1로 롤백(데모 시연용)
        if(LevelData[nextMap]) {
            this.loadLevel(nextMap);
        } else {
            this.loadLevel("1-1");
            document.getElementById('world').innerText = `${this.world}-${this.stage} (루프)`;
        }
    },

    gameOver() {
        this.state = 'menu';
        if (this.score > Storage.saveData.highScore) {
            Storage.saveData.highScore = this.score;
            Storage.save();
        }
        
        this.loadLevel('title'); 
        
        const msg = document.getElementById('message-screen');
        msg.classList.remove('hidden');
        
        document.querySelector('.title-box').style.display = 'none'; // 타이틀 로고 숨김
        
        let titleEl = document.getElementById('msg-title');
        titleEl.innerHTML = "GAME OVER";
        titleEl.style.marginTop = '100px';
        titleEl.style.display = 'block';
        
        document.getElementById('high-score-display').innerText = String(Storage.saveData.highScore).padStart(6, '0');
        document.getElementById('btn-start').innerText = "TRY AGAIN";
        
        clearInterval(this.timerInterval);
        
        // 3초 후 타이틀 화면으로 완전 복귀
        setTimeout(() => {
             document.querySelector('.title-box').style.display = 'block';
             titleEl.style.display = 'none'; // GAME OVER 텍스트 숨김 (로고 안에 포함되어있지 않음)
             document.getElementById('btn-start').innerText = "1 PLAYER GAME";
        }, 3000);
    },

    addCoin(amount) {
        this.coins += amount;
        if (this.coins >= 100) {
            this.coins -= 100;
            this.lives++;
            playSound('powerup'); // 1UP 소리
        }
        this.updateUI();
    },

    addParticle(x, y, color) {
        this.particles.push(new Particle(x, y, color));
    },

    updateUI() {
        document.getElementById('score').innerText = String(this.score).padStart(6, '0');
        document.getElementById('coins').innerText = String(this.coins).padStart(2, '0');
        document.getElementById('world').innerText = `${this.world}-${this.stage}`;
        document.getElementById('time').innerText = String(this.time).padStart(3, '0');
        // 라이프 UI는 오리지널 느낌을 위해 일단 제거하거나 시작 화면에서만 보여주도록 변경 (여기서는 HTML에서 제거됨)
    },

    loop(timestamp) {
        const dt = (timestamp - this.lastTime) / 1000;
        this.lastTime = timestamp;

        if (this.state === 'playing' || this.state === 'menu') {
            this.update(dt);
        }
        
        if (this.state !== 'editor') {
            this.draw();
        }

        requestAnimationFrame(t => this.loop(t));
    },

    update(dt) {
        if (this.player) this.player.update(dt);

        // 엔티티 업데이트 및 충돌
        for (let i = this.entities.length - 1; i >= 0; i--) {
            const ent = this.entities[i];
            ent.update(dt);
            
            // 플레이어와 적/아이템 충돌
            if (ent.active && !this.player.dead && !this.player.won) {
                if (this.player.intersects(ent)) {
                    if (ent instanceof Item) {
                        ent.active = false;
                        if (ent.type === 'mushroom') this.player.setState(1);
                        if (ent.type === 'flower') this.player.setState(2);
                    } else if (ent instanceof Enemy) {
                        // 밟기 판정 (플레이어가 하강 중이고, 적의 중심점보다 높을 때)
                        if (this.player.vy > 0 && this.player.y + this.player.h < ent.y + ent.h/2 + 10) {
                            this.player.vy = -8; // 통통 튐
                            ent.stomp();
                        } else {
                            this.player.damage();
                        }
                    }
                }
                
                // 파이어볼과 적 충돌
                if (ent instanceof Fireball) {
                    for(let j=0; j<this.entities.length; j++) {
                        const other = this.entities[j];
                        if (other instanceof Enemy && other.active && !other.squished && ent.intersects(other)) {
                            other.active = false; // 파이어볼에 맞으면 즉사
                            ent.active = false;
                            Game.addParticle(other.x, other.y, COLORS.marioFire);
                            Game.score += 200;
                            playSound('break');
                        }
                    }
                }
            }
            if (!ent.active) this.entities.splice(i, 1);
        }

        // 파티클 업데이트
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update();
            if (this.particles[i].life <= 0) this.particles.splice(i, 1);
        }

        // 카메라 이동 (플레이어 추적, 왼쪽으로 되돌아가지 못함)
        if (this.player && !this.player.dead) {
            if(this.state === 'menu') {
                this.camera.x = 0;
            } else {
                const targetX = this.player.x - canvas.width / 2;
                if (targetX > this.camera.x) {
                    this.camera.x = targetX;
                }
                // 맵 끝 제한
                if (this.camera.x < 0) this.camera.x = 0;
                if (this.camera.x > this.level.width * TILE_SIZE - canvas.width) {
                    this.camera.x = this.level.width * TILE_SIZE - canvas.width;
                }
                
                // 플레이어가 카메라 왼쪽 밖으로 나가는 것 방지
                if (this.player.x < this.camera.x) {
                    this.player.x = this.camera.x;
                    this.player.vx = 0;
                }
            }
            // Y축 카메라는 현재 고정
            this.camera.y = (this.level.height * TILE_SIZE) - canvas.height;
        }
    },

    draw() {
        if (!this.level) return;
        
        // 화면 지우기 및 배경화면
        ctx.fillStyle = COLORS[this.level.theme] || COLORS.sky;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 부드러운 카메라 보정 처리 후 소수점 버림 (픽셀 깨짐 방지)
        const cx = Math.floor(this.camera.x);
        const cy = Math.floor(this.camera.y);

        this.level.draw(ctx, cx, cy);

        for (const ent of this.entities) ent.draw(ctx, cx, cy);
        for (const p of this.particles) p.draw(ctx, cx, cy);
        
        if (this.player) this.player.draw(ctx, cx, cy);
    },

    /**
     * ==========================================
     * 스테이지 에디터 (간단 구현)
     * ==========================================
     */
    startEditor() {
        this.state = 'editor';
        document.getElementById('message-screen').classList.add('hidden');
        const ui = document.getElementById('editor-ui');
        ui.classList.remove('hidden');
        
        // 1-1 맵 베이스로 로드
        this.loadLevel("1-1");
        this.camera.x = 0; // 에디터는 자유 카메라 모드로 전환 필요하지만 MVP에선 고정
        
        const tools = [
            { char: ' ', name: '지우개' },
            { char: '#', name: '바닥' },
            { char: 'B', name: '벽돌' },
            { char: '?', name: '동전블록' },
            { char: 'M', name: '버섯블록' },
            { char: 'p', name: '파이프' },
            { char: 'g', name: '굼바' },
            { char: 'P', name: '플레이어' }
        ];
        
        let currentTool = '#';
        ui.innerHTML = '';
        tools.forEach(t => {
            const btn = document.createElement('div');
            btn.className = `editor-btn ${t.char === currentTool ? 'selected' : ''}`;
            btn.innerText = t.name;
            btn.onclick = () => {
                currentTool = t.char;
                document.querySelectorAll('.editor-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            };
            ui.appendChild(btn);
        });

        // 맵 출력 버튼
        const exportBtn = document.createElement('div');
        exportBtn.className = 'editor-btn';
        exportBtn.innerText = '콘솔에 맵 출력';
        exportBtn.onclick = () => {
            let mapStr = '[\n';
            for(let y=0; y<this.level.height; y++) {
                mapStr += '  "' + this.level.grid[y].join('') + '",\n';
            }
            mapStr += ']';
            console.log(mapStr);
            alert("F12 개발자 도구 콘솔을 확인하세요.");
        };
        ui.appendChild(exportBtn);
        
        const closeBtn = document.createElement('div');
        closeBtn.className = 'editor-btn';
        closeBtn.innerText = '에디터 종료';
        closeBtn.onclick = () => {
            ui.classList.add('hidden');
            this.gameOver();
        };
        ui.appendChild(closeBtn);

        // 마우스 클릭 이벤트 오버라이드
        canvas.onmousedown = (e) => {
            if(this.state !== 'editor') return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left + this.camera.x;
            const mouseY = e.clientY - rect.top + this.camera.y;
            
            const tx = Math.floor(mouseX / TILE_SIZE);
            const ty = Math.floor(mouseY / TILE_SIZE);
            
            if(currentTool === 'P') {
                this.player.x = tx * TILE_SIZE;
                this.player.y = ty * TILE_SIZE;
            } else if (currentTool === 'g') {
                this.level.setBlock(tx, ty, ' '); // 겹치지 않게 타일 지우고
                this.entities.push(new Enemy(tx*TILE_SIZE, ty*TILE_SIZE, 30, 30));
            } else {
                this.level.setBlock(tx, ty, currentTool);
            }
            this.draw(); // 즉시 렌더링
        };
        
        // 에디터 루프용 간단 그리기 호출
        const editorLoop = () => {
            if(this.state === 'editor') {
                // 키보드로 카메라 이동 기능 추가
                if(Input.isDown('ArrowRight')) this.camera.x += 10;
                if(Input.isDown('ArrowLeft')) this.camera.x -= 10;
                if(this.camera.x < 0) this.camera.x = 0;
                
                this.draw();
                requestAnimationFrame(editorLoop);
            }
        };
        editorLoop();
    }
};

// 게임 초기화 시작
Game.init();
</script>
