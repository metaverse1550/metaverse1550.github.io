    <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #FFF0F6;
            background-image: linear-gradient(135deg, #FFF5F9 0%, #FFF0F6 50%, #FFE3F1 100%);
            user-select: none;
            overflow: hidden;
        }
        .fancy-title {
            font-family: 'Do Hyeon', sans-serif;
        }
        /* 글래스모피즘 테마 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1.5px solid #FFD3EA;
            box-shadow: 0 10px 25px -5px rgba(255, 160, 210, 0.35);
        }
        .glass-panel-heavy {
            background: rgba(255, 248, 252, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid #FFD3EA;
            box-shadow: 0 15px 35px rgba(255, 160, 210, 0.4);
        }
        /* 하트 입자 애니메이션 */
        @keyframes float-heart {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-160px) scale(1.8) rotate(30deg);
                opacity: 0;
            }
        }
        .floating-heart {
            position: absolute;
            animation: float-heart 1.5s forwards ease-out;
            pointer-events: none;
            z-index: 100;
        }
        @keyframes float-broken-heart {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translateY(-60px) scale(1.2) rotate(-20deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-130px) scale(0.8) rotate(-40deg);
                opacity: 0;
            }
        }
        .floating-broken-heart {
            position: absolute;
            animation: float-broken-heart 1.6s forwards ease-in-out;
            pointer-events: none;
            z-index: 100;
        }
        /* 반응형 캔버스 컨테이너 */
        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain; /* 16:9 렌더링 스케일 유지 */
            background-color: #FFE3F1;
        }
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.3);
        }
        ::-webkit-scrollbar-thumb {
            background: #FFC9E6;
            border-radius: 4px;
        }
    </style>
</head>

/* ==========================================
   Sound Engine (Web Audio API)
========================================== */
class SoundSynth {
    constructor() { this.ctx = null; }
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    playTone(freq, type, duration, delay = 0) {
        this.init(); if (!this.ctx) return;
        try {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime + delay);
            gain.gain.setValueAtTime(0.08, this.ctx.currentTime + delay);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + delay + duration);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(this.ctx.currentTime + delay);
            osc.stop(this.ctx.currentTime + delay + duration);
        } catch(e) { console.log("Audio not allowed yet"); }
    }
    playLoveGain() {
        this.playTone(523.25, 'sine', 0.1, 0); 
        this.playTone(659.25, 'sine', 0.1, 0.06); 
        this.playTone(783.99, 'sine', 0.1, 0.12); 
        this.playTone(1046.50, 'sine', 0.18, 0.18); 
    }
    playLoveLoss() {
        this.playTone(493.88, 'triangle', 0.1, 0); 
        this.playTone(440.00, 'triangle', 0.1, 0.06); 
        this.playTone(392.00, 'triangle', 0.1, 0.12); 
        this.playTone(311.13, 'triangle', 0.2, 0.18); 
    }
    playFanfare() {
        const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99];
        notes.forEach((f, i) => this.playTone(f, 'sine', 0.1, i * 0.04));
        this.playTone(1046.50, 'sine', 0.3, 0.24);
    }
}

// Helper to draw rounded rectangles
function roundRect(x, y, w, h, r, fill = true, stroke = false) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
}

/* ==========================================
   Face State Modification & Drawing
========================================== */
function setEmotion(character, emotion){
    if (!Characters[character]) return;
    Characters[character].face.emotion = emotion;
    Characters[character].face.blush = false;
    Characters[character].face.tears = false;
    Characters[character].face.shake = false;

    switch(emotion){
        case "happy":
            break;
        case "blush":
            Characters[character].face.blush = true;
            break;
        case "sad":
            Characters[character].face.tears = true;
            break;
        case "jealous":
            Characters[character].face.shake = true;
            break;
    }
}

function drawBlush(x,y){
    ctx.fillStyle = "rgba(255,120,150,.45)";
    ctx.beginPath();
    ctx.arc(x-32,y+18,13,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x+32,y+18,13,0,Math.PI*2);
    ctx.fill();
}

function drawTears(x,y){
    ctx.fillStyle = "#79D8FF";
    ctx.beginPath();
    ctx.arc(x-22,y+40,4,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x+22,y+40,4,0,Math.PI*2);
    ctx.fill();
}

function drawHair(x,y,color){
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x,y-42,62,Math.PI,0);
    ctx.fill();
}

function drawFace(character,x,y){
    ctx.fillStyle = "#FFE4D6";
    ctx.beginPath();
    ctx.arc(x,y,55,0,Math.PI*2);
    ctx.fill();

    // Draw Hair
    const hairColor = Characters[character].appearance?.hair?.color || "#444444";
    drawHair(x,y,hairColor);

    // Eyes
    const eyeColor = Characters[character].appearance?.eyes?.color || "#333333";
    ctx.fillStyle = eyeColor;
    ctx.beginPath();
    ctx.arc(x-22, y-3, 9, 0, Math.PI*2);
    ctx.arc(x+22, y-3, 9, 0, Math.PI*2);
    ctx.fill();

    // Eye Pupils
    ctx.fillStyle = "#FFFFFF";
    ctx.beginPath();
    ctx.arc(x-24, y-5, 3, 0, Math.PI*2);
    ctx.arc(x+20, y-5, 3, 0, Math.PI*2);
    ctx.fill();

    // Smile/Mouth (Based on face emotion)
    ctx.strokeStyle = "#5A3B4E";
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    const emotion = Characters[character].face.emotion;
    if (emotion === "happy" || emotion === "love" || Characters[character].face.blush) {
        ctx.arc(x, y+16, 12, 0, Math.PI, false);
    } else if (emotion === "sad" || Characters[character].face.tears) {
        ctx.arc(x, y+24, 10, Math.PI, 0, false);
    } else {
        ctx.arc(x, y+18, 8, 0, Math.PI, false);
    }
    ctx.stroke();

    if(Characters[character].face.blush){
        drawBlush(x,y);
    }

    if(Characters[character].face.tears){
        drawTears(x,y);
    }
}

function drawPortrait(character) {
    const img = portraits[character];
    const data = Characters[character];
    if (!data) return;

    let targetX = 820;
    let targetY = 30;

    // Apply screen shake effect on jealous/angry expression
    if (data.face?.shake) {
        targetX += (Math.random() * 8 - 4);
        targetY += (Math.random() * 8 - 4);
    }

    // Shadow & Frame
    ctx.save();
    ctx.shadowColor = GAME.theme.shadow;
    ctx.shadowBlur = 25;

    // White Card frame
    ctx.fillStyle = GAME.theme.panelColor;
    roundRect(targetX, targetY, 380, 620, 25, true, false);
    ctx.restore();

    // Portrait image draw (If loaded)
    if (img && img.complete && img.naturalWidth > 0) {
        ctx.save();
        // Clip to fit frame nicely
        ctx.beginPath();
        roundRect(targetX + 20, targetY + 20, 340, 580, 20, false, false);
        ctx.clip();
        ctx.drawImage(img, targetX + 20, targetY + 20, 340, 580);
        ctx.restore();
    } else {
        // Aesthetic Procedural Fallback if image asset is unavailable
        ctx.save();
        const cardGrad = ctx.createLinearGradient(targetX + 20, targetY + 20, targetX + 20, targetY + 600);
        cardGrad.addColorStop(0, "#FFE3F1");
        cardGrad.addColorStop(1, "#FFF0F6");
        ctx.fillStyle = cardGrad;
        roundRect(targetX + 20, targetY + 20, 340, 580, 20, true, false);

        // Body drawing
        ctx.fillStyle = data.appearance?.outfit?.jacket || "#FFFFFF";
        ctx.beginPath();
        ctx.moveTo(targetX + 60, targetY + 500);
        ctx.lineTo(targetX + 320, targetY + 500);
        ctx.lineTo(targetX + 260, targetY + 340);
        ctx.lineTo(targetX + 120, targetY + 340);
        ctx.closePath();
        ctx.fill();

        // Tie
        ctx.fillStyle = data.appearance?.outfit?.tie || "#B22222";
        ctx.beginPath();
        ctx.moveTo(targetX + 175, targetY + 340);
        ctx.lineTo(targetX + 205, targetY + 340);
        ctx.lineTo(targetX + 190, targetY + 410);
        ctx.closePath();
        ctx.fill();

        // Call detailed procedural facial features
        const faceCenterX = targetX + 190;
        const faceCenterY = targetY + 250;
        drawFace(character, faceCenterX, faceCenterY);
        ctx.restore();
    }

    // Name plate
    ctx.fillStyle = "#FF6DAE";
    ctx.font = "bold 28px 'Do Hyeon', sans-serif";
    ctx.textBaseline = "alphabetic";
    ctx.textAlign = "center";
    ctx.fillText(data.name, targetX + 190, targetY + 580);
}

/* ==========================================
   Procedural Vector Background Rendering Engine
========================================== */
function drawProceduralBackground(location) {
    ctx.save();
    
    if (location === "도서관") {
        // library background
        // Warm brown wooden theme floor & bookshelves
        const floorGrad = ctx.createLinearGradient(0, 360, 0, 720);
        floorGrad.addColorStop(0, "#D7A15C");
        floorGrad.addColorStop(1, "#8F5C38");
        ctx.fillStyle = floorGrad;
        ctx.fillRect(0, 0, 1280, 720);

        // Bookshelves drawing
        ctx.fillStyle = "#5c3d24";
        ctx.fillRect(100, 50, 250, 400);
        ctx.fillRect(450, 50, 250, 400);

        // Warm lamps lighting bloom
        const lampGlow = ctx.createRadialGradient(300, 100, 10, 300, 100, 250);
        lampGlow.addColorStop(0, "rgba(255, 230, 180, 0.7)");
        lampGlow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = lampGlow;
        ctx.fillRect(0, 0, 1280, 720);

    } else if (location === "교실") {
        // classroom background
        // Floor perspective + blackboard + wooden chairs
        const walls = ctx.createLinearGradient(0, 0, 0, 360);
        walls.addColorStop(0, "#ECE9E6");
        walls.addColorStop(1, "#E8E5E2");
        ctx.fillStyle = walls;
        ctx.fillRect(0, 0, 1280, 720);

        // Wood Floor reflection
        ctx.fillStyle = "#CDBB9E";
        ctx.fillRect(0, 360, 1280, 360);

        // Blackboard drawing
        ctx.fillStyle = "#2F4F4F";
        roundRect(150, 80, 800, 250, 10, true, false);
        ctx.strokeStyle = "#8B4513";
        ctx.lineWidth = 10;
        roundRect(150, 80, 800, 250, 10, false, true);

        // Clock
        ctx.fillStyle = "#FFFFFF";
        ctx.beginPath();
        ctx.arc(1100, 100, 40, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 4;
        ctx.stroke();

    } else if (location === "운동장") {
        // gym or athletic fields
        const sky = ctx.createLinearGradient(0, 0, 0, 360);
        sky.addColorStop(0, "#A9E6FF");
        sky.addColorStop(0.5, "#D8F5FF");
        sky.addColorStop(1, "#FFF7FC");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, 1280, 720);

        // Green track grass
        ctx.fillStyle = "#7CCD7C";
        ctx.fillRect(0, 360, 1280, 360);

        // Running lanes perspective
        ctx.strokeStyle = "#FFFFFF";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(100, 720); ctx.lineTo(400, 360);
        ctx.moveTo(300, 720); ctx.lineTo(480, 360);
        ctx.moveTo(980, 720); ctx.lineTo(800, 360);
        ctx.stroke();

    } else if (location === "옥상") {
        // rooftop background
        ctx.fillStyle = "#B3E5FC";
        ctx.fillRect(0, 0, 1280, 720);

        // Skyline distant buildings
        ctx.fillStyle = "#CFD8DC";
        ctx.fillRect(200, 250, 120, 150);
        ctx.fillRect(380, 200, 150, 200);
        ctx.fillRect(700, 280, 110, 120);

        // Fence grid
        ctx.strokeStyle = "#B0BEC5";
        ctx.lineWidth = 4;
        for (let x = 0; x < 1280; x += 60) {
            ctx.beginPath(); ctx.moveTo(x, 300); ctx.lineTo(x, 420); ctx.stroke();
        }
        ctx.beginPath(); ctx.moveTo(0, 300); ctx.lineTo(1280, 300); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 420); ctx.lineTo(1280, 420); ctx.stroke();

    } else if (location === "매점") {
        // shop/store background
        const storeGrad = ctx.createLinearGradient(0, 0, 1280, 0);
        storeGrad.addColorStop(0, "#FFEBEF");
        storeGrad.addColorStop(1, "#FFF4F7");
        ctx.fillStyle = storeGrad;
        ctx.fillRect(0, 0, 1280, 720);

        // Counter
        ctx.fillStyle = "#FF8DA1";
        ctx.fillRect(0, 400, 1280, 320);

        // Drinks and boxes
        ctx.fillStyle = "#FFB3C1";
        ctx.fillRect(200, 200, 300, 150);
    } else {
        // default background layout
        const grad = ctx.createLinearGradient(0, 0, 0, 720);
        GAME.theme.backgroundGradient.forEach((color, idx) => {
            grad.addColorStop(idx / (GAME.theme.backgroundGradient.length - 1), color);
        });
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 1280, 720);
    }
    
    ctx.restore();
}

let dialogueTypeTimer = 0;
let displayedDialogueLength = 0;

function runGameLoop() {
    ctx.clearRect(0, 0, 1280, 720);

    // 1. Draw Background
    if (gameState.phase === 'story' && gameState.currentLocation) {
        drawProceduralBackground(gameState.currentLocation);
    } else {
        // Fallback or Title Background
        const grad = ctx.createLinearGradient(0, 0, 0, 720);
        GAME.theme.backgroundGradient.forEach((color, idx) => {
            grad.addColorStop(idx / (GAME.theme.backgroundGradient.length - 1), color);
        });
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 1280, 720);
    }

    // 2. Render Clouds
    if (GAME.theme.cloud) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
        clouds.forEach(c => {
            c.x += c.speed;
            if (c.x > 1280) c.x = -c.width;
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.height, 0, Math.PI * 2);
            ctx.arc(c.x + c.width * 0.3, c.y - c.height * 0.2, c.height * 1.2, 0, Math.PI * 2);
            ctx.arc(c.x + c.width * 0.6, c.y, c.height, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    // 3. Sunlight Bloom
    if (GAME.theme.bloom) {
        const sun = ctx.createRadialGradient(1280, 0, 10, 1280, 0, 700);
        sun.addColorStop(0, "rgba(255, 255, 255, 0.4)");
        sun.addColorStop(0.3, "rgba(255, 224, 236, 0.2)");
        sun.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = sun;
        ctx.fillRect(0, 0, 1280, 720);
    }

    // 4. Draw Characters (Story Mode Only)
    if (gameState.phase === 'story' && gameState.currentEvent) {
        const activeCharId = gameState.currentEvent.a[0][1];
        if (activeCharId) {
            drawPortrait(activeCharId);
        }
    }

    // 5. Draw Dialogue Box Canvas Overlay (Precisely conforming to DialogueUI constraints)
    if (gameState.phase === 'story' && gameState.currentEvent) {
        ctx.save();
        
        // Shadow configuration
        ctx.shadowColor = DialogueUI.panel.shadowColor;
        ctx.shadowBlur = DialogueUI.panel.shadowBlur;
        
        // Main dialogue panel
        ctx.fillStyle = DialogueUI.panel.background;
        ctx.strokeStyle = DialogueUI.panel.border;
        ctx.lineWidth = DialogueUI.panel.borderWidth;
        roundRect(
            DialogueUI.panel.x,
            DialogueUI.panel.y,
            DialogueUI.panel.width,
            DialogueUI.panel.height,
            DialogueUI.panel.radius,
            true,
            true
        );
        ctx.restore();

        // Speaker Name box
        ctx.save();
        ctx.fillStyle = DialogueUI.nameBox.color;
        roundRect(
            DialogueUI.nameBox.x,
            DialogueUI.nameBox.y,
            DialogueUI.nameBox.width,
            DialogueUI.nameBox.height,
            12,
            true,
            false
        );
        
        // Speaker text
        ctx.fillStyle = DialogueUI.nameBox.textColor;
        ctx.font = "bold 22px 'Pretendard', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        
        const activeCharId = gameState.currentEvent.a[0][1];
        const speakerName = Characters[activeCharId] ? Characters[activeCharId].name : "???";
        ctx.fillText(
            speakerName, 
            DialogueUI.nameBox.x + DialogueUI.nameBox.width / 2, 
            DialogueUI.nameBox.y + DialogueUI.nameBox.height / 2
        );
        ctx.restore();

        // Dialog Typing Text Effect
        ctx.save();
        ctx.fillStyle = DialogueUI.dialogColor;
        ctx.font = "600 24px 'Pretendard', sans-serif";
        ctx.textAlign = "left";
        
        const fullText = gameState.currentEvent.q;
        if (displayedDialogueLength < fullText.length) {
            dialogueTypeTimer += 16.7; // Approx ms per frame
            if (dialogueTypeTimer >= DialogueUI.typingSpeed) {
                displayedDialogueLength++;
                dialogueTypeTimer = 0;
            }
        }
        
        const partialText = fullText.substring(0, displayedDialogueLength);
        wrapKoreanText(ctx, partialText, DialogueUI.panel.x + 40, DialogueUI.panel.y + 60, DialogueUI.panel.width - 80, 36);
        ctx.restore();
    }

    // 6. Sakura Falling Petals
    if (GAME.theme.sakura) {
        ctx.fillStyle = "rgba(255, 182, 193, 0.85)";
        sakuraParticles.forEach(p => {
            p.x += p.speedX;
            p.y += p.speedY;
            p.angle += p.spin;

            if (p.y > 720 || p.x > 1280) {
                p.y = -20;
                p.x = Math.random() * 1280 * 1.5 - 1280 * 0.5;
            }

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle);
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });
    }

    requestAnimationFrame(runGameLoop);
}

// Multiline text wrapper for Korean texts (Conforming to exact grid)
function wrapKoreanText(ctx, text, x, y, maxWidth, lineHeight) {
    let lines = [];
    let currentLine = "";
    for (let i = 0; i < text.length; i++) {
        let char = text[i];
        if (char === '\n') {
            lines.push(currentLine);
            currentLine = "";
            continue;
        }
        let testLine = currentLine + char;
        let metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth) {
            lines.push(currentLine);
            currentLine = char;
        } else {
            currentLine = testLine;
        }
    }
    lines.push(currentLine);
    
    for(let j = 0; j < lines.length; j++) {
        ctx.fillText(lines[j], x, y + (j * lineHeight));
    }
}

            } else if (winner.id === 'boy2') {
                endTitle = `강 카오와의 해변 석양 빛 연인 엔딩 💛`;
                endDesc = `"장난스러운 눈길을 거두고, 카오가 전에 본 적 없는 극진하고 진실한 태도로 당신의 손목을 부드럽게 가져갑니다.\n\n'야, 나 수영부 에이스에 다른 애들한텐 대충 흘리고 다녀서 가벼워 보였겠지만... 솔직히 네 앞에만 서면 심장이 터질 것처럼 주체가 안 돼. 나 이제 너 말고 다른 애는 안 보여. 내 마음, 완전히 네 거야.'\n\n그의 나지막이 떨리는 목소리가 석양으로 붉게 물든 옥상을 따스하게 메웠습니다."`;
            } else if (winner.id === 'boy3') {
                endTitle = `아마노 히로와의 불꽃 같은 열혈 연인 엔딩 ❤️`;
                endDesc = `"육상부의 에너지 넘치는 아마노 히로가 힘차게 달려와 숨이 턱 끝까지 찬 채 당신을 가슴 가득 꽉 끌어안았습니다.\n\n'누나! 나 이제 누나 없으면 한 걸음도 못 뛸 것 같아! 매일 매점 같이 가주고, 땀 냄새나는 나를 웃으며 맞이해준 사람은 누나밖에 없어! 나랑 평생 같이 뛰어줄래?'\n\n햇살 같은 소년의 함박웃음 속에서 고유한 온기가 당신의 가슴 속 전기 코드를 완전히 메웠습니다."`;
            }
        }

        footer.innerHTML = `
            <div class="glass-panel-heavy p-6 rounded-[28px] max-w-xl mx-auto shadow-2xl text-center border-2 border-[#FFC9E6]">
                <span class="text-[9px] tracking-widest text-pink-500 font-extrabold uppercase bg-[#FFE3F1] border border-[#FFD3EA] px-3 py-1.5 rounded-full">COMMENCEMENT EPILOGUE</span>
                <h2 class="fancy-title text-2xl md:text-3xl text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-amber-500 mt-4 mb-3 font-bold">${endTitle}</h2>
                <p class="text-slate-600 text-xs leading-relaxed mb-6 whitespace-pre-wrap max-w-md mx-auto">
                    ${endDesc}
                </p>
                <button onclick="resetGame()" class="px-6 py-3 bg-gradient-to-r from-[#FF96C5] via-[#FF6D9E] to-[#FFAE64] hover:from-[#FFB0D2] text-white font-black text-xs rounded-xl shadow-lg transition transform active:scale-95">
                    처음부터 다시 공략하기 🔁
                </button>
            </div>
        `;
    }
}

function visit(place) {
    sound.init();

    // 1. 능력치 증가 수동 반영
    addStat(place);

    const placeEvents = events[place];
    // Filter to avoid repeating already observed events
    const available = (placeEvents || []).filter((_, index) => {
        return !seenEvents.has(place + "_" + index);
    });

    // Fallback if there are no unused events for the place
    if (available.length === 0) {
        sound.playTone(392.00, 'sine', 0.1);
        
        let fallbackText = `오늘 [${place}] 구역에는 특별히 당신을 기다리는 소년이 없었지만, 주변 환경을 청소하고 자율 훈련에 동참하여 기분을 알차게 정리했습니다.`;
        if (place === "교실") {
            fallbackText = "조용한 정규 수업 교실 칠판 앞에서 열심히 예습 및 정리 노트 필기에 열중하여 지성 능력이 튼튼해졌습니다!";
        } else if (place === "매점") {
            fallbackText = "매점에서 소년들이 평소 선호하는 달콤한 초코우유와 허니 생크림 샌드위치를 기분 좋게 챙겨 먹고 매력을 가꿨습니다.";
        }

        const header = document.getElementById("ui-header");
        const footer = document.getElementById("ui-footer");

        header.innerHTML = `
            <div class="glass-panel px-4 py-2 rounded-full pointer-events-auto flex gap-2 text-xs font-semibold text-[#5A3B4E]">
                <span>⚡ 자율 단련 구역 : ${place}</span>
            </div>
        `;

        footer.innerHTML = `
            <div class="glass-panel-heavy p-5 rounded-[28px] w-full max-w-full md:max-w-[760px] shadow-2xl border-2 border-[#FFD3EA]">
                <p class="text-slate-600 text-xs md:text-sm leading-relaxed mb-5 font-semibold">
                    ${fallbackText}
                </p>
                <button onclick="nextTime()" class="w-full py-2.5 bg-gradient-to-r from-[#FF96C5] to-[#FF6D9E] text-white font-bold rounded-xl shadow-md text-xs transition active:scale-95 text-center">
                    다음 교실 일정 시간으로 정각 이동 ➜
                </button>
            </div>
        `;
        return;
    }

    // Allocate random event
    const selectedEvent = available[Math.floor(Math.random() * available.length)];
    const originalIndex = placeEvents.indexOf(selectedEvent);

    // Save as observed to avoid duplication
    seenEvents.add(place + "_" + originalIndex);

    sound.playTone(440.00, 'sine', 0.08);

    gameState.currentLocation = place;
    gameState.currentEvent = selectedEvent;
    gameState.phase = 'story';

    // Reset Typing animation states when dialogue loads
    displayedDialogueLength = 0;
    dialogueTypeTimer = 0;

    // Set normal face emotion state when story event initiates
    const activeCharId = selectedEvent.a[0][1];
    if (activeCharId) {
        setEmotion(activeCharId, 'normal');
    }

    renderScreen();
}

function addStat(place) {
    if (!statEvents[place]) return;
    const s = statEvents[place];
    
    player[s.stat] += s.value;
    
    document.getElementById("charm").innerText = player.charm;
    document.getElementById("intel").innerText = player.intel;
    document.getElementById("stamina").innerText = player.stamina;

    addLog(`[능력치 강화] ${place} 방문으로 [${s.stat === 'charm' ? '매력' : (s.stat === 'intel' ? '지성' : '체력')}] +${s.value}`);
}

function makeChoice(idx) {
    const ev = gameState.currentEvent;
    const choice = ev.a[idx];
    
    const choiceText = choice[0];
    const npcId = choice[1];
    let loveGain = choice[2];
    const outcomeMsg = "서로 정갈한 눈빛을 교차하며 화답의 다정한 여운을 갈무리했습니다.";

    const targetNPC = Characters[npcId];

    // Added stat bonuses based on player stats
    let statBonus = 0;
    if (npcId === "boy1" && player.intel >= 20) statBonus = 2;
    if (npcId === "boy2" && player.stamina >= 20) statBonus = 2;
    if (npcId === "boy3" && player.stamina >= 15) statBonus = 2;
    if (npcId === "rival" && player.charm >= 20) statBonus = 2;

    if (loveGain > 0) {
        loveGain += statBonus;
    }

    targetNPC.love += loveGain;
    if (targetNPC.love < 0) targetNPC.love = 0;

    addLog(`"${choiceText}" 선택 (${targetNPC.name} 호감도 ${loveGain >= 0 ? '+' : ''}${loveGain}${statBonus > 0 ? ' [스탯 보너스 반영]' : ''})`);
    updateLove();

    // Dynamically adjust emotional states on face based on love change
    if (loveGain > 0) {
        sound.playLoveGain();
        spawnHearts(false);
        setEmotion(npcId, 'happy');
        // Give a blush chance on significant positive gains
        if (loveGain >= 10) {
            setEmotion(npcId, 'blush');
        }
    } else if (loveGain < 0) {
        sound.playLoveLoss();
        spawnHearts(true);
        setEmotion(npcId, 'sad');
    } else {
        setEmotion(npcId, 'normal');
    }

    // Checking thresholds
    specialCheck(npcId);

    // Results screen render
    const header = document.getElementById("ui-header");
    const footer = document.getElementById("ui-footer");

    header.innerHTML = `
        <div class="glass-panel px-4 py-2 rounded-full pointer-events-auto flex gap-2 text-xs font-semibold text-[#5A3B4E]">
            <span>🎉 교감 결과 수렴 완료</span>
        </div>
    `;

    footer.innerHTML = `
        <div class="glass-panel-heavy p-5 rounded-[28px] w-full max-w-full md:max-w-[760px] shadow-2xl relative border-2 border-[#FFC9E6]">
            <div class="absolute -top-2.5 left-5 px-3 py-0.5 bg-[#FF6D9E] text-white text-[9px] font-black rounded-md tracking-wider shadow">대화 완료</div>
            
            <p class="text-slate-700 text-xs md:text-sm leading-relaxed mb-5 mt-1 font-semibold">
                "${outcomeMsg}"
            </p>

            <div class="flex items-center justify-between bg-pink-50/50 p-2.5 rounded-xl border border-[#FFD3EA] mb-4 shadow-inner">
                <span class="text-xs text-slate-500">호감 변동수치 :</span>
                <span class="font-extrabold text-sm ${loveGain >= 0 ? 'text-pink-500' : 'text-slate-400'}">
                    ${loveGain >= 0 ? `+${loveGain}` : loveGain}
                </span>
            </div>

            <button onclick="nextTime()" class="w-full py-2.5 bg-gradient-to-r from-[#FF96C5] to-[#FF6D9E] text-white font-bold rounded-xl shadow-md text-xs transition active:scale-95 text-center">
                다음 교시 시간으로 가볍게 넘어가기 ➜
            </button>
        </div>
    `;
}

function nextTime() {
    advanceTime();
}

function advanceTime() {
    // Check if there is an absolute love winner (reached 100%)
    let targetWinnerId = null;
    Object.keys(Characters).forEach(key => {
        if (Characters[key].love >= Characters[key].endingLove) {
            if (key === 'rival') {
                if (Characters.rival.unlock) targetWinnerId = key;
            } else {
                targetWinnerId = key;
            }
        }
    });

    if (targetWinnerId) {
        ending(Characters[targetWinnerId]);
        return;
    }

    jealousyCheck();
    rivalEvent();

    // Advance period indices
    gameState.periodIndex++;
    if (gameState.periodIndex >= gameState.periods.length) {
        gameState.periodIndex = 0;
        gameState.day++;
    }

    syncSnippetVariables();

    // Limit game to 4 days, then check endings
    if (gameState.day > 4) {
        let finalWinner = null;
        Object.keys(Characters).forEach(key => {
            if (Characters[key].love >= Characters[key].endingLove) {
                if (key === 'rival') {
                    if (Characters.rival.unlock) finalWinner = Characters[key];
                } else {
                    finalWinner = Characters[key];
                }
            }
        });

        if (finalWinner) {
            ending(finalWinner);
        } else {
            gameOver();
        }
        return;
    }

    gameState.phase = 'map';
    gameState.currentLocation = null;
    gameState.currentEvent = null;

    document.getElementById("current-cycle").innerText = getPeriodText();
    renderScreen();
}

function specialCheck(id) {
    const c = Characters[id];
    if (c.love >= c.routeOpen && !c.special) {
        c.special = true;
        sound.playFanfare();
        showToast("💌 특별한 교감 진동!", `${c.name}이(가) 당신에게 더욱 적극적인 진심과 두근거림으로 다가옵니다!`, "💌");
    }
    if (c.love >= c.endingLove) {
        ending(c);
    }
}

function jealousyCheck() {
    const list = [Characters.boy1, Characters.boy2, Characters.boy3];
    let highCount = 0;

    list.forEach(n => {
        if (n.love >= 70) highCount++;
    });

    if (highCount >= 2) {
        sound.playLoveLoss();
        showToast("💔 질투심 폭발 감지!", "두 명 이상의 남학생이 동시에 당신을 연모하기 시작해 미묘하고 팽팽한 질투심이 터져나옵니다. 그들의 호감도가 소폭 하락합니다.", "💔");
        list.forEach(n => {
            if (n.love >= 70) {
                n.love = Math.max(0, n.love - 5);
                setEmotion(n.id, 'jealous');
            }
        });
        addLog("🚨 [질투 이벤트] 관계 과부하로 인한 호감도 소폭 페널티 하락 (-5)");
        updateLove();
    }
}

function rivalEvent() {
    if (Characters.rival.love >= 60 && !Characters.rival.unlock) {
        Characters.rival.unlock = true;
        sound.playFanfare();
        showToast("💅 강세라의 비밀스런 마음 개방!", "도도하던 학우 강세라가 당신을 향한 굳은 오해를 깨끗하게 지웠습니다! 그녀 고유의 히든 고백/친밀 연인 루트가 완벽히 기동됩니다.", "💅");
        addLog("💚 [라이벌 돌파] 강세라 플래그 해금 수령 완료!");
        updateLove();
    }
}

function ending(c) {
    gameState.phase = 'ending';
    gameState.winner = c;
    renderScreen();
}

function gameOver() {
    gameState.phase = 'ending';
    gameState.winner = null;
    renderScreen();
}

function showToast(title, msg, icon = "✨") {
    document.getElementById("toast-title").innerText = title;
    document.getElementById("toast-body").innerText = msg;
    document.getElementById("toast-icon").innerText = icon;
    
    const overlay = document.getElementById("toast-overlay");
    overlay.classList.remove("hidden");
    overlay.classList.add("flex");
}

function closeToast() {
    const overlay = document.getElementById("toast-overlay");
    overlay.classList.add("hidden");
    overlay.classList.remove("flex");
}

function spawnHearts(isBroken = false) {
    const area = document.getElementById("main-display-area");
    if (!area) return;

    for (let i = 0; i < 6; i++) {
        const p = document.createElement("div");
        if (isBroken) {
            p.className = "floating-broken-heart text-2xl md:text-3xl pointer-events-none";
            p.innerText = "💔";
        } else {
            p.className = "floating-heart text-2xl md:text-3xl pointer-events-none";
            p.innerText = "❤️";
        }
        
        const left = Math.random() * 80 + 10;
        const bottom = Math.random() * 30 + 10;
        p.style.left = `${left}%`;
        p.style.bottom = `${bottom}%`;
        p.style.animationDelay = `${Math.random() * 0.3}s`;
        
        area.appendChild(p);
        
        setTimeout(() => {
            p.remove();
        }, 1600);
    }
}

window.onload = function() {
    initParticles();
    runGameLoop();
    updateLove();
    buildMap();
};
</script>
</body>
</html>
