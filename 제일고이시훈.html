<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀 미션의 원카드 - 1980 노아 코믹스</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #121212;
            color: #f0f0f0;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1280px;
            max-height: 720px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 6px double #f0f0f0;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #1e1e1e;
        }

        /* 흑백 빈티지 질감을 위한 노이즈/하프톤 오버레이 */
        .halftone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.05;
            background-image: radial-gradient(#000 20%, transparent 20%),
                              radial-gradient(#000 20%, transparent 20%);
            background-size: 8px 8px;
            background-position: 0 0, 4px 4px;
        }

        /* 종이 구겨짐/빈티지 텍스처 오버레이 */
        .paper-texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.06;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 와일드 카드 사용 시 색상 선택용 오버레이 UI */
        #color-picker {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            border: 4px solid #000;
            box-shadow: 10px 10px 0px #000;
            padding: 24px;
            z-index: 100;
            text-align: center;
            width: 320px;
        }

        #color-picker h3 {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            color: #000;
            margin-bottom: 16px;
            border-bottom: 3px solid #000;
            padding-bottom: 8px;
        }

        .color-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .color-btn {
            padding: 14px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: 3px solid #000;
            background: #fff;
            color: #000;
            transition: all 0.1s ease;
            box-shadow: 4px 4px 0px #000;
        }

        .color-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        .btn-red { background: #ff4d4d; color: #fff; }
        .btn-blue { background: #3385ff; color: #fff; }
        .btn-green { background: #2eb82e; color: #fff; }
        .btn-yellow { background: #e6b800; color: #000; }

        /* 오디오 상태 토글 아이콘 */
        #audio-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 50;
            background: #ffffff;
            color: #000000;
            border: 3px solid #000000;
            box-shadow: 3px 3px 0px #000000;
            padding: 6px 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }
        #audio-toggle:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
        <div class="halftone-overlay"></div>
        <div class="paper-texture"></div>
        <button id="audio-toggle">음악/효과음 ON</button>
        
        <!-- 와일드 컬러 선택 모달 -->
        <div id="color-picker">
            <h3>SELECT COLOR</h3>
            <div class="color-btns">
                <button class="color-btn btn-red" onclick="selectWildColor('Red')">RED</button>
                <button class="color-btn btn-blue" onclick="selectWildColor('Blue')">BLUE</button>
                <button class="color-btn btn-green" onclick="selectWildColor('Green')">GREEN</button>
                <button class="color-btn btn-yellow" onclick="selectWildColor('Yellow')">YELLOW</button>
            </div>
        </div>
    </div>

    <script>
        // --- 글로벌 사운드 매니저 ---
        class AudioManager {
            constructor() {
                this.ctx = null;
                this.muted = true;
                this.bgmInterval = null;
                this.bgmSequence = [
                    220, 247, 262, 294, 330, 294, 262, 247,
                    220, 247, 262, 294, 330, 392, 349, 330,
                    147, 165, 175, 196, 220, 196, 175, 165,
                    196, 220, 247, 262, 294, 330, 349, 392
                ];
                this.bgmStep = 0;
            }

            init() {
                if (this.ctx) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                this.muted = false;
                this.startBGM();
            }

            toggle() {
                if (!this.ctx) {
                    this.init();
                    return true;
                }
                this.muted = !this.muted;
                if (!this.muted) {
                    if (this.ctx.state === 'suspended') {
                        this.ctx.resume();
                    }
                    this.startBGM();
                } else {
                    this.stopBGM();
                }
                return !this.muted;
            }

            playTone(freq, type, duration, volume) {
                if (this.muted || !this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gainNode = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    
                    gainNode.gain.setValueAtTime(volume, this.ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                    
                    osc.connect(gainNode);
                    gainNode.connect(this.ctx.destination);
                    osc.start();
                    osc.stop(this.ctx.currentTime + duration);
                } catch (e) {
                    console.log("Audio play error", e);
                }
            }

            startBGM() {
                if (this.bgmInterval) clearInterval(this.bgmInterval);
                this.bgmInterval = setInterval(() => {
                    if (this.muted) return;
                    const note = this.bgmSequence[this.bgmStep];
                    this.playTone(note, 'triangle', 0.4, 0.08);
                    
                    if (this.bgmStep % 4 === 2) {
                        this.playTone(800, 'sine', 0.05, 0.02);
                    }
                    this.bgmStep = (this.bgmStep + 1) % this.bgmSequence.length;
                }, 400);
            }

            stopBGM() {
                if (this.bgmInterval) {
                    clearInterval(this.bgmInterval);
                    this.bgmInterval = null;
                }
            }

            playCardPlace() {
                this.playTone(350, 'triangle', 0.15, 0.15);
                setTimeout(() => this.playTone(200, 'triangle', 0.1, 0.1), 60);
            }

            playCardDraw() {
                this.playTone(180, 'sine', 0.1, 0.1);
                setTimeout(() => this.playTone(280, 'sine', 0.15, 0.15), 50);
            }

            playSpecialCard() {
                this.playTone(523, 'sawtooth', 0.2, 0.1);
                setTimeout(() => this.playTone(659, 'sawtooth', 0.2, 0.1), 100);
                setTimeout(() => this.playTone(784, 'sawtooth', 0.3, 0.15), 200);
            }

            playMissionSuccess() {
                const notes = [261.6, 329.6, 392.0, 523.3, 659.3, 784.0];
                notes.forEach((freq, i) => {
                    setTimeout(() => {
                        this.playTone(freq, 'sawtooth', 0.3, 0.2);
                    }, i * 80);
                });
            }

            playWin() {
                const notes = [523.3, 523.3, 523.3, 523.3, 659.3, 587.3, 659.3, 784.0, 1046.5];
                notes.forEach((freq, i) => {
                    setTimeout(() => {
                        this.playTone(freq, 'square', 0.4, 0.15);
                    }, i * 150);
                });
            }

            playClick() {
                this.playTone(600, 'sine', 0.05, 0.15);
            }
        }

        const audio = new AudioManager();
        document.getElementById('audio-toggle').addEventListener('click', (e) => {
            const on = audio.toggle();
            e.target.innerText = on ? "음악/효과음 ON" : "음악/효과음 OFF";
        });


        // --- 이미지/색상 및 리소스 모음 ---
        const Colors = {
            DarkInk: '#0e0e0e',
            MidInk: '#2d2d2d',
            LightInk: '#555555',
            Paper: '#fbf8f0', 
            PaperDark: '#e3dfd3',
            White: '#ffffff',
            Black: '#000000',
            Red: '#c02c2c',    
            Blue: '#1a5fa6',   
            Green: '#1a7a3e',  
            Yellow: '#cca300', 
            Accent: '#e5c158'  
        };

        const CardColors = ['Red', 'Blue', 'Green', 'Yellow'];
        const CardValues = ['1', '2', '3', '4', '5', '6', '7', '8', '9', 'Skip', 'Reverse', 'Draw2', 'Wild', 'WildDraw4'];

        const Missions = [
            { id: 1, text: "홀수 카드만 3회 연속 내기", check: 'odds' },
            { id: 2, text: "짝수 카드만 3회 연속 내기", check: 'evens' },
            { id: 3, text: "빨간색 카드 3회 연속 내기", check: 'reds' },
            { id: 4, text: "특수 카드 2회 연속 내기", check: 'specials' },
            { id: 5, text: "숫자 카드만 4회 연속 내기", check: 'numbers' },
            { id: 6, text: "같은 색상 연속 4회 내기", check: 'sameColor' },
            { id: 7, text: "같은 숫자 연속 2회 내기", check: 'sameValue' },
            { id: 8, text: "와일드 카드 사용 성공하기", check: 'useWild' }
        ];

        // --- 카드 클래스 ---
        class Card {
            constructor(color, value) {
                this.color = color; 
                this.value = value; 
                
                this.x = 640;
                this.y = 360;
                this.targetX = 640;
                this.targetY = 360;
                this.width = 90;
                this.height = 135;
                this.rotation = 0;
                this.targetRotation = 0;
                this.isFlipped = true; 
                
                // Delta Time 기반 보간을 위한 가중치들
                this.scale = 1.0;
                this.targetScale = 1.0;
                this.hoverProgress = 0.0; // 0.0 ~ 1.0 보간 데이터

                this.hovered = false;
                this.playable = false;
            }

            update(dt) {
                const speed = 10;
                
                // Hover 상태 전환 애니메이션 보간 (0.2초 이내 부드러운 Ease In Out 설계)
                if (this.hovered) {
                    this.hoverProgress = Math.min(1.0, this.hoverProgress + dt / 0.2);
                } else {
                    this.hoverProgress = Math.max(0.0, this.hoverProgress - dt / 0.2);
                }

                // Ease In Out 공식
                const t = this.hoverProgress;
                const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

                // 마우스를 올릴 시: 15px 상승, 1.05배 확대, sin(time) 기반 최대 1.2도 자연스러운 흔들림
                const timeSec = Date.now() / 1000;
                const swayAngle = Math.sin(timeSec * Math.PI * 1.5) * 0.02; // 초당 1.5회 왕복, 최대 1.2도(약 0.021라디안)
                
                this.scale = 1.0 + (0.05 * ease);
                
                // 타겟 좌표 수정 반영
                const finalTargetY = this.targetY - (15 * ease);
                const finalTargetRotation = this.targetRotation + (swayAngle * ease);

                this.x += (this.targetX - this.x) * speed * dt;
                this.y += (finalTargetY - this.y) * speed * dt;
                this.rotation += (finalTargetRotation - this.rotation) * speed * dt;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(this.scale, this.scale);

                if (this.isFlipped) {
                    this.drawCardBack(ctx);
                } else {
                    this.drawCardFront(ctx);
                }

                ctx.restore();
            }

            drawCardBack(ctx) {
                const w = this.width;
                const h = this.height;

                ctx.fillStyle = Colors.Paper;
                ctx.fillRect(-w/2, -h/2, w, h);

                ctx.strokeStyle = Colors.Black;
                ctx.lineWidth = 4;
                ctx.strokeRect(-w/2, -h/2, w, h);

                ctx.lineWidth = 1;
                ctx.strokeRect(-w/2 + 6, -h/2 + 6, w - 12, h - 12);

                ctx.beginPath();
                ctx.ellipse(0, 0, w/3, h/4, 0, 0, Math.PI * 2);
                ctx.fillStyle = Colors.Black;
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = Colors.Paper;
                ctx.font = '900 13px Cinzel';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('NOIR', 0, -3);
                ctx.fillText('CARD', 0, 11);

                ctx.fillStyle = Colors.Black;
                const inset = 10;
                ctx.beginPath();
                ctx.arc(-w/2 + inset, -h/2 + inset, 2, 0, Math.PI * 2);
                ctx.arc(w/2 - inset, -h/2 + inset, 2, 0, Math.PI * 2);
                ctx.arc(-w/2 + inset, h/2 - inset, 2, 0, Math.PI * 2);
                ctx.arc(w/2 - inset, h/2 - inset, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            drawCardFront(ctx) {
                const w = this.width;
                const h = this.height;

                // 카드 플레이어블에 따른 글로우 외곽선
                if (this.playable && !this.isFlipped) {
                    ctx.save();
                    ctx.shadowColor = '#000000';
                    ctx.shadowBlur = 12;
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 8;
                    ctx.strokeRect(-w/2 - 2, -h/2 - 2, w + 4, h + 4);
                    ctx.restore();
                }

                // 카드 호버 시 강한 테두리 하이라이트 추가
                if (this.hoverProgress > 0.01) {
                    ctx.save();
                    ctx.shadowColor = 'rgba(0,0,0,0.4)';
                    ctx.shadowBlur = 8 + (6 * this.hoverProgress);
                    ctx.strokeStyle = Colors.Black;
                    ctx.lineWidth = 4 + (2 * this.hoverProgress);
                    ctx.strokeRect(-w/2, -h/2, w, h);
                    ctx.restore();
                }

                ctx.fillStyle = Colors.Paper;
                ctx.fillRect(-w/2, -h/2, w, h);

                ctx.strokeStyle = Colors.Black;
                ctx.lineWidth = 4;
                ctx.strokeRect(-w/2, -h/2, w, h);

                let cTheme = Colors.Black;
                if (this.color === 'Red') cTheme = Colors.Red;
                else if (this.color === 'Blue') cTheme = Colors.Blue;
                else if (this.color === 'Green') cTheme = Colors.Green;
                else if (this.color === 'Yellow') cTheme = Colors.Yellow;

                ctx.fillStyle = cTheme;
                
                if (this.color === 'Wild') {
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(-w/2 + 5, -h/2 + 5, w - 10, h - 10);
                    ctx.clip();
                    
                    const barW = (w - 10) / 4;
                    ctx.fillStyle = Colors.Red;
                    ctx.fillRect(-w/2 + 5, -h/2 + 5, barW, h - 10);
                    ctx.fillStyle = Colors.Blue;
                    ctx.fillRect(-w/2 + 5 + barW, -h/2 + 5, barW, h - 10);
                    ctx.fillStyle = Colors.Green;
                    ctx.fillRect(-w/2 + 5 + barW * 2, -h/2 + 5, barW, h - 10);
                    ctx.fillStyle = Colors.Yellow;
                    ctx.fillRect(-w/2 + 5 + barW * 3, -h/2 + 5, barW, h - 10);
                    ctx.restore();
                } else {
                    ctx.fillRect(-w/2 + 5, -h/2 + 5, w - 10, 22);
                    ctx.fillRect(-w/2 + 5, h/2 - 27, w - 10, 22);
                }

                ctx.strokeStyle = Colors.Black;
                ctx.lineWidth = 1;
                ctx.strokeRect(-w/2 + 5, -h/2 + 5, w - 10, h - 10);

                let displayVal = this.value;
                if (this.value === 'Draw2') displayVal = '+2';
                if (this.value === 'WildDraw4') displayVal = '+4';
                if (this.value === 'Skip') displayVal = 'S';
                if (this.value === 'Reverse') displayVal = 'R';
                if (this.value === 'Wild') displayVal = 'W';

                ctx.fillStyle = (this.color === 'Wild' || this.color === 'Yellow') ? Colors.Black : Colors.White;
                ctx.font = '900 13px "Cinzel", "Noto Sans KR"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                if (this.color !== 'Wild') {
                    ctx.fillText(displayVal, -w/2 + 18, -h/2 + 16);
                    ctx.fillText(displayVal, w/2 - 18, h/2 - 16);
                } else {
                    ctx.fillStyle = Colors.Black;
                    ctx.fillText('W', -w/2 + 18, -h/2 + 16);
                    ctx.fillText('W', w/2 - 18, h/2 - 16);
                }

                ctx.save();
                ctx.beginPath();
                ctx.arc(0, 0, w/3.2, 0, Math.PI*2);
                ctx.fillStyle = Colors.Paper;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = Colors.Black;
                ctx.stroke();
                ctx.restore();

                ctx.save();
                ctx.beginPath();
                ctx.arc(0, 0, w/3.2 - 2, 0, Math.PI*2);
                ctx.clip();
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.lineWidth = 1;
                for (let i = -w; i < w; i += 4) {
                    ctx.beginPath();
                    ctx.moveTo(i, -h);
                    ctx.lineTo(i + h, h);
                    ctx.stroke();
                }
                ctx.restore();

                ctx.fillStyle = Colors.Black;
                
                if (this.value === 'Skip') {
                    ctx.strokeStyle = Colors.Black;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, 14, 0, Math.PI*2);
                    ctx.moveTo(-10, -10);
                    ctx.lineTo(10, 10);
                    ctx.stroke();
                } else if (this.value === 'Reverse') {
                    ctx.strokeStyle = Colors.Black;
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.arc(-4, 0, 10, Math.PI*0.5, Math.PI*1.5);
                    ctx.moveTo(-4, -10); ctx.lineTo(-1, -7); ctx.moveTo(-4, -10); ctx.lineTo(-1, -13);
                    ctx.arc(4, 0, 10, Math.PI*1.5, Math.PI*0.5);
                    ctx.moveTo(4, 10); ctx.lineTo(1, 7); ctx.moveTo(4, 10); ctx.lineTo(1, 13);
                    ctx.stroke();
                } else {
                    ctx.font = '900 32px "Cinzel", "Noto Sans KR"';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    ctx.shadowOffsetX = 2;
                    ctx.shadowOffsetY = 2;
                    ctx.fillText(displayVal, 0, 0);
                }
            }

            contains(mx, my) {
                const localX = mx - this.x;
                const localY = my - this.y;
                
                const cos = Math.cos(-this.rotation);
                const sin = Math.sin(-this.rotation);
                const rx = localX * cos - localY * sin;
                const ry = localX * sin + localY * cos;

                return (rx >= -this.width/2 && rx <= this.width/2 && 
                        ry >= -this.height/2 && ry <= this.height/2);
            }
        }

        // --- 말풍선 및 파티클 특수효과 연출 관리 클래스 ---
        class ComicEffect {
            constructor(x, y, text, type = 'impact') {
                this.x = x;
                this.y = y;
                this.text = text;
                this.type = type; 
                this.age = 0;
                this.maxAge = 60; 
                this.opacity = 1.0;
                this.scale = 0.1;
                this.rotation = (Math.random() - 0.5) * 0.4;
                
                this.lines = [];
                if (type === 'speed') {
                    for (let i = 0; i < 30; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const len = 100 + Math.random() * 300;
                        this.lines.push({ angle, len });
                    }
                }
            }

            update(dt) {
                this.age += 60 * dt;
                if (this.age > this.maxAge) {
                    this.opacity = 0;
                } else {
                    const progress = this.age / this.maxAge;
                    this.scale = Math.sin(progress * Math.PI * 0.5) * 1.3;
                    if (this.scale > 1) this.scale = 1 + (1.3 - this.scale) * 0.2;
                    this.opacity = 1.0 - Math.pow(progress, 3); 
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;

                if (this.type === 'speed') {
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.lineWidth = 2;
                    const cx = 640;
                    const cy = 360;
                    this.lines.forEach(l => {
                        ctx.beginPath();
                        const x1 = cx + Math.cos(l.angle) * 200;
                        const y1 = cy + Math.sin(l.angle) * 200;
                        const x2 = cx + Math.cos(l.angle) * (200 + l.len);
                        const y2 = cy + Math.sin(l.angle) * (200 + l.len);
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.stroke();
                    });
                } else if (this.type === 'impact') {
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.scale(this.scale * 1.2, this.scale * 1.2);

                    ctx.beginPath();
                    const numPoints = 16;
                    const outerRad = 110;
                    const innerRad = 60;
                    let angle = 0;
                    const step = Math.PI / numPoints;
                    
                    ctx.moveTo(Math.cos(angle) * outerRad, Math.sin(angle) * outerRad);
                    for (let i = 0; i < numPoints * 2; i++) {
                        angle += step;
                        const r = (i % 2 === 0) ? innerRad : outerRad;
                        ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                    }
                    ctx.closePath();
                    
                    ctx.fillStyle = Colors.Black;
                    ctx.fill();
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = Colors.Black;
                    ctx.stroke();

                    ctx.beginPath();
                    angle = 0;
                    ctx.moveTo(Math.cos(angle) * (outerRad - 12), Math.sin(angle) * (outerRad - 12));
                    for (let i = 0; i < numPoints * 2; i++) {
                        angle += step;
                        const r = (i % 2 === 0) ? innerRad - 8 : outerRad - 12;
                        ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                    }
                    ctx.closePath();
                    ctx.fillStyle = Colors.Paper;
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = Colors.Black;
                    ctx.font = '900 36px "Cinzel", "Noto Sans KR"';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.text, 4, 4);

                    ctx.fillStyle = Colors.Black;
                    ctx.fillText(this.text, 0, 0);
                } else if (this.type === 'floating') {
                    ctx.translate(this.x, this.y - this.age * 0.8);
                    ctx.fillStyle = Colors.Black;
                    ctx.strokeStyle = Colors.White;
                    ctx.lineWidth = 4;
                    ctx.font = '900 20px "Noto Sans KR"';
                    ctx.textAlign = 'center';
                    ctx.strokeText(this.text, 0, 0);
                    ctx.fillText(this.text, 0, 0);
                }

                ctx.restore();
            }
        }


        // --- 게임 핵심 매니저 ---
        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.state = 'TITLE';
                this.difficulty = 'Normal'; 

                this.deck = [];
                this.discardPile = [];
                this.players = []; 
                this.currentPlayerIndex = 0;
                this.turnDirection = 1; 
                this.isDrawStackActive = false;
                this.drawPenaltyCount = 0; 

                this.waitingForColorSelect = false;
                this.activeWildCard = null;

                this.effects = [];
                this.oneCardDeclared = [false, false, false, false]; 
                this.currentBGM = null;

                this.mx = 0;
                this.my = 0;
                this.clicked = false;

                // 버튼 Hover 보간 애니메이션 누적 데이터 구조화
                this.buttonHoverStates = {
                    titleStart: 0.0,
                    diffEasy: 0.0,
                    diffNormal: 0.0,
                    diffHard: 0.0,
                    playOnecard: 0.0,
                    resultRetry: 0.0,
                    resultMainMenu: 0.0
                };

                this.deckPos = { x: 550, y: 340 };
                this.discardPos = { x: 730, y: 340 };

                this.gameStats = {
                    winnerName: '',
                    playTime: 0,
                    cardsUsed: 0,
                    missionSuccess: false,
                    startTime: 0
                };

                this.setupEventListeners();
                this.initTitleParticles();
            }

            setupEventListeners() {
                const getMousePos = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const scaleX = this.canvas.width / rect.width;
                    const scaleY = this.canvas.height / rect.height;
                    return {
                        x: (e.clientX - rect.left) * scaleX,
                        y: (e.clientY - rect.top) * scaleY
                    };
                };

                this.canvas.addEventListener('mousemove', (e) => {
                    const pos = getMousePos(e);
                    this.mx = pos.x;
                    this.my = pos.y;
                });

                this.canvas.addEventListener('mousedown', (e) => {
                    const pos = getMousePos(e);
                    this.mx = pos.x;
                    this.my = pos.y;
                    this.clicked = true;
                    audio.init(); 
                });
            }

            initTitleParticles() {
                this.titleParticles = [];
                for (let i = 0; i < 8; i++) {
                    this.titleParticles.push({
                        x: Math.random() * 1280,
                        y: 720 + Math.random() * 200,
                        speed: 30 + Math.random() * 50,
                        text: ['BAM!', 'POW!', 'SNAP!', 'SLASH!', 'MISSION!', 'ONE CARD!'][Math.floor(Math.random()*6)],
                        rotation: (Math.random() - 0.5) * 0.5,
                        scale: 0.8 + Math.random() * 0.4
                    });
                }
            }

            startNewGame() {
                this.state = 'PLAY';
                this.deck = [];
                this.discardPile = [];
                this.players = [];
                this.currentPlayerIndex = 0;
                this.turnDirection = 1;
                this.drawPenaltyCount = 0;
                this.isDrawStackActive = false;
                this.waitingForColorSelect = false;
                this.activeWildCard = null;
                this.effects = [];
                this.oneCardDeclared = [false, false, false, false];

                this.gameStats.startTime = Date.now();
                this.gameStats.cardsUsed = 0;
                this.gameStats.missionSuccess = false;

                this.players.push({
                    id: 0,
                    name: "PLAYER (YOU)",
                    cards: [],
                    isAI: false,
                    mission: this.assignRandomMission(),
                    missionProgress: { count: 0, lastValue: null, lastColor: null, success: false },
                    handX: 640,
                    handY: 620
                });

                for (let i = 1; i <= 3; i++) {
                    this.players.push({
                        id: i,
                        name: `AI - ${['CHIP', 'SPIKE', 'BULL'][i-1]}`,
                        cards: [],
                        isAI: true,
                        mission: this.assignRandomMission(),
                        missionProgress: { count: 0, lastValue: null, lastColor: null, success: false },
                        handX: i === 1 ? 160 : (i === 2 ? 640 : 1120),
                        handY: i === 1 ? 360 : (i === 2 ? 100 : 360)
                    });
                }

                CardColors.forEach(color => {
                    CardValues.forEach(val => {
                        if (val !== 'Wild' && val !== 'WildDraw4') {
                            this.deck.push(new Card(color, val));
                            this.deck.push(new Card(color, val));
                        }
                    });
                });
                for (let i = 0; i < 4; i++) {
                    this.deck.push(new Card('Wild', 'Wild'));
                    this.deck.push(new Card('Wild', 'WildDraw4'));
                }

                this.shuffleDeck();

                let cardIndex = 0;
                for (let round = 0; round < 7; round++) {
                    for (let p = 0; p < 4; p++) {
                        const targetPlayer = this.players[p];
                        const card = this.deck.pop();
                        
                        card.x = this.deckPos.x;
                        card.y = this.deckPos.y;
                        card.isFlipped = targetPlayer.isAI; 
                        
                        targetPlayer.cards.push(card);
                    }
                }

                let firstCard = this.deck.pop();
                while (firstCard.color === 'Wild' || firstCard.value === 'Skip' || firstCard.value === 'Reverse' || firstCard.value === 'Draw2') {
                    this.deck.unshift(firstCard);
                    this.shuffleDeck();
                    firstCard = this.deck.pop();
                }
                
                firstCard.x = this.deckPos.x;
                firstCard.y = this.deckPos.y;
                firstCard.isFlipped = false;
                firstCard.targetX = this.discardPos.x;
                firstCard.targetY = this.discardPos.y;
                firstCard.targetRotation = (Math.random() - 0.5) * 0.3;
                this.discardPile.push(firstCard);

                this.triggerEffect(640, 360, 'START!', 'impact');
                audio.playCardPlace();

                this.updateHandPositions(true);
                this.updatePlayableCards();
            }

            shuffleDeck() {
                for (let i = this.deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.deck[i], this.deck[j]] = [this.deck[j], this.deck[i]];
                }
            }

            assignRandomMission() {
                const rand = Missions[Math.floor(Math.random() * Missions.length)];
                return { ...rand };
            }

            updateHandPositions(immediate = false) {
                const player = this.players[0];
                const pCount = player.cards.length;
                const maxSpread = 500;
                const spacing = Math.min(65, maxSpread / Math.max(1, pCount - 1));
                const startX = player.handX - ((pCount - 1) * spacing) / 2;

                player.cards.forEach((card, i) => {
                    card.targetX = startX + i * spacing;
                    card.targetY = player.handY;
                    card.targetRotation = (i - (pCount - 1) / 2) * 0.05;
                    card.isFlipped = false;
                    if (immediate) {
                        card.x = card.targetX;
                        card.y = card.targetY;
                    }
                });

                // AI 1
                const ai1 = this.players[1];
                const ai1Count = ai1.cards.length;
                const ai1Spacing = Math.min(30, 300 / Math.max(1, ai1Count - 1));
                const ai1StartY = ai1.handY - ((ai1Count - 1) * ai1Spacing) / 2;
                ai1.cards.forEach((card, i) => {
                    card.targetX = ai1.handX;
                    card.targetY = ai1StartY + i * ai1Spacing;
                    card.targetRotation = Math.PI / 2 + (Math.random() - 0.5) * 0.1;
                    card.targetScale = 0.7;
                    card.isFlipped = true;
                    if (immediate) {
                        card.x = card.targetX;
                        card.y = card.targetY;
                    }
                });

                // AI 2
                const ai2 = this.players[2];
                const ai2Count = ai2.cards.length;
                const ai2Spacing = Math.min(30, 400 / Math.max(1, ai2Count - 1));
                const ai2StartX = ai2.handX - ((ai2Count - 1) * ai2Spacing) / 2;
                ai2.cards.forEach((card, i) => {
                    card.targetX = ai2StartX + i * ai2Spacing;
                    card.targetY = ai2.handY;
                    card.targetRotation = Math.PI + (Math.random() - 0.5) * 0.1;
                    card.targetScale = 0.7;
                    card.isFlipped = true;
                    if (immediate) {
                        card.x = card.targetX;
                        card.y = card.targetY;
                    }
                });

                // AI 3
                const ai3 = this.players[3];
                const ai3Count = ai3.cards.length;
                const ai3Spacing = Math.min(30, 300 / Math.max(1, ai3Count - 1));
                const ai3StartY = ai3.handY - ((ai3Count - 1) * ai3Spacing) / 2;
                ai3.cards.forEach((card, i) => {
                    card.targetX = ai3.handX;
                    card.targetY = ai3StartY + i * ai3Spacing;
                    card.targetRotation = -Math.PI / 2 + (Math.random() - 0.5) * 0.1;
                    card.targetScale = 0.7;
                    card.isFlipped = true;
                    if (immediate) {
                        card.x = card.targetX;
                        card.y = card.targetY;
                    }
                });
            }

            updatePlayableCards() {
                const topCard = this.getTopDiscard();
                const activeColor = this.getCurrentActiveColor();

                this.players.forEach((player, pIdx) => {
                    const isMyTurn = (this.currentPlayerIndex === pIdx);
                    
                    player.cards.forEach(card => {
                        card.playable = false;

                        if (!isMyTurn || this.waitingForColorSelect) return;

                        if (this.isDrawStackActive && this.drawPenaltyCount > 0) {
                            if (topCard.value === 'Draw2') {
                                if (card.value === 'Draw2' || card.value === 'WildDraw4') {
                                    card.playable = true;
                                }
                            } else if (topCard.value === 'WildDraw4') {
                                if (card.value === 'WildDraw4') {
                                    card.playable = true; 
                                }
                            }
                            return;
                        }

                        if (card.color === 'Wild' || card.value === 'Wild' || card.value === 'WildDraw4') {
                            card.playable = true;
                        } else if (card.color === activeColor) {
                            card.playable = true;
                        } else if (card.value === topCard.value) {
                            card.playable = true;
                        }
                    });
                });
            }

            getTopDiscard() {
                return this.discardPile[this.discardPile.length - 1];
            }

            getCurrentActiveColor() {
                const top = this.getTopDiscard();
                if (top.color === 'Wild' && this.activeWildColor) {
                    return this.activeWildColor;
                }
                return top.color;
            }

            playCard(playerIndex, cardIndex) {
                const player = this.players[playerIndex];
                const card = player.cards[cardIndex];

                if (playerIndex !== this.currentPlayerIndex || this.waitingForColorSelect) return;

                if (player.cards.length === 2) {
                    this.oneCardDeclared[playerIndex] = false;
                }

                player.cards.splice(cardIndex, 1);
                card.isFlipped = false;
                card.targetX = this.discardPos.x;
                card.targetY = this.discardPos.y;
                card.targetRotation = (Math.random() - 0.5) * 0.5;
                card.targetScale = 1.0;
                
                this.discardPile.push(card);
                this.activeWildColor = null; 

                audio.playCardPlace();
                this.gameStats.cardsUsed++;

                this.checkMissionProgress(player, card);
                this.handleCardEffect(card, playerIndex);
            }

            handleCardEffect(card, playerIndex) {
                const player = this.players[playerIndex];

                if (card.value === 'Draw2') {
                    this.drawPenaltyCount += 2;
                    this.isDrawStackActive = true;
                    this.triggerEffect(this.discardPos.x, this.discardPos.y, 'DRAW 2!', 'impact');
                    audio.playSpecialCard();
                } else if (card.value === 'WildDraw4') {
                    this.drawPenaltyCount += 4;
                    this.isDrawStackActive = true;
                    this.triggerEffect(this.discardPos.x, this.discardPos.y, 'DRAW 4!', 'impact');
                    audio.playSpecialCard();
                } else if (card.value === 'Skip') {
                    this.triggerEffect(this.discardPos.x, this.discardPos.y, 'SKIP!', 'impact');
                    audio.playSpecialCard();
                    this.currentPlayerIndex = this.getNextPlayerIndex();
                } else if (card.value === 'Reverse') {
                    this.turnDirection *= -1;
                    this.triggerEffect(this.discardPos.x, this.discardPos.y, 'REVERSE!', 'impact');
                    audio.playSpecialCard();
                }

                if (card.color === 'Wild') {
                    if (!player.isAI) {
                        this.waitingForColorSelect = true;
                        this.activeWildCard = card;
                        document.getElementById('color-picker').style.display = 'block';
                    } else {
                        const chosenColor = this.getAIConsideringColor(playerIndex);
                        this.activeWildColor = chosenColor;
                        this.triggerEffect(640, 360, chosenColor.toUpperCase() + '!', 'floating');
                        this.finishTurnSequence();
                    }
                } else {
                    this.finishTurnSequence();
                }
            }

            finishTurnSequence() {
                this.updateHandPositions();
                if (this.checkWinCondition()) return;
                this.checkOneCardRule();

                this.currentPlayerIndex = this.getNextPlayerIndex();
                this.updatePlayableCards();

                if (this.players[this.currentPlayerIndex].isAI) {
                    setTimeout(() => this.runAILogic(), 1200);
                }
            }

            checkOneCardRule() {
                this.players.forEach((player, idx) => {
                    if (player.cards.length === 1 && !this.oneCardDeclared[idx]) {
                        if (player.isAI) {
                            const delay = this.difficulty === 'Easy' ? 0.6 : 0.95;
                            if (Math.random() < delay) {
                                this.oneCardDeclared[idx] = true;
                                this.triggerEffect(player.handX, player.handY - 40, "ONE CARD!", "impact");
                            }
                        } else {
                            setTimeout(() => {
                                if (player.cards.length === 1 && !this.oneCardDeclared[idx]) {
                                    this.drawCard(idx, 1);
                                    this.triggerEffect(player.handX, player.handY - 40, "PENALTY!", "floating");
                                }
                            }, 1500);
                        }
                    }
                });
            }

            userDeclareOneCard() {
                if (this.players[0].cards.length === 1) {
                    this.oneCardDeclared[0] = true;
                    this.triggerEffect(640, 520, "ONE CARD!", "impact");
                    audio.playSpecialCard();
                } else {
                    this.triggerEffect(640, 520, "카드가 1장일 때만 외칠 수 있습니다!", "floating");
                }
            }

            getNextPlayerIndex() {
                let next = this.currentPlayerIndex + this.turnDirection;
                if (next < 0) next = 3;
                if (next > 3) next = 0;
                return next;
            }

            drawCard(playerIndex, count = 1) {
                const player = this.players[playerIndex];

                for (let i = 0; i < count; i++) {
                    if (this.deck.length === 0) {
                        this.rebuildDeckFromDiscard();
                    }
                    if (this.deck.length === 0) break; 

                    const card = this.deck.pop();
                    card.x = this.deckPos.x;
                    card.y = this.deckPos.y;
                    card.isFlipped = player.isAI;
                    card.rotation = 0;
                    card.scale = 1.0;
                    
                    player.cards.push(card);
                    this.oneCardDeclared[playerIndex] = false; 
                }

                audio.playCardDraw();
                this.updateHandPositions();
            }

            rebuildDeckFromDiscard() {
                if (this.discardPile.length <= 1) return;
                const top = this.discardPile.pop(); 
                
                this.deck = [...this.discardPile];
                this.discardPile = [top];

                this.deck.forEach(c => {
                    c.isFlipped = true;
                    c.rotation = 0;
                });
                this.shuffleDeck();
                this.triggerEffect(640, 360, "DECK RESHUFFLED!", "floating");
            }

            playerDrawAttempt() {
                if (this.currentPlayerIndex !== 0 || this.waitingForColorSelect) return;

                if (this.isDrawStackActive && this.drawPenaltyCount > 0) {
                    this.drawCard(0, this.drawPenaltyCount);
                    this.triggerEffect(640, 480, `BAM! +${this.drawPenaltyCount} CARDS`, "impact");
                    this.drawPenaltyCount = 0;
                    this.isDrawStackActive = false;
                } else {
                    this.drawCard(0, 1);
                }

                this.finishTurnSequence();
            }

            checkMissionProgress(player, playedCard) {
                if (player.missionProgress.success) return;

                const progress = player.missionProgress;
                const missionType = player.mission.check;

                let meetsCondition = false;

                switch (missionType) {
                    case 'odds':
                        if (['1','3','5','7','9'].includes(playedCard.value)) {
                            meetsCondition = true;
                        }
                        break;
                    case 'evens':
                        if (['2','4','6','8'].includes(playedCard.value)) {
                            meetsCondition = true;
                        }
                        break;
                    case 'reds':
                        if (playedCard.color === 'Red') {
                            meetsCondition = true;
                        }
                        break;
                    case 'specials':
                        if (['Skip', 'Reverse', 'Draw2', 'Wild', 'WildDraw4'].includes(playedCard.value)) {
                            meetsCondition = true;
                        }
                        break;
                    case 'numbers':
                        if (!['Skip', 'Reverse', 'Draw2', 'Wild', 'WildDraw4'].includes(playedCard.value)) {
                            meetsCondition = true;
                        }
                        break;
                    case 'sameColor':
                        if (progress.lastColor === null || playedCard.color === progress.lastColor) {
                            meetsCondition = true;
                        }
                        break;
                    case 'sameValue':
                        if (progress.lastValue === null || playedCard.value === progress.lastValue) {
                            meetsCondition = true;
                        }
                        break;
                    case 'useWild':
                        if (playedCard.color === 'Wild') {
                            meetsCondition = true;
                        }
                        break;
                }

                if (meetsCondition) {
                    progress.count++;
                    progress.lastValue = playedCard.value;
                    progress.lastColor = playedCard.color;

                    let targetCount = 3;
                    if (missionType === 'numbers' || missionType === 'sameColor') targetCount = 4;
                    if (missionType === 'sameValue') targetCount = 2;
                    if (missionType === 'useWild') targetCount = 1;

                    if (progress.count >= targetCount) {
                        progress.success = true;
                        this.triggerMissionReward(player);
                    }
                } else {
                    progress.count = 0;
                    progress.lastValue = null;
                    progress.lastColor = null;
                }
            }

            triggerMissionReward(player) {
                audio.playMissionSuccess();
                this.triggerEffect(player.handX, player.handY - 60, "MISSION COMPLETE!", "impact");
                
                if (player.id === 0) {
                    this.gameStats.missionSuccess = true;
                }

                this.triggerEffect(640, 360, "BAM!", "speed");

                this.players.forEach(p => {
                    if (p.id !== player.id) {
                        this.drawCard(p.id, 1);
                        this.triggerEffect(p.handX, p.handY - 20, "POW! +1", "floating");
                    }
                });
            }

            runAILogic() {
                if (this.state !== 'PLAY') return;

                const aiIndex = this.currentPlayerIndex;
                const ai = this.players[aiIndex];

                const playableIndices = [];
                ai.cards.forEach((card, idx) => {
                    if (card.playable) playableIndices.push(idx);
                });

                if (playableIndices.length > 0) {
                    let selectedHandIdx = playableIndices[0];

                    if (this.difficulty === 'Easy') {
                        selectedHandIdx = playableIndices[Math.floor(Math.random() * playableIndices.length)];
                    } else if (this.difficulty === 'Normal') {
                        selectedHandIdx = this.getNormalAICardSelection(ai, playableIndices);
                    } else if (this.difficulty === 'Hard') {
                        selectedHandIdx = this.getHardAICardSelection(ai, playableIndices);
                    }

                    this.playCard(aiIndex, selectedHandIdx);
                } else {
                    if (this.isDrawStackActive && this.drawPenaltyCount > 0) {
                        this.drawCard(aiIndex, this.drawPenaltyCount);
                        this.triggerEffect(ai.handX, ai.handY - 40, `BAM! +${this.drawPenaltyCount}`, "impact");
                        this.drawPenaltyCount = 0;
                        this.isDrawStackActive = false;
                    } else {
                        this.drawCard(aiIndex, 1);
                    }
                    this.finishTurnSequence();
                }
            }

            getNormalAICardSelection(ai, playableIndices) {
                const specials = playableIndices.filter(i => ['Skip', 'Reverse', 'Draw2', 'WildDraw4'].includes(ai.cards[i].value));
                if (specials.length > 0) {
                    return specials[0];
                }
                return playableIndices[0];
            }

            getHardAICardSelection(ai, playableIndices) {
                const nextPlayer = this.players[this.getNextPlayerIndex()];
                
                if (nextPlayer.cards.length <= 2) {
                    const attacks = playableIndices.filter(i => ['Draw2', 'WildDraw4', 'Skip'].includes(ai.cards[i].value));
                    if (attacks.length > 0) return attacks[Math.floor(Math.random() * attacks.length)];
                }

                const checkType = ai.mission.check;
                const missionCandidates = playableIndices.filter(i => {
                    const card = ai.cards[i];
                    if (checkType === 'odds' && ['1','3','5','7','9'].includes(card.value)) return true;
                    if (checkType === 'evens' && ['2','4','6','8'].includes(card.value)) return true;
                    if (checkType === 'reds' && card.color === 'Red') return true;
                    if (checkType === 'specials' && ['Skip', 'Reverse', 'Draw2', 'Wild', 'WildDraw4'].includes(card.value)) return true;
                    return false;
                });
                if (missionCandidates.length > 0 && !ai.missionProgress.success) {
                    return missionCandidates[0];
                }

                const colorCounts = { Red: 0, Blue: 0, Green: 0, Yellow: 0 };
                ai.cards.forEach(c => { if (c.color !== 'Wild') colorCounts[c.color]++; });
                let bestColor = 'Red';
                let max = -1;
                for (let col in colorCounts) {
                    if (colorCounts[col] > max) { max = colorCounts[col]; bestColor = col; }
                }

                const sameColorCards = playableIndices.filter(i => ai.cards[i].color === bestColor);
                if (sameColorCards.length > 0) return sameColorCards[0];

                return playableIndices[0];
            }

            getAIConsideringColor(aiIndex) {
                const ai = this.players[aiIndex];
                const counts = { Red: 0, Blue: 0, Green: 0, Yellow: 0 };
                ai.cards.forEach(c => {
                    if (c.color !== 'Wild') counts[c.color]++;
                });

                let bestColor = 'Red';
                let maxCount = -1;
                CardColors.forEach(col => {
                    if (counts[col] > maxCount) {
                        maxCount = counts[col];
                        bestColor = col;
                    }
                });
                return bestColor;
            }

            checkWinCondition() {
                for (let p = 0; p < 4; p++) {
                    if (this.players[p].cards.length === 0) {
                        this.gameStats.winnerName = this.players[p].name;
                        this.gameStats.playTime = Math.floor((Date.now() - this.gameStats.startTime) / 1000);
                        this.state = 'RESULT';
                        
                        audio.playWin();
                        this.triggerEffect(640, 360, "VICTORY!", "impact");
                        return true;
                    }
                }
                return false;
            }

            triggerEffect(x, y, text, type) {
                this.effects.push(new ComicEffect(x, y, text, type));
            }

            update(dt) {
                this.players.forEach(p => {
                    p.cards.forEach(c => c.update(dt));
                });
                this.discardPile.forEach(c => c.update(dt));

                for (let i = this.effects.length - 1; i >= 0; i--) {
                    this.effects[i].update(dt);
                    if (this.effects[i].opacity <= 0) {
                        this.effects.splice(i, 1);
                    }
                }

                if (this.state === 'TITLE') {
                    this.titleParticles.forEach(p => {
                        p.y -= p.speed * dt;
                        if (p.y < -100) {
                            p.y = 750;
                            p.x = Math.random() * 1280;
                        }
                    });
                }

                // Delta Time 기반의 부드러운 버튼 호버 인터랙션 보간 연산 (Ease-In-Out 효과)
                const updateButtonHover = (key, isHovered) => {
                    if (isHovered) {
                        this.buttonHoverStates[key] = Math.min(1.0, this.buttonHoverStates[key] + dt / 0.2); // 0.2초 Ease-In
                    } else {
                        this.buttonHoverStates[key] = Math.max(0.0, this.buttonHoverStates[key] - dt / 0.2); // 0.2초 Ease-Out
                    }
                };

                // 현재 상태에 맞게 각 버튼 충돌 감지 후 보간 업데이트
                if (this.state === 'TITLE') {
                    updateButtonHover('titleStart', this.isInsideRect(this.mx, this.my, 540, 460, 200, 60));
                } else if (this.state === 'DIFFICULTY') {
                    updateButtonHover('diffEasy', this.isInsideRect(this.mx, this.my, 290, 420, 180, 60));
                    updateButtonHover('diffNormal', this.isInsideRect(this.mx, this.my, 550, 420, 180, 60));
                    updateButtonHover('diffHard', this.isInsideRect(this.mx, this.my, 810, 420, 180, 60));
                } else if (this.state === 'PLAY') {
                    updateButtonHover('playOnecard', this.isInsideRect(this.mx, this.my, 1000, 600, 120, 45));
                } else if (this.state === 'RESULT') {
                    updateButtonHover('resultRetry', this.isInsideRect(this.mx, this.my, 400, 500, 200, 55));
                    updateButtonHover('resultMainMenu', this.isInsideRect(this.mx, this.my, 680, 500, 200, 55));
                }

                if (this.state === 'PLAY' && this.currentPlayerIndex === 0) {
                    let hoveredAny = false;
                    for (let i = this.players[0].cards.length - 1; i >= 0; i--) {
                        const card = this.players[0].cards[i];
                        if (!hoveredAny && card.contains(this.mx, this.my)) {
                            card.hovered = true;
                            hoveredAny = true;
                        } else {
                            card.hovered = false;
                        }
                    }
                    this.updateHandPositions();
                }

                if (this.clicked) {
                    this.clicked = false;
                    this.handleInputClick();
                }
            }

            handleInputClick() {
                audio.playClick();

                if (this.state === 'TITLE') {
                    if (this.isInsideRect(this.mx, this.my, 540, 460, 200, 60)) {
                        this.state = 'DIFFICULTY';
                    }
                } 
                else if (this.state === 'DIFFICULTY') {
                    if (this.isInsideRect(this.mx, this.my, 290, 420, 180, 60)) {
                        this.difficulty = 'Easy';
                        this.startNewGame();
                    } else if (this.isInsideRect(this.mx, this.my, 550, 420, 180, 60)) {
                        this.difficulty = 'Normal';
                        this.startNewGame();
                    } else if (this.isInsideRect(this.mx, this.my, 810, 420, 180, 60)) {
                        this.difficulty = 'Hard';
                        this.startNewGame();
                    }
                } 
                else if (this.state === 'PLAY') {
                    if (this.currentPlayerIndex === 0 && !this.waitingForColorSelect) {
                        for (let i = this.players[0].cards.length - 1; i >= 0; i--) {
                            const card = this.players[0].cards[i];
                            if (card.contains(this.mx, this.my)) {
                                if (card.playable) {
                                    this.playCard(0, i);
                                } else {
                                    this.triggerEffect(this.mx, this.my - 30, "낼 수 없는 카드!", "floating");
                                }
                                return; 
                            }
                        }

                        const deckDist = Math.hypot(this.mx - this.deckPos.x, this.my - this.deckPos.y);
                        if (deckDist < 60) {
                            this.playerDrawAttempt();
                            return;
                        }

                        if (this.isInsideRect(this.mx, this.my, 1000, 600, 120, 45)) {
                            this.userDeclareOneCard();
                            return;
                        }
                    }
                } 
                else if (this.state === 'RESULT') {
                    if (this.isInsideRect(this.mx, this.my, 400, 500, 200, 55)) {
                        this.startNewGame();
                    }
                    if (this.isInsideRect(this.mx, this.my, 680, 500, 200, 55)) {
                        this.state = 'TITLE';
                        this.initTitleParticles();
                    }
                }
            }

            isInsideRect(mx, my, rx, ry, rw, rh) {
                return mx >= rx && mx <= rx + rw && my >= ry && my <= ry + rh;
            }

            selectColorFromUI(color) {
                this.activeWildColor = color;
                document.getElementById('color-picker').style.display = 'none';
                this.waitingForColorSelect = false;
                
                this.triggerEffect(640, 360, color.toUpperCase() + '!', 'floating');
                this.finishTurnSequence();
            }

            // --- UI 및 버튼 그리기 헬퍼 ---
            drawAnimatedButton(ctx, x, y, w, h, label, hoverStateKey, actionCallback = null) {
                const t = this.buttonHoverStates[hoverStateKey];
                const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

                const timeSec = Date.now() / 1000;
                const swayAngle = Math.sin(timeSec * Math.PI * 1.5) * 0.017; 

                const scaleVal = 1.0 + (0.04 * ease);
                const offsetY = -8 * ease;
                const finalRotation = swayAngle * ease;

                ctx.save();
                ctx.translate(x + w / 2, y + h / 2);
                ctx.rotate(finalRotation);
                ctx.scale(scaleVal, scaleVal);

                ctx.fillStyle = Colors.Black;
                ctx.fillRect(-w/2 + 6 + (2 * ease), -h/2 + 6 + (2 * ease), w, h);

                ctx.fillStyle = Colors.Paper;
                ctx.strokeStyle = Colors.Black;
                ctx.lineWidth = 4 + (2 * ease);
                ctx.fillRect(-w/2, -h/2 + offsetY, w, h);
                ctx.strokeRect(-w/2, -h/2 + offsetY, w, h);

                ctx.fillStyle = Colors.Black;
                ctx.font = '900 18px "Noto Sans KR"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(label, 0, offsetY);

                ctx.restore();
            }


            // ==========================================
            // --- 화면 렌더링 프레임워크 (Draw) ---
            // ==========================================
            draw() {
                this.ctx.clearRect(0, 0, 1280, 720);

                // Background
                this.ctx.fillStyle = Colors.Paper;
                this.ctx.fillRect(0, 0, 1280, 720);
                this.drawBackgroundGrids();

                // Table & Cards & HUD 분기 렌더링
                if (this.state === 'TITLE') {
                    this.drawTitleScreen();
                } else if (this.state === 'DIFFICULTY') {
                    this.drawDifficultyScreen();
                } else if (this.state === 'PLAY') {
                    this.drawPlayScreen();
                } else if (this.state === 'RESULT') {
                    this.drawResultScreen();
                }

                // 최상단 연출용 특수 이펙트 효과 레이어
                this.effects.forEach(e => e.draw(this.ctx));
            }

            drawBackgroundGrids() {
                this.ctx.save();
                this.ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
                this.ctx.lineWidth = 1;
                const gridSize = 40;
                for (let x = 0; x < 1280; x += gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, 720);
                    this.ctx.stroke();
                }
                for (let y = 0; y < 720; y += gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(1280, y);
                    this.ctx.stroke();
                }
                this.ctx.restore();
            }

            drawTitleScreen() {
                this.titleParticles.forEach(p => {
                    this.ctx.save();
                    this.ctx.translate(p.x, p.y);
                    this.ctx.rotate(p.rotation);
                    this.ctx.scale(p.scale, p.scale);
                    this.ctx.fillStyle = 'rgba(0,0,0,0.1)';
                    this.ctx.font = '900 24px "Cinzel"';
                    this.ctx.fillText(p.text, 0, 0);
                    this.ctx.restore();
                });

                this.ctx.save();
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';

                // 스크린톤 데코 백보드
                this.ctx.beginPath();
                this.ctx.arc(640, 240, 150, 0, Math.PI * 2);
                this.ctx.strokeStyle = Colors.Black;
                this.ctx.lineWidth = 10;
                this.ctx.stroke();

                this.ctx.save();
                this.ctx.clip();
                this.ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
                this.ctx.lineWidth = 2;
                for (let i = -200; i < 400; i += 6) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(640 + i, 90);
                    this.ctx.lineTo(640 - 300 + i, 390);
                    this.ctx.stroke();
                }
                this.ctx.restore();

                // -------------------------------------------------------------
                // [제목/부제 텍스트 레이아웃 겹침 & 중복 출력 해결부]
                // 폰트 크기 및 렌더링 좌표계를 완벽히 정적 분리하여 오버랩을 차단합니다.
                // -------------------------------------------------------------
                
                // 1. 입체적인 드롭 섀도우 레이어 (약간 밀려난 진한 투명 회색)
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                
                // NOIR CARD 영문 타이틀 섀도우
                this.ctx.font = '900 84px "Cinzel"';
                this.ctx.fillText('NOIR CARD', 644, 214);
                
                // 비밀 미션의 원카드 국문 타이틀 섀도우 (크기 분리 적용)
                this.ctx.font = '900 42px "Noto Sans KR"';
                this.ctx.fillText('비밀 미션의 원카드', 643, 313);

                // 2. 메인 정면 인크 레이어 (선명한 블랙 전경)
                this.ctx.fillStyle = Colors.Black;
                
                // NOIR CARD 영문 타이틀 전경
                this.ctx.font = '900 84px "Cinzel"';
                this.ctx.fillText('NOIR CARD', 640, 210);
                
                // 비밀 미션의 원카드 국문 타이틀 전경 (크기 분리 적용)
                this.ctx.font = '900 42px "Noto Sans KR"';
                this.ctx.fillText('비밀 미션의 원카드', 640, 310);

                // 부제 정보 출력
                this.ctx.font = '700 16px "Noto Sans KR"';
                this.ctx.fillText('1980\'s CLASSIC COMIC STYLE BOARD GAME', 640, 390);

                this.ctx.restore();

                // GAME START 버튼
                this.drawAnimatedButton(this.ctx, 540, 460, 200, 60, 'GAME START', 'titleStart');
            }

            drawDifficultyScreen() {
                this.ctx.save();
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';

                this.ctx.fillStyle = Colors.Black;
                this.ctx.font = '900 38px "Noto Sans KR"';
                this.ctx.fillText('난이도를 선택하세요', 640, 200);
                this.ctx.restore();

                const levels = [
                    { name: 'EASY', desc: '초보자용 랜덤 플레이', x: 290, key: 'diffEasy' },
                    { name: 'NORMAL', desc: '색상 관리 및 카드 감소 우선', x: 550, key: 'diffNormal' },
                    { name: 'HARD', desc: '견제 설계, 미션 의식 고지능 AI', x: 810, key: 'diffHard' }
                ];

                levels.forEach(lvl => {
                    this.drawAnimatedButton(this.ctx, lvl.x, 420, 180, 60, lvl.name, lvl.key);

                    // 각 버튼 고유 하단 묘사 텍스트
                    this.ctx.save();
                    this.ctx.fillStyle = Colors.Black;
                    this.ctx.font = '700 13px "Noto Sans KR"';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText(lvl.desc, lvl.x + 90, 505);
                    this.ctx.restore();
                });
            }

            drawPlayScreen() {
                this.ctx.save();
                this.ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
                this.ctx.lineWidth = 3;
                this.ctx.setLineDash([10, 10]);
                this.ctx.beginPath();
                this.ctx.arc(640, 360, 250, 0, Math.PI * 2);
                this.ctx.stroke();
                this.ctx.restore();

                this.drawDeckPile();

                this.discardPile.forEach(c => c.draw(this.ctx));

                this.players.forEach(p => {
                    p.cards.forEach(c => c.draw(this.ctx));
                });

                this.drawPlayHUD();
            }

            drawDeckPile() {
                this.ctx.save();
                const x = this.deckPos.x;
                const y = this.deckPos.y;
                const w = 90;
                const h = 135;

                this.ctx.fillStyle = Colors.Black;
                this.ctx.fillRect(x - w/2 + 6, y - h/2 + 6, w, h);
                this.ctx.fillStyle = Colors.Paper;
                this.ctx.strokeStyle = Colors.Black;
                this.ctx.lineWidth = 2;
                this.ctx.fillRect(x - w/2 + 3, y - h/2 + 3, w, h);
                this.ctx.strokeRect(x - w/2 + 3, y - h/2 + 3, w, h);

                const dummyCard = new Card('Wild', 'Wild');
                dummyCard.x = x;
                dummyCard.y = y;
                dummyCard.isFlipped = true;
                dummyCard.draw(this.ctx);

                this.ctx.fillStyle = Colors.Black;
                this.ctx.font = '900 12px "Noto Sans KR"';
                this.ctx.textAlign = 'center';
                this.ctx.fillText("덱 뽑기", x, y + 85);

                this.ctx.restore();
            }

            drawPlayHUD() {
                this.ctx.save();

                const activeColor = this.getCurrentActiveColor();
                this.ctx.fillStyle = Colors.Black;
                this.ctx.fillRect(0, 0, 1280, 50);

                this.ctx.fillStyle = Colors.Paper;
                this.ctx.font = '900 20px "Cinzel", "Noto Sans KR"';
                this.ctx.textAlign = 'left';
                this.ctx.textBaseline = 'middle';
                this.ctx.fillText(`CURRENT TURN: ${this.players[this.currentPlayerIndex].name}`, 30, 25);

                const dirText = this.turnDirection === 1 ? "CLOCKWISE (▶)" : "COUNTER-CLOCKWISE (◀)";
                this.ctx.font = '700 13px "Cinzel"';
                this.ctx.fillText(`DIR: ${dirText}`, 500, 25);

                if (this.isDrawStackActive && this.drawPenaltyCount > 0) {
                    this.ctx.fillStyle = Colors.Red;
                    this.ctx.font = '900 18px "Cinzel"';
                    this.ctx.fillText(`STRIKE STACK: +${this.drawPenaltyCount} CARDS!`, 850, 25);
                }

                this.players.forEach((p, idx) => {
                    let textX = 0, textY = 0;
                    if (idx === 0) { textX = 400; textY = 530; } 
                    else if (idx === 1) { textX = 260; textY = 360; } 
                    else if (idx === 2) { textX = 640; textY = 190; } 
                    else if (idx === 3) { textX = 1000; textY = 360; } 

                    this.ctx.fillStyle = Colors.Black;
                    this.ctx.font = '900 16px "Noto Sans KR"';
                    this.ctx.textAlign = 'center';
                    
                    if (this.currentPlayerIndex === idx) {
                        this.ctx.save();
                        this.ctx.fillStyle = Colors.Black;
                        this.ctx.fillRect(textX - 100, textY - 22, 200, 32);
                        this.ctx.fillStyle = Colors.Paper;
                        this.ctx.font = '900 16px "Noto Sans KR"';
                        this.ctx.fillText(`▶ ${p.name} (${p.cards.length}장)`, textX, textY);
                        this.ctx.restore();
                    } else {
                        this.ctx.fillText(`${p.name} (${p.cards.length}장)`, textX, textY);
                    }
                });

                const user = this.players[0];
                this.ctx.save();
                this.ctx.translate(30, 580);
                
                this.ctx.fillStyle = Colors.Black;
                this.ctx.fillRect(4, 4, 300, 95);
                this.ctx.fillStyle = Colors.Paper;
                this.ctx.strokeStyle = Colors.Black;
                this.ctx.lineWidth = 3;
                this.ctx.fillRect(0, 0, 300, 95);
                this.ctx.strokeRect(0, 0, 300, 95);

                this.ctx.fillStyle = Colors.Black;
                this.ctx.font = '900 13px "Noto Sans KR"';
                this.ctx.textAlign = 'left';
                this.ctx.fillText('SECRET MISSION', 15, 22);

                this.ctx.font = '700 13px "Noto Sans KR"';
                this.ctx.fillText(`[ ${user.mission.text} ]`, 15, 48);

                let progText = `진행: ${user.missionProgress.count}회`;
                if (user.missionProgress.success) progText = "달성 완료! (적에게 카드 선물)";
                this.ctx.font = '900 12px "Noto Sans KR"';
                this.ctx.fillStyle = user.missionProgress.success ? Colors.Green : Colors.LightInk;
                this.ctx.fillText(progText, 15, 75);

                this.ctx.restore();

                // 원카드 외침용 애니메이티드 버튼 연동
                this.drawAnimatedButton(this.ctx, 1000, 600, 120, 45, 'ONE CARD!', 'playOnecard');

                let activeColorValue = Colors.Black;
                if (activeColor === 'Red') activeColorValue = Colors.Red;
                else if (activeColor === 'Blue') activeColorValue = Colors.Blue;
                else if (activeColor === 'Green') activeColorValue = Colors.Green;
                else if (activeColor === 'Yellow') activeColorValue = Colors.Yellow;

                this.ctx.save();
                this.ctx.translate(640, 360);
                
                this.ctx.beginPath();
                this.ctx.arc(0, 0, 32, 0, Math.PI*2);
                this.ctx.fillStyle = Colors.Black;
                this.ctx.fill();

                this.ctx.beginPath();
                this.ctx.arc(0, 0, 26, 0, Math.PI*2);
                this.ctx.fillStyle = activeColorValue;
                this.ctx.fill();
                this.ctx.lineWidth = 3;
                this.ctx.strokeStyle = Colors.White;
                this.ctx.stroke();

                this.ctx.restore();
                this.ctx.restore();
            }

            drawResultScreen() {
                this.ctx.save();
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';

                this.ctx.fillStyle = Colors.Black;
                this.ctx.font = '900 64px "Cinzel", "Noto Sans KR"';
                this.ctx.fillText('GAME OVER', 640, 160);

                this.ctx.strokeStyle = Colors.Black;
                this.ctx.lineWidth = 4;
                this.ctx.beginPath();
                this.ctx.moveTo(400, 210);
                this.ctx.lineTo(880, 210);
                this.ctx.stroke();

                this.ctx.fillStyle = Colors.Black;
                this.ctx.font = '900 24px "Noto Sans KR"';
                this.ctx.fillText(`승리자: ${this.gameStats.winnerName}`, 640, 260);
                this.ctx.fillText(`플레이 타임: ${this.gameStats.playTime}초`, 640, 310);
                this.ctx.fillText(`총 사용된 카드 수: ${this.gameStats.cardsUsed}장`, 640, 360);
                
                const missionResult = this.gameStats.missionSuccess ? "성공 (BAM!)" : "실패";
                this.ctx.fillText(`내 비밀 미션 달성 여부: ${missionResult}`, 640, 410);
                this.ctx.restore();

                // 애니메이션 버튼 시스템 연동 완료
                this.drawAnimatedButton(this.ctx, 400, 500, 200, 55, '다시 하기', 'resultRetry');
                this.drawAnimatedButton(this.ctx, 680, 500, 200, 55, '메인 메뉴로', 'resultMainMenu');
            }
        }


        function selectWildColor(color) {
            game.selectColorFromUI(color);
        }


        let game;
        let lastTime = 0;

        window.onload = function() {
            game = new GameEngine();

            function loop(timestamp) {
                if (!lastTime) lastTime = timestamp;
                const dt = (timestamp - lastTime) / 1000;
                lastTime = timestamp;

                const clampedDt = Math.min(dt, 0.1);

                game.update(clampedDt);
                game.draw();

                requestAnimationFrame(loop);
            }

            requestAnimationFrame(loop);
        };
    </script>
</body>
</html>
