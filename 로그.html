        class MeleeSlash {
            constructor(x, y, angle, range, arc, damage, isUlt = false, comboStep = 1, duration = 12, startX = null, startY = null, knockbackStrength = 4.5, effectStyle = "slash") {
                this.x = x; this.y = y; this.angle = angle; this.range = range; this.arc = arc; this.damage = damage;
                this.knockbackStrength = knockbackStrength; this.effectStyle = effectStyle; this.isUlt = isUlt;
                this.comboStep = comboStep; this.startX = startX; this.startY = startY;
                
                this.life = duration; this.maxLife = duration;
                this.hitList = new Set(); 

                if (comboStep === 4 || comboStep === 5) {
                    this.lightningPoints = [];
                    this.sparks = [];
                    if (startX !== null && startY !== null) {
                        const segments = 6;
                        const dx = x - startX; const dy = y - startY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const nx = -dy / (dist || 1); const ny = dx / (dist || 1);

                        this.lightningPoints.push({ x: startX, y: startY });
                        for (let i = 1; i < segments; i++) {
                            const t = i / segments;
                            const px = startX + dx * t; const py = startY + dy * t;
                            const offset = (Math.random() - 0.5) * 28;
                            this.lightningPoints.push({ x: px + nx * offset, y: py + ny * offset });
                        }
                        this.lightningPoints.push({ x: x, y: y });

                        for (let i = 0; i < 7; i++) {
                            const rot = Math.random() * Math.PI * 2;
                            const d = 15 + Math.random() * 25;
                            this.sparks.push({ dx: Math.cos(rot) * d, dy: Math.sin(rot) * d });
                        }
                    }
                }
            }

            update() {
                this.life--;
            }

            draw(ctx) {
                const progress = (this.maxLife - this.life) / this.maxLife;
                const alpha = this.life / this.maxLife;
                
                if (this.comboStep === 4 || this.comboStep === 5) {
                    ctx.save();
                    ctx.shadowColor = this.comboStep === 4 ? '#22d3ee' : '#ec4899';
                    ctx.shadowBlur = 15;
                    ctx.strokeStyle = this.comboStep === 4 ? '#67e8f9' : '#f472b6';
                    ctx.lineWidth = 3;
                    
                    ctx.beginPath();
                    if (this.lightningPoints && this.lightningPoints.length > 0) {
                        ctx.moveTo(this.lightningPoints[0].x, this.lightningPoints[0].y);
                        for (let i = 1; i < this.lightningPoints.length; i++) {
                            ctx.lineTo(this.lightningPoints[i].x, this.lightningPoints[i].y);
                        }
                    }
                    ctx.stroke();

                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    ctx.fillStyle = this.comboStep === 4 ? '#22d3ee' : '#ec4899';
                    this.sparks.forEach(s => {
                        ctx.beginPath();
                        const currentX = this.x + s.dx * progress;
                        const currentY = this.y + s.dy * progress;
                        ctx.arc(currentX, currentY, 3.5 * alpha, 0, Math.PI * 2);
                        ctx.fill();
                    });

                    ctx.restore();
                    return;
                }

                if (this.effectStyle === "spellsword_thrust") {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);

                    const rectLength = 160;
                    const rectWidth = 120;

                    ctx.fillStyle = `rgba(168, 85, 247, ${alpha * 0.08})`;
                    ctx.fillRect(10, -rectWidth / 2, rectLength, rectWidth);

                    ctx.strokeStyle = `rgba(168, 85, 247, ${alpha * 0.22})`;
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(10, -rectWidth / 2, rectLength, rectWidth);

                    const stabCount = 10;
                    for (let i = 0; i < stabCount; i++) {
                        const seed = Math.sin(i * 123.45 + this.life * 67.89);
                        const seedY = Math.cos(i * 321.09 + this.life * 45.67);
                        const seedLen = Math.sin(i * 456.78 + this.life * 89.01);

                        const startX = 15 + (seed * 0.5 + 0.5) * (rectLength - 50);
                        const startY = seedY * (rectWidth / 2 - 12);
                        const thrustLen = 35 + (seedLen * 0.5 + 0.5) * 30;
                        const endX = startX + thrustLen;
                        const endY = startY;

                        ctx.save();
                        ctx.shadowColor = "#a855f7";
                        ctx.shadowBlur = 12;
                        ctx.strokeStyle = i % 2 === 0 ? "rgba(34, 211, 238, 0.88)" : "rgba(168, 85, 247, 0.88)";
                        ctx.lineWidth = 2.5;
                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(endX, endY);
                        ctx.stroke();

                        ctx.strokeStyle = "#ffffff";
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(startX + thrustLen * 0.3, startY);
                        ctx.lineTo(endX, endY);
                        ctx.stroke();

                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath();
                        ctx.arc(endX, endY, 2.5 * alpha, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }

                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                const grad = ctx.createRadialGradient(0, 0, this.range * 0.25, 0, 0, this.range);
                
                if (this.isUlt) {
                    grad.addColorStop(0, "rgba(244, 63, 94, 0)");
                    grad.addColorStop(0.6, `rgba(245, 158, 11, ${alpha * 0.7})`);
                    grad.addColorStop(1, `rgba(239, 68, 68, ${alpha * 0.95})`);
                } else if (this.effectStyle === "magic") {
                    grad.addColorStop(0, "rgba(129, 140, 248, 0)");
                    grad.addColorStop(0.7, `rgba(6, 182, 212, ${alpha * 0.65})`);
                    grad.addColorStop(1, `rgba(168, 85, 247, ${alpha * 0.95})`);
                } else if (this.effectStyle === "hammer") {
                    grad.addColorStop(0, "rgba(255, 255, 255, 0)");
                    grad.addColorStop(0.6, `rgba(148, 163, 184, ${alpha * 0.5})`);
                    grad.addColorStop(1, `rgba(241, 245, 249, ${alpha * 0.85})`);
                } else if (this.effectStyle === "seismic_charged") {
                    grad.addColorStop(0, "rgba(234, 88, 12, 0)");
                    grad.addColorStop(0.5, `rgba(234, 88, 12, ${alpha * 0.85})`);
                    grad.addColorStop(1, `rgba(239, 68, 68, ${alpha * 0.98})`);
                } else {
                    if (this.comboStep === 1) {
                        grad.addColorStop(0, "rgba(20, 184, 166, 0)");
                        grad.addColorStop(0.7, `rgba(20, 184, 166, ${alpha * 0.7})`);
                        grad.addColorStop(1, `rgba(45, 212, 191, ${alpha * 0.95})`);
                    } else if (this.comboStep === 2) {
                        grad.addColorStop(0, "rgba(168, 85, 247, 0)");
                        grad.addColorStop(0.7, `rgba(168, 85, 247, ${alpha * 0.7})`);
                        grad.addColorStop(1, `rgba(236, 72, 153, ${alpha * 0.95})`);
                    } else if (this.comboStep === 3) {
                        grad.addColorStop(0, "rgba(234, 179, 8, 0)");
                        grad.addColorStop(0.5, `rgba(249, 115, 22, ${alpha * 0.7})`);
                        grad.addColorStop(1, `rgba(234, 179, 8, ${alpha * 0.98})`);
                    }
                }

                let startAngle = 0;
                let endAngle = 0;
                let arcProgress = progress;

                if (this.isUlt) {
                    startAngle = -Math.PI;
                    endAngle = -Math.PI + Math.PI * 2 * progress;
                } else {
                    if (this.comboStep === 1) {
                        startAngle = -this.arc / 2;
                        endAngle = -this.arc / 2 + this.arc * arcProgress;
                    } else if (this.comboStep === 2) {
                        startAngle = this.arc / 2;
                        endAngle = this.arc / 2 - this.arc * arcProgress;
                    } else if (this.comboStep === 3 || this.effectStyle === "seismic_charged") {
                        startAngle = -this.arc / 2;
                        endAngle = -this.arc / 2 + this.arc * 1.35 * arcProgress;
                    }
                }

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                const isCounter = (this.comboStep === 2 && !this.isUlt);
                ctx.arc(0, 0, this.range, startAngle, endAngle, isCounter);
                ctx.closePath();
                ctx.fill();

                let strokeColor = `rgba(20, 184, 166, ${alpha})`;
                if (this.isUlt) strokeColor = `rgba(244, 63, 94, ${alpha})`;
                else if (this.effectStyle === "magic") strokeColor = `rgba(168, 85, 247, ${alpha})`;
                else if (this.effectStyle === "hammer") strokeColor = `rgba(241, 245, 249, ${alpha})`;
                else if (this.effectStyle === "seismic_charged") strokeColor = `rgba(251, 146, 60, ${alpha})`;
                else if (this.comboStep === 2) strokeColor = `rgba(236, 72, 153, ${alpha})`;
                else if (this.comboStep === 3) strokeColor = `rgba(234, 179, 8, ${alpha})`;

                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = (this.effectStyle === "hammer" || this.effectStyle === "seismic_charged") ? 5.5 : 3.2;
                ctx.beginPath();
                ctx.arc(0, 0, this.range, startAngle, endAngle, isCounter);
                ctx.stroke();

                ctx.restore();
            }
        }

        class SeismicRiftEffect {
            constructor(x, y, angle, range, arc) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.range = range;
                this.arc = arc;
                this.buildLife = 30; 
                this.stayLife = 180; 
                this.life = this.buildLife + this.stayLife;
                this.maxLife = this.life;
                this.isMarkedForRemoval = false;
                this.cracks = [];
                this.damageTimer = 0; 

                const crackCount = 12;
                for (let i = 0; i < crackCount; i++) {
                    const spreadT = crackCount === 1 ? 0.5 : i / (crackCount - 1);
                    const baseAngle = -this.arc / 2 + this.arc * spreadT;
                    const crackAngle = this.angle + baseAngle + (Math.random() - 0.5) * 0.12;
                    const length = this.range * (0.55 + Math.random() * 0.45);

                    const points = [{ x: 0, y: 0 }];
                    const segmentCount = 6;
                    const nx = -Math.sin(crackAngle);
                    const ny = Math.cos(crackAngle);

                    for (let s = 1; s <= segmentCount; s++) {
                        const t = s / segmentCount;
                        const dist = length * t;
                        const wobble = (Math.random() - 0.5) * (15 + 22 * t);
                        points.push({
                            x: Math.cos(crackAngle) * dist + nx * wobble,
                            y: Math.sin(crackAngle) * dist + ny * wobble
                        });
                    }
                    this.cracks.push({ points, width: 3 + Math.random() * 3 });
                }
            }

            update() {
                this.life--;
                if (this.life <= 0) this.isMarkedForRemoval = true;

                this.damageTimer++;
                if (this.damageTimer >= 30) {
                    this.damageTimer = 0;
                    if (game) {
                        game.enemies.forEach(enemy => {
                            const dist = getDistance(this.x, this.y, enemy.x, enemy.y);
                            if (dist <= this.range + enemy.radius) {
                                const angleToEnemy = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                                const diffAngle = normalizeAngle(angleToEnemy - this.angle);
                                if (Math.abs(diffAngle) <= this.arc / 2) {
                                    game.damageEnemy(enemy, 6, false, 'rift');
                                }
                            }
                        });
                    }
                }

                const elapsed = this.maxLife - this.life;
                if (elapsed <= this.buildLife && game) {
                    const t = elapsed / this.buildLife;
                    this.cracks.forEach(crack => {
                        const pointIdx = Math.min(crack.points.length - 1, Math.floor(t * crack.points.length));
                        const pt = crack.points[pointIdx];
                        const worldX = this.x + pt.x;
                        const worldY = this.y + pt.y;

                        if (Math.random() < 0.35) {
                            game.spawnParticles(worldX, worldY, "#ef4444", 2, 2, 3); 
                        }
                        if (Math.random() < 0.2) {
                            game.spawnParticles(worldX, worldY, "#7c2d12", 3, 1, 4); 
                        }
                    });
                }
            }

            draw(ctx) {
                const elapsed = this.maxLife - this.life;
                let drawProgress = 1;
                let alpha = 1;

                if (elapsed < this.buildLife) {
                    drawProgress = elapsed / this.buildLife; 
                } else {
                    const fadeElapsed = elapsed - this.buildLife;
                    alpha = Math.max(0, 1 - fadeElapsed / this.stayLife); 
                }

                ctx.save();
                ctx.translate(this.x, this.y);

                this.cracks.forEach(crack => {
                    ctx.lineCap = "round";
                    ctx.lineJoin = "round";

                    ctx.shadowColor = "#ef4444";
                    ctx.shadowBlur = 12 * alpha;
                    ctx.strokeStyle = `rgba(220, 38, 38, ${0.9 * alpha})`;
                    ctx.lineWidth = (crack.width + 3) * alpha;

                    ctx.beginPath();
                    ctx.moveTo(crack.points[0].x, crack.points[0].y);
                    
                    const drawCount = Math.max(1, Math.ceil(crack.points.length * drawProgress));
                    for (let i = 1; i < drawCount; i++) {
                        ctx.lineTo(crack.points[i].x, crack.points[i].y);
                    }
                    ctx.stroke();

                    ctx.strokeStyle = `rgba(249, 115, 22, ${alpha})`;
                    ctx.lineWidth = Math.max(1.5, crack.width * 0.4) * alpha;
                    ctx.beginPath();
                    ctx.moveTo(crack.points[0].x, crack.points[0].y);
                    for (let i = 1; i < drawCount; i++) {
                        ctx.lineTo(crack.points[i].x, crack.points[i].y);
                    }
                    ctx.stroke();
                });

                ctx.restore();
            }
        }

        class Boomerang {
            constructor(x, y, angle, damage) {
                this.x = x; this.y = y; this.radius = 12; this.damage = damage;
                this.isMarkedForRemoval = false;

                this.speed = 11;
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;

                this.state = 'out'; 
                this.timer = 0;
                this.maxOutTime = 32; 
                this.spinAngle = 0;

                this.hitCooldowns = new Map();
            }

            update(player) {
                this.spinAngle += 0.25;
                this.timer++;

                for (let [enemyId, value] of this.hitCooldowns.entries()) {
                    if (value > 0) this.hitCooldowns.set(enemyId, value - 1);
                    else this.hitCooldowns.delete(enemyId);
                }

                if (this.state === 'out') {
                    this.vx *= 0.94; this.vy *= 0.94;
                    this.x += this.vx; this.y += this.vy;

                    if (this.timer >= this.maxOutTime) {
                        this.state = 'returning';
                    }
                } else if (this.state === 'returning') {
                    const dx = player.x - this.x;
                    const dy = player.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 18) {
                        this.isMarkedForRemoval = true;
                    } else {
                        const accel = 0.68;
                        this.vx += (dx / dist) * accel;
                        this.vy += (dy / dist) * accel;

                        const speedMax = 12.5;
                        const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                        if (currentSpeed > speedMax) {
                            this.vx = (this.vx / currentSpeed) * speedMax;
                            this.vy = (this.vy / currentSpeed) * speedMax;
                        }

                        this.x += this.vx;
                        this.y += this.vy;
                    }
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.spinAngle);
                ctx.shadowColor = '#06b6d4';
                ctx.shadowBlur = 8;

                ctx.fillStyle = "#22d3ee";
                ctx.strokeStyle = "#0891b2";
                ctx.lineWidth = 1.5;

                for (let i = 0; i < 3; i++) {
                    const rot = (Math.PI * 2 / 3) * i;
                    ctx.save();
                    ctx.rotate(rot);

                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.quadraticCurveTo(15, -4, 25, 0);
                    ctx.quadraticCurveTo(10, 8, 0, 0);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    ctx.restore();
                }

                ctx.restore();
            }
        }

        class AutoBolt {
