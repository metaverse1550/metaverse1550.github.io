        class Enemy {
            constructor(x, y, levelFactor, isBoss = false) {
                this.x = x; this.y = y;
                this.isBoss = isBoss;
                this.radius = isBoss ? 35 : 15;
                
                if (this.isBoss) {
                    this.maxHp = 500 + levelFactor * 180;
                    this.speed = 1.1 + (levelFactor * 0.02);
                    this.damage = 32 + Math.floor(levelFactor * 2);
                    this.xpReward = 200;
                    this.color = "#ef4444";
                    this.bossPatternTimer = 0;
                    this.isTelegraphing = false;
                    this.telegraphTimer = 0;
                    this.telegraphMax = 60; 
                    this.chargeTargetX = 0;
                    this.chargeTargetY = 0;
                } else {
                    this.maxHp = 38 + levelFactor * 8; 
                    this.speed = 1.3 + Math.random() * 0.45 + (levelFactor * 0.05);
                    this.damage = 15 + Math.floor(levelFactor * 1.5);
                    this.xpReward = 20;
                    this.color = this.getRandomEnemyColor();
                }

                this.hp = this.maxHp;
                this.isMarkedForRemoval = false;
                this.knockbackX = 0; this.knockbackY = 0;
                this.stunTimer = 0;
                this.slowTimer = 0;
                this.slowMultiplier = 1;
            }

            getRandomEnemyColor() {
                const colors = ["#dc2626", "#991b1b", "#ea580c", "#84cc16", "#701a75", "#4c1d95"];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            applyKnockback(vx, vy, strength) {
                const resist = this.isBoss ? 0.2 : 1.0;
                this.knockbackX = vx * strength * resist;
                this.knockbackY = vy * strength * resist;
            }

            update(player) {
                if (this.stunTimer > 0) this.stunTimer--;
                if (this.slowTimer > 0) {
                    this.slowTimer--;
                    if (this.slowTimer === 0) this.slowMultiplier = 1;
                }

                if (Math.abs(this.knockbackX) > 0.1 || Math.abs(this.knockbackY) > 0.1) {
                    this.x += this.knockbackX;
                    this.y += this.knockbackY;
                    this.knockbackX *= 0.85;
                    this.knockbackY *= 0.85;
                    return; 
                }

                if (this.stunTimer > 0) return;

                if (this.isBoss) {
                    this.bossPatternTimer++;
                    
                    if (this.isTelegraphing) {
                        this.telegraphTimer++;
                        if (this.telegraphTimer >= this.telegraphMax) {
                            this.isTelegraphing = false;
                            this.telegraphTimer = 0;
                            const dx = this.chargeTargetX - this.x;
                            const dy = this.chargeTargetY - this.y;
                            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                            
                            this.knockbackX = (dx / dist) * 16;
                            this.knockbackY = (dy / dist) * 16;
                            if (game) {
                                playExplosionSound();
                                game.spawnParticles(this.x, this.y, "#ef4444", 10, 15);
                            }
                        }
                        return; 
                    }

                    if (this.bossPatternTimer >= 270) {
                        this.bossPatternTimer = 0;
                        this.isTelegraphing = true;
                        this.telegraphTimer = 0;
                        this.chargeTargetX = player.x;
                        this.chargeTargetY = player.y;
                        return;
                    }

                    if (this.bossPatternTimer === 120 && game) {
                        const count = 8;
                        for (let i = 0; i < count; i++) {
                            const angle = (Math.PI * 2 / count) * i;
                            const bx = this.x + Math.cos(angle) * this.radius;
                            const by = this.y + Math.sin(angle) * this.radius;
                            const targetX = bx + Math.cos(angle) * 100;
                            const targetY = by + Math.sin(angle) * 100;
                            
                            const bolt = new AutoBolt(bx, by, targetX, targetY, Math.floor(this.damage * 0.7));
                            game.enemyProjectiles.push(bolt);
                        }
                        playSlashSound(300, 0.2, 'sawtooth');
                    }
                }

                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 0) {
                    const actualSpeed = this.speed * this.slowMultiplier;
                    this.x += (dx / distance) * actualSpeed;
                    this.y += (dy / distance) * actualSpeed;
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                if (this.isBoss && this.isTelegraphing) {
                    const dx = this.chargeTargetX - this.x;
                    const dy = this.chargeTargetY - this.y;
                    const len = Math.sqrt(dx * dx + dy * dy);
                    
                    ctx.save();
                    ctx.rotate(Math.atan2(dy, dx));
                    ctx.fillStyle = "rgba(239, 68, 68, 0.15)";
                    ctx.fillRect(0, -15, len, 30);
                    ctx.strokeStyle = "rgba(239, 68, 68, 0.5)";
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(0, -15, len, 30);
                    ctx.restore();

                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 1.5, 0, Math.PI * 2);
                    ctx.strokeStyle = "rgba(239, 68, 68, 0.8)";
                    ctx.lineWidth = 3;
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 1.5 * (this.telegraphTimer / this.telegraphMax), 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(239, 68, 68, 0.25)";
                    ctx.fill();
                }

                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.strokeStyle = this.isBoss ? "#ef4444" : "#1e293b";
                ctx.lineWidth = this.isBoss ? 3.5 : 2.5;
                ctx.stroke();

                ctx.fillStyle = "#fbbf24";
                ctx.beginPath();
                ctx.arc(4, -5, 3, 0, Math.PI * 2);
                ctx.arc(4, 5, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#000";
                ctx.beginPath();
                ctx.arc(4, -5, 1, 0, Math.PI * 2);
                ctx.arc(4, 5, 1, 0, Math.PI * 2);
                ctx.fill();

                if (!this.isBoss && this.hp < this.maxHp) {
                    const barWidth = 26;
                    const barHeight = 4;
                    const hpPercent = this.hp / this.maxHp;
                    ctx.fillStyle = "rgba(10, 15, 30, 0.8)";
                    ctx.fillRect(-barWidth/2, -this.radius - 8, barWidth, barHeight);
                    ctx.fillStyle = "#f43f5e";
                    ctx.fillRect(-barWidth/2, -this.radius - 8, barWidth * hpPercent, barHeight);
                }

                ctx.restore();
            }
        }

        class Wall {
            constructor(x, y, width, height) {
                this.x = x; this.y = y; this.width = width; this.height = height;
            }

            draw(ctx) {
                ctx.fillStyle = "#1e293b";
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                ctx.strokeStyle = "#334155";
                ctx.lineWidth = 3;
                ctx.strokeRect(this.x, this.y, this.width, this.height);

                ctx.strokeStyle = "#475569";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(this.x + 5, this.y + this.height/2);
                ctx.lineTo(this.x + this.width - 5, this.y + this.height/2);
                ctx.stroke();
            }

            resolveCollision(entity) {
                const closestX = Math.max(this.x, Math.min(entity.x, this.x + this.width));
                const closestY = Math.max(this.y, Math.min(entity.y, this.y + this.height));

                const distanceX = entity.x - closestX;
                const distanceY = entity.y - closestY;
                const distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

                if (distanceSquared < (entity.radius * entity.radius)) {
                    const distance = Math.sqrt(distanceSquared);
                    const overlap = entity.radius - distance;

                    if (distance === 0) {
                        entity.y -= entity.radius;
                    } else {
                        entity.x += (distanceX / distance) * overlap;
                        entity.y += (distanceY / distance) * overlap;
                    }
                }
            }

            collidesWithProjectile(proj) {
                return (
                    proj.x + proj.radius > this.x &&
                    proj.x - proj.radius < this.x + this.width &&
                    proj.y + proj.radius > this.y &&
                    proj.y - proj.radius < this.y + this.height
                );
            }
        }

        class Particle {
            constructor(x, y, color, speed, size) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const spd = (0.5 + Math.random() * 0.8) * speed;
                this.vx = Math.cos(angle) * spd;
                this.vy = Math.sin(angle) * spd;
                this.size = size * (0.6 + Math.random() * 0.5);
                this.life = 25 + Math.floor(Math.random() * 15);
                this.maxLife = this.life;
                this.isMarkedForRemoval = false;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                if (this.life <= 0) this.isMarkedForRemoval = true;
            }
            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class FloatingText {
            constructor(x, y, text, color, size = 16, isCrit = false) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.size = size; this.isCrit = isCrit;
                this.vy = -1.2 - Math.random() * 0.8;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.life = 45; this.maxLife = this.life;
                this.isMarkedForRemoval = false;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                if (this.life <= 0) this.isMarkedForRemoval = true;
            }
            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.shadowColor = "rgba(0,0,0,0.8)";
                ctx.shadowBlur = 4;
                ctx.fillStyle = this.color;
                ctx.font = this.isCrit 
                    ? `italic bold ${this.size + 6}px 'Impact', sans-serif` 
                    : `bold ${this.size}px 'Malgun Gothic', sans-serif`;
                ctx.textAlign = "center";
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        class GameManager {
            constructor(playerClass = "rogue") {
                this.player = new Player(canvas.width / 2, canvas.height / 2 + 150, playerClass);
                
                this.enemies = [];
                this.walls = [];
                this.meleeSlashes = [];  
                this.boomerangs = [];    
                this.projectiles = [];   
                this.returningAxes = []; // 공중 회귀 중인 액스 투사체 관리용
                this.spectralLaunchedBlades = []; 
                this.enemyProjectiles = []; 
                this.stoneShards = [];      
                this.impactWaves = [];
                this.particles = [];
                this.damageTexts = [];
                this.axeLandingZones = []; 

                this.hitStopFrames = 0; 
                this.screenShakeTime = 0;
                this.screenShakeIntensity = 0;

                this.score = 0;
                this.isGameOver = false;
                this.isLevelUpPending = false;
                
                this.waveLevel = 1;
                this.spawnTimer = 0;
                this.spawnInterval = 110; 

                this.walls.push(new Wall(200, 200, 180, 45));
                this.walls.push(new Wall(644, 480, 180, 45));
                this.walls.push(new Wall(644, 200, 45, 180)); 

                this.initEnemies();
            }

            initEnemies() {
                for (let i = 0; i < 4; i++) this.spawnEnemy();
            }

            spawnEnemy() {
                let x, y;
                if (Math.random() < 0.5) {
                    x = Math.random() < 0.5 ? -30 : canvas.width + 30;
                    y = Math.random() * canvas.height;
                } else {
                    x = Math.random() * canvas.width;
                    y = Math.random() < 0.5 ? -30 : canvas.height + 30;
                }
                this.enemies.push(new Enemy(x, y, this.waveLevel));
            }

            spawnBoss() {
                const bx = canvas.width / 2;
                const by = -50;
                const boss = new Enemy(bx, by, this.waveLevel, true);
                this.enemies.push(boss);

                this.triggerScreenShake(20, 10);
                this.damageTexts.push(new FloatingText(canvas.width/2, canvas.height/2 - 80, "⚠️ 보스 수호자 출현!! ⚠️", "#ef4444", 28, true));
                playExplosionSound();
            }

            triggerScreenShake(duration, intensity) {
                this.screenShakeTime = duration;
                this.screenShakeIntensity = intensity;
            }

            spawnParticles(x, y, color, speed, count, size = 3) {
                for (let i = 0; i < count; i++) {
                    this.particles.push(new Particle(x, y, color, speed, size));
                }
            }

            damageEnemy(enemy, damage, isHeavy = false, type = 'normal') {
                if (enemy.hp <= 0) return;

                const isCrit = Math.random() < this.player.critChance;
                let finalDmg = isCrit ? Math.floor(damage * this.player.critMult) : damage;
                
                if (type === 'magic' || type === 'spellsword_thrust') {
                    finalDmg = Math.floor(finalDmg * 1.0);
                }

                enemy.hp -= finalDmg;

                let textColor = "#ffffff";
                if (isCrit) textColor = "#fbbf24"; 
                else if (type === 'magic' || type === 'spellsword_thrust') textColor = "#a855f7"; 
                else if (type === 'lifesteal') textColor = "#22c55e"; 
                else if (type === 'rift' || type === 'seismic_charged') textColor = "#f97316"; 

                this.damageTexts.push(new FloatingText(enemy.x, enemy.y - 12, finalDmg.toString(), textColor, type === 'rift' ? 12 : 15, isCrit));

                const particleColor = (type === 'magic' || type === 'spellsword_thrust') ? "#c084fc" : ((type === 'heavy' || type === 'seismic_charged') ? "#d97706" : (type === 'rift' ? "#ea580c" : "#991b1b"));
                this.spawnParticles(enemy.x, enemy.y, particleColor, isCrit ? 6 : 4, isCrit ? 10 : 5);

                if (type !== 'rift' && (isCrit || isHeavy || enemy.isBoss)) {
                    this.hitStopFrames = isHeavy ? 4 : 2; 
                    this.triggerScreenShake(isHeavy ? 10 : 5, isHeavy ? 6 : 3.5);
                }

                playHitSound(isCrit, isHeavy);

                if (isCrit && Math.random() < 0.25) { 
                    this.player.hp = Math.min(this.player.maxHp, this.player.hp + 1);
                }

                if (enemy.hp <= 0) {
                    enemy.isMarkedForRemoval = true;
                }
            }

            shoot() {
                if (this.isGameOver || this.isLevelUpPending) return;
                
                if (this.player.seismicChargeTimer > 0) return;

                if (this.player.playerClass === "destroyer" && this.player.leapAttackWindow > 0) {
                    resumeAudioContext();
                    this.player.seismicChargeTimer = 120; 
                    this.player.leapAttackWindow = 0;     
                    playSlashSound(120, 0.2, 'sawtooth');
                    return;
                }

                // 엑스 클래스의 평타 투척 처리
                if (this.player.playerClass === "axe") {
                    if (this.player.slashCooldown <= 0) {
                        resumeAudioContext();
                        let isEnhanced = this.player.enhancedAxeActive;
                        let dmg = this.player.damage;
                        let clampedDropX = 0;
                        let clampedDropY = 0;

                        if (isEnhanced) {
                            // 강화 도끼 대미지 연산 (기본 1.5배 및 스택당 10% 복리형 증가, 최대 3.0배)
                            const mult = Math.min(3.0, 1.5 + (this.player.axeStack * 0.10));
                            dmg = Math.floor(this.player.damage * mult);

                            // 단 딱 1회 한정 강화 소모 처리 (발사 즉시 기본 버프는 해제)
                            this.player.enhancedAxeActive = false;

                            // [수정사항 1] 던지는 딱 그 순간! 발사 지점(플레이어 시전 위치) 주변에 낙하 예정지역 좌표 '계산'만 진행
                            const angle = Math.random() * Math.PI * 2;
                            const dist = 55 + Math.random() * 65; // 조작감을 고려한 적정 거리 반경
                            const dropX = this.player.x + Math.cos(angle) * dist;
                            const dropY = this.player.y + Math.sin(angle) * dist;

                            // 캔버스 아웃 방지 처리
                            clampedDropX = Math.max(40, Math.min(canvas.width - 40, dropX));
                            clampedDropY = Math.max(40, Math.min(canvas.height - 40, dropY));
                        }

                        // 도끼 오브젝트 발사 (미리 계산해 둔 좌표들을 매개변수로 탑재)
                        const axe = new AxeProjectile(
                            this.player.x, 
                            this.player.y, 
                            mouse.x, 
                            mouse.y, 
                            dmg, 
                            isEnhanced, 
                            this.player.axeStack,
                            clampedDropX,
                            clampedDropY
                        );
                        
                        this.projectiles.push(axe);
                        
                        this.player.slashCooldown = this.player.slashCooldownMax;

                        // 사운드 출력
                        playSlashSound(480 + (this.player.axeStack * 30), 0.12, 'sawtooth');
                    }
                    return;
                }

                if (this.player.slashCooldown <= 0) {
                    resumeAudioContext();
                    
                    if (this.player.dashAttackWindow > 0) {
                        let currentCombo = this.player.dashComboStep;
                        let dmg = this.player.damage;
                        let duration = 18;

                        this.player.isSwinging = true;
                        this.player.swingProgress = 0;
                        this.player.swingCombo = currentCombo + 3; 

                        if (currentCombo === 1) {
                            dmg = Math.floor(this.player.damage * 1.5);
                            duration = 18;
                            this.player.slashCooldown = 8;

                            this.player.dash1StartX = this.player.x;
                            this.player.dash1StartY = this.player.y;

                            const chargeDist = 140;
                            this.player.x += Math.cos(this.player.angle) * chargeDist;
                            this.player.y += Math.sin(this.player.angle) * chargeDist;
                            
                            this.player.clampPosition();
                            this.walls.forEach(wall => wall.resolveCollision(this.player));

                            const slash = new MeleeSlash(
                                this.player.x, this.player.y, this.player.angle,
                                60, Math.PI * 0.2, dmg, false, 4, duration,
                                this.player.dash1StartX, this.player.dash1StartY
                            );
                            this.meleeSlashes.push(slash);
                            playSlashSound(750, 0.15, 'sawtooth');

                            this.player.dashAttackWindow = 35;
                            this.player.dashComboStep = 2;

                        } else if (currentCombo === 2) {
                            dmg = Math.floor(this.player.damage * 2.0);
                            duration = 24;
                            this.player.slashCooldown = 15;

                            const prevX = this.player.x;
                            const prevY = this.player.y;

                            this.player.x = this.player.dash1StartX;
                            this.player.y = this.player.dash1StartY;

                            this.player.clampPosition();
                            this.walls.forEach(wall => wall.resolveCollision(this.player));

                            const slash = new MeleeSlash(
                                this.player.x, this.player.y, this.player.angle,
                                60, Math.PI * 0.2, dmg, false, 5, duration,
                                prevX, prevY
                            );
                            this.meleeSlashes.push(slash);
                            playSlashSound(500, 0.2, 'sawtooth');

                            this.player.dashAttackWindow = 0;
                            this.player.dashComboStep = 1;
                        }
                    } else {
                        let currentCombo = this.player.comboStep;
                        let dmg = this.player.damage;
                        let range = this.player.slashRange;
                        let arc = this.player.slashArc;
                        let duration = 10;
                        let effectStyle = "slash";

                        this.player.isSwinging = true;
                        this.player.swingProgress = 0;
                        this.player.swingCombo = currentCombo;

                        if (this.player.playerClass === "destroyer") {
                            effectStyle = "hammer";
                            if (currentCombo === 1) {
                                dmg = Math.floor(this.player.damage * 1.1);
                                arc = 130 * Math.PI / 180;
                                this.player.slashCooldown = Math.max(18, Math.floor(this.player.slashCooldownMax * 0.55));
                                this.player.x += Math.cos(this.player.angle) * 10;
                                this.player.y += Math.sin(this.player.angle) * 10;
                                duration = 16;
                                playSlashSound(200, 0.22, 'triangle');
                            } else if (currentCombo === 2) {
                                dmg = Math.floor(this.player.damage * 1.35);
                                arc = 140 * Math.PI / 180;
                                this.player.slashCooldown = Math.max(22, Math.floor(this.player.slashCooldownMax * 0.7));
                                this.player.x += Math.cos(this.player.angle) * 12;
                                this.player.y += Math.sin(this.player.angle) * 12;
                                duration = 18;
                                playSlashSound(150, 0.28, 'sawtooth');
                            }
                        } else if (this.player.playerClass === "spellsword") {
                            effectStyle = "magic";
                            if (currentCombo === 1) {
                                dmg = Math.floor(this.player.damage * 0.95);
                                this.player.slashCooldown = 7;
                                duration = 11;
                                playSlashSound(650, 0.12, 'sine');
                            } else if (currentCombo === 2) {
                                dmg = Math.floor(this.player.damage * 1.05);
                                this.player.slashCooldown = 7;
                                duration = 11;
                                playSlashSound(550, 0.12, 'sine');
                            } else if (currentCombo === 3) {
                                dmg = Math.floor(this.player.damage * 1.6);
                                range = Math.floor(this.player.slashRange * 1.4);
                                effectStyle = "spellsword_thrust";
                                this.player.slashCooldown = Math.max(14, Math.floor(this.player.slashCooldownMax));
                                duration = 18; 

                                playSlashSound(700, 0.08, 'sawtooth');
                                setTimeout(() => playSlashSound(800, 0.08, 'sawtooth'), 50);
                                setTimeout(() => playSlashSound(900, 0.08, 'sawtooth'), 100);
                                setTimeout(() => playSlashSound(1000, 0.1, 'sawtooth'), 150);
                                
                                const boltX = this.player.x + Math.cos(this.player.angle) * 15;
                                const boltY = this.player.y + Math.sin(this.player.angle) * 15;
                                const targetX = boltX + Math.cos(this.player.angle) * 100;
                                const targetY = boltY + Math.sin(this.player.angle) * 100;
                                this.projectiles.push(new AutoBolt(boltX, boltY, targetX, targetY, Math.floor(this.player.damage * 0.8)));
                            }
                        } else {
                            if (currentCombo === 1) {
                                dmg = Math.floor(this.player.damage * 0.9);
                                this.player.slashCooldown = 6;
                                this.player.x += Math.cos(this.player.angle) * 12;
                                this.player.y += Math.sin(this.player.angle) * 12;
                                duration = 10;
                                playSlashSound(700, 0.1, 'triangle');
                            } else if (currentCombo === 2) {
                                dmg = Math.floor(this.player.damage * 1.0);
                                this.player.slashCooldown = 6;
                                this.player.x += Math.cos(this.player.angle) * 12;
                                this.player.y += Math.sin(this.player.angle) * 12;
                                duration = 10;
                                playSlashSound(600, 0.1, 'triangle');
                            } else if (currentCombo === 3) {
                                dmg = Math.floor(this.player.damage * 1.6);
                                range = Math.floor(this.player.slashRange * 1.35);
                                arc = Math.PI * 1.5; 
                                this.player.slashCooldown = Math.max(12, Math.floor(this.player.slashCooldownMax));
                                this.player.x += Math.cos(this.player.angle) * 20;
                                this.player.y += Math.sin(this.player.angle) * 20;
                                duration = 14;
                                playSlashSound(450, 0.16, 'sawtooth');
                            }
                        }

                        this.player.swingDuration = duration;
                        this.player.currentSwingArc = arc;
                        this.player.clampPosition();

                        const slash = new MeleeSlash(
                            this.player.x, this.player.y, this.player.angle,
                            range, arc, dmg, false, currentCombo, duration,
                            null, null, this.player.basicKnockback, effectStyle
                        );
                        this.meleeSlashes.push(slash);
                        
                        this.player.comboTimer = 60; 
                        this.player.comboStep++;
                        if (this.player.comboStep > this.player.comboMax) {
                            this.player.comboStep = 1; 
                        }
                    }
                }
            }

            releaseSeismicChargedAttack(angle) {
                const p = this.player;
                const dmg = Math.floor(p.damage * 3.5); 
                const range = p.slashRange * 1.8;      
                const arc = 100 * Math.PI / 180;        
                const duration = 22;

                p.isSwinging = true;
                p.swingProgress = 0;
                p.swingCombo = 3; 
                p.swingDuration = duration;

                const slash = new MeleeSlash(
                    p.x, p.y, angle, range, arc, dmg, false, 3, duration,
                    null, null, 0, "seismic_charged" 
                );
                this.meleeSlashes.push(slash);

                this.impactWaves.push(new GroundSlamEffect(p.x, p.y, range, true));

                const shardCount = 6 + Math.floor(Math.random() * 3);
                for (let i = 0; i < shardCount; i++) {
                    const shardDmg = Math.floor(p.damage * 0.9); 
                    this.stoneShards.push(new StoneShard(p.x, p.y, angle, shardDmg));
                }

                this.triggerScreenShake(30, 15);
                playExplosionSound();
                this.spawnParticles(p.x, p.y, "#7c2d12", 7, 18, 5); 
                this.spawnParticles(p.x, p.y, "#ea580c", 9, 12, 3); 

                p.chargedAttackComboWindow = 60;
                p.chargedAttackAngle = angle;
            }

            useFanOfKnives() {
                if (this.player.playerClass === "destroyer") {
                    if (this.player.chargedAttackComboWindow > 0) {
                        this.useSeismicRift();
                    } else {
                        this.useCrushingWave();
                    }
                    return;
                } else if (this.player.playerClass === "spellsword") {
                    this.useSpectralBlades();
                    return;
                } else if (this.player.playerClass === "axe") {
                    // 엑스 클래스: 버프 가동 (강화 모드로 변경)
                    this.useAxeEnhancedState();
                    return;
                }
                
                if (this.isGameOver || this.isLevelUpPending || this.player.fokCooldown > 0) return;

                resumeAudioContext();
                const spreadAngle = 30 * Math.PI / 180; 
                const segments = 6 + (this.player.fokLevel * 2); 

                const baseAngle = this.player.angle;
                const startAngle = baseAngle - spreadAngle / 2;
                const angleStep = segments > 1 ? spreadAngle / (segments - 1) : 0;

                for (let i = 0; i < segments; i++) {
                    const angle = startAngle + angleStep * i;
                    const targetX = this.player.x + Math.cos(angle) * 100;
                    const targetY = this.player.y + Math.sin(angle) * 100;
                    
                    const pDmg = Math.floor(this.player.damage * 0.95);
                    const bolt = new AutoBolt(this.player.x, this.player.y, targetX, targetY, pDmg);
                    this.projectiles.push(bolt);
                }

                playSlashSound(900, 0.12, 'sawtooth');
                this.player.fokCooldown = this.player.fokCooldownMax;
            }

            useAxeEnhancedState() {
                if (this.isGameOver || this.isLevelUpPending || this.player.fokCooldown > 0) return;

                resumeAudioContext();
                this.player.enhancedAxeActive = true;
                this.player.axeStack = 0; // 신규 가동 시 스택 리셋
                this.player.fokCooldown = this.player.fokCooldownMax;

                this.spawnParticles(this.player.x, this.player.y, "#ef4444", 5, 12, 4);
                this.damageTexts.push(new FloatingText(this.player.x, this.player.y - 30, "🔥 도끼 무장 각성! 🔥", "#ef4444", 18, true));
                playExplosionSound();
            }

            useSeismicRift() {
                const p = this.player;
                const range = p.slashRange * 2.1; 
                const arc = 120 * Math.PI / 180; 
                const damage = Math.floor(p.damage * 2.0); 
                
                this.impactWaves.push(new SeismicRiftEffect(p.x, p.y, p.chargedAttackAngle, range, arc));
                this.applyConeImpact(p.x, p.y, p.chargedAttackAngle, range, arc, damage, 4.0);
                
                p.chargedAttackComboWindow = 0;
                p.fokCooldown = p.fokCooldownMax;
                playExplosionSound();
            }

            useSpectralBlades() {
                if (this.player.spectralBladesActive) {
                    this.launchSpectralBlades();
                    return;
                }

                if (this.isGameOver || this.isLevelUpPending || this.player.fokCooldown > 0) return;

                this.player.spectralBladesActive = true;
                this.player.spectralBladesTimer = 360; 
                this.player.spectralBladesAngle = 0;
                playSlashSound(500, 0.25, 'sine');
            }

            launchSpectralBlades() {
                this.player.spectralBladesActive = false;
                this.player.fokCooldown = this.player.fokCooldownMax;

                const baseAngle = this.player.angle;
                const spread = 0.16; 
                const dmg = Math.floor(this.player.damage * 1.6);

                playSlashSound(700, 0.25, 'sawtooth');
                setTimeout(() => playSlashSound(900, 0.2, 'sine'), 50);

                this.projectiles.push(new SpectralLaunchedBlade(this.player.x, this.player.y, baseAngle - spread, dmg));
                this.projectiles.push(new SpectralLaunchedBlade(this.player.x, this.player.y, baseAngle, dmg));
                this.projectiles.push(new SpectralLaunchedBlade(this.player.x, this.player.y, baseAngle + spread, dmg));

                this.triggerScreenShake(12, 6);
                this.spawnParticles(this.player.x, this.player.y, "#a855f7", 6, 8);
                this.spawnParticles(this.player.x, this.player.y, "#06b6d4", 5, 8);
            }

            applyAreaImpact(x, y, radius, damage, knockback, stunFrames = 0, slowFrames = 0, slowMultiplier = 1) {
                this.enemies.forEach(enemy => {
                    const dist = getDistance(x, y, enemy.x, enemy.y);
                    if (dist <= radius + enemy.radius) {
                        this.damageEnemy(enemy, damage, true, 'magic');
                        
                        const dx = enemy.x - x;
                        const dy = enemy.y - y;
                        const len = Math.sqrt(dx * dx + dy * dy) || 1;
                        enemy.applyKnockback(dx / len, dy / len, knockback);
                        
                        enemy.stunTimer = Math.max(enemy.stunTimer, stunFrames);
                        if (slowFrames > 0) {
                            enemy.slowTimer = Math.max(enemy.slowTimer, slowFrames);
                            enemy.slowMultiplier = Math.min(enemy.slowMultiplier, slowMultiplier);
                        }
                    }
                });
            }

            applyConeImpact(x, y, angle, range, arc, damage, knockback) {
                this.enemies.forEach(enemy => {
                    const dist = getDistance(x, y, enemy.x, enemy.y);
                    if (dist <= range + enemy.radius) {
                        const angleToEnemy = Math.atan2(enemy.y - y, enemy.x - x);
                        const diffAngle = normalizeAngle(angleToEnemy - angle);
                        if (Math.abs(diffAngle) <= arc / 2) {
                            this.damageEnemy(enemy, damage, true, 'heavy');
                            enemy.applyKnockback(Math.cos(angle), Math.sin(angle), knockback);
                        }
                    }
                });
            }

            useSeismicLeap() {
                if (this.isGameOver || this.isLevelUpPending || this.player.dashCooldown > 0 || this.player.seismicLeapTimer > 0) return;

                const leapDistance = 150;
                this.player.seismicLeapStartX = this.player.x;
                this.player.seismicLeapStartY = this.player.y;
                this.player.seismicLeapEndX = this.player.x + Math.cos(this.player.angle) * leapDistance;
                this.player.seismicLeapEndY = this.player.y + Math.sin(this.player.angle) * leapDistance;
                
                this.player.seismicLeapEndX = Math.max(this.player.radius, Math.min(canvas.width - this.player.radius, this.player.seismicLeapEndX));
                this.player.seismicLeapEndY = Math.max(this.player.radius, Math.min(canvas.height - this.player.radius, this.player.seismicLeapEndY));
                
                this.player.seismicLeapTimer = this.player.seismicLeapMax;
                this.player.dashCooldown = this.player.dashCooldownMax;
                playSlashSound(120, 0.15, 'triangle');
            }

            finishSeismicLeap() {
                this.player.clampPosition();
                this.walls.forEach(wall => wall.resolveCollision(this.player));
                
                this.applyAreaImpact(this.player.x, this.player.y, 135, Math.floor(this.player.damage * 1.6), 10.5, 60);
                this.impactWaves.push(new GroundSlamEffect(this.player.x, this.player.y, 140, true));
                
                for (let i = 0; i < 10; i++) {
                    const angle = (Math.PI * 2 / 10) * i;
                    this.impactWaves.push(new HammerImpactWave(
                        this.player.x + Math.cos(angle) * 16,
                        this.player.y + Math.sin(angle) * 16,
                        angle
                    ));
                }
                playExplosionSound();

                this.player.leapAttackWindow = 60;
            }

            useCrushingWave() {
                if (this.isGameOver || this.isLevelUpPending || this.player.fokCooldown > 0) return;

                const range = 285;
                const arc = Math.PI / 2;
                const damage = Math.floor(this.player.damage * 1.6);
                
                this.applyConeImpact(this.player.x, this.player.y, this.player.angle, range, arc, damage, 7.5);
                this.impactWaves.push(new ConeShockwaveEffect(this.player.x, this.player.y, this.player.angle, range, arc));
                playExplosionSound();
                this.player.fokCooldown = this.player.fokCooldownMax;
            }

            performDestroyerUltSlam(isFinal) {
                const radius = isFinal ? 360 : 180;
                const damage = Math.floor(this.player.damage * (isFinal ? 3.3 : 1.8));
                this.applyAreaImpact(this.player.x, this.player.y, radius, damage, isFinal ? 13 : 8, 0, isFinal ? 180 : 0, 0.45);
                this.impactWaves.push(new GroundSlamEffect(this.player.x, this.player.y, radius, isFinal));
                playExplosionSound();
            }

            performSpellswordUltVortex() {
                this.enemies.forEach(enemy => {
                    const d = getDistance(this.player.x, this.player.y, enemy.x, enemy.y);
                    if (d < 320) {
                        const pullForce = (320 - d) * 0.09;
                        const angle = Math.atan2(this.player.y - enemy.y, this.player.x - enemy.x);
                        
                        enemy.x += Math.cos(angle) * pullForce;
                        enemy.y += Math.sin(angle) * pullForce;
                        
                        this.damageEnemy(enemy, Math.floor(this.player.damage * 0.25), false, 'magic');
                    }
                });

                const count = 8;
                const offsetAngle = Math.random() * Math.PI;
                for (let i = 0; i < count; i++) {
                    const angle = offsetAngle + (Math.PI * 2 / count) * i;
                    const ex = this.player.x + Math.cos(angle) * 300;
                    const ey = this.player.y + Math.sin(angle) * 300;
                    this.impactWaves.push(new SpectralVortexBeam(this.player.x, this.player.y, ex, ey));
                }
                playSlashSound(800, 0.1, 'sine');
            }

            update() {
                if (this.isGameOver || this.isLevelUpPending) return;

                if (this.hitStopFrames > 0) {
                    this.hitStopFrames--;
                    return; 
                }

                if (this.screenShakeTime > 0) this.screenShakeTime--;

                this.player.update();
                if (this.player.seismicLeapTimer === 0) {
                    this.walls.forEach(wall => wall.resolveCollision(this.player));
                }

                // 엑스 클래스: 낙하지점 도끼 회수 체크 및 스택/타임아웃 핸들링
                if (this.player.playerClass === "axe") {
                    for (let i = this.axeLandingZones.length - 1; i >= 0; i--) {
                        const zone = this.axeLandingZones[i];
                        zone.update();

                        const distanceToPlayer = getDistance(this.player.x, this.player.y, zone.x, zone.y);
                        
                        // 도끼 회수 (CATCH!) - 범위 충전 조건
                        if (distanceToPlayer <= zone.radius + this.player.radius) {
                            this.player.axeStack++;
                            this.player.enhancedAxeActive = true; 
                            
                            const nextMult = Math.min(3.0, 1.5 + (this.player.axeStack * 0.10));
                            this.damageTexts.push(new FloatingText(
                                this.player.x, 
                                this.player.y - 22, 
                                `CATCH! x${this.player.axeStack} (${nextMult.toFixed(1)}배)`, 
                                "#ef4444", 
                                16, 
                                true
                            ));

                            this.spawnParticles(zone.x, zone.y, "#ef4444", 5.5, 9);
                            playSlashSound(650 + Math.min(300, this.player.axeStack * 35), 0.12, 'sine');

                            // 회수 시, 해당 낙하지와 링크된 모든 공중 비행 도끼들 정리
                            this.returningAxes = this.returningAxes.filter(retAxe => retAxe.linkedZone !== zone);

                            this.axeLandingZones.splice(i, 1);
                            continue;
                        }

                        // 시간 초과로 리셋 (MISS!) - 스택과 강화 상태 즉시 초기화
                        if (zone.isMarkedForRemoval) {
                            this.damageTexts.push(new FloatingText(
                                this.player.x, 
                                this.player.y - 20, 
                                "MISS!", 
                                "#475569", 
                                14
                            ));
                            this.player.axeStack = 0;
                            this.player.enhancedAxeActive = false; 

                            // 소멸 시, 링크된 비행 도끼 제거
                            this.returningAxes = this.returningAxes.filter(retAxe => retAxe.linkedZone !== zone);

                            this.axeLandingZones.splice(i, 1);
                        }
                    }
                }

                for (let i = this.boomerangs.length - 1; i >= 0; i--) {
                    const boom = this.boomerangs[i];
                    boom.update(this.player);

                    if (boom.isMarkedForRemoval) {
                        this.boomerangs.splice(i, 1);
                        continue;
                    }

                    this.enemies.forEach(enemy => {
                        const dist = getDistance(boom.x, boom.y, enemy.x, enemy.y);
                        if (dist < boom.radius + enemy.radius) {
                            const cooldownKey = `enemy_${enemy.x}_${enemy.y}`;
                            if (!boom.hitCooldowns.has(cooldownKey)) {
                                this.damageEnemy(enemy, boom.damage, false, 'normal');
                                boom.hitCooldowns.set(cooldownKey, 15);
                                
                                const dx = enemy.x - boom.x;
                                const dy = enemy.y - boom.y;
                                const d2 = Math.sqrt(dx * dx + dy * dy);
                                if (d2 > 0) enemy.applyKnockback(dx / d2, dy / d2, 2.5);
                            }
                        }
                    });
                }

                for (let i = this.spectralLaunchedBlades.length - 1; i >= 0; i--) {
                    const blade = this.spectralLaunchedBlades[i];
                    blade.update();

                    if (blade.isMarkedForRemoval) {
                        this.spectralLaunchedBlades.splice(i, 1);
                        continue;
                    }

                    this.enemies.forEach(enemy => {
                        if (blade.hitList.has(enemy)) return;
                        const dist = getDistance(blade.x, blade.y, enemy.x, enemy.y);
                        if (dist < blade.radius + enemy.radius) {
                            blade.hitList.add(enemy);
                            this.damageEnemy(enemy, blade.damage, false, 'magic');
                            
                            const normX = Math.cos(blade.angle);
                            const normY = Math.sin(blade.angle);
                            enemy.applyKnockback(normX, normY, 3.2); 
                        }
                    });
                }

                for (let i = this.projectiles.length - 1; i >= 0; i--) {
                    const proj = this.projectiles[i];
                    proj.update();

                    let hitWall = false;
                    for (let w = 0; w < this.walls.length; w++) {
                        if (this.walls[w].collidesWithProjectile(proj)) {
                            hitWall = true; break;
                        }
                    }

                    if (hitWall || proj.isMarkedForRemoval) {
                        this.projectiles.splice(i, 1);
                        continue;
                    }

                    for (let e = 0; e < this.enemies.length; e++) {
                        const enemy = this.enemies[e];
                        const dist = getDistance(proj.x, proj.y, enemy.x, enemy.y);
                        if (dist < proj.radius + enemy.radius) {
                            this.damageEnemy(enemy, proj.damage, false, proj.isAxe ? 'heavy' : 'magic');
                            
                            const normX = proj.vx / proj.speed;
                            const normY = proj.vy / proj.speed;
                            enemy.applyKnockback(normX, normY, 2.0);

                            // [수정사항 2] 평타 도끼가 피격당한 바로 그 순간에만, 전장 바닥에 낙하 예고지 및 비행 도끼 활성화
                            if (proj.isAxe && proj.isEnhanced) {
                                // 스택 가속 메커니즘 (스택 비례하여 낙하 비행시간 및 전장 대기 시간 10%씩 단축)
                                const flightDuration = Math.max(15, Math.floor(45 * Math.pow(0.90, proj.stackCount)));
                                const stayDuration = Math.max(60, Math.floor(135 * Math.pow(0.90, proj.stackCount)));
                                const totalDuration = flightDuration + stayDuration;

                                // 전장에 낙하 예정 서클(AxeLandingZone) 등록
                                const linkedZone = new AxeLandingZone(
                                    proj.targetDropX, 
                                    proj.targetDropY, 
                                    flightDuration, 
                                    totalDuration, 
                                    proj.stackCount
                                );
                                this.axeLandingZones.push(linkedZone);

                                // 피격한 적 위치로부터 회귀 예상 지점까지, 계산된 비행 속도 비율에 맞춰서 비행
                                const returningAxe = new AxeReturningProjectile(
                                    enemy.x,
                                    enemy.y,
                                    proj.targetDropX,
                                    proj.targetDropY,
                                    linkedZone,
                                    flightDuration
                                );
                                this.returningAxes.push(returningAxe);
                            }

                            this.projectiles.splice(i, 1);
                            break;
                        }
                    }
                }

                // 회귀 공중 비행 도끼 업데이트 루프
                for (let i = this.returningAxes.length - 1; i >= 0; i--) {
                    const retAxe = this.returningAxes[i];
                    retAxe.update();
                    if (retAxe.isMarkedForRemoval) {
                        this.returningAxes.splice(i, 1);
                    }
                }

                for (let i = this.stoneShards.length - 1; i >= 0; i--) {
                    const shard = this.stoneShards[i];
                    shard.update();

                    let hitWall = false;
                    for (let w = 0; w < this.walls.length; w++) {
                        if (this.walls[w].collidesWithProjectile(shard)) {
                            hitWall = true; break;
                        }
                    }

                    if (hitWall || shard.isMarkedForRemoval) {
                        this.stoneShards.splice(i, 1);
                        continue;
                    }

                    for (let e = 0; e < this.enemies.length; e++) {
                        const enemy = this.enemies[e];
                        const dist = getDistance(shard.x, shard.y, enemy.x, enemy.y);
                        if (dist < shard.radius + enemy.radius) {
                            this.damageEnemy(enemy, shard.damage, true, 'seismic_charged');
                            enemy.applyKnockback(shard.vx / shard.speed, shard.vy / shard.speed, 4.0);
                            this.stoneShards.splice(i, 1);
                            break;
                        }
                    }
                }

                for (let i = this.enemyProjectiles.length - 1; i >= 0; i--) {
                    const proj = this.enemyProjectiles[i];
                    proj.update();

                    if (proj.isMarkedForRemoval) {
                        this.enemyProjectiles.splice(i, 1);
                        continue;
                    }

                    const distToPlayer = getDistance(proj.x, proj.y, this.player.x, this.player.y);
                    if (distToPlayer < proj.radius + this.player.radius) {
                        let finalDmg = proj.damage * 0.55;
                        if (this.player.seismicChargeTimer > 0) {
                            finalDmg *= 0.2;
                        }
                        this.player.hp -= finalDmg;
                        this.spawnParticles(this.player.x, this.player.y, "#ef4444", 3, 5);
                        this.enemyProjectiles.splice(i, 1);
                        
                        if (this.player.hp <= 0) {
                            this.player.hp = 0;
                            this.triggerGameOver();
                        }
                        continue;
                    }

                    for (let w = 0; w < this.walls.length; w++) {
                        if (this.walls[w].collidesWithProjectile(proj)) {
                            this.enemyProjectiles.splice(i, 1);
                            break;
                        }
                    }
                }

                for (let i = this.meleeSlashes.length - 1; i >= 0; i--) {
                    const slash = this.meleeSlashes[i];
                    slash.update();

                    if (slash.life <= 0) {
                        this.meleeSlashes.splice(i, 1);
                        continue;
                    }

                    this.enemies.forEach(enemy => {
                        if (slash.hitList.has(enemy)) return;

                        let isHit = false;
                        let pushX = 0, pushY = 0;

                        if (slash.comboStep === 4 || slash.comboStep === 5) {
                            const distToSeg = getDistanceToSegment(enemy.x, enemy.y, slash.startX, slash.startY, slash.x, slash.y);
                            if (distToSeg <= enemy.radius + 30) {
                                isHit = true;
                                const dx = enemy.x - slash.x;
                                const dy = enemy.y - slash.y;
                                const len = Math.sqrt(dx * dx + dy * dy);
                                if (len > 0) { pushX = dx / len; pushY = dy / len; }
                            }
                        } else if (slash.effectStyle === "spellsword_thrust") {
                            const dx = enemy.x - slash.x;
                            const dy = enemy.y - slash.y;
                            
                            const projU = dx * Math.cos(slash.angle) + dy * Math.sin(slash.angle);
                            const projV = -dx * Math.sin(slash.angle) + dy * Math.cos(slash.angle);

                            const rectLength = 160;
                            const rectWidth = 120;

                            if (projU >= 10 && projU <= rectLength + enemy.radius && Math.abs(projV) <= rectWidth / 2 + enemy.radius) {
                                isHit = true;
                                const dxLen = Math.sqrt(dx * dx + dy * dy);
                                if (dxLen > 0) {
                                    pushX = dx / dxLen;
                                    pushY = dy / dxLen;
                                }
                            }
                        } else {
                            const dist = getDistance(slash.x, slash.y, enemy.x, enemy.y);
                            if (dist <= slash.range + enemy.radius) {
                                const angleToEnemy = Math.atan2(enemy.y - slash.y, enemy.x - slash.x);
                                const diffAngle = normalizeAngle(angleToEnemy - slash.angle);

                                if (Math.abs(diffAngle) < slash.arc / 2) {
                                    isHit = true;
                                    const dx = enemy.x - slash.x;
                                    const dy = enemy.y - slash.y;
                                    const distToEnemy = Math.sqrt(dx * dx + dy * dy);
                                    if (distToEnemy > 0) { pushX = dx / distToEnemy; pushY = dy / distToEnemy; }
                                }
                            }
                        }

                        if (isHit) {
                            slash.hitList.add(enemy);
                            const isHeavy = (slash.comboStep === 3 || slash.effectStyle === "hammer" || slash.effectStyle === "seismic_charged");
                            
                            this.damageEnemy(enemy, slash.damage, isHeavy, slash.effectStyle);

                            if (slash.effectStyle === "seismic_charged") {
                                enemy.stunTimer = Math.max(enemy.stunTimer, 90);
                                enemy.knockbackX = 0;
                                enemy.knockbackY = 0;
                            } else {
                                if (pushX !== 0 || pushY !== 0) {
                                    enemy.applyKnockback(pushX, pushY, slash.knockbackStrength);
                                }
                            }

                            if (slash.effectStyle === "hammer" && (pushX !== 0 || pushY !== 0)) {
                                const waveAngle = Math.atan2(pushY, pushX);
                                this.impactWaves.push(new HammerImpactWave(
                                    enemy.x + pushX * enemy.radius * 0.9,
                                    enemy.y + pushY * enemy.radius * 0.9,
                                    waveAngle
                                ));
                            }
                        }
                    });
                }

                for (let i = this.impactWaves.length - 1; i >= 0; i--) {
                    this.impactWaves[i].update();
                    if (this.impactWaves[i].isMarkedForRemoval) this.impactWaves.splice(i, 1);
                }

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    this.particles[i].update();
                    if (this.particles[i].isMarkedForRemoval) this.particles.splice(i, 1);
                }

                for (let i = this.damageTexts.length - 1; i >= 0; i--) {
                    this.damageTexts[i].update();
                    if (this.damageTexts[i].isMarkedForRemoval) this.damageTexts.splice(i, 1);
                }

                const baseInterval = 120;
                const levelMilestone = Math.floor(this.player.level / 5);
                const dynamicInterval = Math.max(25, baseInterval - levelMilestone * 15);
                const maxEnemies = Math.min(50, 15 + levelMilestone * 5);

                this.spawnTimer++;
                if (this.spawnTimer >= dynamicInterval) {
                    this.spawnTimer = 0;
                    if (this.enemies.filter(e => !e.isBoss).length < maxEnemies) {
                        this.spawnEnemy();
                    }
                }

                let hasBossNow = false;
                let activeBoss = null;

                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    const enemy = this.enemies[i];
                    enemy.update(this.player);
                    this.walls.forEach(wall => wall.resolveCollision(enemy));

                    if (enemy.isBoss) {
                        hasBossNow = true;
                        activeBoss = enemy;
                    }

                    const distToPlayer = getDistance(this.player.x, this.player.y, enemy.x, enemy.y);
                    if (distToPlayer < this.player.radius + enemy.radius) {
                        if (this.player.dashDuration === 0 && this.player.ultDuration === 0 && this.player.seismicLeapTimer === 0) {
                            let rawDmg = enemy.isBoss ? 0.95 : 0.65;
                            if (this.player.seismicChargeTimer > 0) {
                                rawDmg *= 0.2;
                            }
                            this.player.hp -= rawDmg;
                            if (this.player.hp <= 0) {
                                
                                this.player.hp = 0;
                                this.triggerGameOver();
                            }
                        }
                    }

                    if (enemy.isMarkedForRemoval) {
                        this.player.gainXp(enemy.xpReward);
                        this.score++;
                        this.enemies.splice(i, 1);

                        if (this.score > 0 && this.score % 50 === 0) {
                            this.spawnBoss();
                        } else if (this.score % 6 === 0) {
                            this.waveLevel += 1;
                        }
                    }
                }

                const bossHud = document.getElementById("boss-hud");
                if (hasBossNow && activeBoss) {
                    bossHud.style.display = "flex";
                    document.getElementById("boss-hp-fill").style.width = `${Math.max(0, (activeBoss.hp / activeBoss.maxHp) * 100)}%`;
                    document.getElementById("boss-name-display").innerText = `심연의 수호자 [각성 LV.${this.waveLevel}]`;
                } else {
                    bossHud.style.display = "none";
                }

                updateHUD();
                updateSkillsUI();
            }

            draw() {
                ctx.save();
                
                if (this.screenShakeTime > 0) {
                    const dx = (Math.random() - 0.5) * this.screenShakeIntensity;
                    const dy = (Math.random() - 0.5) * this.screenShakeIntensity;
                    ctx.translate(dx, dy);
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                this.drawGrid();

                this.walls.forEach(wall => wall.draw(ctx));
                this.axeLandingZones.forEach(zone => zone.draw(ctx)); 
                this.meleeSlashes.forEach(slash => slash.draw(ctx));
                this.impactWaves.forEach(wave => wave.draw(ctx));
                this.projectiles.forEach(proj => proj.draw(ctx));
                this.returningAxes.forEach(retAxe => retAxe.draw(ctx)); // 회귀 도끼 렌더링 추가
                this.spectralLaunchedBlades.forEach(blade => blade.draw(ctx)); 
                this.enemyProjectiles.forEach(proj => proj.draw(ctx));
                this.stoneShards.forEach(s => s.draw(ctx)); 
                this.boomerangs.forEach(b => b.draw(ctx));
                this.enemies.forEach(enemy => enemy.draw(ctx));
                this.particles.forEach(p => p.draw(ctx));
                this.player.draw(ctx);
                this.damageTexts.forEach(t => t.draw(ctx));

                ctx.restore();
            }

            drawGrid() {
                ctx.strokeStyle = "#0d1321";
                ctx.lineWidth = 1;
                const gridSize = 40;

                for (let x = 0; x < canvas.width; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
                for (let y = 0; y < canvas.height; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }
            }

            triggerGameOver() {
                this.isGameOver = true;
                finalStats.innerText = `처치한 마물: ${this.score}마리 (최종 경지 LV.${this.player.level})`;
                gameOverScreen.style.display = "flex";
                playExplosionSound();
            }
        }

        const UPGRADE_POOL = [
            {
                id: 'slash_damage',
                title: '⚔️ 예도 각성',
                desc: '기본 칼 베기 공격력이 3 상승합니다.',
                action: (p) => { p.damage += 3; }
            },
            {
                id: 'crit_chance',
                title: '🎯 약점 간파',
                desc: '치명타 확률이 영구적으로 8% 증가합니다.',
                action: (p) => { p.critChance += 0.08; }
            },
            {
                id: 'crit_multiplier',
                title: '💥 광포한 일격',
                desc: '치명타 배율이 30% 증가합니다. (기존 대비 극강 대미지)',
                action: (p) => { p.critMult += 0.3; }
            },
            {
                id: 'slash_range',
                title: '📐 기검 연마 (사거리)',
                desc: '칼로 베는 범위 and 사거리가 15% 길어집니다.',
                action: (p) => { p.slashRange = Math.floor(p.slashRange * 1.15); }
            },
            {
                id: 'slash_speed',
                title: '⚡ 질풍격 (공격 속도)',
                desc: '검의 공격 후 딜레이가 15% 단축됩니다.',
                action: (p) => { p.slashCooldownMax = Math.max(8, Math.floor(p.slashCooldownMax * 0.85)); }
            },
            {
                id: 'max_hp',
                title: '❤️ 생명의 비약',
                desc: '최대 체력이 25 증가하며, 50의 HP를 즉시 수복합니다.',
                action: (p) => { p.maxHp += 25; p.hp = Math.min(p.maxHp, p.hp + 50); }
            },
            {
                id: 'move_speed',
                title: '👟 축지천보',
                desc: '영구히 질주 이동속도가 0.45 빨라집니다.',
                action: (p) => { p.speed += 0.45; }
            },
            {
                id: 'weapon_boomerang',
                title: '🪃 그림자 부메랑',
                desc: '되돌아오며 마물을 가르는 관통 부메랑을 던집니다. (중첩 가능)',
                action: (p) => { p.boomerangLevel += 1; }
            },
            {
                id: 'weapon_crossbow',
                title: '🏹 영혼 석궁',
                desc: '근접 적을 알아서 정밀 조준해 영혼 볼트를 속사합니다.',
                action: (p) => { p.autoCrossbowLevel += 1; }
            },
            {
                id: 'dash_cooldown',
                title: '👣 대시 마스터리',
                desc: '회피 대시 재사용 대기시간이 25% 단축됩니다.',
                action: (p) => { p.dashCooldownMax = Math.floor(p.dashCooldownMax * 0.75); }
            },
            {
                id: 'fok_expansion',
                title: '🗡️ 비검 무작위 사출 증강',
                desc: '칼날 사출 스킬 연마 시 방출 칼날 수가 2개 추가됩니다.',
                action: (p) => { p.fokLevel += 1; }
            }
        ];

        function generateUpgradeChoices() {
            upgradeOptionsContainer.innerHTML = "";
            const poolCopy = [...UPGRADE_POOL];
            const choices = [];
            
            for (let i = 0; i < 3; i++) {
                if (poolCopy.length === 0) break;
                const idx = Math.floor(Math.random() * poolCopy.length);
                choices.push(poolCopy.splice(idx, 1)[0]);
            }

            choices.forEach(upgrade => {
                const button = document.createElement("button");
                button.className = "upgrade-btn";
                button.innerHTML = `
                    <span class="title">${upgrade.title}</span>
                    <span class="desc">${upgrade.desc}</span>
                `;
                button.onclick = () => { executeUpgrade(upgrade); };
                upgradeOptionsContainer.appendChild(button);
            });

            levelUpModal.style.display = "flex";
        }

        function executeUpgrade(upgrade) {
            if (!game || !game.isLevelUpPending) return;
            upgrade.action(game.player);
            levelUpModal.style.display = "none";
            game.isLevelUpPending = false;
        }

        function updateHUD() {
            if (!game) return;
            const p = game.player;

            const hpPercent = Math.max(0, (p.hp / p.maxHp) * 100);
            const xpPercent = Math.min(100, (p.xp / p.nextXp) * 100);

            hpFill.style.width = `${hpPercent}%`;
            xpFill.style.width = `${xpPercent}%`;
            levelDisplay.innerText = `LV. ${p.level}`;
            scoreDisplay.innerText = `처치: ${game.score}`;
        }

        function updateSkillsUI() {
            if (!game) return;
            const p = game.player;
            const skillUltSlot = document.getElementById("skill-ult");
            const ultCooldownOverlay = document.getElementById("ult-cooldown-overlay");

            if (p.playerClass === "destroyer") {
                skillDashSlot.querySelector(".skill-icon").innerText = "⛰️";
                skillDashSlot.querySelector(".skill-name").innerText = "지각변동";
                
                if (p.chargedAttackComboWindow > 0) {
                    skillFokSlot.querySelector(".skill-icon").innerText = "⚡";
                    skillFokSlot.querySelector(".skill-name").innerText = "대지 균열!";
                } else {
                    skillFokSlot.querySelector(".skill-icon").innerText = "💥";
                    skillFokSlot.querySelector(".skill-name").innerText = "분쇄의 파동";
                }
                
                skillUltSlot.querySelector(".skill-icon").innerText = "🔨";
                skillUltSlot.querySelector(".skill-name").innerText = "대지 붕괴";
            } else if (p.playerClass === "spellsword") {
                skillDashSlot.querySelector(".skill-icon").innerText = "🔮";
                skillDashSlot.querySelector(".skill-name").innerText = "차원 점멸";
                
                if (p.spectralBladesActive) {
                    skillFokSlot.querySelector(".skill-icon").innerText = "✨";
                    skillFokSlot.querySelector(".skill-name").innerText = "환영 사출!";
                } else {
                    skillFokSlot.querySelector(".skill-icon").innerText = "⚔️";
                    skillFokSlot.querySelector(".skill-name").innerText = "환영 수호검";
                }
                
                skillUltSlot.querySelector(".skill-icon").innerText = "🌌";
                skillUltSlot.querySelector(".skill-name").innerText = "아케인 볼텍스";
            } else if (p.playerClass === "axe") {
                skillDashSlot.querySelector(".skill-icon").innerText = "👣";
                skillDashSlot.querySelector(".skill-name").innerText = "회피 대시";

                if (p.enhancedAxeActive) {
                    skillFokSlot.querySelector(".skill-icon").innerText = "🪓";
                    skillFokSlot.querySelector(".skill-name").innerText = `도끼 각성 (x${p.axeStack})`;
                } else {
                    skillFokSlot.querySelector(".skill-icon").innerText = "🪓";
                    skillFokSlot.querySelector(".skill-name").innerText = "도끼 각성 장전";
                }

                skillUltSlot.querySelector(".skill-icon").innerText = "🌀";
                skillUltSlot.querySelector(".skill-name").innerText = "천지섬멸 무비검";
            } else {
                skillDashSlot.querySelector(".skill-icon").innerText = "👣";
                skillDashSlot.querySelector(".skill-name").innerText = "그림자 대시";
                skillFokSlot.querySelector(".skill-icon").innerText = "🗡️";
                skillFokSlot.querySelector(".skill-name").innerText = "칼날 부채";
                skillUltSlot.querySelector(".skill-icon").innerText = "🌀";
                skillUltSlot.querySelector(".skill-name").innerText = "천지섬멸 무비검";
            }

            if (p.dashCooldown > 0) {
                skillDashSlot.classList.remove("ready");
                dashCooldownOverlay.style.display = "flex";
                dashCooldownOverlay.innerText = (p.dashCooldown / 60).toFixed(1);
            } else {
                skillDashSlot.classList.add("ready");
                dashCooldownOverlay.style.display = "none";
            }

            if (p.playerClass === "spellsword" && p.spectralBladesActive) {
                skillFokSlot.classList.add("ready");
                fokCooldownOverlay.style.display = "none";
            } else if (p.playerClass === "destroyer" && p.chargedAttackComboWindow > 0) {
                skillFokSlot.classList.add("ready");
                fokCooldownOverlay.style.display = "none";
            } else if (p.playerClass === "axe" && p.enhancedAxeActive) {
                skillFokSlot.classList.add("ready");
                fokCooldownOverlay.style.display = "none";
            } else if (p.fokCooldown > 0) {
                skillFokSlot.classList.remove("ready");
                fokCooldownOverlay.style.display = "flex";
                fokCooldownOverlay.innerText = (p.fokCooldown / 60).toFixed(1);
            } else {
                skillFokSlot.classList.add("ready");
                fokCooldownOverlay.style.display = "none";
            }

            if (p.ultCooldown > 0) {
                skillUltSlot.classList.remove("ready");
                ultCooldownOverlay.style.display = "flex";
                ultCooldownOverlay.innerText = (p.ultCooldown / 60).toFixed(1);
            } else {
                skillUltSlot.classList.add("ready");
                ultCooldownOverlay.style.display = "none";
            }
        }

        window.addEventListener("keydown", (e) => {
            const key = e.key.toLowerCase();
            
            if (key === 'w' || key === 'ㅈ') keys.w = true;
            if (key === 'a' || key === 'ㅁ') keys.a = true;
            if (key === 's' || key === 'ㄴ') keys.s = true;
            if (key === 'd' || key === 'ㅇ') keys.d = true;

            if (e.code === 'Space') {
                e.preventDefault();
                if (game) game.player.useDash();
            }
            if (key === 'e' || key === 'ㄷ') {
                if (game) game.useFanOfKnives();
            }
            if (key === 'q' || key === 'ㅂ') {
                if (game) game.player.useUltimate();
            }

            if ((key === 'r' || key === 'ㄱ') && game && game.isGameOver) {
                initGame();
            }
        });

        window.addEventListener("keyup", (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'ㅈ') keys.w = false;
            if (key === 'a' || key === 'ㅁ') keys.a = false;
            if (key === 's' || key === 'ㄴ') keys.s = false;
            if (key === 'd' || key === 'ㅇ') keys.d = false;
        });

        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
            mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        canvas.addEventListener("mousedown", (e) => {
            if (e.button === 0 && game) {
                game.shoot();
            }
        });

        canvas.addEventListener("contextmenu", (e) => e.preventDefault());

        function initGame(playerClass = selectedClass) {
            selectedClass = playerClass;
            titleScreen.style.display = "none";
            gameOverScreen.style.display = "none";
            levelUpModal.style.display = "none";
            
            keys.w = false; keys.a = false; keys.s = false; keys.d = false;

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            resumeAudioContext();

            game = new GameManager(selectedClass);
            updateHUD();
            updateSkillsUI();
        }

        rogueClassCard.addEventListener("click", () => initGame("rogue"));
        destroyerClassCard.addEventListener("click", () => initGame("destroyer"));
        spellswordClassCard.addEventListener("click", () => initGame("spellsword"));
        axeClassCard.addEventListener("click", () => initGame("axe"));

        function loop() {
            if (game) {
                game.update();
                game.draw();
            }
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
