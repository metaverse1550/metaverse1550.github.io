<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>배드민턴 마스터즈 (Badminton Masters)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #111;
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            background-color: #222;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .interactive {
            pointer-events: auto;
        }

        .hidden {
            display: none !important;
        }

        .panel {
            background: rgba(20, 30, 50, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(100, 150, 255, 0.5);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 3rem;
            color: #ffcc00;
            text-shadow: 2px 2px 0 #cc4400, 4px 4px 0px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        h2 {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .btn {
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 40px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 150, 255, 0.4);
            transition: all 0.1s;
            font-family: 'Noto Sans KR', sans-serif;
            margin: 10px;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0, 150, 255, 0.4);
        }

        .btn:hover {
            filter: brightness(1.1);
        }
        
        .btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        .shop-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            width: 400px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .stat-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
        }

        .stat-level {
            font-size: 0.9rem;
            color: #aaa;
        }

        .upgrade-btn {
            background: linear-gradient(180deg, #ffb12b 0%, #ff7300 100%);
            padding: 8px 20px;
            font-size: 1rem;
        }
        
        .upgrade-btn:disabled {
            background: #555;
        }

        .gold-display {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 2rem;
            color: #ffd700;
            text-shadow: 1px 1px 2px #000;
            margin-bottom: 10px;
        }

        #msg-overlay {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 5rem;
            color: white;
            text-shadow: 4px 4px 0 #000, 0 0 20px rgba(255,255,255,0.5);
            position: absolute;
            top: 40%;
            text-align: center;
            width: 100%;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #msg-overlay.show {
            opacity: 1;
            transform: scale(1);
        }

        .help-text {
            color: #bbb;
            font-size: 0.9rem;
            margin-top: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>

    <!-- 메시지 오버레이 -->
    <div id="msg-overlay">SET OVER</div>

    <!-- 메인 메뉴 -->
    <div id="menu-ui" class="ui-layer interactive">
        <div class="panel">
            <h1>배드민턴 마스터즈</h1>
            <button class="btn" onclick="startGame()">게임 시작</button>
            <div class="help-text">
                [조작법]<br>
                이동: A (좌), D (우)<br>
                점프: W (더 강력해진 높은 가공할 점프력!)<br>
                스윙: 방향키 (↑클리어 - 절대아웃없음, ↓스매시 - 25도 레이저, ←언더, →드라이브)<br>
                서브: 아무 방향키나 입력
            </div>
        </div>
    </div>

    <!-- 샵 (강화) 메뉴 -->
    <div id="shop-ui" class="ui-layer interactive hidden">
        <div class="panel">
            <h2>훈련소 (강화)</h2>
            <div class="gold-display" id="shop-gold">0 G</div>
            
            <div class="shop-container">
                <div class="stat-row">
                    <div class="stat-info">
                        <span class="stat-name">라켓 (스윙 파워)</span>
                        <span class="stat-level" id="lv-racket">Lv. 1</span>
                    </div>
                    <button class="btn upgrade-btn" id="btn-up-racket" onclick="upgradeStat('racket')">50 G</button>
                </div>
                <div class="stat-row">
                    <div class="stat-info">
                        <span class="stat-name">점프 (점프 높이)</span>
                        <span class="stat-level" id="lv-jump">Lv. 1</span>
                    </div>
                    <button class="btn upgrade-btn" id="btn-up-jump" onclick="upgradeStat('jump')">50 G</button>
                </div>
                <div class="stat-row">
                    <div class="stat-info">
                        <span class="stat-name">근력 (셔틀콕 속도)</span>
                        <span class="stat-level" id="lv-strength">Lv. 1</span>
                    </div>
                    <button class="btn upgrade-btn" id="btn-up-strength" onclick="upgradeStat('strength')">50 G</button>
                </div>
                <div class="stat-row">
                    <div class="stat-info">
                        <span class="stat-name">민첩 (이동 속도)</span>
                        <span class="stat-level" id="lv-agility">Lv. 1</span>
                    </div>
                    <button class="btn upgrade-btn" id="btn-up-agility" onclick="upgradeStat('agility')">50 G</button>
                </div>
                <div class="stat-row">
                    <div class="stat-info">
                        <span class="stat-name">수비 (리시브 범위)</span>
                        <span class="stat-level" id="lv-defense">Lv. 1</span>
                    </div>
                    <button class="btn upgrade-btn" id="btn-up-defense" onclick="upgradeStat('defense')">50 G</button>
                </div>
            </div>

            <button class="btn" onclick="nextMatch()">다음 경기 시작</button>
        </div>
    </div>

    <!-- 경기 종료 결과 -->
    <div id="result-ui" class="ui-layer interactive hidden">
        <div class="panel">
            <h1 id="result-title">승리!</h1>
            <h2 id="result-score">2 : 0</h2>
            <div class="gold-display" id="result-gold-earned">+ 200 G 획득</div>
            <button class="btn" onclick="enterShop()">훈련소 가기</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CW = canvas.width;
const CH = canvas.height;

const GRAVITY = 0.55;
const DRAG = 0.985;
const FLOOR_Y = 620;
const NET_X = CW / 2;
const NET_HEIGHT = 95; 
const COURT_LEFT = 100;
const COURT_RIGHT = CW - 100;

// Game States
const STATE = {
    MENU: 0,
    SERVE: 1,
    PLAYING: 2,
    SCORE_WAIT: 3,
    SET_OVER: 4,
    MATCH_OVER: 5,
    SHOP: 6
};

const keys = {
    w: false, a: false, s: false, d: false,
    ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false
};
const keyJustPressed = {}; 

window.addEventListener('keydown', (e) => {
    if(keys.hasOwnProperty(e.key)) {
        if(!keys[e.key]) keyJustPressed[e.key] = true;
        keys[e.key] = true;
    }
});
window.addEventListener('keyup', (e) => {
    if(keys.hasOwnProperty(e.key)) keys[e.key] = false;
});

function isJustPressed(key) {
    if (keyJustPressed[key]) {
        keyJustPressed[key] = false;
        return true;
    }
    return false;
}

let playerGold = 0;
const stats = {
    racket: { level: 1, max: 10, baseCost: 50 },
    jump: { level: 1, max: 10, baseCost: 50 },
    strength: { level: 1, max: 10, baseCost: 50 },
    agility: { level: 1, max: 10, baseCost: 50 },
    defense: { level: 1, max: 10, baseCost: 50 }
};

let aiLevel = 1;

function getStatCost(statName) {
    const s = stats[statName];
    return s.baseCost * s.level;
}

function rand(min, max) { return Math.random() * (max - min) + min; }
function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
function getDistance(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = rand(-5, 5);
        this.vy = rand(-5, 5);
        this.life = 1.0;
        this.decay = rand(0.02, 0.05);
        this.color = color;
        this.size = rand(2, 6);
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
    }
    draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

class FloatingText {
    constructor(x, y, text, color, size = 30) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color;
        this.size = size;
        this.life = 1.0;
        this.vy = -2;
    }
    update() {
        this.y += this.vy;
        this.life -= 0.02;
    }
    draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.font = `bold ${this.size}px 'Black Han Sans', sans-serif`;
        ctx.fillStyle = this.color;
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 4;
        ctx.strokeText(this.text, this.x, this.y);
        ctx.fillText(this.text, this.x, this.y);
        ctx.restore();
    }
}

class Shuttlecock {
    constructor() {
        this.reset(CW/2, 200);
        this.radius = 8;
        this.trail = [];
    }
    reset(x, y) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.active = false;
        this.trail = [];
        this.rotation = 0;
    }
    update() {
        if (!this.active) return;

        this.vy += GRAVITY;
        this.vx *= DRAG;
        this.vy *= DRAG;

        this.x += this.vx;
        this.y += this.vy;

        this.rotation = Math.atan2(this.vy, this.vx);

        let netHalfWidth = 5;
        if (this.x + this.radius > NET_X - netHalfWidth && 
            this.x - this.radius < NET_X + netHalfWidth && 
            this.y + this.radius > FLOOR_Y - NET_HEIGHT) {
            
            if (this.y < FLOOR_Y - NET_HEIGHT + 8 && this.vy > 0) {
                this.vy *= -0.6;
            } else {
                this.vx *= -0.5;
                this.x = this.x < NET_X ? NET_X - netHalfWidth - this.radius : NET_X + netHalfWidth + this.radius;
            }
        }

        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > 8) this.trail.shift();
    }
    
    draw(ctx) {
        if (!this.active && game.state !== STATE.SERVE) return;

        if (this.trail.length > 1) {
            ctx.beginPath();
            ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for(let i=1; i<this.trail.length; i++) {
                ctx.lineTo(this.trail[i].x, this.trail[i].y);
            }
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation + Math.PI/2);

        // 깃털
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-8, -15);
        ctx.lineTo(8, -15);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#ddd';
        ctx.stroke();

        // 코르크
        ctx.fillStyle = '#ffbaba';
        ctx.beginPath();
        ctx.arc(0, 0, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.stroke();

        ctx.restore();
    }
}

class Character {
    constructor(isAI) {
        this.isAI = isAI;
        this.width = 40;
        this.height = 130;
        this.x = 0;
        this.y = FLOOR_Y - this.height;
        this.vx = 0;
        this.vy = 0;
        
        this.dir = 1; 

        this.isSwinging = false;
        this.swingTimer = 0;
        this.swingDuration = 12; // 빠르고 역동적인 12프레임 스윙
        this.swingType = '';
        
        this.legAngle = 0;
        this.color = isAI ? '#ff4757' : '#1e90ff';

        this.hitCooldown = 0;

        // 점프력 및 민첩성 스탯 대폭 상향
        this.speed = 10;
        this.jumpPower = -18; 
        this.hitPower = 1.1;
        this.hitRange = 65;
    }

    updateStats() {
        if (!this.isAI) {
            this.speed = 10.5 + (stats.agility.level * 0.75); 
            this.jumpPower = -17.5 - (stats.jump.level * 0.65); // 고공 점프력 상향
            this.hitPower = 1.15 + (stats.strength.level * 0.12);
            this.hitRange = 65 + (stats.defense.level * 5.5);
        } else {
            let l = aiLevel;
            this.speed = 11.5 + (l * 0.6); 
            this.jumpPower = -18.0 - (l * 0.5); 
            this.hitPower = 1.2 + (l * 0.12);
            this.hitRange = 70 + (l * 4.5);
        }
    }

    reset(side) {
        this.dir = side;
        this.x = (side === -1) ? COURT_LEFT + 200 : COURT_RIGHT - 200;
        this.y = FLOOR_Y - this.height;
        this.vx = 0;
        this.vy = 0;
        this.isSwinging = false;
        this.swingTimer = 0;
        this.updateStats();
    }

    update() {
        this.vy += GRAVITY;
        this.y += this.vy;

        if (this.y >= FLOOR_Y - this.height) {
            this.y = FLOOR_Y - this.height;
            this.vy = 0;
        }

        this.x += this.vx;

        if (Math.abs(this.vx) > 0.1 && this.y >= FLOOR_Y - this.height) {
            this.legAngle += 0.25;
        } else {
            this.legAngle = 0;
        }

        if (this.isSwinging) {
            this.swingTimer++;
            if (this.swingTimer >= this.swingDuration) {
                this.isSwinging = false;
                this.swingTimer = 0;
            }
        }
        if (this.hitCooldown > 0) this.hitCooldown--;

        if (this.dir === -1) {
            this.x = clamp(this.x, 20, NET_X - this.width - 20);
        } else {
            this.x = clamp(this.x, NET_X + 20, CW - this.width - 20);
        }
    }

    swing(type) {
        if (!this.isSwinging && this.hitCooldown === 0) {
            this.isSwinging = true;
            this.swingTimer = 0;
            this.swingType = type;
        }
    }

    jump() {
        if (this.y >= FLOOR_Y - this.height - 5) {
            this.vy = this.jumpPower;
        }
    }

    getHitBox() {
        let hx = this.x + (this.dir === -1 ? 25 : -25);
        let hy = this.y - 15;
        return { x: hx, y: hy, r: this.hitRange };
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);

        let faceDir = this.dir === -1 ? 1 : -1;
        ctx.scale(faceDir, 1);

        // 몸통
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.roundRect(-10, 20, 20, 60, 10);
        ctx.fill();

        // 머리
        ctx.fillStyle = '#ffdbac';
        ctx.beginPath();
        ctx.arc(0, 5, 15, 0, Math.PI * 2);
        ctx.fill();

        // 눈
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(5, 2, 3, 0, Math.PI * 2);
        ctx.fill();

        let isAirborne = this.y < FLOOR_Y - this.height - 5;

        // 다리 렌더링
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';

        if (isAirborne && !this.isSwinging) {
            // 점프 대기 장전: 다리 뒤로 바짝 굽힘
            ctx.beginPath(); ctx.moveTo(-5, 75); ctx.lineTo(-20, 100); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(5, 75); ctx.lineTo(-10, 105); ctx.stroke();
        } else if (isAirborne && this.isSwinging) {
            // 타격 순간: 공중에서 다리를 앞으로 호쾌하게 쭉 뻗으며 임팩트
            ctx.beginPath(); ctx.moveTo(-5, 75); ctx.lineTo(10, 125); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(5, 75); ctx.lineTo(25, 120); ctx.stroke();
        } else {
            // 지상 대기 및 걷기 애니메이션
            let legAnim = Math.sin(this.legAngle) * 22; 
            ctx.beginPath();
            ctx.moveTo(-5, 75); 
            ctx.lineTo(-5 - legAnim, 130); 
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(5, 75); 
            ctx.lineTo(5 + legAnim, 130); 
            ctx.stroke();
        }

        // 팔 및 라켓 관절 렌더링
        ctx.save();
        ctx.translate(0, 30); 

        let sA = Math.PI / 3; 
        let eA = -Math.PI / 6; 
        let wA = -Math.PI / 6; 
        
        if (isAirborne && !this.isSwinging) {
            // [정밀 보정된 완벽한 스매싱 장전 자세]
            // 팔꿈치 및 팔 전체를 바닥과 수평(일직선)으로 완벽하게 수평 정렬
            sA = Math.PI; 
            eA = 0;       
            // 라켓의 헤드가 머리 쪽을 향하도록 위로 30도 각도로 치켜들기 (수평선 기준 동경)
            wA = -Math.PI / 6; 
        }

        if (this.isSwinging) {
            let p = this.swingTimer / this.swingDuration; 
            
            if (this.swingType === 'smash' || this.swingType === 'lob') {
                if (p < 0.25) {
                    // 1단계: 팔꿈치가 완벽히 뒤로 구부러져 'ㄱ자' 모양 형성 및 헤드 낙하
                    let t = p / 0.25;
                    sA = Math.PI * (1 - t) + (-Math.PI / 4) * t; 
                    eA = (Math.PI * 0.75) * t; 
                    wA = (-Math.PI / 6) * (1 - t) + (Math.PI / 2) * t; 
                } else {
                    // 2단계: 손목 스냅 & 채찍처럼 극도로 빠른 임팩트 궤적
                    let t = (p - 0.25) / 0.75;
                    t = 1 - Math.pow(1 - t, 3); // 폭발적인 가속 보간
                    
                    sA = (-Math.PI / 4) * (1 - t) + (Math.PI / 2) * t; 
                    eA = (Math.PI * 0.75) * (1 - t); 
                    wA = (Math.PI / 2) * (1 - t) + (-Math.PI / 4) * t; 
                }
            } else if (this.swingType === 'under') {
                sA = Math.PI * (1 - p) + (-Math.PI / 6) * p; 
                eA = 0;
                wA = 0;
            } else { // drive
                sA = Math.PI * (1 - p) + 0 * p; 
                eA = 0;
                wA = 0;
            }
        }

        // 상완(Upper Arm) 그리기
        ctx.rotate(sA);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(15, 0);
        ctx.strokeStyle = '#ffdbac';
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.stroke();

        // 하완(Forearm) 그리기
        ctx.translate(15, 0);
        ctx.rotate(eA);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(15, 0);
        ctx.stroke();

        // 라켓 렌더링
        ctx.translate(15, 0);
        ctx.rotate(wA);
        
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(25, 0);
        ctx.strokeStyle = '#777';
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.beginPath();
        ctx.ellipse(37, 0, 12, 18, 0, 0, Math.PI * 2);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.stroke();
        
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fill();

        ctx.restore(); 
        ctx.restore(); 
    }
}

class Player extends Character {
    constructor() {
        super(false);
    }
    updateInput() {
        if (game.state !== STATE.PLAYING && game.state !== STATE.SERVE) return;

        this.vx = 0;
        if (keys.a) this.vx = -this.speed;
        if (keys.d) this.vx = this.speed;
        
        if (keys.w) this.jump();

        if (isJustPressed('ArrowUp')) this.swing('lob');
        else if (isJustPressed('ArrowDown')) this.swing('smash');
        else if (isJustPressed('ArrowLeft')) this.swing('under');
        else if (isJustPressed('ArrowRight')) this.swing('drive');
    }
}

class AI extends Character {
    constructor() {
        super(true);
        this.targetX = CW / 2 + 200;
    }

    updateLogic(birdie) {
        if (game.state !== STATE.PLAYING && game.state !== STATE.SERVE) {
            this.vx = 0; 
            return;
        }

        if (game.state === STATE.SERVE && game.server === this) {
            // 서브: 무조건 깊고 높은 방어형 서브(lob) 위주로 안전하게 시작
            if (Math.random() < 0.04) {
                this.swing(Math.random() < 0.95 ? 'lob' : 'drive');
            }
            return;
        }

        let isIncoming = false;
        if (this.dir === 1 && (birdie.vx > 0 || birdie.x > NET_X)) isIncoming = true;
        if (this.dir === -1 && (birdie.vx < 0 || birdie.x < NET_X)) isIncoming = true;

        let activeSpeed = this.speed;
        let hitbox = this.getHitBox();
        let effectiveHitRange = hitbox.r;

        if (isIncoming) {
            // [물리 궤적 예측 알고리즘]
            let tempX = birdie.x;
            let tempY = birdie.y;
            let tempVx = birdie.vx;
            let tempVy = birdie.vy;
            let predictedInterceptX = tempX;
            let closestDistY = 999999;
            let idealHitY = (this.y < FLOOR_Y - this.height - 10) ? this.y + 15 : FLOOR_Y - 110;

            for (let step = 0; step < 150; step++) {
                tempVy += GRAVITY;
                tempVx *= DRAG;
                tempVy *= DRAG;
                tempX += tempVx;
                tempY += tempVy;

                if (tempY > FLOOR_Y) {
                    predictedInterceptX = tempX;
                    break;
                }
                let dy = Math.abs(tempY - idealHitY);
                if (dy < closestDistY) {
                    closestDistY = dy;
                    predictedInterceptX = tempX;
                }
            }
            this.targetX = predictedInterceptX;

            // [철벽 수비력 발동] 엄청나게 빠른 스매시가 날아오면 비상 스피드와 리시브 범위 폭발
            if (birdie.active && (Math.abs(birdie.vx) > 25 || birdie.vy > 10)) {
                activeSpeed += 6.5;      // 미친 리커버리 스피드
                effectiveHitRange += 60; // 기적의 다이빙 리시브 범위 추가
            } else {
                activeSpeed += 2.0;
            }
        } else {
            // [수비 진형 복귀] 공이 내 영역이 아니면 코트 중앙(수비 포지션)으로 전력 질주하여 방어 준비
            this.targetX = this.dir === 1 ? COURT_RIGHT - 240 : COURT_LEFT + 240;
            activeSpeed += 3.5; 
        }

        let boundMin = this.dir === 1 ? NET_X + 45 : 45;
        let boundMax = this.dir === 1 ? CW - 45 : NET_X - 45;
        this.targetX = clamp(this.targetX, boundMin, boundMax);

        this.vx = 0;
        let distToTarget = this.targetX - this.x;
        
        if (Math.abs(distToTarget) > 3) {
            this.vx = (distToTarget > 0 ? 1 : -1) * activeSpeed; 
        }

        let distToHitbox = getDistance(hitbox.x, hitbox.y, birdie.x, birdie.y);
        
        if (isIncoming) { 
            // 점프 찬스: 공격 빈도를 극단적으로 낮춤 (방어 우선)
            if (birdie.y < FLOOR_Y - 220 && birdie.vy > 0 && Math.abs(this.x - birdie.x) < 80) {
                // 단 10%의 확률로만 점프하여 스매시 시도, 나머지는 지상에서 수비
                if (Math.random() < 0.1 && this.y >= FLOOR_Y - this.height - 5) {
                    this.jump();
                }
            }

            // 타격 (Swing Selection)
            if (distToHitbox < effectiveHitRange + 25 && !this.isSwinging) {
                let type = 'lob';
                let isCloseToNet = Math.abs(this.x - NET_X) < 150;
                let playerDistToNet = Math.abs(game.player.x - NET_X);

                if (this.y < FLOOR_Y - this.height - 20 && birdie.y < this.y + 40 && Math.random() < 0.15) {
                    // 고공에 완벽히 떴을 때만 아주 가끔 (15%) 기습 스매시
                    type = 'smash'; 
                } 
                else if (Math.abs(birdie.vx) > 25 || birdie.y > FLOOR_Y - 100) {
                    // 강력한 스매시를 받거나 바닥에 떨어지기 직전인 공은 무조건 걷어올리기 (언더 or 클리어)
                    type = isCloseToNet ? 'under' : 'lob';
                } 
                else if (playerDistToNet > 380 && isCloseToNet) {
                    type = 'under'; // 네트 앞 빈 공간 찌르기 (드롭성)
                } 
                else if (birdie.y > FLOOR_Y - 180 && birdie.y < FLOOR_Y - 110 && Math.random() < 0.1) {
                    type = 'drive';
                } 
                else {
                    type = 'lob'; // 기본값: 철저하게 백라인으로 높고 멀리 보내는 안정적인 수비 클리어
                }
                
                this.swing(type);
            }
        }
    }
}

class Game {
    constructor() {
        this.player = new Player();
        this.ai = new AI();
        this.birdie = new Shuttlecock();
        
        this.particles = [];
        this.texts = [];

        this.state = STATE.MENU;
        this.score = { p: 0, a: 0 };
        this.sets = { p: 0, a: 0 };
        this.server = this.player;
        this.playerSide = -1; 

        this.shakeTimer = 0;
        this.msgTimer = 0;
    }

    startMatch() {
        this.score = { p: 0, a: 0 };
        this.sets = { p: 0, a: 0 };
        this.playerSide = -1;
        this.server = this.player;
        this.startSet();
    }

    startSet() {
        this.score = { p: 0, a: 0 };
        this.player.reset(this.playerSide);
        this.ai.reset(-this.playerSide);
        this.readyServe(this.server);
        document.getElementById('msg-overlay').classList.remove('show');
    }

    readyServe(serverChar) {
        this.state = STATE.SERVE;
        this.server = serverChar;
        this.birdie.active = false;
        
        let hx = serverChar.x + (serverChar.dir === -1 ? 25 : -25);
        this.birdie.x = hx;
        this.birdie.y = serverChar.y - 20;
    }

    addScore(winner) {
        this.state = STATE.SCORE_WAIT;
        this.msgTimer = 120;
        
        let msg = winner === this.player ? "POINT!" : "AI POINT";
        let color = winner === this.player ? "#00f2fe" : "#ff4757";
        this.texts.push(new FloatingText(CW/2, CH/2, msg, color, 60));

        if (winner === this.player) {
            this.score.p++;
            playerGold += 10;
        } else {
            this.score.a++;
        }
        
        this.server = winner;

        if (this.score.p >= 21 || this.score.a >= 21) {
            this.handleSetEnd(winner);
        }
    }

    handleSetEnd(winner) {
        this.state = STATE.SET_OVER;
        this.msgTimer = 180;
        
        if (winner === this.player) {
            this.sets.p++;
            playerGold += 50;
            showUIMessage("SET WIN!");
        } else {
            this.sets.a++;
            showUIMessage("SET LOSE...");
        }

        if (this.sets.p >= 2 || this.sets.a >= 2) {
            this.msgTimer = 200; 
        }
    }

    checkHit(char) {
        if (!char.isSwinging || char.hitCooldown > 0) return;
        if (char.swingTimer > char.swingDuration * 0.65) return;

        let hitbox = char.getHitBox();
        let dist = getDistance(hitbox.x, hitbox.y, this.birdie.x, this.birdie.y);

        if (dist < hitbox.r + this.birdie.radius) {
            this.state = STATE.PLAYING;
            this.birdie.active = true;
            char.hitCooldown = 20;

            let powerMult = char.hitPower;
            let racketStat = char === this.player ? stats.racket.level : aiLevel;
            powerMult += racketStat * 0.05;

            let faceDir = char.dir === -1 ? 1 : -1;
            let vx = 0, vy = 0;
            let hitText = "";
            let color = "#fff";

            if (char.swingType === 'smash') {
                // 프로 스펙 25도 고정 레이저 스매시
                let angleDeg = 25; 
                let rad = angleDeg * (Math.PI / 180);
                let force = 40 * powerMult;
                vx = force * Math.cos(rad) * faceDir;
                vy = force * Math.sin(rad); 
                hitText = "SMASH!";
                color = "#ff4757";
                this.shakeScreen(15);
                this.spawnParticles(this.birdie.x, this.birdie.y, color, 20);
            } else if (char.swingType === 'lob') {
                // [절대 아웃나지 않는 초고도 클리어 궤적 적용]
                // 아웃 방지를 보강하여 타겟 지점을 항상 상대 안방 한가운데 안착
                let safeTargetX = char.dir === -1 ? COURT_RIGHT - rand(40, 100) : COURT_LEFT + rand(40, 100);
                let dx = safeTargetX - this.birdie.x;
                
                vy = -25; // 더 시원하고 깊은 웅장한 포물선
                vx = dx * 0.0175; // 공기저항을 완벽 연산한 보강 계수
                
                hitText = "CLEAR";
                color = "#2ed573";
                this.spawnParticles(this.birdie.x, this.birdie.y, color, 10);
            } else if (char.swingType === 'under') {
                vx = 12 * faceDir;
                vy = -15; 
                hitText = "UNDER";
                color = "#00cec9"; 
                this.spawnParticles(this.birdie.x, this.birdie.y, color, 10);
            } else { // drive
                vx = 22 * faceDir;
                vy = -3;
                hitText = "DRIVE";
                color = "#feca57";
                this.spawnParticles(this.birdie.x, this.birdie.y, color, 10);
            }

            this.birdie.vx = vx;
            this.birdie.vy = vy;
            this.texts.push(new FloatingText(this.birdie.x, this.birdie.y - 30, hitText, color));
        }
    }

    update() {
        if (this.state === STATE.MENU || this.state === STATE.SHOP || this.state === STATE.MATCH_OVER) return;

        if (this.shakeTimer > 0) this.shakeTimer--;

        this.player.updateInput();
        this.player.update();
        
        this.ai.updateLogic(this.birdie);
        this.ai.update();

        if (this.state === STATE.SERVE) {
            let hx = this.server.x + (this.server.dir === -1 ? 25 : -25);
            this.birdie.x = hx;
            this.birdie.y = this.server.y - 30;
        }

        this.birdie.update();

        this.checkHit(this.player);
        this.checkHit(this.ai);

        if (this.state === STATE.PLAYING && this.birdie.y > FLOOR_Y) {
            this.birdie.y = FLOOR_Y;
            this.birdie.vy = -this.birdie.vy * 0.3; 
            this.birdie.vx *= 0.5;

            let pointWinner;
            const leftOut = this.birdie.x < 50;
            const rightOut = this.birdie.x > CW - 50;

            if (leftOut || rightOut) {
                this.texts.push(new FloatingText(this.birdie.x, this.birdie.y - 50, "OUT!", "#ff7f50", 50));
                if (this.birdie.vx > 0) {
                    pointWinner = this.playerSide === -1 ? this.ai : this.player;
                } else {
                    pointWinner = this.playerSide === 1 ? this.ai : this.player;
                }
            } else {
                if (this.birdie.x < NET_X) {
                    pointWinner = this.playerSide === -1 ? this.ai : this.player;
                } else {
                    pointWinner = this.playerSide === 1 ? this.ai : this.player;
                }
            }

            this.addScore(pointWinner);
        }

        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update();
            if (this.particles[i].life <= 0) this.particles.splice(i, 1);
        }
        for (let i = this.texts.length - 1; i >= 0; i--) {
            this.texts[i].update();
            if (this.texts[i].life <= 0) this.texts.splice(i, 1);
        }

        if (this.msgTimer > 0) {
            this.msgTimer--;
            if (this.msgTimer <= 0) {
                if (this.state === STATE.SCORE_WAIT) {
                    this.readyServe(this.server);
                } else if (this.state === STATE.SET_OVER) {
                    if (this.sets.p >= 2 || this.sets.a >= 2) {
                        this.state = STATE.MATCH_OVER;
                        showMatchResult();
                    } else {
                        this.playerSide *= -1;
                        this.startSet();
                    }
                }
            }
        }
    }

    draw() {
        ctx.clearRect(0, 0, CW, CH);

        ctx.save();
        if (this.shakeTimer > 0) {
            let dx = rand(-5, 5) * (this.shakeTimer/15);
            let dy = rand(-5, 5) * (this.shakeTimer/15);
            ctx.translate(dx, dy);
        }

        let bgGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_Y);
        bgGrad.addColorStop(0, '#1a1a2e');
        bgGrad.addColorStop(1, '#16213e');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, CW, CH);

        // 경기장 바닥
        ctx.fillStyle = '#cf9963';
        ctx.fillRect(0, FLOOR_Y, CW, CH - FLOOR_Y);

        ctx.fillStyle = '#fff';
        ctx.fillRect(50, FLOOR_Y, CW - 100, 5);
        ctx.fillRect(NET_X - 2, FLOOR_Y, 4, 10); 
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(0, FLOOR_Y + 5, CW, 15);

        // 네트 기둥 및 메쉬
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(NET_X, FLOOR_Y);
        ctx.lineTo(NET_X, FLOOR_Y - NET_HEIGHT);
        ctx.stroke();

        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.fillRect(NET_X - 2, FLOOR_Y - NET_HEIGHT, 4, NET_HEIGHT);
        
        ctx.fillStyle = '#fff';
        ctx.fillRect(NET_X - 4, FLOOR_Y - NET_HEIGHT, 8, 10);

        this.drawShadow(this.player.x, FLOOR_Y, 30);
        this.drawShadow(this.ai.x, FLOOR_Y, 30);
        if(this.birdie.active) this.drawShadow(this.birdie.x, FLOOR_Y, 10 + (FLOOR_Y - this.birdie.y)*0.02);

        this.player.draw(ctx);
        this.ai.draw(ctx);
        this.birdie.draw(ctx);

        this.particles.forEach(p => p.draw(ctx));
        this.texts.forEach(t => t.draw(ctx));

        ctx.restore(); 

        this.drawHUD();
    }

    drawShadow(x, y, radius) {
        let safeRadius = Math.max(0, radius);
        if (safeRadius === 0) return;
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.scale(1, 0.2);
        ctx.arc(x, y / 0.2, safeRadius, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }

    drawHUD() {
        if (this.state === STATE.MENU) return;

        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.beginPath();
        ctx.roundRect(CW/2 - 200, 20, 400, 80, 15);
        ctx.fill();

        ctx.font = "bold 40px 'Black Han Sans', sans-serif";
        ctx.textAlign = "center";
        
        ctx.fillStyle = '#00f2fe';
        ctx.fillText(this.score.p, CW/2 - 100, 75);
        
        ctx.fillStyle = '#ff4757';
        ctx.fillText(this.score.a, CW/2 + 100, 75);

        ctx.fillStyle = '#fff';
        ctx.font = "bold 20px 'Noto Sans KR', sans-serif";
        ctx.fillText(`SET ${this.sets.p + this.sets.a + 1}`, CW/2, 45);
        
        let drawSetCircle = (x, y, won) => {
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, Math.PI*2);
            ctx.fillStyle = won ? '#ffd700' : 'rgba(255,255,255,0.2)';
            ctx.fill();
        };

        drawSetCircle(CW/2 - 60, 65, this.sets.p >= 1);
        drawSetCircle(CW/2 - 40, 65, this.sets.p >= 2);
        
        drawSetCircle(CW/2 + 40, 65, this.sets.a >= 1);
        drawSetCircle(CW/2 + 60, 65, this.sets.a >= 2);

        ctx.fillStyle = '#ffd700';
        ctx.font = "bold 24px 'Black Han Sans', sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(`💰 ${playerGold} G`, 20, 40);
    }

    shakeScreen(amount) {
        this.shakeTimer = amount;
    }

    spawnParticles(x, y, color, count) {
        for(let i=0; i<count; i++) {
            this.particles.push(new Particle(x, y, color));
        }
    }
}

let game = new Game();

function loop() {
    game.update();
    game.draw();
    requestAnimationFrame(loop);
}

function startGame() {
    document.getElementById('menu-ui').classList.add('hidden');
    game.startMatch();
}

function showUIMessage(text) {
    let msgEl = document.getElementById('msg-overlay');
    msgEl.innerText = text;
    msgEl.classList.add('show');
    setTimeout(() => {
        msgEl.classList.remove('show');
    }, 2000);
}

function showMatchResult() {
    let resultUI = document.getElementById('result-ui');
    let isWin = game.sets.p >= 2;
    
    document.getElementById('result-title').innerText = isWin ? "MATCH WIN!" : "MATCH LOSE...";
    document.getElementById('result-title').style.color = isWin ? "#00f2fe" : "#ff4757";
    document.getElementById('result-score').innerText = `${game.sets.p} : ${game.sets.a}`;
    
    let bonus = isWin ? 200 : 50;
    playerGold += bonus;
    document.getElementById('result-gold-earned').innerText = `+ ${bonus} G 획득!`;

    resultUI.classList.remove('hidden');
}

function enterShop() {
    document.getElementById('result-ui').classList.add('hidden');
    document.getElementById('shop-ui').classList.remove('hidden');
    game.state = STATE.SHOP;
    updateShopUI();
}

function updateShopUI() {
    document.getElementById('shop-gold').innerText = `💰 ${playerGold} G`;

    for (let key in stats) {
        let stat = stats[key];
        document.getElementById(`lv-${key}`).innerText = `Lv. ${stat.level}`;
        
        let btn = document.getElementById(`btn-up-${key}`);
        if (stat.level >= stat.max) {
            btn.innerText = "MAX";
            btn.disabled = true;
        } else {
            let cost = getStatCost(key);
            btn.innerText = `${cost} G`;
            btn.disabled = playerGold < cost;
        }
    }
}

function upgradeStat(statName) {
    let stat = stats[statName];
    let cost = getStatCost(statName);
    
    if (playerGold >= cost && stat.level < stat.max) {
        playerGold -= cost;
        stat.level++;
        updateShopUI();
    }
}

function nextMatch() {
    document.getElementById('shop-ui').classList.add('hidden');
    if (game.sets.p >= 2 && aiLevel < 10) aiLevel++;
    game.startMatch();
}

requestAnimationFrame(loop);
</script>
