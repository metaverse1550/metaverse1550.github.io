<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Tennis Championship 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            cursor: crosshair;
            outline: none;
        }

        /* Overlay Styles */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 2rem;
            color: #4cd137;
            text-shadow: 0 0 10px rgba(76, 209, 55, 0.5), 0 4px 8px rgba(0, 0, 0, 0.8);
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            width: 280px;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #2fd516 0%, #1db008 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(47, 213, 22, 0.4);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #444 0%, #222 100%);
        }

        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.1);
        }

        .difficulty-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px;
            border-radius: 8px;
        }

        .diff-btn {
            flex: 1;
            padding: 0.6rem;
            border: none;
            background: transparent;
            color: #ccc;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .diff-btn.active {
            background: #4cd137;
            color: #000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* In-game HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .scoreboard {
            align-self: flex-start;
            background: rgba(10, 15, 25, 0.85);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 12px 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .scoreboard table {
            border-collapse: collapse;
            color: #fff;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .scoreboard th {
            padding: 2px 10px;
            text-align: center;
            color: #888;
            font-size: 0.8rem;
        }

        .scoreboard td {
            padding: 6px 12px;
            text-align: center;
            font-weight: bold;
        }

        .scoreboard .player-name {
            text-align: left;
            color: #4cd137;
            font-family: sans-serif;
            width: 100px;
        }

        .scoreboard .server-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #fbc531;
            border-radius: 50%;
            margin-left: 5px;
        }

        .hud-left {
            position: absolute;
            top: 100px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 0.9rem;
            border-left: 3px solid #4cd137;
        }

        .hud-right {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #aaa;
        }

        /* 하단에서 상단으로 보낸 상태 메시지 안내문 */
        .hud-top-msg {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 8px 25px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fbc531;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 하단 자막 안내를 상단 우측으로 배치 */
        .controls-hint {
            position: absolute;
            top: 60px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.78rem;
            color: #ccc;
            line-height: 1.35;
            border-right: 3px solid #4cd137;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" tabindex="0"></canvas>

        <!-- HUD -->
        <div id="hud">
            <div class="scoreboard">
                <table>
                    <thead>
                        <tr>
                            <th>PLAYER</th>
                            <th>SET</th>
                            <th>GAME</th>
                            <th>SCORE</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="player-name">PLAYER <span id="p1-serve" class="server-dot"></span></td>
                            <td id="p1-sets">0</td>
                            <td id="p1-games">0</td>
                            <td id="p1-score" style="color:#4cd137;">0</td>
                        </tr>
                        <tr>
                            <td class="player-name">AI <span id="p2-serve" class="server-dot" style="display:none;"></span></td>
                            <td id="p2-sets">0</td>
                            <td id="p2-games">0</td>
                            <td id="p2-score" style="color:#e1b12c;">0</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="hud-left">
                난이도: <span id="hud-difficulty" style="color:#4cd137; font-weight:bold;">Normal</span>
            </div>

            <div class="hud-right">
                [ESC] 또는 [P] : 일시정지
            </div>

            <div id="status-msg" class="hud-top-msg">
                READY
            </div>

            <div class="controls-hint">
                <b>조작법:</b><br>
                WASD / 방향키: 이동<br>
                스페이스바: 다이빙<br>
                마우스 위치: 타격 방향<br>
                좌클릭: 기본 / 우클릭: 강한 스윙
            </div>
        </div>

        <!-- 메인 메뉴 -->
        <div id="main-menu" class="overlay">
            <h1>Pro Tennis 3D</h1>
            <div style="margin-bottom: 1.5rem; text-align: center;">
                <label style="color:#aaa; font-size:0.9rem; display:block; margin-bottom:8px;">난이도 설정</label>
                <div class="difficulty-selector">
                    <button class="diff-btn" onclick="setDifficulty(event, 'Easy')">EASY</button>
                    <button class="diff-btn active" onclick="setDifficulty(event, 'Normal')">NORMAL</button>
                    <button class="diff-btn" onclick="setDifficulty(event, 'Hard')">HARD</button>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="startGame()">Start Match</button>
            </div>
        </div>

        <!-- 일시정지 메뉴 -->
        <div id="pause-menu" class="overlay hidden">
            <h1>PAUSED</h1>
            <div class="btn-group">
                <button class="btn" onclick="resumeGame()">Resume</button>
                <button class="btn btn-secondary" onclick="restartMatch()">Restart Match</button>
                <button class="btn btn-secondary" onclick="showMainMenu()">Main Menu</button>
            </div>
        </div>

        <!-- Game Over Overlay -->
        <div id="gameover-menu" class="overlay hidden">
            <h1 id="gameover-title">VICTORY!</h1>
            <p id="gameover-desc" style="margin-bottom:2rem; font-size:1.2rem; color:#ddd;"></p>
            <div class="btn-group">
                <button class="btn" onclick="restartMatch()">Play Again</button>
                <button class="btn btn-secondary" onclick="showMainMenu()">Main Menu</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Sound & Audio Manager (Web Audio API)
         */
        class AudioManager {
            constructor() {
                this.ctx = null;
                this.initialized = false;
            }

            init() {
                if (this.initialized) return;
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                    this.initialized = true;
                } catch(e) {
                    console.warn("AudioContext not supported");
                }
            }

            playHit(power = 1.0) {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(140 * power, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.08);

                gain.gain.setValueAtTime(0.8 * power, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);

                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.start(now);
                osc.stop(now + 0.08);
            }

            playBounce() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(70, now + 0.05);

                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);

                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.start(now);
                osc.stop(now + 0.05);
            }

            playNet() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                const bufferSize = this.ctx.sampleRate * 0.1;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;

                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(800, now);

                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);

                noise.start(now);
            }

            playScore() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.1);

                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);

                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.start(now);
                osc.stop(now + 0.3);
            }
        }

        const audio = new AudioManager();

        /**
         * Court Dimensions & Constants
         */
        const COURT = {
            width: 20.0,         
            singlesWidth: 15.0,  
            length: 34.0,        
            halfLength: 17.0,
            serviceLineDist: 9.5,
            netHeight: 0.914,    
            netLineWidth: 0.05
        };

        /**
         * 3D Camera System
         */
        class Camera {
            constructor() {
                this.x = 0;
                this.y = 15.0;     
                this.z = -36.0;    
                this.fov = 500;     
                this.pitch = 0.45;  

                this.shakeAmount = 0;
            }

            update(targetX, targetZ, ballY) {
                this.x += (targetX * 0.3 - this.x) * 0.1;
                
                const targetY = 15.0 + Math.max(0, ballY - 1.0) * 0.08;
                this.y += (targetY - this.y) * 0.08;

                if (this.shakeAmount > 0) {
                    this.shakeAmount *= 0.85;
                    if (this.shakeAmount < 0.01) this.shakeAmount = 0;
                }
            }

            shake(intensity) {
                this.shakeAmount = intensity;
            }

            project(x, y, z, canvasWidth, canvasHeight) {
                const sx = (Math.random() - 0.5) * this.shakeAmount;
                const sy = (Math.random() - 0.5) * this.shakeAmount;

                let rx = x - (this.x + sx);
                let ry = y - (this.y + sy);
                let rz = z - this.z;

                const cosP = Math.cos(this.pitch);
                const sinP = Math.sin(this.pitch);

                let y1 = ry * cosP - rz * sinP;
                let z1 = ry * sinP + rz * cosP;

                if (z1 <= 0.1) z1 = 0.1;

                const scale = this.fov / z1;
                const px = canvasWidth / 2 + rx * scale;
                const py = canvasHeight * 0.05 - y1 * scale;

                return { x: px, y: py, scale: scale, depth: z1 };
            }
        }

        /**
         * Physics Engine
         */
        class Ball {
            constructor() {
                this.reset();
                this.radius = 0.13;
                this.trail = [];
            }

            reset(x = 0, y = 1.2, z = -10) {
                this.x = x;
                this.y = y;
                this.z = z;
                this.vx = 0;
                this.vy = 0;
                this.vz = 0;
                this.spin = 0;
                this.bounceCount = 0;
                this.lastHitter = null;
                this.trail = [];
                this.inAir = true;
                this.outOfBounds = false;
            }

            update(dt) {
                if (!this.inAir || dt <= 0) return;

                const gravity = 14.0;
                this.vy -= gravity * dt;

                const drag = 0.10 * dt;
                this.vx *= (1 - drag);
                this.vz *= (1 - drag);

                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.z += this.vz * dt;

                this.trail.push({ x: this.x, y: this.y, z: this.z });
                if (this.trail.length > 12) this.trail.shift();

                if (this.y <= this.radius) {
                    this.y = this.radius;
                    
                    if (this.vy < 0) {
                        this.vy = -this.vy * 0.65;
                    }
                    
                    this.vz *= 0.88;
                    this.vx *= 0.88;

                    this.bounceCount++;
                    audio.playBounce();

                    effectManager.addDust(this.x, 0, this.z);

                    if (Math.abs(this.vy) < 0.6) {
                        this.vy = 0;
                    }
                }

                if (Math.abs(this.z) < 0.25 && this.y < COURT.netHeight) {
                    if (Math.abs(this.x) < COURT.width / 2) {
                        this.vz = -this.vz * 0.2;
                        this.vx *= 0.3;
                        this.vy = Math.min(this.vy, 1.0) * 0.5;
                        audio.playNet();
                        effectManager.addNetRipple();
                    }
                }
            }
        }

        /**
         * Input Handler
         */
        class Input {
            constructor() {
                this.keys = {};
                this.mouse = { x: 0, y: 0, left: false, right: false, clicked: false, rightClicked: false };

                window.addEventListener('keydown', e => {
                    this.keys[e.code] = true;
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                        e.preventDefault();
                    }
                });
                
                window.addEventListener('keyup', e => {
                    this.keys[e.code] = false;
                });

                window.addEventListener('mousemove', e => {
                    const rect = canvas.getBoundingClientRect();
                    this.mouse.x = e.clientX - rect.left;
                    this.mouse.y = e.clientY - rect.top;
                });

                window.addEventListener('mousedown', e => {
                    audio.init();
                    if (e.button === 0) {
                        this.mouse.left = true;
                        this.mouse.clicked = true;
                    } else if (e.button === 2) {
                        this.mouse.right = true;
                        this.mouse.rightClicked = true;
                    }
                });

                window.addEventListener('mouseup', e => {
                    if (e.button === 0) this.mouse.left = false;
                    if (e.button === 2) this.mouse.right = false;
                });

                window.addEventListener('contextmenu', e => e.preventDefault());
            }

            clearFrame() {
                this.mouse.clicked = false;
                this.mouse.rightClicked = false;
            }
        }

        /**
         * Player & AI Base Class
         */
        class Character {
            constructor(x, z, isAI = false) {
                this.x = x;
                this.y = 0;
                this.z = z;
                this.speed = 12.0;
                this.isAI = isAI;
                this.width = 0.8;
                this.height = 1.8;
                this.swingCooldown = 0;
                this.animState = 'idle';
                
                this.isDiving = false;
                this.diveTimer = 0;
                this.diveDirX = 0;
                this.diveDirZ = 0;
                this.diveCooldown = 0;
            }

            update(dt) {
                if (this.swingCooldown > 0) {
                    this.swingCooldown -= dt;
                    if (this.swingCooldown <= 0) {
                        this.animState = 'idle';
                    }
                }

                if (this.diveCooldown > 0) {
                    this.diveCooldown -= dt;
                }
            }
        }

        class Player extends Character {
            constructor() {
                super(0, -COURT.halfLength + 1.5, false);
            }

            handleInput(input, dt) {
                super.update(dt);

                let moveX = 0;
                let moveZ = 0;

                if (input.keys['KeyA'] || input.keys['ArrowLeft']) moveX -= 1;
                if (input.keys['KeyD'] || input.keys['ArrowRight']) moveX += 1;
                if (input.keys['KeyW'] || input.keys['ArrowUp']) moveZ += 1;
                if (input.keys['KeyS'] || input.keys['ArrowDown']) moveZ -= 1;

                if (moveX !== 0 && moveZ !== 0) {
                    moveX *= 0.7071;
                    moveZ *= 0.7071;
                }

                if (input.keys['Space'] && !this.isDiving && this.diveCooldown <= 0) {
                    this.isDiving = true;
                    this.diveTimer = 0.28;
                    this.diveCooldown = 0.8;

                    if (moveX === 0 && moveZ === 0) {
                        this.diveDirX = 0;
                        this.diveDirZ = 1;
                    } else {
                        this.diveDirX = moveX;
                        this.diveDirZ = moveZ;
                    }

                    this.animState = 'diving';
                    effectManager.addDust(this.x, 0, this.z);
                }

                if (this.isDiving) {
                    this.diveTimer -= dt;
                    const diveSpeed = 16.0;
                    this.x += this.diveDirX * diveSpeed * dt;
                    this.z += this.diveDirZ * diveSpeed * dt;

                    if (Math.random() < 0.4) {
                        effectManager.addDust(this.x, 0, this.z);
                    }

                    if (this.diveTimer <= 0) {
                        this.isDiving = false;
                        this.animState = 'idle';
                    }
                } else {
                    this.x += moveX * this.speed * dt;
                    this.z += moveZ * this.speed * dt;

                    if (moveX !== 0 || moveZ !== 0) {
                        if (this.animState === 'idle') this.animState = 'running';
                    } else if (this.animState === 'running') {
                        this.animState = 'idle';
                    }
                }

                const maxW = COURT.width / 2 + 3;
                this.x = Math.max(-maxW, Math.min(maxW, this.x));
                this.z = Math.max(-COURT.halfLength - 4, Math.min(-0.5, this.z));
            }

            swing(isPower, ball, camera, canvasWidth, input) {
                if (this.swingCooldown > 0) return false;

                this.swingCooldown = 0.35;
                
                const aimFactor = (input.mouse.x / canvasWidth - 0.5) * 2;
                const targetX = aimFactor * (COURT.singlesWidth / 2 - 0.5);
                const targetZ = COURT.halfLength - 3.5;

                const dx = ball.x - this.x;
                const dz = ball.z - this.z;
                const dist = Math.sqrt(dx * dx + dz * dz);

                if (!this.isDiving) {
                    this.animState = dx >= 0 ? 'swing_forehand' : 'swing_backhand';
                }

                const reachDist = this.isDiving ? 4.0 : 3.2;

                if (dist < reachDist && Math.abs(this.z - ball.z) < (this.isDiving ? 2.8 : 2.5) && ball.y < 3.8) {
                    const powerMultiplier = isPower ? 1.3 : 0.82;
                    const flightTime = isPower ? 0.58 : 0.95; 
                    
                    ball.vx = (targetX - ball.x) / flightTime;
                    ball.vz = (targetZ - ball.z) / flightTime;
                    ball.vy = isPower ? 5.5 : 5.2;

                    ball.lastHitter = 'player';
                    ball.bounceCount = 0;

                    audio.playHit(powerMultiplier);
                    effectManager.addHitFlash(ball.x, ball.y, ball.z);
                    camera.shake(isPower ? 0.3 : 0.1);

                    return true;
                }
                return false;
            }
        }

        class AIPlayer extends Character {
            constructor() {
                super(0, COURT.halfLength - 1.5, true);
                this.difficulty = 'Normal';
                this.targetX = 0;
                this.targetZ = COURT.halfLength - 1.5;
                this.reactionError = 0;
            }

            setDifficulty(diff) {
                this.difficulty = diff;
                switch (diff) {
                    case 'Easy':
                        this.speed = 9.5;
                        this.reactionError = 0.6;
                        break;
                    case 'Normal':
                        this.speed = 12.5;
                        this.reactionError = 0.2;
                        break;
                    case 'Hard':
                        this.speed = 15.5;
                        this.reactionError = 0.0;
                        break;
                }
            }

            updateAI(ball, dt) {
                super.update(dt);

                if (ball.vz > -2.0) {
                    let predictedX = ball.x;
                    if (ball.vz > 0.1) {
                        const timeToReach = (this.z - ball.z) / ball.vz;
                        predictedX = ball.x + ball.vx * timeToReach;
                    }
                    
                    predictedX += (Math.sin(Date.now() * 0.005) * this.reactionError);

                    this.targetX = Math.max(-COURT.width / 2, Math.min(COURT.width / 2, predictedX));
                    this.targetZ = Math.max(2.0, Math.min(COURT.halfLength + 2.0, ball.z + 0.6));
                } else {
                    this.targetX = 0;
                    this.targetZ = COURT.halfLength - 1.5;
                }

                const dx = this.targetX - this.x;
                const dz = this.targetZ - this.z;
                const dist = Math.sqrt(dx * dx + dz * dz);

                if (dist > 0.2) {
                    this.x += (dx / dist) * this.speed * dt;
                    this.z += (dz / dist) * this.speed * dt;
                    if (this.swingCooldown <= 0) this.animState = 'running';
                } else if (this.swingCooldown <= 0) {
                    this.animState = 'idle';
                }

                if (ball.vz > -1.0 && Math.abs(ball.z - this.z) < 2.8 && Math.abs(ball.x - this.x) < 3.2 && ball.y < 4.0) {
                    this.swing(ball);
                }
            }

            swing(ball) {
                if (this.swingCooldown > 0) return;

                this.swingCooldown = 0.35;
                const dx = ball.x - this.x;
                this.animState = dx >= 0 ? 'swing_forehand' : 'swing_backhand';

                const targetX = (Math.random() > 0.5 ? 1 : -1) * (COURT.singlesWidth / 2 - 1.5);
                const targetZ = -COURT.halfLength + 4.0;

                const flightTime = 0.82;

                ball.vx = (targetX - ball.x) / flightTime;
                ball.vz = (targetZ - ball.z) / flightTime;
                ball.vy = 5.5;

                ball.lastHitter = 'ai';
                ball.bounceCount = 0;

                audio.playHit(1.0);
                effectManager.addHitFlash(ball.x, ball.y, ball.z);
            }
        }

        /**
         * Effect & Particle Manager
         */
        class EffectManager {
            constructor() {
                this.particles = [];
                this.pool = [];
                for (let i = 0; i < 120; i++) {
                    this.pool.push({ x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0, life: 0, maxLife: 1, size: 1, color: '#fff', active: false });
                }
                this.flashes = [];
            }

            getParticle() {
                let p = this.pool.find(p => !p.active);
                if (!p) {
                    p = { x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0, life: 0, maxLife: 1, size: 1, color: '#fff', active: false };
                    this.pool.push(p);
                }
                p.active = true;
                return p;
            }

            addDust(x, y, z) {
                for (let i = 0; i < 8; i++) {
                    const p = this.getParticle();
                    p.x = x; p.y = y + 0.05; p.z = z;
                    p.vx = (Math.random() - 0.5) * 2;
                    p.vy = Math.random() * 1.5 + 0.5;
                    p.vz = (Math.random() - 0.5) * 2;
                    p.life = 0;
                    p.maxLife = 0.35;
                    p.size = 0.08;
                    p.color = '#c2a649';
                }
            }

            addHitFlash(x, y, z) {
                this.flashes.push({ x, y, z, life: 0.15, maxLife: 0.15 });
            }

            addNetRipple() {}

            update(dt) {
                for (let p of this.pool) {
                    if (p.active) {
                        p.life += dt;
                        if (p.life >= p.maxLife) {
                            p.active = false;
                        } else {
                            p.x += p.vx * dt;
                            p.y += p.vy * dt;
                            p.z += p.vz * dt;
                            p.vy -= 4.0 * dt;
                        }
                    }
                }

                for (let i = this.flashes.length - 1; i >= 0; i--) {
                    this.flashes[i].life -= dt;
                    if (this.flashes[i].life <= 0) this.flashes.splice(i, 1);
                }
            }

            draw(ctx, camera, cw, ch) {
                for (let p of this.pool) {
                    if (p.active) {
                        const pos = camera.project(p.x, p.y, p.z, cw, ch);
                        const alpha = 1 - (p.life / p.maxLife);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, p.size * pos.scale, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                for (let f of this.flashes) {
                    const pos = camera.project(f.x, f.y, f.z, cw, ch);
                    const alpha = f.life / f.maxLife;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 25 * (pos.scale / 20), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
                ctx.globalAlpha = 1.0;
            }
        }

        const effectManager = new EffectManager();

        /**
         * Main Game Engine Controller
         */
        class Game {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.camera = new Camera();
                this.input = new Input();
                this.ball = new Ball();
                this.player = new Player();
                this.ai = new AIPlayer();

                this.state = 'MENU';
                this.server = 'player';

                this.scores = {
                    p1: 0, p2: 0,
                    gamesP1: 0, gamesP2: 0,
                    setsP1: 0, setsP2: 0
                };

                this.statusMsg = "READY";
                this.lastTime = 0;

                this.resize();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            startNewMatch() {
                this.scores = { p1: 0, p2: 0, gamesP1: 0, gamesP2: 0, setsP1: 0, setsP2: 0 };
                this.server = 'player';
                this.resetPoint();
                this.state = 'SERVING';
                this.updateHUD();
                this.showStatus("YOUR SERVE! Click to Serve");
                this.canvas.focus();
            }

            resetPoint() {
                this.player.x = 0;
                this.player.z = -COURT.halfLength + 1.5;
                this.ai.x = 0;
                this.ai.z = COURT.halfLength - 1.5;

                if (this.server === 'player') {
                    this.ball.reset(0.5, 1.2, this.player.z + 0.5);
                } else {
                    this.ball.reset(-0.5, 1.2, this.ai.z - 0.5);
                }
            }

            showStatus(text, duration = 0) {
                const el = document.getElementById('status-msg');
                el.innerText = text;
                el.classList.remove('hidden');
            }

            updateHUD() {
                const scoreNames = ["0", "15", "30", "40", "AD"];
                
                let p1Text = scoreNames[this.scores.p1] || "40";
                let p2Text = scoreNames[this.scores.p2] || "40";

                if (this.scores.p1 >= 3 && this.scores.p2 >= 3) {
                    if (this.scores.p1 === this.scores.p2) {
                        p1Text = "40";
                        p2Text = "40";
                    } else if (this.scores.p1 === this.scores.p2 + 1) {
                        p1Text = "AD";
                        p2Text = "40";
                    } else if (this.scores.p2 === this.scores.p1 + 1) {
                        p1Text = "40";
                        p2Text = "AD";
                    }
                }

                document.getElementById('p1-score').innerText = p1Text;
                document.getElementById('p2-score').innerText = p2Text;
                document.getElementById('p1-games').innerText = this.scores.gamesP1;
                document.getElementById('p2-games').innerText = this.scores.gamesP2;
                document.getElementById('p1-sets').innerText = this.scores.setsP1;
                document.getElementById('p2-sets').innerText = this.scores.setsP2;

                document.getElementById('p1-serve').style.display = this.server === 'player' ? 'inline-block' : 'none';
                document.getElementById('p2-serve').style.display = this.server === 'ai' ? 'inline-block' : 'none';
            }

            awardPoint(winner) {
                this.state = 'POINT_OVER';
                audio.playScore();

                if (winner === 'player') {
                    this.scores.p1++;
                    this.showStatus("POINT PLAYER!");
                } else {
                    this.scores.p2++;
                    this.showStatus("POINT AI!");
                }

                let gameWon = false;
                if (this.scores.p1 >= 4 && this.scores.p1 >= this.scores.p2 + 2) {
                    this.scores.gamesP1++;
                    gameWon = true;
                    this.showStatus("GAME PLAYER!");
                } else if (this.scores.p2 >= 4 && this.scores.p2 >= this.scores.p1 + 2) {
                    this.scores.gamesP2++;
                    gameWon = true;
                    this.showStatus("GAME AI!");
                }

                if (gameWon) {
                    this.scores.p1 = 0;
                    this.scores.p2 = 0;
                    this.server = this.server === 'player' ? 'ai' : 'player';

                    if (this.scores.gamesP1 >= 6 && this.scores.gamesP1 >= this.scores.gamesP2 + 2) {
                        this.scores.setsP1++;
                        this.scores.gamesP1 = 0;
                        this.scores.gamesP2 = 0;
                    } else if (this.scores.gamesP2 >= 6 && this.scores.gamesP2 >= this.scores.gamesP1 + 2) {
                        this.scores.setsP2++;
                        this.scores.gamesP1 = 0;
                        this.scores.gamesP2 = 0;
                    }
                }

                this.updateHUD();

                setTimeout(() => {
                    if (this.scores.setsP1 >= 1) {
                        this.endGame(true);
                    } else if (this.scores.setsP2 >= 1) {
                        this.endGame(false);
                    } else {
                        this.resetPoint();
                        this.state = 'SERVING';
                        if (this.server === 'player') {
                            this.showStatus("YOUR SERVE! Click to Serve");
                        } else {
                            this.showStatus("AI SERVING...");
                            setTimeout(() => this.aiServe(), 1000);
                        }
                    }
                }, 1600);
            }

            aiServe() {
                if (this.state !== 'SERVING' || this.server !== 'ai') return;
                this.ball.reset(0, 1.8, this.ai.z - 0.2);
                this.ball.vx = (Math.random() - 0.5) * 2;
                this.ball.vz = -20.0;
                this.ball.vy = 5.5;
                this.ball.lastHitter = 'ai';
                this.state = 'RALLY';
                this.showStatus("RALLY!");
                audio.playHit(1.2);
            }

            endGame(isVictory) {
                this.state = 'GAMEOVER';
                document.getElementById('gameover-menu').classList.remove('hidden');
                document.getElementById('gameover-title').innerText = isVictory ? "VICTORY!" : "DEFEAT";
                document.getElementById('gameover-title').style.color = isVictory ? "#4cd137" : "#e74c3c";
                document.getElementById('gameover-desc').innerText = isVictory ? 
                    "축하합니다! 경기에서 승리하셨습니다." : "아쉽게 패배했습니다. 다시 도전해보세요!";
            }

            update(dt) {
                if (this.input.keys['Escape'] || this.input.keys['KeyP']) {
                    this.input.keys['Escape'] = false;
                    this.input.keys['KeyP'] = false;
                    if (this.state === 'RALLY' || this.state === 'SERVING') {
                        pauseGame();
                    }
                }

                if (this.state === 'PAUSED' || this.state === 'MENU' || this.state === 'GAMEOVER') return;

                this.player.handleInput(this.input, dt);

                this.ai.updateAI(this.ball, dt);

                if (this.state === 'SERVING' && this.server === 'player') {
                    this.ball.x = this.player.x + 0.3;
                    this.ball.z = this.player.z + 0.4;
                    this.ball.y = 1.2;

                    if (this.input.mouse.clicked || this.input.mouse.rightClicked) {
                        const isPower = this.input.mouse.rightClicked;
                        this.player.swing(isPower, this.ball, this.camera, this.canvas.width, this.input);
                        this.state = 'RALLY';
                        this.showStatus("RALLY!");
                    }
                }

                if (this.state === 'RALLY') {
                    if (this.input.mouse.clicked) {
                        this.player.swing(false, this.ball, this.camera, this.canvas.width, this.input);
                    } else if (this.input.mouse.rightClicked) {
                        this.player.swing(true, this.ball, this.camera, this.canvas.width, this.input);
                    }

                    this.ball.update(dt);

                    this.checkRules();
                }

                effectManager.update(dt);
                this.camera.update(this.player.x, this.player.z, this.ball.y);

                this.input.clearFrame();
            }

            checkRules() {
                if (this.ball.bounceCount >= 2) {
                    if (this.ball.lastHitter === 'player') {
                        this.awardPoint('player');
                    } else {
                        this.awardPoint('ai');
                    }
                    return;
                }

                if (this.ball.bounceCount === 1 && !this.ball.outOfBounds) {
                    const halfW = COURT.singlesWidth / 2;
                    const halfL = COURT.halfLength;

                    if (Math.abs(this.ball.x) > halfW || Math.abs(this.ball.z) > halfL) {
                        this.ball.outOfBounds = true;
                        if (this.ball.lastHitter === 'player') {
                            this.awardPoint('ai');
                        } else {
                            this.awardPoint('player');
                        }
                    }
                }
            }

            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                const cw = this.canvas.width;
                const ch = this.canvas.height;

                this.drawBackground(cw, ch);
                this.drawCourt(cw, ch);
                this.drawShadows(cw, ch);

                const objects = [
                    { type: 'player', z: this.player.z, draw: () => this.drawCharacter(this.player, false) },
                    { type: 'ai', z: this.ai.z, draw: () => this.drawCharacter(this.ai, true) },
                    { type: 'ball', z: this.ball.z, draw: () => this.drawBall(cw, ch) },
                    { type: 'net', z: 0, draw: () => this.drawNet(cw, ch) }
                ];

                objects.sort((a, b) => b.z - a.z);

                for (let obj of objects) {
                    obj.draw();
                }

                effectManager.draw(this.ctx, this.camera, cw, ch);
            }

            drawBackground(cw, ch) {
                const grad = this.ctx.createLinearGradient(0, 0, 0, ch);
                grad.addColorStop(0, '#1a2a3a');
                grad.addColorStop(0.5, '#2c3e50');
                grad.addColorStop(1, '#0f171e');
                this.ctx.fillStyle = grad;
                this.ctx.fillRect(0, 0, cw, ch);

                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
                for (let i = 0; i < cw; i += 20) {
                    this.ctx.fillRect(i, 0, 10, ch * 0.3);
                }
            }

            drawCourt(cw, ch) {
                const proj = (x, y, z) => this.camera.project(x, y, z, cw, ch);

                const outW = COURT.width / 2 + 5;
                const outL = COURT.halfLength + 6;
                const p1 = proj(-outW, 0, -outL);
                const p2 = proj(outW, 0, -outL);
                const p3 = proj(outW, 0, outL);
                const p4 = proj(-outW, 0, outL);

                this.ctx.fillStyle = '#2980b9';
                this.ctx.beginPath();
                this.ctx.moveTo(p1.x, p1.y);
                this.ctx.lineTo(p2.x, p2.y);
                this.ctx.lineTo(p3.x, p3.y);
                this.ctx.lineTo(p4.x, p4.y);
                this.ctx.fill();

                const cW = COURT.width / 2;
                const cL = COURT.halfLength;
                const cp1 = proj(-cW, 0, -cL);
                const cp2 = proj(cW, 0, -cL);
                const cp3 = proj(cW, 0, cL);
                const cp4 = proj(-cW, 0, cL);

                this.ctx.fillStyle = '#27ae60';
                this.ctx.beginPath();
                this.ctx.moveTo(cp1.x, cp1.y);
                this.ctx.lineTo(cp2.x, cp2.y);
                this.ctx.lineTo(cp3.x, cp3.y);
                this.ctx.lineTo(cp4.x, cp4.y);
                this.ctx.fill();

                this.ctx.strokeStyle = '#ffffff';
                this.ctx.lineWidth = Math.max(1.5, 3 * (cp1.scale / 30));

                const drawLine3D = (x1, z1, x2, z2) => {
                    const a = proj(x1, 0, z1);
                    const b = proj(x2, 0, z2);
                    this.ctx.beginPath();
                    this.ctx.moveTo(a.x, a.y);
                    this.ctx.lineTo(b.x, b.y);
                    this.ctx.stroke();
                };

                drawLine3D(-cW, -cL, cW, -cL);
                drawLine3D(-cW, cL, cW, cL);
                drawLine3D(-cW, -cL, -cW, cL);
                drawLine3D(cW, -cL, cW, cL);

                const sW = COURT.singlesWidth / 2;
                drawLine3D(-sW, -cL, -sW, cL);
                drawLine3D(sW, -cL, sW, cL);

                const sD = COURT.serviceLineDist;
                drawLine3D(-sW, -sD, sW, -sD);
                drawLine3D(-sW, sD, sW, sD);

                drawLine3D(0, -sD, 0, sD);
            }

            drawNet(cw, ch) {
                const proj = (x, y, z) => this.camera.project(x, y, z, cw, ch);
                const nw = COURT.width / 2 + 0.5;
                const nh = COURT.netHeight;

                const bottomL = proj(-nw, 0, 0);
                const bottomR = proj(nw, 0, 0);
                const topL = proj(-nw, nh, 0);
                const topR = proj(nw, nh, 0);

                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
                this.ctx.beginPath();
                this.ctx.moveTo(bottomL.x, bottomL.y);
                this.ctx.lineTo(bottomR.x, bottomR.y);
                this.ctx.lineTo(topR.x, topR.y);
                this.ctx.lineTo(topL.x, topL.y);
                this.ctx.fill();

                this.ctx.strokeStyle = '#ffffff';
                this.ctx.lineWidth = Math.max(2, 4 * (topL.scale / 30));
                this.ctx.beginPath();
                this.ctx.moveTo(topL.x, topL.y);
                this.ctx.lineTo(topR.x, topR.y);
                this.ctx.stroke();

                this.ctx.strokeStyle = '#111';
                this.ctx.lineWidth = Math.max(3, 6 * (topL.scale / 30));
                this.ctx.beginPath();
                this.ctx.moveTo(bottomL.x, bottomL.y);
                this.ctx.lineTo(topL.x, topL.y);
                this.ctx.moveTo(bottomR.x, bottomR.y);
                this.ctx.lineTo(topR.x, topR.y);
                this.ctx.stroke();
            }

            drawShadows(cw, ch) {
                const proj = (x, y, z) => this.camera.project(x, y, z, cw, ch);

                const drawEllipseShadow = (x, z, radiusX, radiusZ, alpha = 0.4) => {
                    const pos = proj(x, 0, z);
                    this.ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
                    this.ctx.beginPath();
                    this.ctx.ellipse(pos.x, pos.y, radiusX * pos.scale, radiusZ * pos.scale, 0, 0, Math.PI * 2);
                    this.ctx.fill();
                };

                drawEllipseShadow(this.player.x, this.player.z, 0.6, 0.3, 0.45);
                drawEllipseShadow(this.ai.x, this.ai.z, 0.6, 0.3, 0.45);

                const ballShadowScale = Math.max(0.1, 0.25 - this.ball.y * 0.04);
                const shadowAlpha = Math.max(0.1, 0.5 - this.ball.y * 0.1);
                drawEllipseShadow(this.ball.x, this.ball.z, ballShadowScale, ballShadowScale * 0.5, shadowAlpha);
            }

            drawCharacter(char, isAI) {
                const proj = (x, y, z) => this.camera.project(x, y, z, this.canvas.width, this.canvas.height);
                const pos = proj(char.x, char.y, char.z);

                const h = char.height * pos.scale;
                const w = char.width * pos.scale;

                this.ctx.save();
                this.ctx.translate(pos.x, pos.y);

                if (char.animState === 'diving') {
                    const rotAngle = (char.diveDirX >= 0 ? 1 : -1) * 0.6;
                    this.ctx.rotate(rotAngle);
                }

                const bodyColor = isAI ? '#e74c3c' : '#2ecc71';
                const skinColor = '#f1c40f';

                let swingOffset = 0;
                if (char.animState === 'swing_forehand') swingOffset = 25;
                if (char.animState === 'swing_backhand') swingOffset = -25;

                this.ctx.fillStyle = skinColor;
                this.ctx.beginPath();
                this.ctx.arc(0, -h * 0.88, w * 0.25, 0, Math.PI * 2);
                this.ctx.fill();

                this.ctx.fillStyle = bodyColor;
                this.ctx.fillRect(-w * 0.3, -h * 0.75, w * 0.6, h * 0.45);

                this.ctx.fillStyle = '#34495e';
                this.ctx.fillRect(-w * 0.25, -h * 0.3, w * 0.2, h * 0.3);
                this.ctx.fillRect(w * 0.05, -h * 0.3, w * 0.2, h * 0.3);

                this.ctx.strokeStyle = '#f39c12';
                this.ctx.lineWidth = Math.max(2, 3 * (pos.scale / 30));
                this.ctx.beginPath();
                this.ctx.moveTo(0, -h * 0.6);
                const racketX = (w * 0.6) + swingOffset;
                const racketY = -h * 0.5;
                this.ctx.lineTo(racketX, racketY);
                this.ctx.stroke();

                this.ctx.strokeStyle = '#e67e22';
                this.ctx.beginPath();
                this.ctx.arc(racketX + 10, racketY - 10, w * 0.22, 0, Math.PI * 2);
                this.ctx.stroke();

                this.ctx.restore();
            }

            drawBall(cw, ch) {
                for (let i = 0; i < this.ball.trail.length; i++) {
                    const pt = this.ball.trail[i];
                    const pos = this.camera.project(pt.x, pt.y, pt.z, cw, ch);
                    const alpha = (i / this.ball.trail.length) * 0.4;
                    this.ctx.fillStyle = `rgba(241, 196, 15, ${alpha})`;
                    this.ctx.beginPath();
                    this.ctx.arc(pos.x, pos.y, this.ball.radius * pos.scale * 0.7, 0, Math.PI * 2);
                    this.ctx.fill();
                }

                const pos = this.camera.project(this.ball.x, this.ball.y, this.ball.z, cw, ch);
                const r = Math.max(2, this.ball.radius * pos.scale);

                this.ctx.fillStyle = '#f1c40f';
                this.ctx.beginPath();
                this.ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
                this.ctx.fill();

                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                this.ctx.beginPath();
                this.ctx.arc(pos.x - r * 0.3, pos.y - r * 0.3, r * 0.3, 0, Math.PI * 2);
                this.ctx.fill();
            }

            loop(timestamp) {
                if (!this.lastTime) this.lastTime = timestamp;
                let dt = (timestamp - this.lastTime) / 1000;
                this.lastTime = timestamp;

                if (dt > 0.05) dt = 0.05;

                this.update(dt);
                this.draw();

                requestAnimationFrame((t) => this.loop(t));
            }
        }

        let game;

        window.onload = () => {
            game = new Game();
            requestAnimationFrame((t) => game.loop(t));
        };

        function setDifficulty(e, diff) {
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            if (e && e.currentTarget) e.currentTarget.classList.add('active');
            if (game && game.ai) game.ai.setDifficulty(diff);
            const hudDiff = document.getElementById('hud-difficulty');
            if (hudDiff) hudDiff.innerText = diff;
        }

        function startGame() {
            document.getElementById('main-menu').classList.add('hidden');
            if (game) game.startNewMatch();
        }

        function pauseGame() {
            if (game) game.state = 'PAUSED';
            document.getElementById('pause-menu').classList.remove('hidden');
        }

        function resumeGame() {
            document.getElementById('pause-menu').classList.add('hidden');
            if (game) {
                game.state = 'RALLY';
                game.canvas.focus();
            }
        }

        function restartMatch() {
            document.getElementById('pause-menu').classList.add('hidden');
            document.getElementById('gameover-menu').classList.add('hidden');
            if (game) game.startNewMatch();
        }

        function showMainMenu() {
            document.getElementById('pause-menu').classList.add('hidden');
            document.getElementById('gameover-menu').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            if (game) game.state = 'MENU';
        }
    </script>
</body>
</html>
