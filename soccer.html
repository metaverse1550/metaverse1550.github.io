<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현실적인 대한민국 승부차기 게임</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111111;
            color: #ffffff;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border-radius: 12px;
            overflow: hidden;
        }
        canvas {
            background: #27ae60;
            display: block;
        }
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 10px;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .score-board {
            display: flex;
            gap: 40px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .score-item { text-align: center; }
        .score-val { font-size: 32px; color: #f1c40f; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .turn-info {
            text-align: right;
            font-size: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.4;
        }
        .status-msg {
            position: absolute;
            top: 38%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 54px;
            font-weight: 900;
            text-shadow: 4px 4px 0px #000;
            text-align: center;
            width: 100%;
            opacity: 0;
            transition: opacity 0.2s ease;
            letter-spacing: 2px;
        }
        .status-msg.show { opacity: 1; }
        .controls-guide {
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.6;
            pointer-events: auto;
            max-width: 300px;
            border-left: 4px solid #e74c3c;
        }
        #gaugeContainer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 24px;
            background: #222;
            border: 2px solid #fff;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #gaugeBar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
            transition: width 0.05s linear;
        }
        #screenMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 10;
        }
        #screenMenu h1 { 
            font-size: 44px; 
            margin-bottom: 15px; 
            color: #f1c40f; 
            text-align: center;
            font-weight: 900;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #screenMenu p { 
            font-size: 18px; 
            margin-bottom: 35px; 
            color: #eeeeee; 
            text-align: center; 
            max-width: 520px; 
            line-height: 1.7;
        }
        .btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }
        .btn:hover { 
            background: #c0392b; 
            transform: translateY(-2px);
        }
        .record-container {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .ball-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #555555;
            display: inline-block;
        }
        .ball-icon.success { background: #2ecc71; position: relative; }
        .ball-icon.success::after { content: '✓'; color: #fff; font-size: 10px; position: absolute; top:-2px; left:3px; font-weight: bold;}
        .ball-icon.fail { background: #e74c3c; position: relative; }
        .ball-icon.fail::after { content: '✗'; color: #fff; font-size: 10px; position: absolute; top:-2px; left:4px; font-weight: bold;}
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="uiOverlay">
        <div class="hud">
            <div class="score-board">
                <div class="score-item">
                    <div style="color: #e74c3c;">대한민국 (KICKER)</div>
                    <div class="score-val" id="pScore">0</div>
                    <div class="record-container" id="pRecord"></div>
                </div>
                <div class="score-item">
                    <div style="color: #3498db;">원정팀 (KEEPER)</div>
                    <div class="score-val" id="aScore">0</div>
                    <div class="record-container" id="aRecord"></div>
                </div>
            </div>
            <div class="turn-info" id="turnDisplay">
                라운드: 1 / 5<br>
                현재 차례: PLAYER 슛
            </div>
        </div>

        <div class="status-msg" id="statusMsg">GOAL!</div>

        <div style="display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none;">
            <div class="controls-guide" id="controlsGuide">
                <strong>[조작법 - 공격]</strong><br>
                방향키: 조준선 이동<br>
                D 키 누르기: 게이지 충전<br>
                D 키 떼기: 슛 발사
            </div>
            <div id="gaugeContainer">
                <div id="gaugeBar"></div>
            </div>
            <div style="width:300px;"></div> 
        </div>
    </div>

    <div id="screenMenu">
        <h1 id="menuTitle">KOREA 승부차기 챔피언십</h1>
        <p id="menuDesc">대한민국 축구 국가대표팀 유니폼과 정밀해진 탄도 물리엔진을 탑재했습니다. 5번의 슛팅 대결을 치른 후 서든데스가 진행됩니다.</p>
        <button class="btn" id="startBtn">게임 시작</button>
    </div>
</div>

<script>
const CANVAS_WIDTH = 800;
const CANVAS_HEIGHT = 600;

const STATE_MENU = 0;
const STATE_READY = 1;
const STATE_CHARGING = 2;
const STATE_KICKED = 3;
const STATE_GOALKEEPING = 4; 
const STATE_RESULT = 5;
const STATE_GAMEOVER = 6;

// 입력 인터페이스 캐싱
const DOM = {
    pScore: document.getElementById('pScore'),
    aScore: document.getElementById('aScore'),
    pRecord: document.getElementById('pRecord'),
    aRecord: document.getElementById('aRecord'),
    turnDisplay: document.getElementById('turnDisplay'),
    statusMsg: document.getElementById('statusMsg'),
    controlsGuide: document.getElementById('controlsGuide'),
    gaugeContainer: document.getElementById('gaugeContainer'),
    gaugeBar: document.getElementById('gaugeBar'),
    screenMenu: document.getElementById('screenMenu'),
    menuTitle: document.getElementById('menuTitle'),
    menuDesc: document.getElementById('menuDesc'),
    startBtn: document.getElementById('startBtn')
};

class Input {
    constructor() {
        this.keys = {};
        window.addEventListener('keydown', e => { this.keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { this.keys[e.key.toLowerCase()] = false; });
    }
    isPressed(key) { return !!this.keys[key.toLowerCase()]; }
}

class Ball {
    constructor() {
        this.defaultX = CANVAS_WIDTH / 2;
        this.defaultY = 480;
        this.defaultZ = 0; 
        this.reset();
        this.radius = 12;
    }
    reset() {
        this.x = this.defaultX;
        this.y = this.defaultY;
        this.z = this.defaultZ;
        this.vx = 0;
        this.vy = 0;
        this.vz = 0;
        this.friction = 0.985;
        this.gravity = 0.28; // 사실적인 낙하를 위한 기본 중력
        this.isDead = false;
        this.scale = 1;
        this.isInNet = false;
    }
    update() {
        if (this.isDead) return;

        this.x += this.vx;
        this.y += this.vy;
        this.z += this.vz;

        if (this.isInNet) {
            // 그물망 내부 마찰 및 포획 연출 (매우 빠른 감속)
            this.vx *= 0.82;
            this.vy *= 0.82;
            
            // 공이 튕겨 위로 날아가는 정도를 현격히 줄임
            if (this.vz > 0) {
                this.vz *= 0.25; 
            }
            
            // 그물 내 중력 가속도를 대폭 늘려(기존 대비 6배) 화면 전환 전 완전히 떨어지도록 함
            this.vz -= this.gravity * 2.8;

            // 골대 안쪽 뒷그물 한계선(Y=215)에 부드럽게 안착
            if (this.y < 215) {
                this.y = 215;
                this.vx = 0;
                this.vy = 0;
            } 

            // 옆그물 충돌 및 정지 판정 설계
            let netDepthProgress = Math.max(0, Math.min(1, (260 - this.y) / 45));
            let sideNetLeftLimit = 220 + 27 * netDepthProgress;
            let sideNetRightLimit = 580 - 27 * netDepthProgress;

            if (this.x < sideNetLeftLimit) {
                this.x = sideNetLeftLimit;
                this.vx = 0;
                this.vy *= 0.5;
            }
            if (this.x > sideNetRightLimit) {
                this.x = sideNetRightLimit;
                this.vx = 0;
                this.vy *= 0.5;
            }

            // 그물망 내부에서는 바운드(지면 튕김)를 아예 제로(0)로 두어 즉각 정지하도록 설계
            if (this.z < 0) {
                this.z = 0;
                this.vz = 0; 
                this.vx = 0;
                this.vy = 0;
            }
        } else {
            // 가상 Z축 중력 물리 (비행 상태)
            if (this.z > 0 || this.vz !== 0) {
                this.vz -= this.gravity;
            }

            // 지면 충돌 (그물망 외의 바닥 바운드)
            if (this.z < 0) {
                this.z = 0;
                this.vz = -this.vz * 0.45; // 탄성 묵직하게 바운드
                if (Math.abs(this.vz) < 0.4) this.vz = 0;
            }

            // 바닥 마찰력
            if (this.z === 0) {
                this.vx *= this.friction;
                this.vy *= this.friction;
            }
        }

        // 원근 비율 연산
        this.scale = Math.max(0.55, 1 - (this.defaultY - this.y) * 0.001);
    }
    draw(ctx) {
        let currentRadius = this.radius * this.scale;
        let drawY = this.y - this.z;

        // 볼 쉐도우
        ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
        ctx.beginPath();
        ctx.ellipse(this.x, this.y, currentRadius, currentRadius * 0.45, 0, 0, Math.PI * 2);
        ctx.fill();

        // 메인 공 구체
        ctx.fillStyle = '#ffffff';
        ctx.strokeStyle = '#2c3e50';
        ctx.lineWidth = 2.5 * this.scale;
        ctx.beginPath();
        ctx.arc(this.x, drawY, currentRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        // 3D 패턴 묘사
        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.arc(this.x, drawY, currentRadius * 0.35, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Goal {
    constructor() {
        this.left = 220;
        this.right = 580;
        this.top = 130;
        this.bottom = 260; 
        this.depth = 60; 
    }
    
    // 그물망 및 신규 설계된 옆그물 렌더링
    drawNet(ctx) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
        ctx.lineWidth = 1.5;

        // 세로 그물망 3D 입체 표현 및 옆그물 골조 뼈대
        for (let i = this.left; i <= this.right; i += 18) {
            ctx.beginPath();
            let i_back = i - (i - CANVAS_WIDTH/2) * 0.15;
            let top_back = this.top - this.depth; // Y = 70
            let bottom_back = this.bottom - this.depth + 15; // Y = 215 (바닥 깊이)

            ctx.moveTo(i, this.top);
            ctx.lineTo(i_back, top_back);
            ctx.lineTo(i_back, bottom_back);
            ctx.stroke();
        }

        // 가로 그물망 뒷그물망 세밀 묘사
        for (let y = this.top - this.depth; y <= this.bottom - this.depth + 15; y += 15) {
            ctx.beginPath();
            let left_back = this.left - (this.left - CANVAS_WIDTH/2) * 0.15;
            let right_back = this.right - (this.right - CANVAS_WIDTH/2) * 0.15;
            ctx.moveTo(left_back, y);
            ctx.lineTo(right_back, y);
            ctx.stroke();
        }

        // 옆그물 (Side Nets) 촘촘한 그물망 디자인
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
        ctx.lineWidth = 1.0;

        // 좌측 옆그물 가로 라인 그리기
        let left_back_x = this.left - (this.left - CANVAS_WIDTH/2) * 0.15;
        for (let ratio = 0.1; ratio < 0.9; ratio += 0.2) {
            ctx.beginPath();
            let x_front = this.left;
            let y_front = this.top + (this.bottom - this.top) * ratio;
            let x_back = left_back_x;
            let y_back = (this.top - this.depth) + ((this.bottom - this.depth + 15) - (this.top - this.depth)) * ratio;
            ctx.moveTo(x_front, y_front);
            ctx.lineTo(x_back, y_back);
            ctx.stroke();
        }

        // 우측 옆그물 가로 라인 그리기
        let right_back_x = this.right - (this.right - CANVAS_WIDTH/2) * 0.15;
        for (let ratio = 0.1; ratio < 0.9; ratio += 0.2) {
            ctx.beginPath();
            let x_front = this.right;
            let y_front = this.top + (this.bottom - this.top) * ratio;
            let x_back = right_back_x;
            let y_back = (this.top - this.depth) + ((this.bottom - this.depth + 15) - (this.top - this.depth)) * ratio;
            ctx.moveTo(x_front, y_front);
            ctx.lineTo(x_back, y_back);
            ctx.stroke();
        }
    }

    // 주 골대 백색 포스트 프레임 렌더링 (공보다 앞에 겹쳐 그려짐)
    drawFrame(ctx) {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(this.left, this.bottom);
        ctx.lineTo(this.left, this.top);
        ctx.lineTo(this.right, this.top);
        ctx.lineTo(this.right, this.bottom);
        ctx.stroke();

        // 바닥 백색 골라인
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, this.bottom);
        ctx.lineTo(CANVAS_WIDTH, this.bottom);
        ctx.stroke();
    }

    checkGoal(ball) {
        if (ball.y <= this.bottom && ball.y >= this.top - this.depth) {
            if (ball.x >= this.left && ball.x <= this.right && ball.z <= (this.bottom - this.top)) {
                return true;
            }
        }
        return false;
    }
}

class GoalKeeper {
    constructor() {
        this.width = 44;
        this.height = 74;
        this.reset();
    }
    reset() {
        this.x = CANVAS_WIDTH / 2;
        this.y = 250; 
        this.vx = 0;
        this.vy = 0;
        this.state = 'idle'; 
        this.diveTimer = 0;
        this.diveDirX = 0;
        this.diveDirY = 0;
        // AI 프리킥 대기 셔플용 가상 타겟
        this.shuffleTargetX = CANVAS_WIDTH / 2;
    }
    update(input, isAI, ball, gameState) {
        if (this.state === 'idle') {
            if (!isAI) {
                // 플레이어가 제어하는 키퍼 - AI 키퍼 속도 수준에 맞추어 좌우 이동 속도 너프 (8.5 -> 6.0)
                if (input.isPressed('ArrowLeft')) this.vx = -6.0;
                else if (input.isPressed('ArrowRight')) this.vx = 6.0;
                else this.vx = 0;

                // 수비 다이빙 커맨드
                if (input.isPressed('d')) {
                    if (input.isPressed('ArrowLeft')) this.startDive(-1, -0.3);
                    else if (input.isPressed('ArrowRight')) this.startDive(1, -0.3);
                    else if (input.isPressed('ArrowUp')) this.startDive(0, -0.85);
                }
            } else {
                // AI가 제어하는 키퍼
                if (gameState === STATE_READY || gameState === STATE_CHARGING) {
                    // [대기 셔플 모션 고도화] 킥 하기 전에도 끊임없이 좌우 스텝을 밟으며 움직임
                    if (Math.abs(this.x - this.shuffleTargetX) < 15 || Math.random() < 0.03) {
                        // 골대 안 중앙부 (260px ~ 540px) 범위에서 새로운 셔플 타겟 설정
                        this.shuffleTargetX = CANVAS_WIDTH / 2 + (Math.random() - 0.5) * 160;
                    }
                    let dir = this.shuffleTargetX > this.x ? 1 : -1;
                    this.vx = dir * 4.5; // 민첩하고 긴장감 넘치는 잔발 스텝 속도
                } else if (gameState === STATE_KICKED) {
                    if (ball.y < 390 && ball.vy < 0) {
                        let targetX = ball.x;
                        let diffX = targetX - this.x;
                        
                        if (Math.abs(diffX) > 15) {
                            let dir = diffX > 0 ? 1 : -1;
                            // 선방(다이빙 감행) 확률은 여전히 철저히 5%로 고정!
                            if (Math.random() < 0.05) {
                                let divY = (ball.z > 40) ? -0.65 : -0.15;
                                this.startDive(dir, divY);
                            } else {
                                this.vx = dir * 6.0; // AI 키퍼의 일반 좌우 복귀/이동 속도를 플레이어 수준인 6.0으로 대등하게 맞춤
                            }
                        }
                    }
                }
            }
            this.x += this.vx;

            // 골라인 가동 한계 제한
            if (this.x < 205) this.x = 205;
            if (this.x > 595) this.x = 595;

        } else if (this.state === 'diving') {
            this.x += this.diveDirX * 10.5; // 속도 증가에 비례하여 다이빙 전진력 소폭 보정
            this.y += this.diveDirY * 5.5;
            this.diveTimer--;
            
            if (this.diveTimer <= 0) {
                this.state = 'stunned';
                this.diveTimer = 40; 
            }
        } else if (this.state === 'stunned') {
            this.y += (250 - this.y) * 0.12;
            this.diveTimer--;
            if (this.diveTimer <= 0) {
                this.state = 'idle';
                this.y = 250;
                this.shuffleTargetX = this.x; // 복귀 후 셔플 타겟 리셋
            }
        }
    }
    startDive(dirX, dirY) {
        this.state = 'diving';
        this.diveDirX = dirX;
        this.diveDirY = dirY;
        this.diveTimer = 18; 
    }
    draw(ctx, isKorea) {
        ctx.save();
        ctx.translate(this.x, this.y);

        if (this.state === 'diving') {
            let angle = this.diveDirX * Math.PI * 0.35;
            if (this.diveDirX === 0) angle = Math.PI * 0.0;
            ctx.rotate(angle);
        } else if (this.state === 'stunned') {
            ctx.rotate(this.diveDirX * Math.PI * 0.5);
        }

        // 대한민국 GK: 화사한 네온 옐로우 수비 유니폼
        let jerseyColor = isKorea ? '#f1c40f' : '#2ecc71';
        let shortsColor = isKorea ? '#111111' : '#27ae60';
        let socksColor = isKorea ? '#f1c40f' : '#2ecc71';
        let skinColor = '#ffdbac';
        let gloveColor = '#111111';

        // 1. 다리 및 스타킹 렌더링
        ctx.fillStyle = skinColor;
        ctx.fillRect(-10, 0, 6, 20);
        ctx.fillRect(4, 0, 6, 20);
        ctx.fillStyle = socksColor;
        ctx.fillRect(-10, 8, 6, 12);
        ctx.fillRect(4, 8, 6, 12);

        // 2. 축구화
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(-12, 17, 9, 4);
        ctx.fillRect(3, 17, 9, 4);

        // 3. 하의
        ctx.fillStyle = shortsColor;
        ctx.fillRect(-12, -8, 24, 10);

        // 4. 상의
        ctx.fillStyle = jerseyColor;
        ctx.fillRect(-14, -45, 28, 38);

        ctx.fillStyle = '#222';
        ctx.fillRect(-5, -45, 10, 4);

        // 5. 골키퍼 장갑 및 팔 렌더링
        ctx.fillStyle = jerseyColor;
        if (this.state === 'diving') {
            ctx.fillRect(-22, -42, 8, 20);
            ctx.fillRect(14, -42, 8, 20);
            ctx.fillStyle = gloveColor;
            ctx.fillRect(-24, -22, 10, 6);
            ctx.fillRect(14, -22, 10, 6);
        } else {
            ctx.fillRect(-20, -42, 6, 18);
            ctx.fillRect(14, -42, 6, 18);
            ctx.fillStyle = gloveColor;
            ctx.fillRect(-21, -26, 8, 8);
            ctx.fillRect(13, -26, 8, 8);
        }

        // 6. 머리 및 머리카락
        ctx.fillStyle = skinColor;
        ctx.beginPath();
        ctx.arc(0, -54, 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.arc(0, -56, 10, Math.PI, 0);
        ctx.fill();

        // 7. 가슴 좌측 태극 문양
        if (isKorea) {
            ctx.fillStyle = '#2980b9';
            ctx.beginPath();
            ctx.arc(5, -34, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(5, -34, 3, Math.PI, 0);
            ctx.fill();
        }

        ctx.restore();
    }
    getBB() {
        if (this.state === 'diving') {
            return {
                minX: this.x - this.height * 0.75,
                maxX: this.x + this.height * 0.75,
                minY: this.y - this.width * 1.8,
                maxY: this.y + 10
            };
        }
        return {
            minX: this.x - this.width / 2 - 4,
            maxX: this.x + this.width / 2 + 4,
            minY: this.y - this.height - 12,
            maxY: this.y
        };
    }
}

class KickerPlayer {
    constructor() {
        this.isLeftFooted = false;        
        this.name = '';
        this.reset();
    }
    reset(isLeftFooted, name = '') {
        this.isLeftFooted = isLeftFooted !== undefined ? isLeftFooted : (Math.random() < 0.4);
        this.name = name;
        this.x = CANVAS_WIDTH / 2 + (this.isLeftFooted ? 42 : -42);
        this.y = 510;
        this.animFrame = 0;
        this.state = 'idle'; // 'idle', 'running', 'kicking', 'done'
    }
    update(ballState, ballX, ballY) {
        if (ballState === STATE_CHARGING) {
            this.state = 'running';
        } else if (ballState === STATE_KICKED || ballState === STATE_RESULT) {
            if (this.state === 'running') {
                this.state = 'kicking';
                this.animFrame = 0;
            }
            if (this.state === 'kicking') {
                this.animFrame += 0.22;
                if (this.animFrame >= 5) {
                    this.state = 'done';
                }
            }
        }
        
        if (this.state === 'running') {
            let targetX = ballX + (this.isLeftFooted ? 12 : -16);
            let targetY = ballY + 8;
            let dx = targetX - this.x;
            let dy = targetY - this.y;
            this.x += dx * 0.16;
            this.y += dy * 0.16;
        }
    }
    draw(ctx, isKorea) {
        if (this.state === 'done') {
            let returnX = CANVAS_WIDTH / 2 + (this.isLeftFooted ? 75 : -75);
            this.x += (returnX - this.x) * 0.05;
            this.y += (510 - this.y) * 0.05;
        }
        
        ctx.save();
        ctx.translate(this.x, this.y);

        if (this.isLeftFooted) {
            ctx.scale(-1, 1);
        }

        // 국대 홈 유니폼: 빨간색 상의, 파란색 하의, 백색 스타킹
        let shirtColor = isKorea ? '#e74c3c' : '#ffffff';
        let shortsColor = isKorea ? '#2980b9' : '#111111';
        let socksColor = isKorea ? '#ffffff' : '#e74c3c';
        let skinColor = '#ffdbac';

        // [이스터 에그] 포병지 선수가 키커일 때는 전용 골키퍼 형광노랑 유니폼 착용!
        if (isKorea && this.name === '포병지') {
            shirtColor = '#f1c40f'; // 키퍼 상의 (노란색)
            shortsColor = '#111111'; // 키퍼 하의 (검은색)
            socksColor = '#f1c40f'; // 키퍼 스타킹 (노란색)
        }

        // 1. 다리 및 대퇴 묘사
        ctx.fillStyle = skinColor;
        ctx.fillRect(4, 20, 5, 12);
        ctx.fillRect(15, 20, 5, 12);
        ctx.fillStyle = socksColor;
        ctx.fillRect(4, 26, 5, 6);
        ctx.fillRect(15, 26, 5, 6);

        // 검정 축구화
        ctx.fillStyle = '#222';
        ctx.fillRect(2, 31, 8, 4);
        ctx.fillRect(14, 31, 8, 4);

        // 2. 하의 (바지)
        ctx.fillStyle = shortsColor;
        ctx.fillRect(2, 10, 20, 11);

        // 3. 상의 바디
        ctx.fillStyle = shirtColor;
        ctx.fillRect(0, -10, 24, 20);
        ctx.fillRect(-5, -10, 5, 11);
        ctx.fillRect(24, -10, 5, 11);

        // 4. 팔/손목
        ctx.fillStyle = skinColor;
        ctx.fillRect(-5, 1, 4, 5);
        ctx.fillRect(25, 1, 4, 5);

        // [추가 디테일] 포병지는 골키퍼 장갑도 착용
        if (isKorea && this.name === '포병지') {
            ctx.fillStyle = '#111111'; // 검정 키퍼 장갑
            ctx.fillRect(-6, 3, 6, 5);
            ctx.fillRect(24, 3, 6, 5);
        }

        // 5. 머리 및 헤어스타일
        ctx.fillStyle = skinColor;
        ctx.fillRect(8, -14, 8, 5);
        ctx.beginPath();
        ctx.arc(12, -21, 9, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.arc(12, -23, 9, Math.PI, 0);
        ctx.fill();

        // 6. 슛 발사 시 오른다리 스윙 임팩트 각도 조절 기믹
        if (this.state === 'kicking') {
            ctx.fillStyle = shirtColor;
            ctx.save();
            ctx.translate(17, 20);
            ctx.rotate(-this.animFrame * 0.35);
            ctx.fillStyle = skinColor;
            ctx.fillRect(-2, 0, 5, 12);
            ctx.fillStyle = socksColor;
            ctx.fillRect(-2, 6, 5, 6);
            ctx.fillStyle = '#222';
            ctx.fillRect(-4, 11, 8, 4);
            ctx.restore();
        }

        // 7. 국가대표 왼쪽 가슴 태극마크 디테일 (포병지 노란 유니폼에도 적용)
        ctx.fillStyle = '#2980b9';
        ctx.beginPath();
        ctx.arc(17, -2, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.arc(17, -2, 2.5, Math.PI, 0);
        ctx.fill();

        ctx.restore();
    }
}

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.input = new Input();
        
        this.ball = new Ball();
        this.goal = new Goal();
        this.keeper = new GoalKeeper();
        this.kicker = new KickerPlayer();
        
        this.state = STATE_MENU;
        
        this.pScore = 0;
        this.aScore = 0;
        this.round = 1;
        this.isPlayerTurn = true; 
        
        this.pHistory = [];
        this.aHistory = [];
        
        this.shootPower = 0;
        this.maxPower = 22;
        this.aimX = CANVAS_WIDTH / 2;
        this.aimY = 180;
        
        this.aiDelayTimer = 0;
        this.statusTimer = 0;

        // 키커 이름 후보 및 풀 관리 시스템
        this.kickerCandidates = ['소농민', '모른정환', '바캉서', '박쥐성', '삼강인', '김당긴재', '앉을영우', '을용타', '포병지', '황앉은홍', '홍띵보'];
        this.kickerNamePool = [];
        this.kickerCount = 0;
        this.currentKickerName = '';
        this.aiKickerIsLeft = false; // AI 키커의 주발 상태 캐싱
        
        this.initEvents();
    }
    
    initEvents() {
        DOM.startBtn.addEventListener('click', () => {
            if (this.state === STATE_MENU || this.state === STATE_GAMEOVER) {
                this.resetFullGame();
                this.state = STATE_READY;
                DOM.screenMenu.style.display = 'none';
                this.updateDOM();
            }
        });
    }

    // 중복 없는 11명 랜덤 키커 이름 선택기
    getNextKickerName() {
        if (this.kickerNamePool.length === 0) {
            this.kickerNamePool = [...this.kickerCandidates];
        }
        const randomIndex = Math.floor(Math.random() * this.kickerNamePool.length);
        const name = this.kickerNamePool.splice(randomIndex, 1)[0];
        return name;
    }

    resetFullGame() {
        this.pScore = 0;
        this.aScore = 0;
        this.round = 1;
        this.isPlayerTurn = true;
        this.pHistory = [];
        this.aHistory = [];
        
        this.kickerCount = 0;
        this.kickerNamePool = [];
        
        this.resetTurn();
    }

    resetTurn() {
        this.ball.reset();
        this.keeper.reset();
        this.shootPower = 0;
        this.aimX = CANVAS_WIDTH / 2;
        this.aimY = 180;
        
        if (this.isPlayerTurn) {
            this.kickerCount++;
            this.currentKickerName = this.getNextKickerName();

            // [주발 조건 기믹 분기] 삼강인, 을용타는 왼발, 나머지는 오른발
            let isLeft = (this.currentKickerName === '삼강인' || this.currentKickerName === '을용타');
            this.kicker.reset(isLeft, this.currentKickerName);

            DOM.controlsGuide.innerHTML = `<strong>[조작법 - 공격]</strong><br>방향키: 조준선 이동<br>D 키 누르기: 게이지 충전<br>D 키 떼기: 슛 발사`;
        } else {
            // [원정팀 주발 기믹 분기] 상대팀 AI 키커는 완전히 랜덤(50/50)하게 왼발과 오른발을 번갈아 선택
            this.aiKickerIsLeft = Math.random() < 0.5;
            this.kicker.reset(this.aiKickerIsLeft, 'AI');

            DOM.controlsGuide.innerHTML = `<strong>[조작법 - 수비]</strong><br>방향키: 좌우 이동<br>방향키 + D 키: 해당 방향 다이빙`;
        }
        this.updateDOM();
    }

    update() {
        if (this.state === STATE_READY) {
            // 플레이어가 차기 전에도 상대 AI 키퍼가 멈추지 않고 계속 제자리 스텝을 밟도록 세팅
            this.keeper.update(this.input, true, this.ball, this.state);

            if (this.isPlayerTurn) {
                if (this.input.isPressed('ArrowLeft')) this.aimX -= 3;
                if (this.input.isPressed('ArrowRight')) this.aimX += 3;
                if (this.input.isPressed('ArrowUp')) this.aimY -= 2;
                if (this.input.isPressed('ArrowDown')) this.aimY += 2;
                
                this.aimX = Math.max(160, Math.min(640, this.aimX));
                this.aimY = Math.max(105, Math.min(295, this.aimY));

                if (this.input.isPressed('d')) {
                    this.state = STATE_CHARGING;
                    DOM.gaugeContainer.style.display = 'block';
                }
            } else {
                this.state = STATE_GOALKEEPING;
                this.aiDelayTimer = 45 + Math.random() * 35; 
            }
        }
        else if (this.state === STATE_CHARGING) {
            // 게이지 차징 중에도 상대 AI 키퍼는 긴장하며 스텝을 밟음
            this.keeper.update(this.input, true, this.ball, this.state);
            this.kicker.update(this.state, this.ball.x, this.ball.y);

            if (this.input.isPressed('d')) {
                // 게이지 차징
                this.shootPower += 0.55;
                if (this.shootPower > this.maxPower) this.shootPower = this.maxPower;
                DOM.gaugeBar.style.width = `${(this.shootPower / this.maxPower) * 100}%`;
            } else {
                this.performPlayerKick();
            }
        }
        else if (this.state === STATE_GOALKEEPING) {
            // AI가 공격하므로 플레이어가 키퍼를 직접 움직여 방어 준비
            this.keeper.update(this.input, false, this.ball, this.state);
            this.aiDelayTimer--;
            if (this.aiDelayTimer <= 0) {
                this.performAiKick();
            }
        }
        else if (this.state === STATE_KICKED) {
            this.ball.update();
            this.kicker.update(this.state, this.ball.x, this.ball.y);
            
            // 핵심 룰 검증: 플레이어가 키커일 때만 AI 골키퍼가 움직임
            this.keeper.update(this.input, this.isPlayerTurn, this.ball, this.state);
            
            this.checkCollisions();
        }
        else if (this.state === STATE_RESULT) {
            this.ball.update();
            this.kicker.update(this.state, this.ball.x, this.ball.y);
            this.keeper.update(this.input, this.isPlayerTurn, this.ball, this.state);
            this.statusTimer--;
            if (this.statusTimer <= 0) {
                DOM.statusMsg.classList.remove('show');
                this.advanceTurn();
            }
        }
    }

    performPlayerKick() {
        this.state = STATE_KICKED;
        DOM.gaugeContainer.style.display = 'none';
        
        let dx = this.aimX - this.ball.x;
        let dy = 260 - this.ball.y; // 바닥 Y=260 타겟 설정
        let dist = Math.sqrt(dx*dx + dy*dy);
        
        // 정비례 메커니즘: 파워에 선형 비례하여 스피드(S) 설정
        let powerRatio = this.shootPower / this.maxPower; 
        let S = 5.5 + powerRatio * 18.5; // 최소 5.5, 최대 24의 볼 속도
        
        this.ball.vx = (dx / dist) * S;
        this.ball.vy = (dy / dist) * S;
        
        // 조준 높이 비례 포물선 궤적 탄도 연산
        let T = dist / S; 
        let targetZ = Math.max(0, 260 - this.aimY); 
        
        // 탄도 중력 보정 vz 구문 적용 (정밀 타겟 도착)
        this.ball.vz = (targetZ / T) + 0.5 * this.ball.gravity * T;
    }

    performAiKick() {
        this.state = STATE_KICKED;
        
        // 플레이어 수비 난이도 조절: 중앙 방향 위주의 타겟팅 포함
        let targetX;
        let randVal = Math.random();
        if (randVal < 0.35) {
            targetX = 225 + Math.random() * 50; 
        } else if (randVal < 0.70) {
            targetX = 525 + Math.random() * 50; 
        } else {
            targetX = 350 + Math.random() * 100; 
        }
        let targetY = 120 + Math.random() * 90; 
        
        if (Math.random() < 0.12) targetX += (Math.random() - 0.5) * 100; 

        let dx = targetX - this.ball.x;
        let dy = 260 - this.ball.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        
        // AI 킥 속도 최대 강도 소폭 하향 (13 ~ 19 사이의 파워 스케일)
        let aiPwr = 13 + Math.random() * 6; 
        let powerRatio = aiPwr / this.maxPower;
        let S = 5.5 + powerRatio * 15.0; // 유저 골키퍼가 대응할 수 있도록 탄속 부드럽게 조정
        
        this.ball.vx = (dx / dist) * S;
        this.ball.vy = (dy / dist) * S;
        
        let T = dist / S;
        let targetZ = Math.max(0, 260 - targetY);
        this.ball.vz = (targetZ / T) + 0.5 * this.ball.gravity * T;
    }

    checkCollisions() {
        // 1. 골키퍼 충돌 (AABB 감지)
        let kBB = this.keeper.getBB();
        let ballDrawY = this.ball.y - this.ball.z;
        
        if (this.ball.x >= kBB.minX && this.ball.x <= kBB.maxX &&
            ballDrawY >= kBB.minY && ballDrawY <= kBB.maxY && this.ball.vy < 0) {
            
            this.ball.vx = (this.ball.x - this.keeper.x) * 0.35 + (Math.random() - 0.5) * 4.5;
            this.ball.vy = 4 + Math.random() * 4.5;
            this.ball.vz = 2.5 + Math.random() * 3;
            this.triggerResult(false, "KEEPER SAVE!");
            return;
        }

        // 2. 골대 충돌 판정 (포스트 5px, 크로스바 4px 현실적인 초슬림 마진 설계)
        if (this.ball.y <= this.goal.bottom && this.ball.y >= this.goal.top - 20) {
            let ballZHeight = this.ball.z;
            let totalTopHeight = this.goal.bottom - this.goal.top; // 130px

            // 양 기둥 충돌 (좌우 기둥 5px 마진)
            if (Math.abs(this.ball.x - this.goal.left) < 5 || Math.abs(this.ball.x - this.goal.right) < 5) {
                if (ballZHeight <= totalTopHeight) {
                    this.ball.vx = -this.ball.vx * 0.55;
                    this.ball.vy = 4.5;
                    this.triggerResult(false, "HIT THE POST!");
                    return;
                }
            }
            // 크로스바 충돌 (윗대 기둥 4px 마진)
            if (this.ball.x >= this.goal.left && this.ball.x <= this.goal.right) {
                if (Math.abs(ballZHeight - totalTopHeight) < 4) {
                    this.ball.vz = -this.ball.vz * 0.35;
                    this.ball.vy = 4.5;
                    this.triggerResult(false, "HIT THE BAR!");
                    return;
                }
            }
        }

        // 3. 골인 여부 검사
        if (this.ball.vy < 0 && this.ball.y <= this.goal.bottom) {
            if (this.goal.checkGoal(this.ball)) {
                this.ball.isInNet = true; // 그물 진입 플래그 온
                this.triggerResult(true, "GOAL!");
            } else {
                this.triggerResult(false, "MISS!");
            }
        } else if (this.ball.vy === 0 && this.state === STATE_KICKED) {
            this.triggerResult(false, "MISS!");
        }
    }

    triggerResult(isGoal, message) {
        this.state = STATE_RESULT;
        this.statusTimer = 85; 
        
        DOM.statusMsg.innerText = message;
        DOM.statusMsg.className = "status-msg show";
        
        if (this.isPlayerTurn) {
            this.pScore += isGoal ? 1 : 0;
            this.pHistory.push(isGoal);
        } else {
            this.aScore += isGoal ? 1 : 0;
            this.aHistory.push(isGoal);
        }
        this.updateDOM();
    }

    advanceTurn() {
        let maxKicks = 5;
        let pRemaining = Math.max(0, maxKicks - this.pHistory.length);
        let aRemaining = Math.max(0, maxKicks - this.aHistory.length);

        // 수학적 승패 조기 확정
        if (this.pHistory.length <= maxKicks && this.aHistory.length <= maxKicks) {
            if (this.pScore > this.aScore + aRemaining) { this.endGame("대한민국 승리! 🇰🇷"); return; }
            if (this.aScore > this.pScore + pRemaining) { this.endGame("상대팀 승리!"); return; }
        }

        if (!this.isPlayerTurn) {
            if (this.round >= maxKicks) {
                if (this.pScore !== this.aScore) {
                    let winner = this.pScore > this.aScore ? "대한민국 승리! 🇰🇷" : "상대팀 승리!";
                    this.endGame(winner);
                    return;
                } else {
                    this.round++;
                }
            } else {
                this.round++;
            }
        }

        this.isPlayerTurn = !this.isPlayerTurn;
        this.state = STATE_READY;
        this.resetTurn();
    }

    endGame(winnerText) {
        this.state = STATE_GAMEOVER;
        
        // 플레이어 대한민국 팀이 패배했을 때 특수 패배 문구 "홍명보 나가!!!" 노출
        if (this.aScore > this.pScore) {
            DOM.menuTitle.innerText = "홍명보 나가!!!";
            DOM.menuTitle.style.color = "#e74c3c"; // 붉은 색상으로 분노 연출
            DOM.menuDesc.innerText = `최종 스코어 - 대한민국 ${this.pScore} : ${this.aScore} 원정팀\n\n대한민국 축구의 미래를 위해 다시 대결해 보세요!`;
        } else {
            DOM.menuTitle.innerText = winnerText;
            DOM.menuTitle.style.color = "#f1c40f"; // 정상 승리 시 황금색 유지
            DOM.menuDesc.innerText = `최종 스코어 - 대한민국 ${this.pScore} : ${this.aScore} 원정팀\n\n다시 플레이 해보세요!`;
        }
        
        DOM.startBtn.innerText = "다시 하기";
        DOM.screenMenu.style.display = 'flex';
    }

    updateDOM() {
        DOM.pScore.innerText = this.pScore;
        DOM.aScore.innerText = this.aScore;
        
        let roundStr = this.round <= 5 ? `라운드: ${this.round} / 5` : `서든데스 라운드: ${this.round - 5}`;
        
        let turnStr = "";
        if (this.isPlayerTurn) {
            let footStr = this.kicker.isLeftFooted ? " (왼발잡이)" : " (오른발잡이)";
            // "N번 키커: 키커이름"을 HUD 상단 차례 알림 영역에 명확히 표기
            turnStr = `대한민국 슛${footStr}<br><span style="color: #f1c40f; font-weight: bold; font-size: 16px;">[ ${this.kickerCount}번 키커 : ${this.currentKickerName} ]</span>`;
        } else {
            let aiFootStr = this.aiKickerIsLeft ? " (왼발잡이)" : " (오른발잡이)";
            turnStr = `원정팀 슛${aiFootStr} (수비 골키퍼 제어)`;
        }
        
        DOM.turnDisplay.innerHTML = `${roundStr}<br>현재 차례: <strong>${turnStr}</strong>`;

        this.renderHistoryIcons(DOM.pRecord, this.pHistory, this.round);
        this.renderHistoryIcons(DOM.aRecord, this.aHistory, this.round);
    }

    renderHistoryIcons(container, history, currentRound) {
        container.innerHTML = '';
        let totalCount = Math.max(5, currentRound);
        for(let i=0; i<totalCount; i++) {
            let icon = document.createElement('div');
            icon.className = 'ball-icon';
            if(history[i] === true) icon.classList.add('success');
            else if(history[i] === false) icon.classList.add('fail');
            container.appendChild(icon);
        }
    }

    draw() {
        this.ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        
        // 잔디 필드 스트라이프 패턴 구현
        this.ctx.fillStyle = '#27ae60';
        this.ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        this.ctx.fillStyle = '#219a52';
        for(let y = 130; y < CANVAS_HEIGHT; y += 42) {
            if((y/42)%2===0) this.ctx.fillRect(0, y, CANVAS_WIDTH, 42);
        }

        // 전광판 하단 보드
        this.ctx.fillStyle = '#1e272c';
        this.ctx.fillRect(0, 100, CANVAS_WIDTH, 30);
        this.ctx.fillStyle = '#ffffff';
        this.ctx.font = 'bold 11px sans-serif';
        this.ctx.textAlign = 'center';
        this.ctx.fillText("★ 2026 KOREA PENALTY CHAMPIONSHIP ★", CANVAS_WIDTH/2, 119);

        // 패널티 에어리어 호 묘사
        this.ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        this.ctx.lineWidth = 4;
        this.ctx.beginPath();
        this.ctx.arc(CANVAS_WIDTH/2, 480, 60, Math.PI, 0, true);
        this.ctx.stroke();

        // 1. 골대 그물 레이어 및 골라인 먼저 렌더링 (가장 아래에 옆그물 + 뒷그물 조합)
        this.goal.drawNet(this.ctx);

        // 2. 조준 크로스헤어 렌더링
        if (this.isPlayerTurn && (this.state === STATE_READY || this.state === STATE_CHARGING)) {
            this.ctx.strokeStyle = 'rgba(241, 196, 15, 0.7)';
            this.ctx.lineWidth = 2.5;
            this.ctx.beginPath();
            this.ctx.arc(this.aimX, this.aimY, 15, 0, Math.PI*2);
            this.ctx.moveTo(this.aimX - 25, this.aimY); this.ctx.lineTo(this.aimX + 25, this.aimY);
            this.ctx.moveTo(this.aimX, this.aimY - 25); this.ctx.lineTo(this.aimX, this.aimY + 25);
            this.ctx.stroke();
        }

        // 3. 골키퍼 렌더링 (플레이어 턴이면 골키퍼는 AI 원정국가, 아니면 플레이어 한국)
        this.keeper.draw(this.ctx, !this.isPlayerTurn);

        // 4. 키커 모델 렌더링
        if (this.state === STATE_READY || this.state === STATE_CHARGING || this.state === STATE_KICKED || this.state === STATE_RESULT) {
            this.kicker.draw(this.ctx, this.isPlayerTurn);
        }

        // 5. 공 개체 렌더링 (옆그물 제한 처리가 된 공 드로잉)
        this.ball.draw(this.ctx);

        // 6. [레이어 보정] 대한민국 키커 턴일 때 머리 위에 "N번 키커 : 이름" 말풍선 최종 렌더링
        // 공보다 나중에 그리기 때문에 공에 이름표가 가려지지 않고 깔끔하게 표출됩니다.
        if (this.isPlayerTurn && (this.state === STATE_READY || this.state === STATE_CHARGING)) {
            this.ctx.save();
            // 말풍선 배경
            this.ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            this.ctx.strokeStyle = '#e74c3c';
            this.ctx.lineWidth = 1.5;
            
            let tagW = 140;
            let tagH = 24;
            let tagX = this.kicker.x + 12 - tagW / 2; // 키커 몸통 중앙 기준
            let tagY = this.kicker.y - 40;

            this.ctx.beginPath();
            if (this.ctx.roundRect) {
                this.ctx.roundRect(tagX, tagY, tagW, tagH, 5);
            } else {
                this.ctx.rect(tagX, tagY, tagW, tagH);
            }
            this.ctx.fill();
            this.ctx.stroke();

            // 작은 가리키는 삼각형
            this.ctx.beginPath();
            this.ctx.moveTo(this.kicker.x + 12 - 5, tagY + tagH);
            this.ctx.lineTo(this.kicker.x + 12 + 5, tagY + tagH);
            this.ctx.lineTo(this.kicker.x + 12, tagY + tagH + 5);
            this.ctx.closePath();
            this.ctx.fill();
            this.ctx.stroke();

            // 텍스트 출력
            this.ctx.fillStyle = '#ffffff';
            this.ctx.font = 'bold 11px sans-serif';
            this.ctx.textAlign = 'center';
            this.ctx.fillText(`${this.kickerCount}번 키커: ${this.currentKickerName}`, this.kicker.x + 12, tagY + 16);
            this.ctx.restore();
        }

        // 7. 주 백색 골대 프레임 최종 렌더링 (이 프레임이 공과 키퍼 위에 덮어씌워져 입체감 완성)
        this.goal.drawFrame(this.ctx);
    }

    run() {
        const loop = () => {
            this.update();
            this.draw();
            requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
    }
}

// --- 최종 윈도우 마운트 구동 ---
window.onload = () => {
    const game = new Game();
    game.run();
};
</script>
