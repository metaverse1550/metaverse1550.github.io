<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>배드민턴 마스터즈 (Multiplayer Online) - Full Version with Local AI & Mega Shot System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            background-color: #111;
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1280px;
            max-height: 720px;
            aspect-ratio: 16 / 9;
            background-color: #222;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .interactive {
            pointer-events: auto;
        }

        .hidden {
            display: none !important;
        }

        .panel {
            background: rgba(20, 30, 50, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(100, 150, 255, 0.5);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-out;
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 2.5rem;
            color: #ffcc00;
            text-shadow: 2px 2px 0 #cc4400, 4px 4px 0px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .btn {
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 12px 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 150, 255, 0.4);
            transition: all 0.1s;
            font-family: 'Noto Sans KR', sans-serif;
            margin: 8px;
        }

        .input-room {
            padding: 10px 15px;
            font-size: 1.1rem;
            border-radius: 25px;
            border: 2px solid #00f2fe;
            background: #111;
            color: #fff;
            text-align: center;
            outline: none;
            margin-bottom: 10px;
            width: 240px;
        }

        #msg-overlay {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 4rem;
            color: white;
            text-shadow: 4px 4px 0 #000, 0 0 20px rgba(255,255,255,0.5);
            position: absolute;
            top: 40%;
            text-align: center;
            width: 100%;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        #msg-overlay.show {
            opacity: 1;
            transform: scale(1);
        }

        #rotate-notice {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0e1626;
            color: #fff;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        #rotate-notice h2 { font-family: 'Black Han Sans', sans-serif; font-size: 2rem; color: #ffcc00; margin-bottom: 15px; }
        #rotate-notice p { font-size: 1.1rem; line-height: 1.6; color: #ddd; }
        #rotate-notice .icon { font-size: 4rem; margin-bottom: 15px; animation: rotateAnim 2s infinite linear; }
        @keyframes rotateAnim { 0% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } 100% { transform: rotate(90deg); } }

        @media screen and (max-width: 1024px) and (orientation: portrait) {
            #rotate-notice { display: flex; }
            #game-container { display: none !important; }
        }

        #fullscreen-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            padding: 8px 16px;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            z-index: 99;
            pointer-events: auto;
        }

        #mobile-virtual-pad {
            display: none; 
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            pointer-events: none;
            z-index: 90;
        }

        .joystick-container {
            position: absolute;
            bottom: 30px;
            left: 50px;
            width: 130px;
            height: 130px;
            background: rgba(255, 255, 255, 0.08);
            border: 3px solid rgba(255, 255, 255, 0.25);

            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;

        .joystick-handle {

            height: 55px;

            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
            transition: transform 0.05s ease-out;
        }

        .right-pad-zone {
            position: absolute;
            bottom: 15px;
            right: 40px;
            width: 200px;
            height: 200px;
            pointer-events: none;
        }

        .btn-jump-container {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
        }
        .btn-touch-jump {
            width: 65px;
            height: 48px;
            background: rgba(100, 150, 255, 0.35);
            border: 2px solid rgba(100, 150, 255, 0.7);
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;

            display: flex;

        .cross-pad {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 160px;
            pointer-events: none;
        }

        .btn-action {
            position: absolute;
            width: 65px;
            height: 48px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255, 255, 255, 0.35);
            color: #fff;
            font-weight: bold;
            font-size: 0.85rem;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            pointer-events: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-action:active { background: rgba(0, 242, 254, 0.4); border-color: #00f2fe; }

        .btn-clear { top: 0; left: 47.5px; } 
        .btn-drive { top: 56px; right: 0; }  
        .btn-drop { top: 56px; left: 0; }    
        .btn-smash { bottom: 0; left: 47.5px; background: rgba(255, 71, 87, 0.35); border-color: rgba(255, 71, 87, 0.7); color: #ff4757; } 
        .btn-smash:active { background: rgba(255, 50, 50, 0.5); border-color: #ff3333; color: #fff; }

        .btn-touch-mega {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #ffcc00 0%, #ff6600 100%);
            border: 2px solid #fff;
            color: #fff;
            font-size: 1.05rem;
            font-weight: bold;
            font-family: 'Black Han Sans', sans-serif;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
            text-shadow: 1px 1px 2px #000;
            animation: pulseMega 2s infinite;
        }
        .btn-touch-mega.cooling {
            background: rgba(50, 50, 50, 0.85) !important;
            border-color: rgba(255, 255, 255, 0.3);
            color: #777;
            box-shadow: none;
            animation: none;
        }
        @keyframes pulseMega {
            0% { transform: scale(1); box-shadow: 0 0 12px rgba(255, 204, 0, 0.6); }
            50% { transform: scale(1.08); box-shadow: 0 0 20px rgba(255, 204, 0, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 12px rgba(255, 204, 0, 0.6); }
        }

        @media (hover: none) and (pointer: coarse), screen and (max-width: 1024px) {
            #mobile-virtual-pad { display: block; }
        }
    </style>
</head>
<body>

</div>

<script>
const SUPABASE_URL = "https://rxhdzwlymxlcmgibkqaw.supabase.co";
const SUPABASE_KEY = "sb_publishable_MrCEPb2jUVbfxDZ0YosWAQ_zncJkz_f";
const sbClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CW = canvas.width;
const CH = canvas.height;

const GRAVITY = 0.55;
const DRAG = 0.985;
const FLOOR_Y = 620;
const NET_X = CW / 2;
const NET_HEIGHT = 95; 
const COURT_LEFT = 100;
const COURT_RIGHT = CW - 100;

const STATE = { MENU: 0, SERVE: 1, PLAYING: 2, SCORE_WAIT: 3, SET_OVER: 4, MATCH_OVER: 5 };
const NET_SYNC_RATE = 2; 
const NET_BALL_SYNC_RATE = 6; 

let gameSession = null;
let networkRole = null; 
let isConnected = false;
let isLocalSinglePlayer = false; 

let localMegaCooldown = 0; 
let lastMegaTriggerTime = 0;

const keys = {
    w: false, a: false, s: false, d: false, r: false,
    ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
    '1': false, '2': false, '3': false 
};
const keyJustPressed = {};
const keyPressTime = {}; 

window.addEventListener('keydown', (e) => {
    let k_lower = e.key.toLowerCase();
    let k_exact = e.key;

    // 소문자 키(w,a,d)와 대소문자 키(ArrowUp 등)를 모두 지원하도록 수정
    let targetKey = null;
    if (keys.hasOwnProperty(k_lower)) targetKey = k_lower;
    else if (keys.hasOwnProperty(k_exact)) targetKey = k_exact;

    if (targetKey) {
        if (!keys[targetKey]) {
            keyJustPressed[targetKey] = true;
            keyPressTime[targetKey] = Date.now(); 
        }
        keys[targetKey] = true;
    }

    if (k_lower === 'r') {
        triggerMegaShot();
    }
});

window.addEventListener('keyup', (e) => { 
    let k_lower = e.key.toLowerCase();
    let k_exact = e.key;

    if (keys.hasOwnProperty(k_lower)) keys[k_lower] = false;
    if (keys.hasOwnProperty(k_exact)) keys[k_exact] = false;
    
    if (k_lower === 'w') {
        let myChar = (networkRole === 'host') ? game.p1 : game.p2;
        if (myChar) myChar.stopJump();
    }
});

function isJustPressed(key) {
    if (keyJustPressed[key]) { keyJustPressed[key] = false; return true; }
    return false;
}

function toggleFullscreen() {
    let elem = document.getElementById('game-container');
    if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitFullscreen(); 
        else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        document.getElementById('fullscreen-btn').innerText = "[ ⛶ 창모드 ]";
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.msExitFullscreen) document.msExitFullscreen();
        document.getElementById('fullscreen-btn').innerText = "[ ⛶ 전체화면 ]";
    }
}

const SoundEngine = {
    ctx: null,
    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },
    playNormalHit() {
        this.init();
        if (!this.ctx) return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(320, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.03); 

        gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08); 

        osc.start(); osc.stop(this.ctx.currentTime + 0.08);
    },
    playSmashHit() {
        this.init();
        if (!this.ctx) return;
        
        let now = this.ctx.currentTime;

        let osc = this.ctx.createOscillator();
        let gainNode = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(180, now);
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.04);
        gainNode.gain.setValueAtTime(0.8, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.connect(gainNode); gainNode.connect(this.ctx.destination);
        osc.start(); osc.stop(now + 0.15);

        let bufferSize = this.ctx.sampleRate * 0.12; 
        let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }

        let noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        let noiseFilter = this.ctx.createBiquadFilter();
        noiseFilter.type = 'bandpass'; 
        noiseFilter.frequency.setValueAtTime(1000, now);
        noiseFilter.frequency.exponentialRampToValueAtTime(2500, now + 0.08);

        let noiseGain = this.ctx.createGain();
        noiseGain.gain.setValueAtTime(0.3, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);

        noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(this.ctx.destination);
        noise.start(); noise.stop(now + 0.12);
    },
    playMegaAttemptSound() {
        this.init();
        if (!this.ctx) return;
        let now = this.ctx.currentTime;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(); osc.stop(now + 0.3);
    },
    playMegaHit() {
        this.init();
        if (!this.ctx) return;
        let now = this.ctx.currentTime;

        let osc1 = this.ctx.createOscillator();
        let gain1 = this.ctx.createGain();
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(380, now);
        osc1.frequency.exponentialRampToValueAtTime(35, now + 0.45);
        gain1.gain.setValueAtTime(0.95, now);
        gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        
        let osc2 = this.ctx.createOscillator();
        let gain2 = this.ctx.createGain();
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(1300, now);
        osc2.frequency.exponentialRampToValueAtTime(250, now + 0.18);
        gain2.gain.setValueAtTime(0.65, now);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.22);

        let bufferSize = this.ctx.sampleRate * 0.4; 
        let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }

        let noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        let noiseFilter = this.ctx.createBiquadFilter();
        noiseFilter.type = 'bandpass'; 
        noiseFilter.frequency.setValueAtTime(900, now);
        noiseFilter.frequency.exponentialRampToValueAtTime(80, now + 0.35);

        let noiseGain = this.ctx.createGain();
        noiseGain.gain.setValueAtTime(0.85, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);

        let waveShaper = this.ctx.createWaveShaper();
        const makeDistCurve = (amount) => {
            let k = amount, n = 44100, curve = new Float32Array(n), deg = Math.PI / 180;
            for (let i = 0; i < n; ++i) {
                let x = (i * 2) / n - 1;
                curve[i] = (3 + k) * x * 22 * deg / (Math.PI + k * Math.abs(x));
            }
            return curve;
        };
        waveShaper.curve = makeDistCurve(110);
        waveShaper.oversample = '4x';

        osc1.connect(waveShaper);
        osc2.connect(waveShaper);
        waveShaper.connect(gain1);
        gain1.connect(this.ctx.destination);

        noise.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(this.ctx.destination);

        osc1.start(); osc1.stop(now + 0.6);
        osc2.start(); osc2.stop(now + 0.25);
        noise.start(); noise.stop(now + 0.4);
    },
    playScorePoint() {
        this.init();
        if (!this.ctx) return;
        let now = this.ctx.currentTime;
        
        let playTone = (freq, delay, duration) => {
            let osc = this.ctx.createOscillator();
            let gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + delay);
            gain.gain.setValueAtTime(0.25, now + delay);
            gain.gain.exponentialRampToValueAtTime(0.005, now + delay + duration);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(now + delay); osc.stop(now + delay + duration);
        };

        playTone(523.25, 0, 0.15);     
        playTone(659.25, 0.06, 0.15);  
        playTone(783.99, 0.12, 0.35);  
    }
};

function setupMobileJoystickAndPad() {
    const joyContainer = document.getElementById('joy-container');
    const joyHandle = document.getElementById('joy-handle');
    if (!joyContainer || !joyHandle) return;

    let isActive = false;
    let startX = 0;
    let maxDistance = 45; 

    const bindTouchAction = (elemId, keyName) => {
        let el = document.getElementById(elemId);
        if(!el) return;
        el.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(!keys[keyName]) {
                keyJustPressed[keyName] = true;
                keyPressTime[keyName] = Date.now();
            }
            keys[keyName] = true;
        }, {passive: false});
        
        el.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys[keyName] = false;
            
            if (keyName === 'w') {
                let myChar = (networkRole === 'host') ? game.p1 : game.p2;
                if (myChar) myChar.stopJump();
            }
        }, {passive: false});
    };

    bindTouchAction('touch-jump', 'w');
    bindTouchAction('touch-lob', 'ArrowUp');
    bindTouchAction('touch-smash', 'ArrowDown');
    bindTouchAction('touch-drop', 'ArrowLeft');
    bindTouchAction('touch-drive', 'ArrowRight');

    const touchMega = document.getElementById('touch-mega');
    if (touchMega) {
        touchMega.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerMegaShot();
        }, {passive: false});
    }

    joyContainer.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isActive = true;
        let touch = e.touches[0];
        let rect = joyContainer.getBoundingClientRect();
        startX = rect.left + rect.width / 2; 
    }, {passive: false});

    joyContainer.addEventListener('touchmove', (e) => {
        if (!isActive) return;
        e.preventDefault();
        let touch = e.touches[0];
        let deltaX = touch.clientX - startX;

        deltaX = Math.max(-maxDistance, Math.min(maxDistance, deltaX));
        joyHandle.style.transform = `translate(${deltaX}px, 0px)`;

        let ratio = deltaX / maxDistance;     

        if (ratio < -0.3) {
            keys.a = true; keys.d = false;
        } else if (ratio > 0.3) {
            keys.d = true; keys.a = false;
        } else {
            keys.a = false; keys.d = false;
        }
    }, {passive: false});

    const resetJoystick = (e) => {
        if (!isActive) return;
        e.preventDefault();
        isActive = false;
        joyHandle.style.transform = `translate(0px, 0px)`; 
        keys.a = false;
        keys.d = false;
    };

    joyContainer.addEventListener('touchend', resetJoystick, {passive: false});
    joyContainer.addEventListener('touchcancel', resetJoystick, {passive: false});
}

function triggerMegaShot() {
    if (game.state === STATE.MENU || game.state === STATE.MATCH_OVER || game.state === STATE.SCORE_WAIT) return;
    if (game.state === STATE.SERVE) return;
    let myChar = (networkRole === 'host') ? game.p1 : game.p2;
    if (myChar.isSwinging || myChar.hitCooldown > 0) return;
    if (localMegaCooldown > 0) return;

    game.spawnParticles(myChar.x, myChar.y - 45, '#ffd700', 35);
    game.shockwaves.push(new SmashShockwave(myChar.x, myChar.y - 45, '#ffd700', 1.4));
    SoundEngine.playMegaAttemptSound();

    myChar.swing('mega');
    localMegaCooldown = 60 * 1000; 
    lastMegaTriggerTime = Date.now();

    if (networkRole === 'guest') {
        broadcastData('guest_swing_input', { type: 'mega' });
    }
}

function rand(min, max) { return Math.random() * (max - min) + min; }
function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
function getDistance(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = rand(-5, 5); this.vy = rand(-5, 5);
        this.life = 1.0; this.decay = rand(0.02, 0.05);
        this.color = color; this.size = rand(2, 6);
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
    draw(ctx) {
        ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

class DriftParticle {
    constructor(x, y, color, hitterDir) {
        this.x = x + rand(-15, 15);
        this.y = y + rand(-25, 25);
        this.vx = hitterDir * rand(4, 9); 
        this.vy = rand(-2.5, 0.5); 
        this.life = 1.0;
        this.decay = rand(0.015, 0.03); 
        this.color = color;
        this.size = rand(3.5, 7.5);
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.94;
        this.vy *= 0.94;
        this.life -= this.decay;
    }
    draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 12;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

class SmashShockwave {
    constructor(x, y, color = '#ffffff', sizeMultiplier = 1) {
        this.x = x; this.y = y;
        this.radius = 10;
        this.maxRadius = 140 * sizeMultiplier;
        this.life = 1.0;
        this.decay = 0.045 / sizeMultiplier; 
        this.color = color;
    }
    update() {
        this.radius += (this.maxRadius - this.radius) * 0.18;
        this.life -= this.decay;
    }
    draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 5 * this.life; 
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    }
}

class FloatingText {
    constructor(x, y, text, color, size = 30) {
        this.x = x; this.y = y; this.text = text; this.color = color; this.size = size;
        this.life = 1.0; this.vy = -2;
    }
    update() { this.y += this.vy; this.life -= 0.02; }
    draw(ctx) {
        ctx.save(); ctx.globalAlpha = this.life;
        ctx.font = `bold ${this.size}px 'Black Han Sans', sans-serif`;
        ctx.fillStyle = this.color; ctx.strokeStyle = 'black'; ctx.lineWidth = 4;
        
        if (networkRole === 'guest') {
            ctx.scale(-1, 1);
            ctx.strokeText(this.text, -this.x, this.y);
            ctx.fillText(this.text, -this.x, this.y);
        } else {
            ctx.strokeText(this.text, this.x, this.y);
            ctx.fillText(this.text, this.x, this.y);
        }
        ctx.restore();
    }
}

class EmotionBubble {
    constructor(owner, type) {
        this.owner = owner;
        this.type = type; 
        this.life = 1.0;
        this.x = owner.x;
        // [수정] 말풍선 생성 위치를 캐릭터 머리 바로 위로 확 낮춤 (기존 -60 -> -15)
        this.y = owner.y - owner.height - 15; 
        // [수정] 위로 떠오르는 속도를 줄여서 캐릭터 곁에 안정적으로 머물게 함
        this.vy = -0.4; 
        this.bubbleW = 90;
        this.bubbleH = 80;
    }

    update() {
        this.life -= 0.012; 
        this.y += this.vy;
        this.x = this.owner.x + (this.owner.dir === 1 ? -10 : 10);
        if (this.life <= 0) this.life = 0;
    }

    draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.life;
        if (networkRole === 'guest') {
            ctx.translate(CW, 0);
            ctx.scale(-1, 1);
        }
        ctx.translate(this.x, this.y);
        
        let faceDir = this.owner.dir; 
        if (faceDir === 1) { ctx.scale(-1, 1); } 

        // [수정] 물음표 핑을 포함한 모든 이모티콘에 하얀색 말풍선 바탕 공통 적용
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.roundRect(-this.bubbleW/2, -this.bubbleH/2, this.bubbleW, this.bubbleH, 15);
        ctx.fill();
        
        // 말풍선 꼬리
        ctx.beginPath();
        ctx.moveTo(10, this.bubbleH/2);
        ctx.lineTo(25, this.bubbleH/2 + 18);
        ctx.lineTo(0, this.bubbleH/2);
        ctx.fill();

        // 내용 그리기 (타입별)
        ctx.translate(0, -5); 
        if (this.type === 1) this.drawTeemoThumbsUp(ctx); // 1+2
        else if (this.type === 2) this.drawBeeEmoji(ctx);   // 2+3
        else if (this.type === 3) this.drawQuestionPing(ctx); // 1+3

        ctx.restore();
    }

    // 1+2: 티모 따봉 이모티콘 (유저 픽 고퀄리티)
    drawTeemoThumbsUp(ctx) {
        ctx.save();
        ctx.translate(0, 5); // 살짝 아래로 조정
        
        // 뒷배경 노란색 후광
        let glow = ctx.createRadialGradient(0, 0, 5, 0, 0, 40);
        glow.addColorStop(0, 'rgba(255, 255, 150, 0.8)');
        glow.addColorStop(1, 'rgba(255, 255, 150, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.arc(0, 0, 45, 0, Math.PI*2); ctx.fill();

        // 붉은 스카프
        ctx.fillStyle = '#c0392b';
        ctx.beginPath();
        ctx.moveTo(-20, 20); ctx.lineTo(-25, 30); ctx.lineTo(-10, 25);
        ctx.lineTo(0, 32); ctx.lineTo(10, 25); ctx.lineTo(25, 28);
        ctx.lineTo(15, 15); ctx.fill();

        // 얼굴 (살구색)
        ctx.fillStyle = '#e5c3a6';
        ctx.beginPath(); ctx.ellipse(-5, 0, 26, 20, 0, 0, Math.PI*2); ctx.fill();

        // 갈색 무늬 (눈 주위)
        ctx.fillStyle = '#c89e7c';
        ctx.beginPath(); ctx.ellipse(-18, -2, 12, 10, -Math.PI/6, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(8, -2, 12, 10, Math.PI/6, 0, Math.PI*2); ctx.fill();

        // 감은 눈 (웃는 눈 ^ ^)
        ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 3; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.arc(-18, -2, 7, Math.PI*1.1, Math.PI*1.9); ctx.stroke();
        ctx.beginPath(); ctx.arc(8, -2, 7, Math.PI*1.1, Math.PI*1.9); ctx.stroke();

        // 코와 입
        ctx.fillStyle = '#4e342e'; ctx.beginPath(); ctx.ellipse(-5, 5, 4, 2.5, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#4e342e'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-10, 10); ctx.quadraticCurveTo(-5, 15, 0, 10); ctx.stroke();

        // 초록색 모자 챙
        ctx.fillStyle = '#27ae60';
        ctx.beginPath();
        ctx.moveTo(-35, -5); ctx.quadraticCurveTo(-20, -25, -5, -15);
        ctx.quadraticCurveTo(10, -25, 25, -5);
        ctx.quadraticCurveTo(-5, -10, -35, -5); ctx.fill();

        // 빨간 고글 렌즈
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath(); ctx.roundRect(-22, -26, 14, 8, 3); ctx.fill();
        ctx.beginPath(); ctx.roundRect(-2, -26, 14, 8, 3); ctx.fill();
        ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 2;
        ctx.strokeRect(-22, -26, 14, 8); ctx.strokeRect(-2, -26, 14, 8);

        // 따봉 장갑 (초록색)
        ctx.fillStyle = '#2ecc71';
        ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 2;
        ctx.save();
        ctx.translate(22, 15);
        ctx.rotate(-Math.PI/8);
        ctx.beginPath(); ctx.ellipse(0, 0, 12, 15, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke(); // 주먹
        ctx.beginPath(); ctx.moveTo(-5, -10); ctx.quadraticCurveTo(-15, -25, 0, -25); 
        ctx.quadraticCurveTo(8, -25, 5, -10); ctx.fill(); ctx.stroke(); // 엄지
        ctx.restore();

        ctx.restore();
    }

    // 2+3: 꿀잼 꿀벌 이모티콘 (유저 픽 고퀄리티)
    drawBeeEmoji(ctx) {
        ctx.save();
        ctx.translate(0, 5);

        // 몸통 (노란색)
        let bodyGrad = ctx.createRadialGradient(-5, -5, 5, 0, 0, 25);
        bodyGrad.addColorStop(0, '#fff200'); bodyGrad.addColorStop(1, '#f39c12');
        ctx.fillStyle = bodyGrad;
        ctx.beginPath(); ctx.ellipse(0, 0, 30, 22, -Math.PI/12, 0, Math.PI*2); ctx.fill();

        // 갈색 줄무늬
        ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 8; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(10, -20); ctx.quadraticCurveTo(20, 0, 10, 20); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(22, -15); ctx.quadraticCurveTo(30, 0, 22, 15); ctx.stroke();

        // 검은 꼬리침
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.moveTo(28, 5); ctx.lineTo(45, 10); ctx.lineTo(26, 15); ctx.fill();

        // 투명한 파란 날개
        ctx.fillStyle = 'rgba(178, 235, 242, 0.8)';
        ctx.strokeStyle = '#80deea'; ctx.lineWidth = 2;
        ctx.save(); ctx.translate(-5, -15); ctx.rotate(-Math.PI/6);
        ctx.beginPath(); ctx.ellipse(0, -15, 10, 20, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.restore();
        ctx.save(); ctx.translate(15, -12); ctx.rotate(Math.PI/6);
        ctx.beginPath(); ctx.ellipse(0, -15, 10, 20, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.restore();

        // 까만 큰 눈
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.ellipse(-15, -2, 6, 8, -Math.PI/8, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(2, -2, 6, 8, Math.PI/8, 0, Math.PI*2); ctx.fill();
        // 눈동자 하이라이트
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-16, -5, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(1, -5, 3, 0, Math.PI*2); ctx.fill();

        // 빨간 볼터치
        ctx.fillStyle = 'rgba(255, 100, 100, 0.6)';
        ctx.beginPath(); ctx.ellipse(-24, 6, 5, 3, -Math.PI/8, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(10, 8, 5, 3, 0, 0, Math.PI*2); ctx.fill();

        // 웃는 입
        ctx.fillStyle = '#880e4f';
        ctx.beginPath();
        ctx.moveTo(-12, 10);
        ctx.quadraticCurveTo(-5, 20, 2, 10);
        ctx.fill();

        ctx.restore();
    }

    // 1+3: 롤 물음표 핑 이모티콘 (유저 픽 고퀄리티)
    drawQuestionPing(ctx) {
        ctx.save();
        ctx.translate(0, 10);

        // 노란/금색 그라데이션
        let pingGrad = ctx.createLinearGradient(0, -30, 0, 30);
        pingGrad.addColorStop(0, '#f1c40f');
        pingGrad.addColorStop(1, '#d35400');

        ctx.fillStyle = pingGrad;
        ctx.strokeStyle = '#333'; // 어두운 테두리
        ctx.lineWidth = 3;

        // 물음표 윗부분 기둥 그리기
        ctx.beginPath();
        ctx.moveTo(-15, -25);
        ctx.bezierCurveTo(-15, -45, 15, -45, 15, -25); // 둥근 머리
        ctx.bezierCurveTo(15, -10, -5, -5, -5, 10);   // 구부러져 내려오는 부분
        ctx.lineTo(5, 10);                            // 두께
        ctx.bezierCurveTo(5, -10, 28, -15, 28, -25);  // 바깥쪽 구부러짐
        ctx.bezierCurveTo(28, -55, -28, -55, -28, -25); // 바깥쪽 둥근 머리
        ctx.lineTo(-15, -25);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // 아래쪽 마름모 점
        ctx.beginPath();
        ctx.moveTo(0, 18);
        ctx.lineTo(-10, 28);
        ctx.lineTo(0, 38);
        ctx.lineTo(10, 28);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.restore();
    }
}

class Shuttlecock {
    constructor() { this.reset(CW/2, 200); this.radius = 8; this.trail = []; this.isSmashShot = false; this.smashTicks = 0; this.maxSmashSpeed = 0; this.freezeTicks = 0; this.shotType = ''; this.lastHitter = null; }
    reset(x, y) {
        this.x = x; this.y = y; this.vx = 0; this.vy = 0;
        this.active = false; this.trail = []; this.rotation = 0;
        this.isSmashShot = false; this.smashTicks = 0; this.maxSmashSpeed = 0;
        this.freezeTicks = 0; this.shotType = ''; this.lastHitter = null;
    }
    update() {
        if (game.state === STATE.SERVE) {
            let currentServer = game.server;
            let hx = currentServer.x + (currentServer.dir === -1 ? 25 : -25);
            this.x = hx; 
            this.y = currentServer.y - 30;
            this.vx = 0;
            this.vy = 0;
            return;
        }

        if (!this.active) return;

        if (this.freezeTicks > 0) {
            this.freezeTicks--;
            return; 
        }

        if (this.isSmashShot) {
            this.smashTicks++;
            let currentDrag = 0.88; 
            
            if (this.smashTicks <= 4) {
                this.vy += GRAVITY * 0.1;
                this.vx *= 0.999;
                this.vy *= 0.999;
            } else {
                let currentSpeed = Math.hypot(this.vx, this.vy);
                let minSpeed = this.maxSmashSpeed * 0.10;

                if (currentSpeed * currentDrag > minSpeed) {
                    this.vx *= currentDrag;
                    this.vy *= currentDrag;
                } else {
                    if (currentSpeed > 0) {
                        let ratio = minSpeed / currentSpeed;
                        this.vx *= ratio;
                        this.vy *= ratio;
                    }
                }
            }
        } else {
            this.vy += GRAVITY;
            // [수정 사항] 드라이브 샷은 공기 저항(감속)을 덜 받도록 설계 변경 (기존 기본 저항 0.987 -> 드라이브 전용 0.994)
            let drag = (this.shotType === 'drive') ? 0.994 : 0.987;
            this.vx *= drag;
            this.vy *= drag;
        }

        let oldX = this.x;
        let oldY = this.y;

        this.x += this.vx; 
        this.y += this.vy;
        this.rotation = Math.atan2(this.vy, this.vx);

        let netHalfWidth = 5;

        let crossedNet = (oldX < NET_X && this.x >= NET_X) || (oldX > NET_X && this.x <= NET_X);

        if (crossedNet && Math.abs(this.vx) > 0) {
            let t = (NET_X - oldX) / this.vx; 
            let interceptY = oldY + this.vy * t; 
            
            if (interceptY + this.radius > FLOOR_Y - NET_HEIGHT) {
                this.vx *= -0.5;
                this.x = oldX < NET_X ? NET_X - netHalfWidth - this.radius : NET_X + netHalfWidth + this.radius;
            }
        } else if (Math.abs(this.x - NET_X) < netHalfWidth + this.radius && this.y + this.radius > FLOOR_Y - NET_HEIGHT) {
            if (this.y < FLOOR_Y - NET_HEIGHT + 8 && this.vy > 0) { 
                this.vy *= -0.6; 
            } else { 
                this.vx *= -0.5; 
                this.x = this.x < NET_X ? NET_X - netHalfWidth - this.radius : NET_X + netHalfWidth + this.radius; 
            }
        }

        // [수정 사항 1] 맵 양 끝에 '투명 벽' 설치하여 장외(아웃) 원천 봉쇄
        if (this.x < this.radius) {
            this.x = this.radius;
            this.vx *= -0.7; 
        } else if (this.x > CW - this.radius) {
            this.x = CW - this.radius;
            this.vx *= -0.7;
        }

        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > 8) this.trail.shift();
    }
    draw(ctx) {
        if (!this.active && game.state !== STATE.SERVE) return;
        if (this.trail.length > 1) {
            const TRAIL_COLORS = {
                smash: 'rgba(255, 40, 40, 0.85)',
                mega: 'rgba(255, 230, 0, 0.9)',
                lob: 'rgba(46, 213, 115, 0.7)',
                drop: 'rgba(0, 206, 201, 0.7)',
                drive: 'rgba(254, 202, 87, 0.7)',
                serve: 'rgba(255, 215, 0, 0.7)'
            };
            ctx.beginPath(); ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for(let i=1; i<this.trail.length; i++) { ctx.lineTo(this.trail[i].x, this.trail[i].y); }
            ctx.strokeStyle = TRAIL_COLORS[this.shotType] || 'rgba(255, 255, 255, 0.4)'; 
            ctx.lineWidth = (this.isSmashShot || this.shotType === 'mega') ? 8 : 4; 
            ctx.stroke();
        }
        ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation + Math.PI/2);
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-8, -15); ctx.lineTo(8, -15); ctx.closePath(); ctx.fill(); ctx.strokeStyle = '#ddd'; ctx.stroke();
        ctx.fillStyle = (this.isSmashShot || this.shotType === 'mega') ? '#ff1111' : '#ffbaba'; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#000'; ctx.stroke();
        ctx.restore();
    }
}

class Character {
    constructor(side, color) {
        this.width = 40; this.height = 130;
        this.x = (side === -1) ? COURT_LEFT + 200 : COURT_RIGHT - 200;
        this.y = FLOOR_Y - this.height;
        this.vx = 0; this.vy = 0; this.dir = side;
        this.isSwinging = false; this.swingTimer = 0; this.swingDuration = 12; this.swingType = '';
        this.legAngle = 0; this.color = color; this.hitCooldown = 0;
        
        this.activeEmote = null; 
        this.emoteTimer = 0;

        this.speed = 13.5;
        this.hitPower = 1.63;
        this.hitRange = 150; 

        this.isJumping = false;
        this.jumpHoldTicks = 0;
        this.maxJumpHoldTicks = 14; 

        this.smashStreak = 0;
        this.lastSmashHitTime = 0;
    }
    reset(side) {
        this.dir = side;
        this.x = (side === -1) ? COURT_LEFT + 200 : COURT_RIGHT - 200;
        this.y = FLOOR_Y - this.height; this.vx = 0; this.vy = 0; this.isSwinging = false; this.swingTimer = 0;
        this.isJumping = false;
        this.activeEmote = null;
        this.emoteTimer = 0;
        this.smashStreak = 0;
        this.lastSmashHitTime = 0;
    }
    update() {
        if (typeof game !== 'undefined' && game.birdie && game.birdie.freezeTicks > 0) {
            return;
        }

        if (this.activeEmote !== null) {
            this.emoteTimer++;
            
            let isMyChar = (this === game.p1 && networkRole === 'host') || (this === game.p2 && networkRole === 'guest');
            if (isMyChar) {
                let isMoving = keys.a || keys.d || keys.w || this.isSwinging || this.y < FLOOR_Y - this.height - 5;
                if (isMoving) {
                    this.activeEmote = null;
                    this.emoteTimer = 0;
                    broadcastData('player_emote', { emote: null });
                }
            } else {
                if (Math.abs(this.vx) > 0.1 || this.isSwinging || this.y < FLOOR_Y - this.height - 5) {
                    this.activeEmote = null;
                    this.emoteTimer = 0;
                }
            }
        }

            if (this.y >= FLOOR_Y - this.height) {
