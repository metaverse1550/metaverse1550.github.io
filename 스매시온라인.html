                this.vy = 0; 
                this.isJumping = false; 
            }
            if (this.activeEmote === null && this.y > FLOOR_Y - this.height) {
                this.y = FLOOR_Y - this.height;
            }
        }

        this.x += this.vx;
        if (Math.abs(this.vx) > 0.1 && this.y >= FLOOR_Y - this.height) { this.legAngle += 0.25; } else { this.legAngle = 0; }
        if (this.isSwinging) {
            this.swingTimer++;
            if (this.swingTimer >= this.swingDuration) { this.isSwinging = false; this.swingTimer = 0; }
        }
        if (this.hitCooldown > 0) this.hitCooldown--;
        
        // [수정 사항 1] 양 팀의 네트 접근 한계선을 완벽하게 대칭으로 통일 (중앙 기준 30px)
        if (this.dir === -1) { 
            // 왼쪽(P1): 네트 중앙선(NET_X)에서 30px 떨어진 곳까지만 이동 가능
            this.x = clamp(this.x, 20, NET_X - 30); 
        } else { 
            // 오른쪽(P2): 네트 중앙선(NET_X)에서 30px 떨어진 곳까지만 이동 가능
            this.x = clamp(this.x, NET_X + 30, CW - 20); 
        }
    }
    swing(type) {
        if (!this.isSwinging && this.hitCooldown === 0) {
            this.activeEmote = null; 
            this.isSwinging = true; this.swingTimer = 0; this.swingType = type;
            this.swingDuration = SWING_DURATIONS[type] || 12;
        }
    }
    startJump() {
        if (this.isSwinging) return;
        this.activeEmote = null; 
        if (this.y >= FLOOR_Y - this.height - 5) { 
            this.vy = -13.5; 
            this.isJumping = true; 
            this.jumpHoldTicks = 0; 
        }
    }
    holdJump() {
        if (this.isJumping && this.jumpHoldTicks < this.maxJumpHoldTicks) {
            this.vy -= 0.8; 
            this.jumpHoldTicks++;
        }
    }
    stopJump() {
        if (this.isJumping) {
            this.isJumping = false;
            if (this.vy < -4) { 
                this.vy *= 0.45; 
            }
        }
    }

    getAngles() {
        let isAirborne = this.y < FLOOR_Y - this.height - 5;
        let sA = Math.PI / 3, eA = -Math.PI / 6, wA = -Math.PI / 6;
        let torso = 0, crouch = 0, lunge = 0;

        if (isAirborne && !this.isSwinging) { sA = Math.PI; eA = 0; wA = -Math.PI / 6; }

        if (this.activeEmote !== null) {
            let time = this.emoteTimer;
            if (this.activeEmote === 1) {
                crouch = Math.sin(time * 0.4) * 20;
                torso = Math.sin(time * 0.4) * 0.15;
                sA = Math.PI * 1.1 + Math.sin(time * 0.3) * 0.2;
                eA = Math.sin(time * 0.3) * 0.4;
                wA = -Math.PI / 6;
            } else if (this.activeEmote === 2) {
                torso = -0.8;
                crouch = 25;
                lunge = Math.sin(time * 0.7) * 25;
                sA = Math.PI / 4;
                eA = -Math.PI / 6;
            } else if (this.activeEmote === 3) {
                torso = Math.PI / 2.1;
                crouch = 0;
                lunge = 0;
                sA = -Math.PI / 2;
                eA = Math.PI / 2;
                wA = 0;
            }
        } else if (this.isSwinging) {
            let p = this.swingTimer / this.swingDuration;

            if (this.swingType === 'smash' || this.swingType === 'mega') {
                if (p < 0.35) {
                    let t = p / 0.35; let te = 1 - Math.pow(1 - t, 2);
                    sA = Math.PI * 1.15 * (1 - te) + (-Math.PI / 5) * te;
                    eA = (Math.PI * 0.5) * te;
                    wA = (Math.PI / 2.3) * te;
                    torso = -0.4 * te;
                    crouch = 20 * Math.sin(t * Math.PI * 0.9);
                } else {
                    let t = (p - 0.35) / 0.65; let te = 1 - Math.pow(1 - t, 4);
                    sA = (-Math.PI / 5) * (1 - te) + (Math.PI * 0.72) * te;
                    eA = (Math.PI * 0.5) * (1 - te) + (-Math.PI * 0.18) * te;
                    wA = (Math.PI / 2.3) * (1 - te) + (-Math.PI / 3) * te;
                    torso = -0.4 * (1 - te) + 0.5 * te;
                    crouch = 20 * (1 - te) * 0.5;
                    lunge = 28 * te;
                }
            } else if (this.swingType === 'lob') {
                if (p < 0.3) {
                    let t = p / 0.3;
                    sA = Math.PI * (1 - t) + (-Math.PI / 3.2) * t;
                    eA = (Math.PI * 0.7) * t;
                    wA = (-Math.PI / 6) * (1 - t) + (Math.PI / 2.2) * t;
                    torso = -0.3 * t;
                    crouch = 6 * t;
                } else {
                    let t = (p - 0.3) / 0.7; let te = 1 - Math.pow(1 - t, 3);
                    sA = (-Math.PI / 3.2) * (1 - te) + (Math.PI * 0.65) * te;
                    eA = (Math.PI * 0.7) * (1 - te) + (-Math.PI * 0.1) * te;
                    wA = (Math.PI / 2.2) * (1 - te) + (-Math.PI / 5) * te;
                    torso = -0.3 * (1 - te) + 0.22 * te;
                    crouch = 6 * (1 - te);
                    lunge = 12 * te;
                }
            } else if (this.swingType === 'drop') {
                let t = 1 - Math.pow(1 - p, 2);
                sA = Math.PI * 0.55 * (1 - t) + (Math.PI * 0.22) * t;
                eA = (-Math.PI / 7) * (1 - t) + (Math.PI / 10) * t;
                wA = (-Math.PI / 8) * (1 - t) + (Math.PI / 2.6) * t;
                torso = 0.08 * t;
                crouch = 9 * Math.sin(p * Math.PI);
            } else if (this.swingType === 'drive') {
                let te = 1 - Math.pow(1 - p, 5);
                sA = Math.PI * 0.25 * (1 - te) + (-Math.PI * 0.28) * te;
                eA = (-Math.PI / 5) * (1 - te) + (Math.PI / 6) * te;
                wA = (Math.PI / 5) * te;
                torso = 0.06 * te;
                lunge = 7 * te;
            } else if (this.swingType === 'serve') {
                let te = 1 - Math.pow(1 - p, 3);
                sA = (Math.PI * 0.6) * (1 - te) + (-Math.PI * 0.1) * te;
                eA = (Math.PI * 0.3) * (1 - te) + (Math.PI * 0.4) * te;
                wA = (-Math.PI / 4) * (1 - te) + (Math.PI / 3) * te;
                torso = -0.1 * (1 - te) + 0.15 * te;
                crouch = 5 * Math.sin(p * Math.PI);
                lunge = 8 * te;
            }
        }
        return { sA, eA, wA, torso, crouch, lunge };
    }

    getHitBox() {
        let faceDir = this.dir === -1 ? 1 : -1;
        let angles = this.getAngles();

        let shoulderX = this.x + faceDir * (angles.lunge || 0) * 0.4;
        let shoulderY = this.y + 30 + (angles.crouch || 0) * 0.3;
        
        let sweetSpotX = shoulderX + Math.cos((angles.torso + angles.sA) * faceDir) * 15 + Math.cos((angles.torso + angles.sA + angles.eA) * faceDir) * 50;
        let sweetSpotY = shoulderY + Math.sin((angles.torso + angles.sA) * faceDir) * 15 + Math.sin((angles.torso + angles.sA + angles.eA) * faceDir) * 50;

        return { 
            x: this.x, y: this.y + 60, r: 150, 
            sweetX: sweetSpotX, sweetY: sweetSpotY, sweetR: 70 
        }; 
    }

    draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y);
        let faceDir = this.dir === -1 ? 1 : -1;

        if (this.activeEmote === 2) {
            faceDir = -faceDir;
        }

        ctx.scale(faceDir, 1);
        let angles = this.getAngles();
        let crouch = angles.crouch || 0;
        let lunge = angles.lunge || 0;
        let torso = angles.torso || 0;
        ctx.save(); ctx.translate(lunge * 0.4, crouch * 0.5);

        if (this.isSwinging && this.swingType === 'mega') {
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ffd700';
        }

        ctx.fillStyle = this.color;

        ctx.beginPath(); ctx.roundRect(-10, 20 + crouch * 0.3, 20, 60 - crouch * 0.3, 10); ctx.fill();

        ctx.save(); ctx.translate(0, 5 + crouch * 0.3); ctx.rotate(torso * 0.5);
        ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(5, -3, 3, 0, Math.PI * 2); ctx.fill(); ctx.restore();

        ctx.strokeStyle = '#333'; ctx.lineWidth = 6; ctx.lineCap = 'round';
        let isAirborne = this.y < FLOOR_Y - this.height - 5;
        let hipY = 75 + crouch * 0.3;

        if (this.activeEmote === 3) {
            let legDangle = Math.sin(this.emoteTimer * 0.15) * 15;
            ctx.beginPath(); ctx.moveTo(-5, hipY); ctx.lineTo(-30, hipY + 10); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(5, hipY); ctx.lineTo(15 + legDangle, hipY - 20); ctx.stroke(); 
        } else if (isAirborne && !this.isSwinging) {
            ctx.beginPath(); ctx.moveTo(-5, hipY); ctx.lineTo(-20, 100); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(5, hipY); ctx.lineTo(-10, 105); ctx.stroke();
        } else if (isAirborne && this.isSwinging) {
            ctx.beginPath(); ctx.moveTo(-5, hipY); ctx.lineTo(10 + lunge, 125); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(5, hipY); ctx.lineTo(25 + lunge * 0.6, 120); ctx.stroke();
        } else if (this.isSwinging && lunge > 0.5) {
            ctx.beginPath(); ctx.moveTo(-5, hipY); ctx.lineTo(-5 + lunge * 1.3, 128); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(5, hipY); ctx.lineTo(5 - lunge * 0.5, 132); ctx.stroke();
        } else if (this.activeEmote === 1) {
            let danceLeg = Math.sin(this.emoteTimer * 0.4) * 15;
            ctx.beginPath(); ctx.moveTo(-5, hipY); ctx.lineTo(-15 + danceLeg, 130); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(5, hipY); ctx.lineTo(15 - danceLeg, 130); ctx.stroke();
        } else {
            let legAnim = Math.sin(this.legAngle) * 22; 
            ctx.beginPath(); ctx.moveTo(-5, hipY); ctx.lineTo(-5 - legAnim, 130); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(5, hipY); ctx.lineTo(5 + legAnim, 130); ctx.stroke();
        }

        ctx.save(); ctx.translate(0, 30 + crouch * 0.3);
        ctx.rotate(torso);
        ctx.rotate(angles.sA); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(15, 0); ctx.strokeStyle = '#ffdbac'; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.stroke();
        ctx.translate(15, 0); ctx.rotate(angles.eA); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(15, 0); ctx.stroke();
        ctx.translate(15, 0); ctx.rotate(angles.wA); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(25, 0); ctx.strokeStyle = '#777'; ctx.lineWidth = 3; ctx.stroke();
        ctx.beginPath(); ctx.ellipse(37, 0, 12, 18, 0, 0, Math.PI * 2); ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill();
        ctx.restore();
        ctx.restore(); ctx.restore();
    }
}

class Game {
    constructor() {
        this.p1 = new Character(-1, '#1e90ff'); this.p2 = new Character(1, '#ff4757');
        this.birdie = new Shuttlecock(); this.particles = []; this.texts = []; this.shockwaves = []; 
        // [신규] 이모티콘 말풍선 관리 배열
        this.emotions = [];
        this.state = STATE.MENU; this.score = { p1: 0, p2: 0 }; this.sets = { p1: 0, p2: 0 };
        this.server = this.p1; this.playerSide = -1; this.shakeTimer = 0; this.msgTimer = 0; this.netTick = 0;
        
        // [장외 타임아웃 감지용 타임스탬프 변수 추가]
        this.lastHitTime = Date.now();

        // [신규 변수] 재경기(리매치) 요청 상태 관리용
        this.rematchState = {
            p1Request: false,
            p2Request: false,
            timer: 0,
            active: false,
            agreed: false
        };
    }
    startMatch() { this.score = { p1: 0, p2: 0 }; this.sets = { p1: 0, p2: 0 }; this.playerSide = -1; this.server = this.p1; this.startSet(); }
    startSet() { this.score = { p1: 0, p2: 0 }; this.p1.reset(-1); this.p2.reset(1); this.readyServe(this.server); document.getElementById('msg-overlay').classList.remove('show'); }
    
    readyServe(serverChar) { 
        this.state = STATE.SERVE; 
        this.server = serverChar; 
        this.birdie.active = false; 
        let hx = serverChar.x + (serverChar.dir === -1 ? 25 : -25); 
        this.birdie.reset(hx, serverChar.y - 20); 
        
        this.p1.isSwinging = false; this.p1.swingTimer = 0; this.p1.swingType = ''; this.p1.hitCooldown = 0; this.p1.activeEmote = null; this.p1.emoteTimer = 0;
        this.p2.isSwinging = false; this.p2.swingTimer = 0; this.p2.swingType = ''; this.p2.hitCooldown = 0; this.p2.activeEmote = null; this.p2.emoteTimer = 0;
        
        // 서브 단계 준비 시 타임스탬프 리셋하여 감지 타이머 초기화
        this.lastHitTime = Date.now();
    }
    
    addScore(winner) { this.state = STATE.SCORE_WAIT; this.msgTimer = 120; let msg = winner === this.p1 ? "P1 POINT!" : "P2 POINT!"; let color = winner === this.p1 ? "#00f2fe" : "#ff4757"; this.texts.push(new FloatingText(CW/2, CH/2, msg, color, 60)); if (winner === this.p1) this.score.p1++; else this.score.p2++; this.server = winner; SoundEngine.playScorePoint(); broadcastData('score_sync', { score: this.score, serverSide: this.server === this.p1 ? 'p1' : 'p2' }); if (this.score.p1 >= 21 || this.score.p2 >= 21) { this.handleSetEnd(winner); } }
    handleSetEnd(winner) { this.state = STATE.SET_OVER; this.msgTimer = 180; if (winner === this.p1) { this.sets.p1++; showUIMessage("SET WIN (P1)!"); } else { this.sets.p2++; showUIMessage("SET WIN (P2)!"); } broadcastData('set_end_sync', { sets: this.sets, state: this.state }); }
    
    checkHit(char) {
        // [수정 사항 2] 중복 득점 방지용 '강철 방패' (상태가 PLAYING이나 SERVE가 아니면 타격 불가)
        if (this.state !== STATE.PLAYING && this.state !== STATE.SERVE) return;

        if (!char.isSwinging || char.hitCooldown > 0 || char.swingTimer > char.swingDuration * 0.75 || this.birdie.lastHitter === char) return;
        let hitbox = char.getHitBox();
        let dist = getDistance(hitbox.x, hitbox.y, this.birdie.x, this.birdie.y);
        if (dist < hitbox.r + this.birdie.radius) {
            this.birdie.lastHitter = char;
            this.state = STATE.PLAYING; this.birdie.active = true; char.hitCooldown = 20;
            this.birdie.freezeTicks = HIT_FREEZE_TICKS[char.swingType] || 12;
            this.birdie.shotType = char.swingType;
            let faceDir = char.dir === -1 ? 1 : -1;
            let sweetDist = getDistance(hitbox.sweetX, hitbox.sweetY, this.birdie.x, this.birdie.y);
            let isSweetSpot = sweetDist < hitbox.sweetR + this.birdie.radius;
            let speedMod = (char.swingType === 'smash' || char.swingType === 'drive' || char.swingType === 'mega') ? (isSweetSpot ? 1.1 : 0.8) : 1.0;
            let vx = 0, vy = 0, hitText = "", color = "#fff";
            this.birdie.isSmashShot = false; this.birdie.smashTicks = 0;
            
            // 타격 성공 시 타임아웃 감지 타이머 무력화 (타임스탬프 리셋)
            this.lastHitTime = Date.now();

            if (char.swingType === 'mega') {
                this.birdie.isSmashShot = true; 
                let force = 66 * char.hitPower * speedMod * 1.8; 
                vx = force * Math.cos(25 * Math.PI/180) * faceDir; 
                vy = force * Math.sin(25 * Math.PI/180); 
                this.birdie.maxSmashSpeed = Math.hypot(vx, vy);
                this.shockwaves.push(new SmashShockwave(this.birdie.x, this.birdie.y, '#ffd700', 2.2)); 
                SoundEngine.playMegaHit(); 
                hitText = "MEGA SHOT!"; 
                color = "#ffea00"; 
                this.shakeScreen(45); 
                this.spawnParticles(this.birdie.x, this.birdie.y, color, 60);
            } else if (char.swingType === 'smash') {
                let now = Date.now();
                if (now - char.lastSmashHitTime > 5000) {
                    char.smashStreak = 0; 
                }
                
                let decayMultiplier = Math.pow(0.91, char.smashStreak); 
                char.smashStreak++;
                char.lastSmashHitTime = now;

                this.birdie.isSmashShot = true; 
                let baseForce = 66 * char.hitPower * speedMod; 
                let force = baseForce * decayMultiplier; 

                vx = force * Math.cos(25 * Math.PI/180) * faceDir; 
                vy = force * Math.sin(25 * Math.PI/180); 
                this.birdie.maxSmashSpeed = Math.hypot(vx, vy);

                this.shockwaves.push(new SmashShockwave(this.birdie.x, this.birdie.y, '#ffffff', 1.0)); 
                SoundEngine.playSmashHit(); 

                if (char.smashStreak > 1) {
                    let percentVal = Math.round(decayMultiplier * 100);
                    hitText = `SMASH x${char.smashStreak} (${percentVal}%)`;
                } else {
                    hitText = isSweetSpot ? "PERFECT SMASH!" : "SMASH";
                }

                color = isSweetSpot ? "#ff0000" : "#ff4757"; 
                this.shakeScreen(isSweetSpot ? 25 : 15); 
                this.spawnParticles(this.birdie.x, this.birdie.y, color, isSweetSpot ? 30 : 20);
            } else {
                SoundEngine.playNormalHit();
                if (char.swingType === 'lob') { vy = -24; vx = ((char.dir === -1 ? COURT_RIGHT : COURT_LEFT) - this.birdie.x) * 0.019; hitText = "CLEAR"; color = "#2ed573"; this.spawnParticles(this.birdie.x, this.birdie.y, color, 10); }
                else if (char.swingType === 'drop') { let dx = (NET_X + (char.dir === -1 ? 100 : -100)) - this.birdie.x; vy = (this.birdie.y < FLOOR_Y - NET_HEIGHT - 20) ? -2 : -9.5; vx = dx * 0.025; hitText = "DROP"; color = "#00cec9"; this.spawnParticles(this.birdie.x, this.birdie.y, color, 10); }
                else if (char.swingType === 'serve') {
                    let targetLobVx = ((char.dir === -1 ? COURT_RIGHT : COURT_LEFT) - this.birdie.x) * 0.019;
                    let targetDriveVx = 26 * faceDir;
                    vx = (targetLobVx + targetDriveVx) / 2; 
                    vy = -14.1; 
                    hitText = "SERVE";
                    color = "#ffd700";
                    this.spawnParticles(this.birdie.x, this.birdie.y, color, 12);
                }
                else { 
                    // [수정 사항] 드라이브 샷 발사 고도를 정밀 수학 계산에 기반하여 약 2도 상향 조정 (기존 약 3.19도 -> 변경 약 5.19도)
                    // 기존: vx = (26 * speedMod) * faceDir; vy = -1.45;
                    // [재수정] 고도를 2도 더 추가 상향 (총 7.19도)
                    vx = (26 * speedMod) * faceDir; 
                    vy = -3.28 * speedMod; 
                    hitText = isSweetSpot ? "PERFECT DRIVE!" : "DRIVE"; 
                    color = "#feca57"; 
                    this.spawnParticles(this.birdie.x, this.birdie.y, color, 10); 
                }
            }
            this.birdie.vx = vx; this.birdie.vy = vy; this.texts.push(new FloatingText(this.birdie.x, this.birdie.y - 30, hitText, color));
            broadcastData('hit_effect', { x: this.birdie.x, y: this.birdie.y, hitText, color, type: char.swingType, vx: this.birdie.vx, vy: this.birdie.vy, isSmashShot: this.birdie.isSmashShot, maxSmashSpeed: this.birdie.maxSmashSpeed });
        }
    }
    
    // [신규] 재경기 요청 트리거 함수
    triggerRematch() {
        if (this.state !== STATE.PLAYING && this.state !== STATE.SERVE && this.state !== STATE.SCORE_WAIT) return;
        if (this.rematchState.agreed) return; // 이미 합의된 상태면 무시

        let mySide = (networkRole === 'host') ? 'p1' : 'p2';
        
        // 싱글 플레이면 AI는 무조건 즉시 동의 처리
        if (isLocalSinglePlayer) {
            this.handleRematchAgree();
            return;
        }

        // 이미 내가 요청한 상태면 무시
        if ((mySide === 'p1' && this.rematchState.p1Request) || (mySide === 'p2' && this.rematchState.p2Request)) return;

        // 상대방이 이미 요청한 상태라면 -> '상호 합의' 완료 처리
        if ((mySide === 'p1' && this.rematchState.p2Request) || (mySide === 'p2' && this.rematchState.p1Request)) {
            this.handleRematchAgree();
            broadcastData('rematch_agree', {});
        } else {
            // 내가 처음 요청하는 경우 -> 요청 시작
            this.rematchState[mySide + 'Request'] = true;
            this.rematchState.active = true;
            this.rematchState.timer = 150; // 5초 (30fps 기준)
            broadcastData('rematch_request', { side: mySide });
        }
    }

    // [신규] 재경기 합의 완료 처리
    handleRematchAgree() {
        this.rematchState.agreed = true;
        this.rematchState.timer = 60; // 2초 대기 후 리셋
        this.state = STATE.SCORE_WAIT; // 게임 정지
        showUIMessage("재경기 합의 완료!");
    }

    spawnEmotion(char, type) {
        // 이미 해당 캐릭터의 이모티콘이 떠있으면 제거 (하나만 유지)
        this.emotions = this.emotions.filter(e => e.owner !== char);
        this.emotions.push(new EmotionBubble(char, type));
        if (networkRole === 'guest') {
           broadcastData('player_emotion', { type: type });
        }
    }

    update() {
        if (this.state === STATE.MENU || this.state === STATE.MATCH_OVER) return;
        if (this.shakeTimer > 0) this.shakeTimer--;
        
        if (localMegaCooldown > 0) {
            let elapsed = Date.now() - lastMegaTriggerTime;
            localMegaCooldown = Math.max(0, 60000 - elapsed);
        }

        // [신규] 재경기 타이머 로직
        if (this.rematchState.active) {
            this.rematchState.timer--;
            if (this.rematchState.timer <= 0) {
                if (this.rematchState.agreed) {
                    // 2초 대기 후 실제 리셋
                    this.rematchState.p1Request = false;
                    this.rematchState.p2Request = false;
                    this.rematchState.active = false;
                    this.rematchState.agreed = false;
                    this.readyServe(this.server); // 점수 변동 없이 서브 리셋
                    showUIMessage("서브 리셋");
                } else {
                    // 5초 타임아웃 -> 요청 취소
                    this.rematchState.p1Request = false;
                    this.rematchState.p2Request = false;
                    this.rematchState.active = false;
                }
            }
        }

        let myChar = (networkRole === 'host') ? this.p1 : this.p2;
        myChar.vx = 0; if (networkRole === 'guest') { if (keys.a) myChar.vx = myChar.speed; if (keys.d) myChar.vx = -myChar.speed; } else { if (keys.a) myChar.vx = -myChar.speed; if (keys.d) myChar.vx = myChar.speed; }
        if (isJustPressed('w')) myChar.startJump(); if (keys.w) myChar.holdJump();
        
        let swType = ''; 
        if (isJustPressed('ArrowUp')) swType = 'lob'; 
        else if (isJustPressed('ArrowDown')) swType = 'smash'; 
        if (isJustPressed('ArrowLeft')) swType = 'drop'; 
        else if (isJustPressed('ArrowRight')) swType = 'drive';
        
        if (swType) { 
            if (this.state === STATE.SERVE || this.state === STATE.PLAYING) {
                if (this.state === STATE.SERVE) {
                    swType = 'serve';
                }
                myChar.swing(swType); 
                if (networkRole === 'guest') broadcastData('guest_swing_input', { type: swType }); 
            }
        }
        
        if (isLocalSinglePlayer) {
            let ai = this.p2;
            ai.vx = 0;
            
            if (this.state === STATE.SERVE && this.server === ai) {
                ai.swing('serve');
            } else if (this.state === STATE.PLAYING) {
                let targetX = this.birdie.x;
                if (this.birdie.x < NET_X) {
                    targetX = COURT_RIGHT - 180; 
                }
                
                let distToTarget = targetX - ai.x;
                if (Math.abs(distToTarget) > 15) {
                    ai.vx = Math.sign(distToTarget) * ai.speed * 0.72; 
                }
                
                if (this.birdie.x > NET_X && this.birdie.y < FLOOR_Y - 220 && Math.abs(this.birdie.x - ai.x) < 110) {
                    if (Math.random() < 0.12 && !ai.isJumping) ai.startJump();
                }
                
                let hitbox = ai.getHitBox();
                let distToBall = getDistance(hitbox.x, hitbox.y, this.birdie.x, this.birdie.y);
                if (distToBall < hitbox.r + this.birdie.radius) {
                    let randomShot = Math.random();
                    let shotType = 'drive';
                    if (ai.y < FLOOR_Y - ai.height - 30) {
                        shotType = 'smash'; 
                    } else if (this.birdie.x > CW - 240) {
                        shotType = 'lob'; 
                    } else if (randomShot < 0.35) {
                        shotType = 'drop';
                    } else if (randomShot < 0.7) {
                        shotType = 'lob';
                    }
                    ai.swing(shotType);
                }
            }
        }

        this.p1.update(); this.p2.update();
        if (this.birdie.freezeTicks > 0 && this.birdie.shotType) { let hitter = (this.birdie.x < NET_X) ? this.p1 : this.p2; let color = SHOT_COLORS[this.birdie.shotType] || '#fff'; let hitbox = hitter.getHitBox(); this.particles.push(new DriftParticle(hitbox.x, hitbox.y, color, hitter.dir)); }
        this.netTick++;

        if (this.netTick % NET_SYNC_RATE === 0) {
            broadcastData('player_pos', { 
                x: myChar.x, 
                y: myChar.y, 
                vy: myChar.vy, 
                isSwinging: myChar.isSwinging, 
                swingType: myChar.swingType,
                activeEmote: myChar.activeEmote,
                emoteTimer: myChar.emoteTimer
            });
        }

        // =========================================================
        // [삭제] 기존 5초 자동 타임아웃(장외) 로직 완전 제거
        // =========================================================
        /*
        if (this.state === STATE.PLAYING) {
            // 5000밀리초(5초) 경과 판정 시 강제 장외 선언
            if (Date.now() - this.lastHitTime >= 5000) {
                this.state = STATE.SCORE_WAIT;
                this.msgTimer = 90; // 약 1.5초간 화면에 메시지 표출
                
                // 화면 중앙에 빨간색 아웃 이펙트 추가
                this.texts.push(new FloatingText(CW/2, CH/2 - 50, "TIME OUT", "#ff4757", 55));
                showUIMessage("타임 아웃! 서브 리셋");
                
                // 방 호스트의 경우 즉시 게스트에게 강제 상태 싱크 전송
                if (networkRole === 'host') {
                    broadcastData('score_sync', { 
                        score: this.score, 
                        serverSide: this.server === this.p1 ? 'p1' : 'p2' 
                    });
                }
                // 연속 트리거 방지를 위한 보호 처리
                this.lastHitTime = Date.now();
            }
        }
        */

        if (networkRole === 'host') {
            this.birdie.update(); this.checkHit(this.p1); this.checkHit(this.p2);
            // [수정 사항 2] 바닥에 닿았을 때 무조건 1점씩만 득점하도록 로직 단순화 및 버그 수정
            if (this.state === STATE.PLAYING && this.birdie.y > FLOOR_Y) {
                this.birdie.y = FLOOR_Y; 
                this.birdie.vx = 0; this.birdie.vy = 0; // 바닥에 닿으면 공 정지
                
                // 네트 기준으로 공이 떨어진 위치의 반대편 플레이어가 득점
                let pointWinner = (this.birdie.x < NET_X) ? this.p2 : this.p1;
                this.addScore(pointWinner);
            }
            if (this.netTick % NET_BALL_SYNC_RATE === 0) broadcastData('ball_sync', { x: this.birdie.x, y: this.birdie.y, vx: this.birdie.vx, vy: this.birdie.vy, active: this.birdie.active, state: this.state, isSmashShot: this.birdie.isSmashShot, smashTicks: this.birdie.smashTicks, maxSmashSpeed: this.birdie.maxSmashSpeed, freezeTicks: this.birdie.freezeTicks, shotType: this.birdie.shotType });
        } else {
            this.birdie.update(); if (this.state === STATE.PLAYING && this.birdie.y > FLOOR_Y) { this.birdie.y = FLOOR_Y; this.birdie.vy = -this.birdie.vy * 0.3; this.birdie.vx *= 0.5; }
        }
        for (let i = this.particles.length - 1; i >= 0; i--) { this.particles[i].update(); if (this.particles[i].life <= 0) this.particles.splice(i, 1); }
        for (let i = this.texts.length - 1; i >= 0; i--) { this.texts[i].update(); if (this.texts[i].life <= 0) this.texts.splice(i, 1); }
        for (let i = this.shockwaves.length - 1; i >= 0; i--) { this.shockwaves[i].update(); if (this.shockwaves[i].life <= 0) this.shockwaves.splice(i, 1); }
        // [신규] 이모티콘 업데이트
        for (let i = this.emotions.length - 1; i >= 0; i--) { this.emotions[i].update(); if (this.emotions[i].life <= 0) this.emotions.splice(i, 1); }
        
        if (this.msgTimer > 0) { 
            this.msgTimer--; 
            if (this.msgTimer <= 0) { 
                if (this.state === STATE.SCORE_WAIT) {
                    this.readyServe(this.server); 
                } else if (this.state === STATE.SET_OVER) { 
                    if (this.sets.p1 >= 2 || this.sets.p2 >= 2) { 
                        this.state = STATE.MATCH_OVER; 
                        showMatchResult(); 
                    } else { 
                        this.playerSide *= -1; 
                        this.startSet(); 
                    } 
                } 
            } 
        }
    }

    draw() {
        ctx.clearRect(0, 0, CW, CH); ctx.save(); if (networkRole === 'guest') { ctx.translate(CW, 0); ctx.scale(-1, 1); }
        if (this.shakeTimer > 0) { ctx.translate(rand(-5, 5) * (this.shakeTimer/15), rand(-5, 5) * (this.shakeTimer/15)); }
        let bgGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_Y); bgGrad.addColorStop(0, '#1a1a2e'); bgGrad.addColorStop(1, '#16213e'); ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, CW, CH);
        ctx.fillStyle = '#cf9963'; ctx.fillRect(0, FLOOR_Y, CW, CH - FLOOR_Y); ctx.fillStyle = '#fff'; ctx.fillRect(50, FLOOR_Y, CW - 100, 5); ctx.fillRect(NET_X - 2, FLOOR_Y, 4, 10); ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0, FLOOR_Y + 5, CW, 15);
        ctx.strokeStyle = '#555'; ctx.lineWidth = 10; ctx.beginPath(); ctx.moveTo(NET_X, FLOOR_Y); ctx.lineTo(NET_X, FLOOR_Y - NET_HEIGHT); ctx.stroke();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; ctx.fillRect(NET_X - 2, FLOOR_Y - NET_HEIGHT, 4, NET_HEIGHT); ctx.fillStyle = '#fff'; ctx.fillRect(NET_X - 4, FLOOR_Y - NET_HEIGHT, 8, 10);
        this.drawShadow(this.p1.x, FLOOR_Y, 30); this.drawShadow(this.p2.x, FLOOR_Y, 30); if(this.birdie.active || game.state === STATE.SERVE) this.drawShadow(this.birdie.x, FLOOR_Y, 10 + (FLOOR_Y - this.birdie.y)*0.02);
        this.p1.draw(ctx); this.p2.draw(ctx); this.birdie.draw(ctx); this.particles.forEach(p => p.draw(ctx)); this.texts.forEach(t => t.draw(ctx)); this.shockwaves.forEach(sw => sw.draw(ctx)); 
        // [신규] 이모티콘 그리기
        this.emotions.forEach(e => e.draw(ctx));
        ctx.restore(); this.drawHUD();

        const touchMegaBtn = document.getElementById('touch-mega');
        if (touchMegaBtn) {
            if (localMegaCooldown > 0) {
                touchMegaBtn.classList.add('cooling');
                touchMegaBtn.innerText = Math.ceil(localMegaCooldown / 1000) + "s";
            } else {
                touchMegaBtn.classList.remove('cooling');
                touchMegaBtn.innerText = "MEGA";
            }
        }
    }
    drawShadow(x, y, radius) { let safeRadius = Math.max(0, radius); if (safeRadius === 0) return; ctx.save(); ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.scale(1, 0.2); ctx.arc(x, y / 0.2, safeRadius, 0, Math.PI*2); ctx.fill(); ctx.restore(); }
    
    drawHUD() {
        if (this.state === STATE.MENU) return; 
        
        // [신규] 재경기 버튼 그리기
        let btnX = 30, btnY = 30, btnW = 140, btnH = 40;
        ctx.save();
        if (this.rematchState.agreed) {
            ctx.fillStyle = '#2ed573'; // 초록색 (합의 완료)
        } else if (this.rematchState.active) {
            ctx.fillStyle = '#f1c40f'; // 노란색 (대기 중)
        } else {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)'; // 기본 (비활성)
        }
        
        // 마우스 오버 효과 (PC)
        if (!this.rematchState.active && !this.rematchState.agreed) {
            // 간단한 히트박스 체크는 생략하고 비주얼만 적용 (실제 클릭은 DOM 버튼으로 대체 예정이었으나, 캔버스에 직접 구현)
             // ctx.fillStyle = 'rgba(255, 255, 255, 0.35)'; 
        }

        ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 10); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = "bold 16px 'Noto Sans KR', sans-serif"; ctx.textAlign = "center";
        
        let btnText = "🔄 재경기 요청";
        if (this.rematchState.agreed) btnText = "✅ 승인 완료!";
        else if (this.rematchState.active) {
            let mySide = (networkRole === 'host') ? 'p1' : 'p2';
            if (this.rematchState[mySide + 'Request']) btnText = `⏳ 동의 대기중 (${Math.ceil(this.rematchState.timer / 30)})`;
            else btnText = "❗ 상대 재경기 요청";
        }
        ctx.fillText(btnText, btnX + btnW / 2, btnY + 26);
        ctx.restore();

        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; ctx.beginPath(); ctx.roundRect(CW/2 - 200, 20, 400, 80, 15); ctx.fill(); ctx.font = "bold 40px 'Black Han Sans', sans-serif"; ctx.textAlign = "center";
        ctx.fillStyle = (networkRole === 'guest') ? '#ff4757' : '#00f2fe'; ctx.fillText(this.score.p1, CW/2 - 100, 75); ctx.fillStyle = (networkRole === 'guest') ? '#00f2fe' : '#ff4757'; ctx.fillText(this.score.p2, CW/2 + 100, 75);
        ctx.fillStyle = '#fff'; ctx.font = "bold 20px 'Noto Sans KR', sans-serif"; ctx.fillText(`SET ${this.sets.p1 + this.sets.p2 + 1}`, CW/2, 45);
        let drawSetCircle = (x, y, won) => { ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2); ctx.fillStyle = won ? '#ffd700' : 'rgba(255,255,255,0.2)'; ctx.fill(); };
        drawSetCircle(CW/2 - 60, 65, this.sets.p1 >= 1); drawSetCircle(CW/2 - 40, 65, this.sets.p1 >= 2); drawSetCircle(CW/2 + 40, 65, this.sets.p2 >= 1); drawSetCircle(CW/2 + 60, 65, this.sets.p2 >= 2);

        let barW = 260;
        let barH = 14;
        let barX = CW / 2 - barW / 2;
        let barY = 125;

        ctx.save();
        ctx.fillStyle = 'rgba(15, 23, 42, 0.75)';
        ctx.beginPath();
        ctx.roundRect(barX - 10, barY - 10, barW + 20, barH + 18, 10);
        ctx.fill();

        if (localMegaCooldown > 0) {
            let progress = (60000 - localMegaCooldown) / 60000;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, barH, 7);
            ctx.fill();

            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW * progress, barH, 7);
            ctx.fill();

            ctx.fillStyle = '#ffcc00';
            ctx.font = "bold 13px 'Noto Sans KR', sans-serif";
            ctx.textAlign = 'center';
            ctx.fillText(`MEGA SHOT COOLDOWN: ${Math.ceil(localMegaCooldown / 1000)}s`, CW / 2, barY - 12);
        } else {
            ctx.fillStyle = '#fff200';
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, barH, 7);
            ctx.fill();

            let alpha = 0.5 + 0.5 * Math.sin(Date.now() * 0.007);
            ctx.shadowColor = '#fff200';
            ctx.shadowBlur = 10;
            ctx.fillStyle = `rgba(255, 242, 0, ${alpha})`;
            ctx.font = "bold 14px 'Black Han Sans', sans-serif";
            ctx.textAlign = 'center';
            ctx.fillText(`⚡ [R] MEGA SHOT READY ⚡`, CW / 2, barY - 14);
        }
        ctx.restore();
    }
    shakeScreen(amount) { this.shakeTimer = amount; }
    spawnParticles(x, y, color, count) { for(let i=0; i<count; i++) { this.particles.push(new Particle(x, y, color)); } }
}

let game = new Game();

// [신규] 캔버스 클릭 이벤트 핸들러 (재경기 버튼용)
canvas.addEventListener('click', (e) => {
    let rect = canvas.getBoundingClientRect();
    // 캔버스 내의 실제 클릭 좌표 계산 (반응형 스케일 고려)
    let scaleX = canvas.width / rect.width;
    let scaleY = canvas.height / rect.height;
    let clickX = (e.clientX - rect.left) * scaleX;
    let clickY = (e.clientY - rect.top) * scaleY;
    
    // 재경기 버튼 영역 (btnX=30, btnY=30, btnW=140, btnH=40)
    if (clickX >= 30 && clickX <= 170 && clickY >= 30 && clickY <= 70) {
        game.triggerRematch();
    }
});

function initLocalSinglePlayer() {
    networkRole = 'host';
    isLocalSinglePlayer = true;
    isConnected = false;
    document.getElementById('menu-ui').classList.add('hidden');
    SoundEngine.init();
    game.state = STATE.SERVE;
    game.startMatch();
}

function initMultimulti(role) {
    const roomStatusEl = document.getElementById('room-status');
    const roomName = document.getElementById('room-input').value.trim();

    if (!sbClient) { 
        roomStatusEl.innerHTML = "<span style='color: #ff4757;'>⚠️ Supabase가 초기화되지 않았습니다. API 설정을 확인하세요.</span>"; 
        return; 
    }
    if (!roomName) { 
        roomStatusEl.innerHTML = "<span style='color: #ff4757;'>⚠️ 방 이름을 먼저 입력해 주세요!</span>"; 
        return; 
    }

    networkRole = role; 
    isLocalSinglePlayer = false;
    roomStatusEl.innerText = `${roomName}번방 동기화 연결 중...`; 
    SoundEngine.init();
    gameSession = sbClient.channel(roomName, { config: { broadcast: { self: false, ack: false } } });
    gameSession
    .on('broadcast', { event: 'player_pos' }, ({ payload }) => { 
        let targetChar = (networkRole === 'host') ? game.p2 : game.p1; 
        targetChar.x = payload.x; 
        targetChar.y = payload.y; 
        targetChar.vy = payload.vy; 
        targetChar.isSwinging = payload.isSwinging; 
        targetChar.swingType = payload.swingType; 
        targetChar.activeEmote = payload.activeEmote;
        targetChar.emoteTimer = payload.emoteTimer;
    })
    .on('broadcast', { event: 'guest_swing_input' }, ({ payload }) => { if (networkRole === 'host') game.p2.swing(payload.type); })
    .on('broadcast', { event: 'player_emote' }, ({ payload }) => {
        let targetChar = (networkRole === 'host') ? game.p2 : game.p1;
        targetChar.activeEmote = payload.emote;
        targetChar.emoteTimer = 0;
    })
    // [신규] 상대방 이모티콘 수신
    .on('broadcast', { event: 'player_emotion' }, ({ payload }) => {
        let targetChar = (networkRole === 'host') ? game.p2 : game.p1;
        game.spawnEmotion(targetChar, payload.type);
    })
    // [신규] 재경기 요청 수신
    .on('broadcast', { event: 'rematch_request' }, ({ payload }) => {
        if (payload.side !== ((networkRole === 'host') ? 'p1' : 'p2')) {
            game.rematchState[payload.side + 'Request'] = true;
            if (!game.rematchState.active) {
                game.rematchState.active = true;
                game.rematchState.timer = 150; // 5초
            }
        }
    })
    // [신규] 재경기 합의 수신
    .on('broadcast', { event: 'rematch_agree' }, ({ payload }) => {
        game.handleRematchAgree();
    })
    .on('broadcast', { event: 'ball_sync' }, ({ payload }) => {
        if (networkRole === 'guest') {
            if (game.state !== STATE.SERVE) {
                if (payload.freezeTicks > 0) { game.birdie.x = payload.x; game.birdie.y = payload.y; } 
                else { if (getDistance(game.birdie.x, game.birdie.y, payload.x, payload.y) > 20) { game.birdie.x = payload.x; game.birdie.y = payload.y; } else { game.birdie.x = game.birdie.x * 0.4 + payload.x * 0.6; game.birdie.y = game.birdie.y * 0.4 + payload.y * 0.6; } }
            }
            game.birdie.vx = payload.vx; game.birdie.vy = payload.vy; game.birdie.active = payload.active; game.state = payload.state; game.birdie.isSmashShot = payload.isSmashShot; game.birdie.smashTicks = payload.smashTicks; game.birdie.maxSmashSpeed = payload.maxSmashSpeed; game.birdie.freezeTicks = payload.freezeTicks; game.birdie.shotType = payload.shotType;
        }
    })
    .on('broadcast', { event: 'score_sync' }, ({ payload }) => { if (networkRole === 'guest') { game.score = payload.score; game.server = payload.serverSide === 'p1' ? game.p1 : game.p2; SoundEngine.playScorePoint(); } })
    .on('broadcast', { event: 'set_end_sync' }, ({ payload }) => { if (networkRole === 'guest') { game.sets = payload.sets; game.state = payload.state; let isP2Win = game.sets.p2 > game.sets.p1; showUIMessage(isP2Win ? "SET WIN (P2)!" : "SET WIN (P1)!"); } })
    .on('broadcast', { event: 'hit_effect' }, ({ payload }) => {
        if (networkRole === 'guest') {
            game.texts.push(new FloatingText(payload.x, payload.y - 30, payload.hitText, payload.color)); game.spawnParticles(payload.x, payload.y, payload.color, payload.type === 'smash' ? 20 : (payload.type === 'mega' ? 60 : 10));
            if (payload.type === 'smash') { SoundEngine.playSmashHit(); game.shakeScreen(15); game.shockwaves.push(new SmashShockwave(payload.x, payload.y, '#ffffff', 1.0)); } 
            else if (payload.type === 'mega') { SoundEngine.playMegaHit(); game.shakeScreen(45); game.shockwaves.push(new SmashShockwave(payload.x, payload.y, '#ffd700', 2.2)); } 
            else { SoundEngine.playNormalHit(); }
            game.birdie.x = payload.x; game.birdie.y = payload.y; game.birdie.vx = payload.vx; game.birdie.vy = payload.vy; game.birdie.active = true; game.birdie.isSmashShot = payload.isSmashShot; game.birdie.smashTicks = 0; game.birdie.maxSmashSpeed = payload.maxSmashSpeed; game.state = STATE.PLAYING; game.birdie.shotType = payload.type; game.birdie.freezeTicks = HIT_FREEZE_TICKS[payload.type] || 12;
        }
    })
    .subscribe((status) => { if (status === 'SUBSCRIBED') { isConnected = true; document.getElementById('menu-ui').classList.add('hidden'); game.state = STATE.SERVE; game.startMatch(); } });
}

function broadcastData(event, payload) { if (isConnected && gameSession) send({ type: 'broadcast', event, payload }); }
function send(packet) { if (gameSession) gameSession.send(packet); }
function showUIMessage(text) { let msgEl = document.getElementById('msg-overlay'); if (networkRole === 'guest') { if (text.includes("P1")) text = text.replace("P1", "상대방"); else if (text.includes("P2")) text = text.replace("P2", "나"); } else { if (text.includes("P1")) text = text.replace("P1", "나"); else if (text.includes("P2")) text = text.replace("P2", "상대방"); } msgEl.innerText = text; msgEl.classList.add('show'); setTimeout(() => { msgEl.classList.remove('show'); }, 2000); }
function showMatchResult() { let isP1Win = game.sets.p1 >= 2; showUIMessage((networkRole === 'guest') ? (isP1Win ? "MATCH OVER: 상대방 WIN!" : "MATCH OVER: 나 WIN!") : (isP1Win ? "MATCH OVER: 나 WIN!" : "MATCH OVER: 상대방 WIN!")); }

let lastTime = performance.now();
const timestep = 1000 / 30; 
function loop(currentTime) { 
    let elapsed = currentTime - lastTime; 
    while (elapsed >= timestep) { 
        // [신규] 조합 키 (이모티콘) 감지 로직 (0.1초 유예 시간 적용)
        let myChar = (networkRole === 'host') ? game.p1 : game.p2;
        if (myChar && game.state !== STATE.SERVE && !myChar.isSwinging && myChar.hitCooldown <= 0) {
            let now = Date.now();
            let tolerance = 100; // 100ms (0.1초)
            let p1 = keys['1'], p2 = keys['2'], p3 = keys['3'];
            let t1 = keyPressTime['1'], t2 = keyPressTime['2'], t3 = keyPressTime['3'];

            let triggered = false;
            if (p1 && p2 && Math.abs(t1 - t2) < tolerance) { game.spawnEmotion(myChar, 1); triggered = true; } // 1+2: 따봉
            else if (p2 && p3 && Math.abs(t2 - t3) < tolerance) { game.spawnEmotion(myChar, 2); triggered = true; } // 2+3: 티모
            else if (p1 && p3 && Math.abs(t1 - t3) < tolerance) { game.spawnEmotion(myChar, 3); triggered = true; } // 1+3: 화남

            if (triggered) {
                // 이모티콘 발동 시 키 입력 시간 초기화 (중복 방지)
                keyPressTime['1'] = 0; keyPressTime['2'] = 0; keyPressTime['3'] = 0;
            } else {
                // 조합이 아닐 경우 단일 키 도발 발동 (기존 로직 유지)
                // 단, 조합 키 입력을 기다리기 위해 약간의 딜레이를 줄 수도 있지만, 
                // 현재는 즉시 반응성을 위해 키를 떼는 순간(keyup)이나 다른 방식으로 처리하는 것이 좋음.
                // 여기서는 일단 기존 몸통 도발은 비활성화하고 이모티콘만 테스트합니다.
                /*
                if (isJustPressed('1')) { myChar.activeEmote = 1; myChar.emoteTimer = 0; broadcastData('player_emote', { emote: 1 }); }
                else if (isJustPressed('2')) { myChar.activeEmote = 2; myChar.emoteTimer = 0; broadcastData('player_emote', { emote: 2 }); }
                else if (isJustPressed('3')) { myChar.activeEmote = 3; myChar.emoteTimer = 0; broadcastData('player_emote', { emote: 3 }); }
                */
            }
        }

        game.update(); 
        game.update(); 
        elapsed -= timestep; 
        lastTime += timestep; 
    } 
    game.draw(); 
    requestAnimationFrame(loop); 
}
requestAnimationFrame(loop);
</script>
