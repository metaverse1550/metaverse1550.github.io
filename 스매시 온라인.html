<script>
const SUPABASE_URL = "https://rxhdzwlymxlcmgibkqaw.supabase.co";

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CW = canvas.width;
const CH = canvas.height;

const GRAVITY = 0.55;
const DRAG = 0.985;
const FLOOR_Y = 620;
const NET_X = CW / 2;
const NET_HEIGHT = 95; 
const COURT_LEFT = 100;
const COURT_RIGHT = CW - 100;

const STATE = { MENU: 0, SERVE: 1, PLAYING: 2, SCORE_WAIT: 3, SET_OVER: 4, MATCH_OVER: 5 };

let gameSession = null;
let networkRole = null; 
let isConnected = false;

const keys = {
    w: false, a: false, s: false, d: false,
    ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false
};
const keyJustPressed = {}; 

window.addEventListener('keydown', (e) => {
    if(keys.hasOwnProperty(e.key)) {
        if(!keys[e.key]) keyJustPressed[e.key] = true;
        keys[e.key] = true;
    }
});
window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

function isJustPressed(key) {
    if (keyJustPressed[key]) { keyJustPressed[key] = false; return true; }
    return false;
}

function toggleFullscreen() {
    let elem = document.getElementById('game-container');
    if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitFullscreen(); 
        else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        document.getElementById('fullscreen-btn').innerText = "[ ⛶ 창모드 ]";
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.msExitFullscreen) document.msExitFullscreen();
        document.getElementById('fullscreen-btn').innerText = "[ ⛶ 전체화면 ]";
    }
}

// =========================================================
// [v12 신대륙] 파일 필요 없는 Web Audio API 주파수 합성 오디오 엔진
// =========================================================
const SoundEngine = {
    ctx: null,
    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },
    playNormalHit() {
        this.init();
        if (!this.ctx) return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(320, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.03); 

        gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08); 

        osc.start(); osc.stop(this.ctx.currentTime + 0.08);
    },
    playSmashHit() {
        this.init();
        if (!this.ctx) return;
        
        let now = this.ctx.currentTime;

        let osc = this.ctx.createOscillator();
        let gainNode = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(180, now);
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.04);
        gainNode.gain.setValueAtTime(0.8, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.connect(gainNode); gainNode.connect(this.ctx.destination);
        osc.start(); osc.stop(now + 0.15);

        let bufferSize = this.ctx.sampleRate * 0.12; 
        let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }

        let noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        let noiseFilter = this.ctx.createBiquadFilter();
        noiseFilter.type = 'bandpass'; 
        noiseFilter.frequency.setValueAtTime(1000, now);
        noiseFilter.frequency.exponentialRampToValueAtTime(2500, now + 0.08);

        let noiseGain = this.ctx.createGain();
        noiseGain.gain.setValueAtTime(0.3, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);

        noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(this.ctx.destination);
        noise.start(); noise.stop(now + 0.12);
    },
    playScorePoint() {
        this.init();
        if (!this.ctx) return;
        let now = this.ctx.currentTime;
        
        let playTone = (freq, delay, duration) => {
            let osc = this.ctx.createOscillator();
            let gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + delay);
            gain.gain.setValueAtTime(0.25, now + delay);
            gain.gain.exponentialRampToValueAtTime(0.005, now + delay + duration);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(now + delay); osc.stop(now + delay + duration);
        };

        playTone(523.25, 0, 0.15);     
        playTone(659.25, 0.06, 0.15);  
        playTone(783.99, 0.12, 0.35);  
    }
};

function setupMobileJoystickAndPad() {
    const joyContainer = document.getElementById('joy-container');
    const joyHandle = document.getElementById('joy-handle');
    if (!joyContainer || !joyHandle) return;

    let isActive = false;
    let startX = 0;
    let maxDistance = 45; 

    const bindTouchAction = (elemId, keyName) => {
        let el = document.getElementById(elemId);
        if(!el) return;
        el.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(!keys[keyName]) keyJustPressed[keyName] = true;
            keys[keyName] = true;
        }, {passive: false});
        el.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys[keyName] = false;
        }, {passive: false});
    };

    bindTouchAction('touch-jump', 'w');
    bindTouchAction('touch-lob', 'ArrowUp');
    bindTouchAction('touch-smash', 'ArrowDown');
    bindTouchAction('touch-drop', 'ArrowLeft');
    bindTouchAction('touch-drive', 'ArrowRight');

    joyContainer.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isActive = true;
        let touch = e.touches[0];
        let rect = joyContainer.getBoundingClientRect();
        startX = rect.left + rect.width / 2; 
    }, {passive: false});

    joyContainer.addEventListener('touchmove', (e) => {
        if (!isActive) return;
        e.preventDefault();
        let touch = e.touches[0];
        let deltaX = touch.clientX - startX;

        deltaX = Math.max(-maxDistance, Math.min(maxDistance, deltaX));
        joyHandle.style.transform = `translate(${deltaX}px, 0px)`;

        let ratio = deltaX / maxDistance;     

        if (ratio < -0.3) {
            keys.a = true; keys.d = false;
        } else if (ratio > 0.3) {
            keys.d = true; keys.a = false;
        } else {
            keys.a = false; keys.d = false;
        }
    }, {passive: false});

    const resetJoystick = (e) => {
        if (!isActive) return;
        e.preventDefault();
        isActive = false;
        joyHandle.style.transform = `translate(0px, 0px)`; 
        keys.a = false;
        keys.d = false;
    };

    joyContainer.addEventListener('touchend', resetJoystick, {passive: false});
    joyContainer.addEventListener('touchcancel', resetJoystick, {passive: false});
}
setupMobileJoystickAndPad();

function rand(min, max) { return Math.random() * (max - min) + min; }
function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
function getDistance(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = rand(-5, 5); this.vy = rand(-5, 5);
        this.life = 1.0; this.decay = rand(0.02, 0.05);
        this.color = color; this.size = rand(2, 6);
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
    draw(ctx) {
        ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

class SmashShockwave {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.radius = 10;
        this.maxRadius = 140;
        this.life = 1.0;
        this.decay = 0.045; 
    }
    update() {
        this.radius += (this.maxRadius - this.radius) * 0.18;
        this.life -= this.decay;
    }
    draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 5 * this.life; 
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    }
}

class FloatingText {
    constructor(x, y, text, color, size = 30) {
        this.x = x; this.y = y; this.text = text; this.color = color; this.size = size;
        this.life = 1.0; this.vy = -2;
    }
    update() { this.y += this.vy; this.life -= 0.02; }
    draw(ctx) {
        ctx.save(); ctx.globalAlpha = this.life;
        ctx.font = `bold ${this.size}px 'Black Han Sans', sans-serif`;
        ctx.fillStyle = this.color; ctx.strokeStyle = 'black'; ctx.lineWidth = 4;
        
        if (networkRole === 'guest') {
            ctx.scale(-1, 1);
            ctx.strokeText(this.text, -this.x, this.y);
            ctx.fillText(this.text, -this.x, this.y);
        } else {
            ctx.strokeText(this.text, this.x, this.y);
            ctx.fillText(this.text, this.x, this.y);
        }
        ctx.restore();
    }
}

class Shuttlecock {
    constructor() { this.reset(CW/2, 200); this.radius = 8; this.trail = []; this.isSmashShot = false; this.smashTicks = 0; this.maxSmashSpeed = 0; this.freezeTicks = 0; }
    reset(x, y) {
        this.x = x; this.y = y; this.vx = 0; this.vy = 0;
        this.active = false; this.trail = []; this.rotation = 0;
        this.isSmashShot = false; this.smashTicks = 0; this.maxSmashSpeed = 0;
        this.freezeTicks = 0;
    }
    update() {
        if (game.state === STATE.SERVE) {
            let currentServer = game.server;
            let hx = currentServer.x + (currentServer.dir === -1 ? 25 : -25);
            this.x = hx; 
            this.y = currentServer.y - 30;
            this.vx = 0;
            this.vy = 0;
            return;
        }

        if (!this.active) return;

        if (this.freezeTicks > 0) {
            this.freezeTicks--;
            return; 
        }

        if (this.isSmashShot) {
            this.smashTicks++;
            let currentDrag = DRAG;
            
            if (this.smashTicks <= 4) {
                this.vy += GRAVITY * 0.1;
                this.vx *= 0.999;
                this.vy *= 0.999;
            } else {
                let currentSpeed = Math.hypot(this.vx, this.vy);
                let minSpeed = this.maxSmashSpeed * 0.10;

                if (currentSpeed * 0.80 > minSpeed) {
                    currentDrag = 0.80;
                } else {
                    if (currentSpeed > 0) {
                        let ratio = minSpeed / currentSpeed;
                        this.vx *= ratio;
                        this.vy *= ratio;
                        currentDrag = 1.0; 
                    }
                }
            }
            
            this.vx *= currentDrag;
            this.vy *= currentDrag;
        } else {
            this.vy += GRAVITY;
            this.vx *= DRAG;
            this.vy *= DRAG;
        }

        this.x += this.vx; 
        this.y += this.vy;
        this.rotation = Math.atan2(this.vy, this.vx);

        let netHalfWidth = 5;
        if (this.x + this.radius > NET_X - netHalfWidth && this.x - this.radius < NET_X + netHalfWidth && this.y + this.radius > FLOOR_Y - NET_HEIGHT) {
            if (this.y < FLOOR_Y - NET_HEIGHT + 8 && this.vy > 0) { this.vy *= -0.6; } 
            else { this.vx *= -0.5; this.x = this.x < NET_X ? NET_X - netHalfWidth - this.radius : NET_X + netHalfWidth + this.radius; }
        }
        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > 8) this.trail.shift();
    }
    draw(ctx) {
        if (!this.active && game.state !== STATE.SERVE) return;
        if (this.trail.length > 1) {
            ctx.beginPath(); ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for(let i=1; i<this.trail.length; i++) { ctx.lineTo(this.trail[i].x, this.trail[i].y); }
            ctx.strokeStyle = this.isSmashShot ? 'rgba(255, 40, 40, 0.8)' : 'rgba(255, 255, 255, 0.4)'; 
            ctx.lineWidth = this.isSmashShot ? 8 : 4; 
            ctx.stroke();
        }
        ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation + Math.PI/2);
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-8, -15); ctx.lineTo(8, -15); ctx.closePath(); ctx.fill(); ctx.strokeStyle = '#ddd'; ctx.stroke();
        ctx.fillStyle = this.isSmashShot ? '#ff1111' : '#ffbaba'; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#000'; ctx.stroke();
        ctx.restore();
    }
}

class Character {
    constructor(side, color) {
        this.width = 40; this.height = 130;
        this.x = (side === -1) ? COURT_LEFT + 200 : COURT_RIGHT - 200;
        this.y = FLOOR_Y - this.height;
        this.vx = 0; this.vy = 0; this.dir = side;
        this.isSwinging = false; this.swingTimer = 0; this.swingDuration = 12; this.swingType = '';
        this.legAngle = 0; this.color = color; this.hitCooldown = 0;
        
        this.speed = 13.5;
        this.jumpPower = -20.1; 
        this.hitPower = 1.63;
        this.hitRange = 100;
    }
    reset(side) {
        this.dir = side;
        this.x = (side === -1) ? COURT_LEFT + 200 : COURT_RIGHT - 200;
        this.y = FLOOR_Y - this.height; this.vx = 0; this.vy = 0; this.isSwinging = false; this.swingTimer = 0;
    }
    update() {
        this.vy += GRAVITY; this.y += this.vy;
        if (this.y >= FLOOR_Y - this.height) { this.y = FLOOR_Y - this.height; this.vy = 0; }
        this.x += this.vx;
        if (Math.abs(this.vx) > 0.1 && this.y >= FLOOR_Y - this.height) { this.legAngle += 0.25; } else { this.legAngle = 0; }
        if (this.isSwinging) {
            this.swingTimer++;
            if (this.swingTimer >= this.swingDuration) { this.isSwinging = false; this.swingTimer = 0; }
        }
        if (this.hitCooldown > 0) this.hitCooldown--;
        if (this.dir === -1) { this.x = clamp(this.x, 20, NET_X - this.width - 20); } 
        else { this.x = clamp(this.x, NET_X + 20, CW - this.width - 20); }
    }
    swing(type) {
        if (!this.isSwinging && this.hitCooldown === 0) { this.isSwinging = true; this.swingTimer = 0; this.swingType = type; }
    }
    jump() { if (this.y >= FLOOR_Y - this.height - 5) { this.vy = this.jumpPower; } }

    getAngles() {
        let isAirborne = this.y < FLOOR_Y - this.height - 5;
        let sA = Math.PI / 3, eA = -Math.PI / 6, wA = -Math.PI / 6;
        
        if (isAirborne && !this.isSwinging) { sA = Math.PI; eA = 0; wA = -Math.PI / 6; }
        
        if (this.isSwinging) {
            let p = this.swingTimer / this.swingDuration;
            
            if (this.swingType === 'smash') {
                if (p < 0.25) {
                    let t = p / 0.25;
                    sA = Math.PI * 1.1 * (1 - t) + (-Math.PI / 6) * t;
                    eA = (Math.PI * 0.4) * t; wA = (Math.PI / 3) * t;
                } else {
                    let t = (p - 0.25) / 0.75; t = 1 - Math.pow(1 - t, 3);
                    sA = (-Math.PI / 6) * (1 - t) + (Math.PI * 0.6) * t;
                    eA = (Math.PI * 0.4) * (1 - t); wA = (Math.PI / 3) * (1 - t) + (-Math.PI / 4) * t;
                }
            } else if (this.swingType === 'lob') {
                if (p < 0.25) {
                    let t = p / 0.25; sA = Math.PI * (1 - t) + (-Math.PI / 4) * t; eA = (Math.PI * 0.75) * t; wA = (-Math.PI / 6) * (1 - t) + (Math.PI / 2) * t;
                } else {
                    let t = (p - 0.25) / 0.75; t = 1 - Math.pow(1 - t, 3);
                    sA = (-Math.PI / 4) * (1 - t) + (Math.PI / 2) * t; eA = (Math.PI * 0.75) * (1 - t); wA = (Math.PI / 2) * (1 - t) + (-Math.PI / 4) * t;
                }
            } else if (this.swingType === 'drop') {
                let t = 1 - Math.pow(1 - p, 2);
                sA = Math.PI * 0.6 * (1 - t) + (Math.PI * 0.2) * t;
                eA = (-Math.PI / 8) * (1 - t); wA = 0;
            } else if (this.swingType === 'drive') {
                let t = p;
                sA = Math.PI * 0.4 * (1 - t) + (-Math.PI * 0.2) * t;
                eA = (-Math.PI / 4) * (1 - t); wA = (Math.PI / 4) * t;
            }
        }
        return { sA, eA, wA };
    }

    getHitBox() {
        let faceDir = this.dir === -1 ? 1 : -1;
        let shoulderX = this.x;
        let shoulderY = this.y + 30;

        let angles = this.getAngles();
        let armSA = angles.sA * faceDir;
        let racketEA = (angles.sA + angles.eA) * faceDir;
        
        let racketHeadX = shoulderX + Math.cos(armSA) * 15 + Math.cos(racketEA) * 50;
        let racketHeadY = shoulderY + Math.sin(armSA) * 15 + Math.sin(racketEA) * 50;

        return { x: racketHeadX, y: racketHeadY, r: this.hitRange }; 
    }

    draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y);
        let faceDir = this.dir === -1 ? 1 : -1;
        ctx.scale(faceDir, 1);
        ctx.fillStyle = this.color; ctx.beginPath(); ctx.roundRect(-10, 20, 20, 60, 10); ctx.fill();
        ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(0, 5, 15, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(5, 2, 3, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#333'; ctx.lineWidth = 6; ctx.lineCap = 'round';
        let isAirborne = this.y < FLOOR_Y - this.height - 5;
        if (isAirborne && !this.isSwinging) {
            ctx.beginPath(); ctx.moveTo(-5, 75); ctx.lineTo(-20, 100); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(5, 75); ctx.lineTo(-10, 105); ctx.stroke();
        } else if (isAirborne && this.isSwinging) {
            ctx.beginPath(); ctx.moveTo(-5, 75); ctx.lineTo(10, 125); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(5, 75); ctx.lineTo(25, 120); ctx.stroke();
        } else {
            let legAnim = Math.sin(this.legAngle) * 22; 
            ctx.beginPath(); ctx.moveTo(-5, 75); ctx.lineTo(-5 - legAnim, 130); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(5, 75); ctx.lineTo(5 + legAnim, 130); ctx.stroke();
        }
        
        ctx.save(); ctx.translate(0, 30);
        let angles = this.getAngles();
        
        ctx.rotate(angles.sA); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(15, 0); ctx.strokeStyle = '#ffdbac'; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.stroke();
        ctx.translate(15, 0); ctx.rotate(angles.eA); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(15, 0); ctx.stroke();
        ctx.translate(15, 0); ctx.rotate(angles.wA); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(25, 0); ctx.strokeStyle = '#777'; ctx.lineWidth = 3; ctx.stroke();
        ctx.beginPath(); ctx.ellipse(37, 0, 12, 18, 0, 0, Math.PI * 2); ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill();
        ctx.restore(); ctx.restore();
    }
}

class Game {
    constructor() {
        this.p1 = new Character(-1, '#1e90ff'); 
        this.p2 = new Character(1, '#ff4757');  
        this.birdie = new Shuttlecock();
        this.particles = []; this.texts = []; this.shockwaves = []; 
        this.state = STATE.MENU;
        this.score = { p1: 0, p2: 0 };
        this.sets = { p1: 0, p2: 0 };
        this.server = this.p1;
        this.playerSide = -1;
        this.shakeTimer = 0; this.msgTimer = 0;
    }
    startMatch() {
        this.score = { p1: 0, p2: 0 }; this.sets = { p1: 0, p2: 0 };
        this.playerSide = -1; this.server = this.p1;
        this.startSet();
    }
    startSet() {
        this.score = { p1: 0, p2: 0 };
        this.p1.reset(-1); this.p2.reset(1);
        this.readyServe(this.server);
        document.getElementById('msg-overlay').classList.remove('show');
    }
    readyServe(serverChar) {
        this.state = STATE.SERVE; this.server = serverChar; this.birdie.active = false;
        let hx = serverChar.x + (serverChar.dir === -1 ? 25 : -25);
        this.birdie.reset(hx, serverChar.y - 20);
    }
    addScore(winner) {
        this.state = STATE.SCORE_WAIT; this.msgTimer = 120;
        let msg = winner === this.p1 ? "P1 POINT!" : "P2 POINT!";
        let color = winner === this.p1 ? "#00f2fe" : "#ff4757";
        this.texts.push(new FloatingText(CW/2, CH/2, msg, color, 60));

        if (winner === this.p1) this.score.p1++; else this.score.p2++;
        this.server = winner;

        SoundEngine.playScorePoint();

        broadcastData('score_sync', { score: this.score, serverSide: this.server === this.p1 ? 'p1' : 'p2' });

        if (this.score.p1 >= 21 || this.score.p2 >= 21) { this.handleSetEnd(winner); }
    }
    handleSetEnd(winner) {
        this.state = STATE.SET_OVER; this.msgTimer = 180;
        if (winner === this.p1) { this.sets.p1++; showUIMessage("SET WIN (P1)!"); } 
        else { this.sets.p2++; showUIMessage("SET WIN (P2)!"); }
        
        broadcastData('set_end_sync', { sets: this.sets, state: this.state });
    }
    checkHit(char) {
        if (!char.isSwinging || char.hitCooldown > 0 || char.swingTimer > char.swingDuration * 0.75) return;
        let hitbox = char.getHitBox();
        let dist = getDistance(hitbox.x, hitbox.y, this.birdie.x, this.birdie.y);

        if (dist < hitbox.r + this.birdie.radius) {
            this.state = STATE.PLAYING; this.birdie.active = true; char.hitCooldown = 20;
            this.birdie.freezeTicks = 4;

            let powerMult = char.hitPower;
            let faceDir = char.dir === -1 ? 1 : -1;
            
            let frontDist = (this.birdie.x - char.x) * faceDir;
            let positionMultiplier = clamp(1.0 + (frontDist / 60) * 0.35, 0.7, 1.4); 

            let vx = 0, vy = 0, hitText = "", color = "#fff";
            this.birdie.isSmashShot = false;
            this.birdie.smashTicks = 0;

            if (char.swingType === 'smash') {
                this.birdie.isSmashShot = true; 
                let angleDeg = 25; let rad = angleDeg * (Math.PI / 180);
                
                let force = 66 * (powerMult * positionMultiplier);
                vx = force * Math.cos(rad) * faceDir; vy = force * Math.sin(rad); 
                
                this.birdie.maxSmashSpeed = Math.hypot(vx, vy);

                this.shockwaves.push(new SmashShockwave(this.birdie.x, this.birdie.y));

                SoundEngine.playSmashHit();

                let isPerfect = positionMultiplier > 1.25;
                hitText = isPerfect ? "PERFECT SMASH!" : "SMASH!"; color = isPerfect ? "#ff0000" : "#ff4757";
                this.shakeScreen(isPerfect ? 25 : 15); this.spawnParticles(this.birdie.x, this.birdie.y, color, isPerfect ? 30 : 20);
            } else {
                SoundEngine.playNormalHit();

                if (char.swingType === 'lob') {
                    let safeTargetX = char.dir === -1 ? COURT_RIGHT - rand(10, 40) : COURT_LEFT + rand(10, 40);
                    if (positionMultiplier < 0.95) { safeTargetX += char.dir === -1 ? -((0.95 - positionMultiplier) * 350) : ((0.95 - positionMultiplier) * 350); }
                    vy = -24; vx = (safeTargetX - this.birdie.x) * 0.019;
                    hitText = "CLEAR"; color = "#2ed573"; this.spawnParticles(this.birdie.x, this.birdie.y, color, 10);
                } else if (char.swingType === 'drop') {
                    let dropTargetX = NET_X + (char.dir === -1 ? rand(70, 130) : -rand(70, 130));
                    let dx = dropTargetX - this.birdie.x;
                    if (this.birdie.y < FLOOR_Y - NET_HEIGHT - 20) {
                        vy = (Math.abs(NET_X - this.birdie.x) > 250) ? -2 : 1; vx = dx * 0.025 * positionMultiplier;
                    } else {
                        vy = -9.5 * positionMultiplier; vx = dx * 0.022;
                    }
                    hitText = "DROP"; color = "#00cec9"; this.spawnParticles(this.birdie.x, this.birdie.y, color, 10);
                } else { 
                    vx = (26 * positionMultiplier) * faceDir; vy = -1;
                    hitText = "DRIVE"; color = "#feca57"; this.spawnParticles(this.birdie.x, this.birdie.y, color, 10);
                }
            }

            this.birdie.vx = vx; this.birdie.vy = vy;
            this.texts.push(new FloatingText(this.birdie.x, this.birdie.y - 30, hitText, color));
            
            broadcastData('hit_effect', { x: this.birdie.x, y: this.birdie.y, hitText, color, type: char.swingType });
        }
    }
    update() {
        if (this.state === STATE.MENU || this.state === STATE.MATCH_OVER) return;
        if (this.shakeTimer > 0) this.shakeTimer--;

        let myChar = (networkRole === 'host') ? this.p1 : this.p2;
        
        myChar.vx = 0;
        
        // 게스트 상태일 경우 화면이 반전되므로 A와 D의 이동 처리를 서로 교차시킴
        if (networkRole === 'guest') {
            if (keys.a) myChar.vx = myChar.speed;
            if (keys.d) myChar.vx = -myChar.speed;
        } else {
            if (keys.a) myChar.vx = -myChar.speed;
            if (keys.d) myChar.vx = myChar.speed;
        }
        
        if (keys.w) myChar.jump();

        let swType = '';
        if (isJustPressed('ArrowUp')) swType = 'lob';
        else if (isJustPressed('ArrowDown')) swType = 'smash';
        if (isJustPressed('ArrowLeft')) swType = 'drop';
        else if (isJustPressed('ArrowRight')) swType = 'drive';

        if (swType) {
            myChar.swing(swType);
            if (networkRole === 'guest') {
                broadcastData('guest_swing_input', { type: swType });
            }
        }

        this.p1.update();
        this.p2.update();

        broadcastData('player_pos', { x: myChar.x, y: myChar.y, vy: myChar.vy, isSwinging: myChar.isSwinging, swingType: myChar.swingType });

        if (networkRole === 'host') {
            this.birdie.update();
            this.checkHit(this.p1);
            this.checkHit(this.p2);

            if (this.state === STATE.PLAYING && this.birdie.y > FLOOR_Y) {
                this.birdie.y = FLOOR_Y; this.birdie.vy = -this.birdie.vy * 0.3; this.birdie.vx *= 0.5;
                let pointWinner;
                if (this.birdie.x < 50 || this.birdie.x > CW - 50) {
                    pointWinner = (this.birdie.vx > 0) ? (this.playerSide === -1 ? this.p2 : this.p1) : (this.playerSide === 1 ? this.p2 : this.p1);
                } else {
                    pointWinner = (this.birdie.x < NET_X) ? this.p2 : this.p1;
                }
                this.addScore(pointWinner);
            }
            broadcastData('ball_sync', { x: this.birdie.x, y: this.birdie.y, vx: this.birdie.vx, vy: this.birdie.vy, active: this.birdie.active, state: this.state, isSmashShot: this.birdie.isSmashShot, smashTicks: this.birdie.smashTicks, maxSmashSpeed: this.birdie.maxSmashSpeed, freezeTicks: this.birdie.freezeTicks });
        } else {
            this.birdie.update(); 
        }

        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update(); if (this.particles[i].life <= 0) this.particles.splice(i, 1);
        }
        for (let i = this.texts.length - 1; i >= 0; i--) {
            this.texts[i].update(); if (this.texts[i].life <= 0) this.texts.splice(i, 1);
        }
        for (let i = this.shockwaves.length - 1; i >= 0; i--) {
            this.shockwaves[i].update(); if (this.shockwaves[i].life <= 0) this.shockwaves.splice(i, 1);
        }

        if (this.msgTimer > 0) {
            this.msgTimer--;
            if (this.msgTimer <= 0) {
                if (this.state === STATE.SCORE_WAIT) { this.readyServe(this.server); } 
                else if (this.state === STATE.SET_OVER) {
                    if (this.sets.p1 >= 2 || this.sets.p2 >= 2) { this.state = STATE.MATCH_OVER; showMatchResult(); } 
                    else { this.playerSide *= -1; this.startSet(); }
                }
            }
        }
    }
    draw() {
        ctx.clearRect(0, 0, CW, CH);
        ctx.save();
        
        if (networkRole === 'guest') {
            ctx.translate(CW, 0);
            ctx.scale(-1, 1);
        }

        if (this.shakeTimer > 0) { ctx.translate(rand(-5, 5) * (this.shakeTimer/15), rand(-5, 5) * (this.shakeTimer/15)); }

        let bgGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_Y);
        bgGrad.addColorStop(0, '#1a1a2e'); bgGrad.addColorStop(1, '#16213e');
        ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, CW, CH);

        ctx.fillStyle = '#cf9963'; ctx.fillRect(0, FLOOR_Y, CW, CH - FLOOR_Y);
        ctx.fillStyle = '#fff'; ctx.fillRect(50, FLOOR_Y, CW - 100, 5); ctx.fillRect(NET_X - 2, FLOOR_Y, 4, 10);
        ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0, FLOOR_Y + 5, CW, 15);

        ctx.strokeStyle = '#555'; ctx.lineWidth = 10; ctx.beginPath(); ctx.moveTo(NET_X, FLOOR_Y); ctx.lineTo(NET_X, FLOOR_Y - NET_HEIGHT); ctx.stroke();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; ctx.fillRect(NET_X - 2, FLOOR_Y - NET_HEIGHT, 4, NET_HEIGHT);
        ctx.fillStyle = '#fff'; ctx.fillRect(NET_X - 4, FLOOR_Y - NET_HEIGHT, 8, 10);

        this.drawShadow(this.p1.x, FLOOR_Y, 30); this.drawShadow(this.p2.x, FLOOR_Y, 30);
        if(this.birdie.active || game.state === STATE.SERVE) this.drawShadow(this.birdie.x, FLOOR_Y, 10 + (FLOOR_Y - this.birdie.y)*0.02);

        this.p1.draw(ctx); this.p2.draw(ctx); this.birdie.draw(ctx);
        this.particles.forEach(p => p.draw(ctx)); this.texts.forEach(t => t.draw(ctx));
        this.shockwaves.forEach(sw => sw.draw(ctx)); 

        ctx.restore();
        
        this.drawHUD();
    }
    drawShadow(x, y, radius) {
        let safeRadius = Math.max(0, radius); if (safeRadius === 0) return;
        ctx.save(); ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.scale(1, 0.2); ctx.arc(x, y / 0.2, safeRadius, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }
    drawHUD() {
        if (this.state === STATE.MENU) return;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; ctx.beginPath(); ctx.roundRect(CW/2 - 200, 20, 400, 80, 15); ctx.fill();
        ctx.font = "bold 40px 'Black Han Sans', sans-serif"; ctx.textAlign = "center";
        
        if (networkRole === 'guest') {
            ctx.fillStyle = '#ff4757'; ctx.fillText(this.score.p2, CW/2 - 100, 75);
            ctx.fillStyle = '#00f2fe'; ctx.fillText(this.score.p1, CW/2 + 100, 75);
        } else {
            ctx.fillStyle = '#00f2fe'; ctx.fillText(this.score.p1, CW/2 - 100, 75);
            ctx.fillStyle = '#ff4757'; ctx.fillText(this.score.p2, CW/2 + 100, 75);
        }

        ctx.fillStyle = '#fff'; ctx.font = "bold 20px 'Noto Sans KR', sans-serif";
        ctx.fillText(`SET ${this.sets.p1 + this.sets.p2 + 1}`, CW/2, 45);
        
        let drawSetCircle = (x, y, won) => {
            ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2);
            ctx.fillStyle = won ? '#ffd700' : 'rgba(255,255,255,0.2)'; ctx.fill();
        };
        if (networkRole === 'guest') {
            drawSetCircle(CW/2 - 60, 65, this.sets.p2 >= 1); drawSetCircle(CW/2 - 40, 65, this.sets.p2 >= 2);
            drawSetCircle(CW/2 + 40, 65, this.sets.p1 >= 1); drawSetCircle(CW/2 + 60, 65, this.sets.p1 >= 2);
        } else {
            drawSetCircle(CW/2 - 60, 65, this.sets.p1 >= 1); drawSetCircle(CW/2 - 40, 65, this.sets.p1 >= 2);
            drawSetCircle(CW/2 + 40, 65, this.sets.p2 >= 1); drawSetCircle(CW/2 + 60, 65, this.sets.p2 >= 2);
        }
    }
    shakeScreen(amount) { this.shakeTimer = amount; }
    spawnParticles(x, y, color, count) {
        for(let i=0; i<count; i++) { this.particles.push(new Particle(x, y, color)); }
    }
}

let game = new Game();

function initMultimulti(role) {
    if (!sbClient) { alert("상단의 수파베이스 정보를 먼저 올바르게 입력해줘!"); return; }
    const roomName = document.getElementById('room-input').value.trim();
    if (!roomName) { alert("방 이름을 적어줘!"); return; }

    networkRole = role;
    document.getElementById('room-status').innerText = `${roomName}번방 동기화 연결 중...`;

    SoundEngine.init();

    gameSession = sbClient.channel(roomName, { config: { broadcast: { self: false, ack: false } } });

    gameSession
    .on('broadcast', { event: 'player_pos' }, ({ payload }) => {
        let targetChar = (networkRole === 'host') ? game.p2 : game.p1;
        targetChar.x = payload.x; targetChar.y = payload.y; targetChar.vy = payload.vy;
        targetChar.isSwinging = payload.isSwinging; targetChar.swingType = payload.swingType;
    })
    .on('broadcast', { event: 'guest_swing_input' }, ({ payload }) => {
        if (networkRole === 'host') {
            game.p2.swing(payload.type);
        }
    })
    .on('broadcast', { event: 'ball_sync' }, ({ payload }) => {
        if (networkRole === 'guest') {
            if (game.state !== STATE.SERVE) {
                if (payload.freezeTicks > 0) {
                    game.birdie.x = payload.x;
                    game.birdie.y = payload.y;
                } else {
                    if (getDistance(game.birdie.x, game.birdie.y, payload.x, payload.y) > 20) {
                        game.birdie.x = payload.x; game.birdie.y = payload.y;
                    } else {
                        game.birdie.x = game.birdie.x * 0.4 + payload.x * 0.6;
                        game.birdie.y = game.birdie.y * 0.4 + payload.y * 0.6;
                    }
                }
            }
            game.birdie.vx = payload.vx; game.birdie.vy = payload.vy;
            game.birdie.active = payload.active; game.state = payload.state;
            game.birdie.isSmashShot = payload.isSmashShot; game.birdie.smashTicks = payload.smashTicks;
            game.birdie.maxSmashSpeed = payload.maxSmashSpeed;
            game.birdie.freezeTicks = payload.freezeTicks; 
        }
    })
    .on('broadcast', { event: 'score_sync' }, ({ payload }) => {
        if (networkRole === 'guest') {
            game.score = payload.score;
            game.server = payload.serverSide === 'p1' ? game.p1 : game.p2;
            SoundEngine.playScorePoint();
        }
    })
    .on('broadcast', { event: 'set_end_sync' }, ({ payload }) => {
        if (networkRole === 'guest') {
            game.sets = payload.sets; game.state = payload.state;
            let isP2Win = game.sets.p2 > game.sets.p1; 
            showUIMessage(isP2Win ? "SET WIN (P2)!" : "SET WIN (P1)!");
        }
    })
    .on('broadcast', { event: 'hit_effect' }, ({ payload }) => {
        if (networkRole === 'guest') {
            game.texts.push(new FloatingText(payload.x, payload.y - 30, payload.hitText, payload.color));
            game.spawnParticles(payload.x, payload.y, payload.color, payload.type === 'smash' ? 20 : 10);
            
            if (payload.type === 'smash') {
                SoundEngine.playSmashHit();
                game.shakeScreen(15);
                game.shockwaves.push(new SmashShockwave(payload.x, payload.y));
            } else {
                SoundEngine.playNormalHit();
            }
            game.birdie.freezeTicks = 4; 
        }
    })
    .subscribe((status) => {
        if (status === 'SUBSCRIBED') {
            isConnected = true;
            document.getElementById('menu-ui').classList.add('hidden');
            game.state = STATE.SERVE;
            game.startMatch();
        }
    });
}

function broadcastData(event, payload) {
    if (isConnected && gameSession) { send({ type: 'broadcast', event, payload }); }
}

function send(packet) { if (gameSession) gameSession.send(packet); }

function showUIMessage(text) {
    let msgEl = document.getElementById('msg-overlay');
    if (networkRole === 'guest') {
        if (text.includes("P1")) text = text.replace("P1", "상대방");
        else if (text.includes("P2")) text = text.replace("P2", "나");
    } else {
        if (text.includes("P1")) text = text.replace("P1", "나");
        else if (text.includes("P2")) text = text.replace("P2", "상대방");
    }
    msgEl.innerText = text; msgEl.classList.add('show');
    setTimeout(() => { msgEl.classList.remove('show'); }, 2000);
}

function showMatchResult() {
    let isP1Win = game.sets.p1 >= 2;
    if (networkRole === 'guest') {
        showUIMessage(isP1Win ? "MATCH OVER: 상대방 WIN!" : "MATCH OVER: 나 WIN!");
    } else {
        showUIMessage(isP1Win ? "MATCH OVER: 나 WIN!" : "MATCH OVER: 상대방 WIN!");
    }
}

let lastTime = performance.now();
const timestep = 1000 / 30; 

function loop(currentTime) {
    let elapsed = currentTime - lastTime;
    
    while (elapsed >= timestep) {
        game.update();
        game.update();
        
        elapsed -= timestep;
        lastTime += timestep;
    }
    
    game.draw();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
