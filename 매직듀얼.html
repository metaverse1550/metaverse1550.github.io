<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Duel - 실시간 탑다운 마법 결투</title>
    <style>
        /* 다크 판타지풍 테마 설정 */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0a14;
            color: #e2d9f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background-color: #120e1e;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            cursor: crosshair;
        }

        /* UI 오버레이 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 비활성화 상태를 보여주는 스크린 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 10, 20, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
            pointer-events: auto;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: #a855f7;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.6), 0 0 40px rgba(168, 85, 247, 0.3);
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 40px;
            text-align: center;
            max-width: 500px;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%);
            color: #fff;
            border: 2px solid #a855f7;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.8);
            background: linear-gradient(135deg, #a855f7 0%, #6d28d9 100%);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* 튜토리얼 안내판 */
        .controls-info {
            margin-top: 30px;
            background: rgba(30, 27, 46, 0.6);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            padding: 20px;
            max-width: 450px;
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .controls-info h3 {
            margin-top: 0;
            color: #c084fc;
            text-align: center;
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
            padding-bottom: 8px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .key {
            background: #334155;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            color: #fff;
            border-bottom: 2px solid #1e293b;
        }

        /* 승리/패배 타이틀 스타일 */
        .result-title {
            font-size: 4rem;
            margin-bottom: 20px;
            font-weight: 900;
            letter-spacing: 5px;
        }

        .result-title.win {
            color: #10b981;
            text-shadow: 0 0 25px rgba(16, 185, 129, 0.6);
        }

        .result-title.lose {
            color: #ef4444;
            text-shadow: 0 0 25px rgba(239, 68, 68, 0.6);
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 메인 캔버스 -->
    <canvas id="gameCanvas"></canvas>

    <!-- 시작 스크린 -->
    <div id="start-screen" class="screen">
        <h1>Magic Duel</h1>
        <p class="subtitle">어둠이 짙게 깔린 마법학교 강당. 최강의 마법사 직위를 두고 펼치는 1대1 실시간 원소 결투가 시작됩니다.</p>
        <button class="btn" id="start-btn">결투 시작</button>
        <div class="controls-info">
            <h3>조작 가이드</h3>
            <div class="controls-grid">
                <div class="control-item">
                    <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> / 방향키 이동
                </div>
                <div class="control-item">
                    <span class="key">Mouse L</span> 마법 발사
                </div>
                <div class="control-item">
                    <span class="key">1</span>~<span class="key">5</span> 카드 선택
                </div>
                <div class="control-item">
                    <span class="key">Space</span> 상자 열기 (근접 시)
                </div>
            </div>
            <p style="font-size: 0.8rem; color: #a78bfa; margin-top: 15px; text-align: center; margin-bottom: 0;">
                💡 맵 곳곳에 배치된 보물상자에서 강력한 주문 카드를 수급하세요!
            </p>
        </div>
    </div>

    <!-- 게임 결과 스크린 -->
    <div id="game-over-screen" class="screen hidden">
        <div id="result-text" class="result-title">VICTORY</div>
        <p class="subtitle" id="result-sub">당신은 뛰어난 결투술로 적 마법사를 쓰러뜨렸습니다.</p>
        <button class="btn" id="restart-btn">다시 도전</button>
    </div>
</div>

<script>
    // ====================================================
    // GLOBAL CONFIG & INITIALIZATION
    // ====================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 화면 비율 동적 설정
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // 마우스 상태 추적
    const mouse = {
        x: 0,
        y: 0,
        worldX: 0,
        worldY: 0,
        isDown: false
    };

    window.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });

    window.addEventListener('mousedown', (e) => {
        if (e.button === 0) mouse.isDown = true;
    });

    window.addEventListener('mouseup', (e) => {
        if (e.button === 0) mouse.isDown = false;
    });

    // 키보드 입력 상태 추적
    const keys = {};
    window.addEventListener('keydown', (e) => {
        keys[e.key.toLowerCase()] = true;
        keys[e.code] = true; // 방향키 대응용 (ArrowUp, ArrowDown 등)
    });
    window.addEventListener('keyup', (e) => {
        keys[e.key.toLowerCase()] = false;
        keys[e.code] = false;
    });

    // ====================================================
    // CARD TYPE DEFINITION
    // ====================================================
    // 속도, 데미지, 쿨타임, 파티클 이펙트 성향을 다르게 가진 주문 카드 풀 정의
    const CARD_TYPES = {
        FIREBALL: {
            id: 'FIREBALL',
            name: '파이어볼',
            color: '#ff4d00',
            glowColor: 'rgba(255, 77, 0, 0.8)',
            speed: 10,
            damage: 25,
            size: 12,
            cooldown: 400,
            description: '적에게 폭발성 화염을 발사합니다. 표준적인 공격 마법.',
            icon: '🔥'
        },
        FROSTBOLT: {
            id: 'FROSTBOLT',
            name: '프로스트볼트',
            color: '#00ccff',
            glowColor: 'rgba(0, 204, 255, 0.8)',
            speed: 13,
            damage: 15,
            size: 8,
            cooldown: 250,
            description: '냉기 탄환을 고속으로 발사합니다. 빠른 시전 속도.',
            icon: '❄️'
        },
        ARCANE_BLAST: {
            id: 'ARCANE_BLAST',
            name: '아케인 블래스트',
            color: '#d400ff',
            glowColor: 'rgba(212, 0, 255, 0.8)',
            speed: 7,
            damage: 45,
            size: 20,
            cooldown: 800,
            description: '거대하고 파괴적인 비전 구체를 시전합니다. 느리지만 극도로 강력함.',
            icon: '🔮'
        },
        EARTH_SPIKE: {
            id: 'EARTH_SPIKE',
            name: '어스 스파이크',
            color: '#eab308',
            glowColor: 'rgba(234, 179, 8, 0.8)',
            speed: 9,
            damage: 30,
            size: 15,
            cooldown: 500,
            description: '견고한 대지의 가시를 투사하여 날립니다. 무거운 타격.',
            icon: '💎'
        }
    };

    const CARD_POOL = [CARD_TYPES.FIREBALL, CARD_TYPES.FROSTBOLT, CARD_TYPES.ARCANE_BLAST, CARD_TYPES.EARTH_SPIKE];

    // ====================================================
    // HELPER FUNCTIONS (MATH, DRAWING, EFFECTS)
    // ====================================================
    function clamp(val, min, max) {
        return Math.min(Math.max(val, min), max);
    }

    function distance(x1, y1, x2, y2) {
        return Math.hypot(x2 - x1, y2 - y1);
    }

    // 부드러운 보간 (Easing)
    function lerp(start, end, amt) {
        return (1 - amt) * start + amt * end;
    }

    // ====================================================
    // CLASSES
    // ====================================================

    // --- PARTICLE CLASS ---
    class Particle {
        constructor() {
            this.reset();
        }

        reset() {
            this.active = false;
            this.x = 0;
            this.y = 0;
            this.vx = 0;
            this.vy = 0;
            this.color = '#fff';
            this.size = 0;
            this.alpha = 1;
            this.decay = 0.02;
            this.glow = false;
            this.glowColor = '';
        }

        init(x, y, vx, vy, color, size, decay, glow = false, glowColor = '') {
            this.x = x;
            this.y = y;
            this.vx = vx;
            this.vy = vy;
            this.color = color;
            this.size = size;
            this.alpha = 1;
            this.decay = decay;
            this.glow = glow;
            this.glowColor = glowColor;
            this.active = true;
        }

        update() {
            if (!this.active) return;
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= this.decay;
            if (this.alpha <= 0) {
                this.active = false;
            }
        }

        draw(ctx, camera) {
            if (!this.active) return;
            ctx.save();
            ctx.globalAlpha = this.alpha;
            
            if (this.glow) {
                ctx.shadowBlur = this.size * 2;
                ctx.shadowColor = this.glowColor || this.color;
            }

            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x - camera.x, this.y - camera.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // --- EXPANDED OBJECT POOLING SYSTEM ---
    class ParticlePool {
        constructor(size = 400) {
            this.pool = Array.from({ length: size }, () => new Particle());
        }

        spawn(x, y, vx, vy, color, size, decay, glow = false, glowColor = '') {
            const particle = this.pool.find(p => !p.active);
            if (particle) {
                particle.init(x, y, vx, vy, color, size, decay, glow, glowColor);
            }
        }

        // 마법 피격/폭발 이펙트 생성
        explode(x, y, color, count = 15, maxSpeed = 5, glowColor = '') {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * maxSpeed + 1;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                const size = Math.random() * 4 + 2;
                const decay = Math.random() * 0.03 + 0.015;
                this.spawn(x, y, vx, vy, color, size, decay, true, glowColor);
            }
        }

        // 트레일 파티클 생성
        spawnTrail(x, y, color, glowColor = '') {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 0.8;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            this.spawn(x, y, vx, vy, color, Math.random() * 3 + 2, 0.04, true, glowColor);
        }
    }

    // --- DAMAGE NUMBER EFFECT CLASS ---
    class DamageNumber {
        constructor(x, y, amount, color) {
            this.x = x;
            this.y = y;
            this.amount = amount;
            this.color = color;
            this.alpha = 1;
            this.vy = -1.5; // 위로 서서히 올라감
            this.active = true;
        }

        update() {
            this.y += this.vy;
            this.alpha -= 0.02;
            if (this.alpha <= 0) {
                this.active = false;
            }
        }

        draw(ctx, camera) {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.font = 'bold 20px "Segoe UI", sans-serif';
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.textAlign = 'center';
            ctx.fillText(Math.round(this.amount), this.x - camera.x, this.y - camera.y);
            ctx.restore();
        }
    }

    // --- MAP ELEMENT: WALL, COLLIDER ---
    class Wall {
        constructor(x, y, w, h, type = 'solid') {
            this.x = x;
            this.y = y;
            this.w = w;
            this.h = h;
            this.type = type; // 'solid' or 'column'
        }

        draw(ctx, camera) {
            // 벽 그리기 (다크 판타지 고딕 석조 벽 느낌)
            ctx.save();
            
            // 바닥 그림자 효과
            ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 8;

            const drawX = this.x - camera.x;
            const drawY = this.y - camera.y;

            // 벽 몸체 그래디언트
            const wallGrad = ctx.createLinearGradient(drawX, drawY, drawX, drawY + this.h);
            wallGrad.addColorStop(0, '#2e2538');
            wallGrad.addColorStop(0.5, '#1b1424');
            wallGrad.addColorStop(1, '#0e0b14');

            ctx.fillStyle = wallGrad;
            ctx.fillRect(drawX, drawY, this.w, this.h);

            // 벽 테두리 선 및 세부 묘사
            ctx.strokeStyle = 'rgba(124, 58, 237, 0.3)';
            ctx.lineWidth = 2;
            ctx.strokeRect(drawX, drawY, this.w, this.h);

            // 돌 무늬 추가 디자인
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.lineWidth = 1;
            for (let offset = 20; offset < this.w; offset += 40) {
                ctx.beginPath();
                ctx.moveTo(drawX + offset, drawY);
                ctx.lineTo(drawX + offset, drawY + this.h);
                ctx.stroke();
            }
            
            ctx.restore();
        }
    }

    // --- CHEST CLASS (상자 시스템) ---
    class Chest {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.w = 50;
            this.h = 40;
            this.active = true;
            this.pulseTimer = 0;
            this.glowIntensity = 5;
        }

        update() {
            this.pulseTimer += 0.05;
            this.glowIntensity = 5 + Math.sin(this.pulseTimer) * 5;
        }

        draw(ctx, camera) {
            if (!this.active) return;
            ctx.save();
            const drawX = this.x - camera.x;
            const drawY = this.y - camera.y;

            // 황금빛 글로우 효과 (상자에 마법 에너지가 가득 찬 연출)
            ctx.shadowBlur = this.glowIntensity + 10;
            ctx.shadowColor = 'rgba(168, 85, 247, 0.8)';

            // 상자 하단 몸체
            ctx.fillStyle = '#4c1d95';
            ctx.fillRect(drawX, drawY + 15, this.w, this.h - 15);
            ctx.strokeStyle = '#c084fc';
            ctx.lineWidth = 2;
            ctx.strokeRect(drawX, drawY + 15, this.w, this.h - 15);

            // 상자 뚜껑
            ctx.fillStyle = '#6d28d9';
            ctx.beginPath();
            ctx.roundRect(drawX - 3, drawY, this.w + 6, 17, [5, 5, 0, 0]);
            ctx.fill();
            ctx.stroke();

            // 황금 잠금 장치
            ctx.fillStyle = '#f59e0b';
            ctx.fillRect(drawX + (this.w / 2) - 6, drawY + 12, 12, 10);
            ctx.strokeStyle = '#d97706';
            ctx.strokeRect(drawX + (this.w / 2) - 6, drawY + 12, 12, 10);

            // 상자 주변 안내 문구 (플레이어 거리 검사용 바깥쪽에서 판별)
            ctx.restore();
        }
    }

    // --- PROJECTILE CLASS (마법 발사체) ---
    class Projectile {
        constructor(x, y, angle, speed, damage, size, color, glowColor, owner) {
            this.x = x;
            this.y = y;
            this.angle = angle;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.speed = speed;
            this.damage = damage;
            this.size = size;
            this.color = color;
            this.glowColor = glowColor;
            this.owner = owner; // 'player' or 'enemy'
            this.active = true;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
        }

        draw(ctx, camera) {
            ctx.save();
            const drawX = this.x - camera.x;
            const drawY = this.y - camera.y;

            // 글로우 광원 효과 적용
            ctx.shadowBlur = this.size * 2.5;
            ctx.shadowColor = this.glowColor;

            // 발사체 내핵(하얀색 코어)과 외핵(마법 컬러) 렌더링
            const grad = ctx.createRadialGradient(drawX, drawY, 0, drawX, drawY, this.size);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.3, this.color);
            grad.addColorStop(1, 'transparent');

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(drawX, drawY, this.size, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }
    }

    // --- CHARACTER BASE CLASS (공통 캐릭터 속성) ---
    class Character {
        constructor(x, y, color, role) {
            this.x = x;
            this.y = y;
            this.radius = 24;
            this.speed = 4.5;
            this.color = color;
            this.role = role; // 'player' or 'enemy'
            
            this.maxHp = 100;
            this.hp = 100;
            this.shield = 0;

            // 이동 시 물리 넉백 및 모션용 변수
            this.vx = 0;
            this.vy = 0;
            this.angle = 0;
            this.lastAngle = 0;
            this.isMoving = false;
            
            // 모션 애니메이션용 타이머
            this.bobTimer = 0;
            this.bobOffset = 0;

            // 쿨타임 관리
            this.lastShotTime = 0;
            
            // 보유 카드 리스트 (손패)
            this.cards = [];
            this.maxCards = 5;
            this.selectedCardIdx = 0;
        }

        // 기본 충돌 및 업데이트 처리
        updatePhysics(mapWidth, mapHeight, walls) {
            // 부드러운 저항 감속
            this.vx *= 0.85;
            this.vy *= 0.85;

            // 속도가 극히 낮으면 0으로 대입
            if (Math.abs(this.vx) < 0.05) this.vx = 0;
            if (Math.abs(this.vy) < 0.05) this.vy = 0;

            // 캐릭터 공중 들썩임 휨 애니메이션 (이동 시 생동감 부여)
            if (this.isMoving) {
                this.bobTimer += 0.25;
                this.bobOffset = Math.sin(this.bobTimer) * 4;
            } else {
                this.bobOffset = lerp(this.bobOffset, 0, 0.1);
            }

            // 벽/오브젝트 충돌 처리 (X축)
            this.x += this.vx;
            this.handleWallCollision(walls, 'x');

            // 벽/오브젝트 충돌 처리 (Y축)
            this.y += this.vy;
            this.handleWallCollision(walls, 'y');

            // 맵 월드 경계 고정
            this.x = clamp(this.x, this.radius, mapWidth - this.radius);
            this.y = clamp(this.y, this.radius, mapHeight - this.radius);
        }

        // 축별 벽 충돌 해결 (Sliding Collision)
        handleWallCollision(walls, axis) {
            for (const wall of walls) {
                // 원과 사각형 충돌 검사
                const closestX = clamp(this.x, wall.x, wall.x + wall.w);
                const closestY = clamp(this.y, wall.y, wall.y + wall.h);
                const dist = distance(this.x, this.y, closestX, closestY);

                if (dist < this.radius) {
                    // 충돌 발생 시 축방향으로 밀어냄
                    const overlap = this.radius - dist;
                    if (overlap > 0) {
                        const dx = this.x - closestX;
                        const dy = this.y - closestY;
                        const angle = Math.atan2(dy, dx);

                        if (axis === 'x') {
                            this.x += Math.cos(angle) * overlap;
                            this.vx = 0; // 마찰에 의한 속도 감쇄 효과
                        } else if (axis === 'y') {
                            this.y += Math.sin(angle) * overlap;
                            this.vy = 0;
                        }
                    }
                }
            }
        }

        // 카드 획득 메서드
        addCard(card) {
            if (this.cards.length < this.maxCards) {
                this.cards.push({ ...card });
                return true;
            }
            return false; // 손패가 가득 참
        }

        // 피격 시 호출
        takeDamage(damage) {
            this.hp = Math.max(0, this.hp - damage);
            // 넉백 벡터 임의 충격 부여는 투사체 피격 시 처리됨
        }

        // 마법사 그리기
        drawWizard(ctx, camera, lookAtX, lookAtY) {
            const drawX = this.x - camera.x;
            const drawY = this.y - camera.y + this.bobOffset;

            this.angle = Math.atan2(lookAtY - this.y, lookAtX - this.x);

            ctx.save();
            // 캐릭터 바닥 미세 그림자
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.beginPath();
            ctx.ellipse(drawX, drawY + this.radius - 2, this.radius * 0.9, this.radius * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();

            // 마법사 본체 회전
            ctx.translate(drawX, drawY);
            ctx.rotate(this.angle);

            // 로브/망토 디자인 (다크 판타지 고딕 디자인)
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fill();

            // 후드 디테일 (얼굴 부분 가림)
            ctx.fillStyle = '#0f0a1d';
            ctx.beginPath();
            ctx.arc(this.radius * 0.3, 0, this.radius * 0.7, -Math.PI/3, Math.PI/3);
            ctx.fill();

            // 빛나는 눈 표현 (마법 에너지가 가득 찬 이펙트)
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 8;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.radius * 0.5, -this.radius * 0.25, 3, 0, Math.PI*2);
            ctx.arc(this.radius * 0.5, this.radius * 0.25, 3, 0, Math.PI*2);
            ctx.fill();

            // 마법 지팡이(스태프) 로테이션 렌더링
            ctx.fillStyle = '#451a03'; // 나무 지팡이 바디
            ctx.fillRect(this.radius * 0.3, this.radius * 0.7, 16, 5);

            // 지팡이 끝 보석
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.radius * 0.3 + 18, this.radius * 0.7 + 2.5, 6, 0, Math.PI*2);
            ctx.fill();

            ctx.restore();

            // 체력바 머리 위 렌더링
            this.drawHpBar(ctx, camera, drawX, drawY);
        }

        drawHpBar(ctx, camera, drawX, drawY) {
            const barW = 50;
            const barH = 6;
            const barY = drawY - this.radius - 16;

            ctx.save();
            // 배경바
            ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
            ctx.fillRect(drawX - barW/2, barY, barW, barH);

            // 현재 체력
            const hpRatio = this.hp / this.maxHp;
            const fillW = barW * hpRatio;
            const hpGrad = ctx.createLinearGradient(drawX - barW/2, barY, drawX + barW/2, barY);
            
            if (this.role === 'player') {
                hpGrad.addColorStop(0, '#10b981');
                hpGrad.addColorStop(1, '#34d399');
            } else {
                hpGrad.addColorStop(0, '#ef4444');
                hpGrad.addColorStop(1, '#f87171');
            }

            ctx.fillStyle = hpGrad;
            ctx.fillRect(drawX - barW/2, barY, fillW, barH);

            // 체력 바 외각선
            ctx.strokeStyle = 'rgba(0,0,0,0.5)';
            ctx.lineWidth = 1;
            ctx.strokeRect(drawX - barW/2, barY, barW, barH);
            ctx.restore();
        }
    }

    // --- PLAYER CLASS ---
    class Player extends Character {
        constructor(x, y) {
            super(x, y, '#7c3aed', 'player'); // 보라색 계열 플레이어 로브
            
            // 기본 시작 카드 부여
            this.addCard(CARD_TYPES.FIREBALL);
            this.addCard(CARD_TYPES.FROSTBOLT);
            this.addCard(CARD_TYPES.FIREBALL);
        }

        handleInput() {
            this.isMoving = false;
            let moveX = 0;
            let moveY = 0;

            if (keys['w'] || keys['W'] || keys['ArrowUp']) {
                moveY -= 1;
            }
            if (keys['s'] || keys['S'] || keys['ArrowDown']) {
                moveY += 1;
            }
            if (keys['a'] || keys['A'] || keys['ArrowLeft']) {
                moveX -= 1;
            }
            if (keys['d'] || keys['D'] || keys['ArrowRight']) {
                moveX += 1;
            }

            // 대각선 이동 속도 최적화 정규화
            if (moveX !== 0 || moveY !== 0) {
                this.isMoving = true;
                const length = Math.hypot(moveX, moveY);
                this.vx += (moveX / length) * this.speed * 0.2;
                this.vy += (moveY / length) * this.speed * 0.2;
            }

            // 숫자키를 이용한 카드 선택
            for (let i = 1; i <= 5; i++) {
                if (keys[i.toString()]) {
                    const idx = i - 1;
                    if (idx < this.cards.length) {
                        this.selectedCardIdx = idx;
                    }
                }
            }
        }
    }

    // --- ENEMY CLASS (AI 마법사) ---
    class Enemy extends Character {
        constructor(x, y) {
            super(x, y, '#ef4444', 'enemy'); // 붉은색 계열 사악한 마법사 로브
            this.decisionTimer = 0;
            this.aiState = 'patrol'; // patrol, chase, flee, strafe
            this.targetX = x;
            this.targetY = y;
            
            // AI 기본 카드 인벤토리 풀 초기화 (AI는 카드가 마르지 않고 자동 공급됨)
            this.cards = [CARD_TYPES.FIREBALL, CARD_TYPES.FROSTBOLT];
        }

        // 지능형 AI 결정 패턴
        updateAI(player, walls, currentTime) {
            this.decisionTimer--;
            const dist = distance(this.x, this.y, player.x, player.y);

            // 주기적인 목표 행동 재조정
            if (this.decisionTimer <= 0) {
                this.decisionTimer = 30 + Math.random() * 30; // 0.5초 ~ 1초 간격

                if (dist > 550) {
                    this.aiState = 'chase';
                } else if (dist < 200) {
                    this.aiState = 'flee';
                } else {
                    this.aiState = Math.random() > 0.4 ? 'strafe' : 'patrol';
                }

                // AI 가려는 무작위 난수 보정치 설정
                if (this.aiState === 'chase') {
                    this.targetX = player.x;
                    this.targetY = player.y;
                } else if (this.aiState === 'flee') {
                    const angle = Math.atan2(this.y - player.y, this.x - player.x) + (Math.random() * 0.5 - 0.25);
                    this.targetX = this.x + Math.cos(angle) * 300;
                    this.targetY = this.y + Math.sin(angle) * 300;
                } else if (this.aiState === 'strafe') {
                    // 회전 원형 서클 이동식 우회 회피 기동
                    const angle = Math.atan2(this.y - player.y, this.x - player.x) + (Math.random() > 0.5 ? Math.PI/2 : -Math.PI/2);
                    this.targetX = player.x + Math.cos(angle) * dist;
                    this.targetY = player.y + Math.sin(angle) * dist;
                } else {
                    this.targetX = this.x + (Math.random() * 400 - 200);
                    this.targetY = this.y + (Math.random() * 400 - 200);
                }
            }

            // 가상 타겟 위치를 향한 가속 이동 조작
            const moveAngle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
            this.vx += Math.cos(moveAngle) * this.speed * 0.12;
            this.vy += Math.sin(moveAngle) * this.speed * 0.12;
            this.isMoving = true;

            // 정기적인 오토 슈팅 패턴 (카드 사용 및 발사)
            if (dist < 500 && currentTime - this.lastShotTime > 1200) {
                // 발사 공격 시도
                this.shootAt(player.x, player.y, currentTime);
            }
        }

        shootAt(targetX, targetY, currentTime) {
            this.lastShotTime = currentTime;
            
            // 사용할 가상의 AI 마법 원소 선정
            const randomType = CARD_POOL[Math.floor(Math.random() * CARD_POOL.length)];
            const angle = Math.atan2(targetY - this.y, targetX - this.x) + (Math.random() * 0.2 - 0.1); // AI 미세 오차 부여
            
            // 발사 이벤트 트리거 (Game 클래스에서 캐치할 수 있게 큐에 전달)
            this.aiShotRequested = {
                angle,
                cardType: randomType
            };
        }
    }


    // ====================================================
    // GAME CLASS (CORE ENGINE)
    // ====================================================
    class Game {
        constructor() {
            this.mapWidth = 2400;
            this.mapHeight = 1800;

            this.player = null;
            this.enemy = null;
            
            this.walls = [];
            this.chests = [];
            this.projectiles = [];
            
            // 이펙트 서브시스템
            this.particlePool = new ParticlePool(500);
            this.damageNumbers = [];
            
            // 점수 및 경기 결과 데이터
            this.winCount = 0;
            this.gameState = 'menu'; // 'menu', 'playing', 'gameover'
            
            // 카메라 설정 (부드러운 추적)
            this.camera = { x: 0, y: 0 };
            this.screenShake = 0;
            this.screenShakeDecay = 0.9;

            // 바닥 깨진 고딕 타일 무늬 사전 생성 배열
            this.floorCracks = [];
            this.magicCircles = [];

            this.fps = 0;
            this.lastFpsUpdateTime = 0;
            this.frameCount = 0;

            this.initMapAssets();
            this.setupEventListeners();
        }

        // 맵 석판 타일 데코 무늬 생성
        initMapAssets() {
            // 무작위 깨진 타일 바닥 정보
            for (let i = 0; i < 60; i++) {
                this.floorCracks.push({
                    x: Math.random() * this.mapWidth,
                    y: Math.random() * this.mapHeight,
                    size: Math.random() * 40 + 20,
                    rotation: Math.random() * Math.PI,
                    opacity: Math.random() * 0.15 + 0.05
                });
            }

            // 고정 무늬 장식용 신비한 웅장 마법진 장식
            this.magicCircles.push({ x: 400, y: 400, r: 100 }, { x: 2000, y: 1400, r: 100 }, { x: 1200, y: 900, r: 150 });
        }

        // 게임 월드 생성 (장애물 배치 규칙성 유지)
        setupWorld() {
            this.walls = [];
            this.chests = [];
            this.projectiles = [];
            this.damageNumbers = [];

            // 외각 경계벽 구조
            // 북쪽/남쪽 외부 벽
            this.walls.push(new Wall(0, 0, this.mapWidth, 40));
            this.walls.push(new Wall(0, this.mapHeight - 40, this.mapWidth, 40));
            // 서쪽/동쪽 외부 벽
            this.walls.push(new Wall(0, 40, 40, this.mapHeight - 80));
            this.walls.push(new Wall(this.mapWidth - 40, 40, 40, this.mapHeight - 80));

            // 중앙 기둥형 벽 및 미로식 방 배치 (다크 아레나 구조)
            this.walls.push(new Wall(300, 300, 80, 400));
            this.walls.push(new Wall(300, 300, 400, 80));
            
            this.walls.push(new Wall(this.mapWidth - 380, 300, 80, 400));
            this.walls.push(new Wall(this.mapWidth - 700, 300, 400, 80));

            this.walls.push(new Wall(300, this.mapHeight - 700, 80, 400));
            this.walls.push(new Wall(300, this.mapHeight - 380, 400, 80));

            this.walls.push(new Wall(this.mapWidth - 380, this.mapHeight - 700, 80, 400));
            this.walls.push(new Wall(this.mapWidth - 700, this.mapHeight - 380, 400, 80));

            // 중앙 원형 홀 격벽
            this.walls.push(new Wall(this.mapWidth / 2 - 200, this.mapHeight / 2 - 200, 400, 60));
            this.walls.push(new Wall(this.mapWidth / 2 - 200, this.mapHeight / 2 + 140, 400, 60));

            // 기둥 장식물 배치 (둥근 충돌을 지니는 사각형 벽)
            this.walls.push(new Wall(800, 800, 60, 60, 'column'));
            this.walls.push(new Wall(1500, 800, 60, 60, 'column'));
            this.walls.push(new Wall(800, 1100, 60, 60, 'column'));
            this.walls.push(new Wall(1500, 1100, 60, 60, 'column'));

            // 보물상자 랜덤 분산 배치
            const chestSpots = [
                { x: 150, y: 150 },
                { x: this.mapWidth - 200, y: 150 },
                { x: 150, y: this.mapHeight - 200 },
                { x: this.mapWidth - 200, y: this.mapHeight - 200 },
                { x: this.mapWidth / 2, y: 250 },
                { x: this.mapWidth / 2, y: this.mapHeight - 300 },
                { x: 500, y: 500 },
                { x: this.mapWidth - 550, y: 550 },
                { x: 500, y: this.mapHeight - 550 },
                { x: this.mapWidth - 550, y: this.mapHeight - 550 }
            ];

            // 7개의 무작위 자리에 상자 스폰
            const shuffled = [...chestSpots].sort(() => 0.5 - Math.random());
            shuffled.slice(0, 7).forEach(spot => {
                this.chests.push(new Chest(spot.x, spot.y));
            });
        }

        // 플레이어 및 적 스폰 지정
        spawnEntities() {
            this.player = new Player(200, 200);
            this.enemy = new Enemy(this.mapWidth - 200, this.mapHeight - 200);
        }

        // 이벤트 바인딩 처리
        setupEventListeners() {
            document.getElementById('start-btn').addEventListener('click', () => {
                this.startGame();
            });

            document.getElementById('restart-btn').addEventListener('click', () => {
                document.getElementById('game-over-screen').classList.add('hidden');
                this.startGame();
            });

            // 게임 마우스 시전 제어
            window.addEventListener('mousedown', (e) => {
                if (this.gameState !== 'playing' || !this.player) return;
                if (e.button === 0) {
                    this.executePlayerAttack();
                }
            });

            // 스페이스 키를 통한 상자 상호작용
            window.addEventListener('keydown', (e) => {
                if (this.gameState !== 'playing' || !this.player) return;
                if (e.code === 'Space') {
                    this.interactWithChest();
                }
            });
        }

        // 게임 구동 시작점
        startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            this.setupWorld();
            this.spawnEntities();
            this.gameState = 'playing';
        }

        // 플레이어 지향 마법 시전
        executePlayerAttack() {
            const playerCard = this.player.cards[this.player.selectedCardIdx];
            if (!playerCard) return; // 카드 없음 작동 중지

            const now = performance.now();
            if (now - this.player.lastShotTime < playerCard.cooldown) return; // 글로벌 쿨타임 미충족

            this.player.lastShotTime = now;

            // 클릭 타겟 월드 좌표 산출
            const targetX = mouse.x + this.camera.x;
            const targetY = mouse.y + this.camera.y;
            const angle = Math.atan2(targetY - this.player.y, targetX - this.player.x);

            // 투사체 발사체 인스턴스 생성
            const proj = new Projectile(
                this.player.x + Math.cos(angle) * this.player.radius,
                this.player.y + Math.sin(angle) * this.player.radius,
                angle,
                playerCard.speed,
                playerCard.damage,
                playerCard.size,
                playerCard.color,
                playerCard.glowColor,
                'player'
            );

            this.projectiles.push(proj);

            // 화면 가속 쉐이크 흔들림 추가
            this.screenShake = 6;

            // 시전 소모 피드백 비쥬얼 파티클 번짐 효과
            this.particlePool.explode(this.player.x, this.player.y, playerCard.color, 10, 3, playerCard.glowColor);

            // 시전 카드 핸드에서 영구 차감
            this.player.cards.splice(this.player.selectedCardIdx, 1);
            if (this.player.selectedCardIdx >= this.player.cards.length && this.player.selectedCardIdx > 0) {
                this.player.selectedCardIdx = this.player.cards.length - 1;
            }
        }

        // AI 마법 투사 요청 실행기
        executeEnemyAttack(attackRequest) {
            const card = attackRequest.cardType;
            const proj = new Projectile(
                this.enemy.x + Math.cos(attackRequest.angle) * this.enemy.radius,
                this.enemy.y + Math.sin(attackRequest.angle) * this.enemy.radius,
                attackRequest.angle,
                card.speed,
                card.damage,
                card.size,
                card.color,
                card.glowColor,
                'enemy'
            );

            this.projectiles.push(proj);
            this.particlePool.explode(this.enemy.x, this.enemy.y, card.color, 8, 3, card.glowColor);
        }

        // 상자 열기 상호작용 체크
        interactWithChest() {
            let found = false;
            for (const chest of this.chests) {
                if (chest.active) {
                    const dist = distance(this.player.x, this.player.y, chest.x + chest.w/2, chest.y + chest.h/2);
                    if (dist < 90) {
                        chest.active = false;
                        found = true;

                        // 무작위 주문 카드 드로우 및 획득 알림
                        const randomCard = CARD_POOL[Math.floor(Math.random() * CARD_POOL.length)];
                        const acquired = this.player.addCard(randomCard);

                        // 획득 이펙트 연출
                        this.particlePool.explode(chest.x + chest.w/2, chest.y + chest.h/2, '#f59e0b', 30, 6, 'rgba(245, 158, 11, 0.9)');

                        if (acquired) {
                            this.damageNumbers.push(new DamageNumber(chest.x + chest.w/2, chest.y, `[${randomCard.name}] 획득!`, '#c084fc'));
                        } else {
                            this.damageNumbers.push(new DamageNumber(chest.x + chest.w/2, chest.y, '손패 가득참!', '#ef4444'));
                        }
                        break;
                    }
                }
            }
        }

        // ====================================================
        // UPDATE PHYSICS LOOP
        // ====================================================
        update(currentTime) {
            if (this.gameState !== 'playing') return;

            // 1. 캐릭터 조작 입력 및 AI 제어 루프
            this.player.handleInput();
            this.player.updatePhysics(this.mapWidth, this.mapHeight, this.walls);

            this.enemy.updateAI(this.player, this.walls, currentTime);
            if (this.enemy.aiShotRequested) {
                this.executeEnemyAttack(this.enemy.aiShotRequested);
                this.enemy.aiShotRequested = null;
            }
            this.enemy.updatePhysics(this.mapWidth, this.mapHeight, this.walls);

            // 2. 상자 애니메이션 업데이트
            this.chests.forEach(chest => chest.update());

            // 3. 발사체 비행 연출 및 데미지 충돌 판정
            for (let i = this.projectiles.length - 1; i >= 0; i--) {
                const proj = this.projectiles[i];
                proj.update();

                // 투사체 궤적 흐름 파티클 스폰 (최적화 반영)
                if (Math.random() > 0.4) {
                    this.particlePool.spawnTrail(proj.x, proj.y, proj.color, proj.glowColor);
                }

                // 투사체 벽 충돌 연출
                let hitWall = false;
                for (const wall of this.walls) {
                    const closestX = clamp(proj.x, wall.x, wall.x + wall.w);
                    const closestY = clamp(proj.y, wall.y, wall.y + wall.h);
                    const dist = distance(proj.x, proj.y, closestX, closestY);

                    if (dist < proj.size) {
                        hitWall = true;
                        break;
                    }
                }

                if (hitWall) {
                    this.particlePool.explode(proj.x, proj.y, proj.color, 12, 4, proj.glowColor);
                    this.projectiles.splice(i, 1);
                    continue;
                }

                // 투사체 캐릭터 피격 판정
                if (proj.owner === 'player') {
                    // 플레이어 투사체 -> 적 적중
                    const dist = distance(proj.x, proj.y, this.enemy.x, this.enemy.y);
                    if (dist < this.enemy.radius + proj.size) {
                        // 피격 처리 및 넉백
                        this.enemy.takeDamage(proj.damage);
                        this.enemy.vx += Math.cos(proj.angle) * 7;
                        this.enemy.vy += Math.sin(proj.angle) * 7;

                        // 피격 타격 이펙트 및 데미지 텍스트
                        this.particlePool.explode(proj.x, proj.y, proj.color, 25, 6, proj.glowColor);
                        this.damageNumbers.push(new DamageNumber(this.enemy.x, this.enemy.y - 10, proj.damage, '#f87171'));
                        this.screenShake = 12; // 격렬한 타격감 진동

                        this.projectiles.splice(i, 1);
                        this.checkVictoryCondition();
                        continue;
                    }
                } else if (proj.owner === 'enemy') {
                    // 적 투사체 -> 플레이어 적중
                    const dist = distance(proj.x, proj.y, this.player.x, this.player.y);
                    if (dist < this.player.radius + proj.size) {
                        // 피격 처리 및 넉백
                        this.player.takeDamage(proj.damage);
                        this.player.vx += Math.cos(proj.angle) * 7;
                        this.player.vy += Math.sin(proj.angle) * 7;

                        // 피격 타격 이펙트 및 데미지 텍스트
                        this.particlePool.explode(proj.x, proj.y, proj.color, 25, 6, proj.glowColor);
                        this.damageNumbers.push(new DamageNumber(this.player.x, this.player.y - 10, proj.damage, '#ef4444'));
                        this.screenShake = 14;

                        this.projectiles.splice(i, 1);
                        this.checkVictoryCondition();
                        continue;
                    }
                }

                // 화면 경계 이탈 검사 제거 (어차피 벽 충돌로 소멸)
            }

            // 4. 파티클 수명주기 업데이트
            this.particlePool.pool.forEach(p => p.update());

            // 5. 데미지 플로팅 텍스트 업데이트
            for (let i = this.damageNumbers.length - 1; i >= 0; i--) {
                const dn = this.damageNumbers[i];
                dn.update();
                if (!dn.active) this.damageNumbers.splice(i, 1);
            }

            // 6. 카메라가 플레이어를 부드럽게 실시간 밀착 추종 (Lerp 적용)
            const targetCamX = this.player.x - canvas.width / 2;
            const targetCamY = this.player.y - canvas.height / 2;
            this.camera.x = lerp(this.camera.x, targetCamX, 0.08);
            this.camera.y = lerp(this.camera.y, targetCamY, 0.08);

            // 맵 월드 경계 고정 (카메라 이탈 차단)
            this.camera.x = clamp(this.camera.x, 0, this.mapWidth - canvas.width);
            this.camera.y = clamp(this.camera.y, 0, this.mapHeight - canvas.height);

            // 화면 쉐이크 감쇄 진동 효과 계산
            if (this.screenShake > 0.1) {
                this.screenShake *= this.screenShakeDecay;
            } else {
                this.screenShake = 0;
            }
        }

        // 승패 판독
        checkVictoryCondition() {
            if (this.enemy.hp <= 0) {
                this.gameState = 'gameover';
                this.winCount++;
                this.showEndScreen(true);
            } else if (this.player.hp <= 0) {
                this.gameState = 'gameover';
                this.showEndScreen(false);
            }
        }

        showEndScreen(isWin) {
            const screen = document.getElementById('game-over-screen');
            const title = document.getElementById('result-text');
            const sub = document.getElementById('result-sub');

            if (isWin) {
                title.innerText = "VICTORY";
                title.className = "result-title win";
                sub.innerHTML = `승리를 차지하셨습니다! 당신은 강력한 원소 에너지를 증명했습니다.<br><strong>현재 누적 승수: ${this.winCount}승</strong>`;
            } else {
                title.innerText = "DEFEATED";
                title.className = "result-title lose";
                sub.innerText = "상대 마법사에게 무참히 패배했습니다. 주문 설계를 검토하세요.";
            }

            screen.classList.remove('hidden');
        }

        // ====================================================
        // RENDERING (DRAW LOOP)
        // ====================================================
        draw() {
            // 메인 클리어
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // 화면 흔들림(Screen Shake) 축값 오프셋 적용
            if (this.screenShake > 0) {
                const dx = (Math.random() - 0.5) * this.screenShake;
                const dy = (Math.random() - 0.5) * this.screenShake;
                ctx.translate(dx, dy);
            }

            // 1. 다크 마법학교 석재 바닥 렌더링
            this.drawFloor();

            // 2. 웅장한 바닥 데코 마법진 및 수수께끼 구조물
            this.drawFloorDecorations();

            // 3. 상자 렌더링
            this.chests.forEach(chest => chest.draw(ctx, this.camera));

            // 4. 캐릭터 (플레이어, 적 마법사)
            if (this.player) {
                this.player.drawWizard(ctx, this.camera, mouse.x + this.camera.x, mouse.y + this.camera.y);
            }
            if (this.enemy) {
                this.enemy.drawWizard(ctx, this.camera, this.player.x, this.player.y);
            }

            // 5. 투사체 마법체 드로잉
            this.projectiles.forEach(p => p.draw(ctx, this.camera));

            // 6. 석판 구조 벽체 / 기둥 렌더링
            this.walls.forEach(w => w.draw(ctx, this.camera));

            // 7. 생동감 넘치는 파티클 이펙트
            this.particlePool.pool.forEach(p => p.draw(ctx, this.camera));

            // 8. 데미지 수치 플로팅 텍스트 렌더링
            this.damageNumbers.forEach(dn => dn.draw(ctx, this.camera));

            ctx.restore();

            // 9. 고퀄리티 화면 위 오버레이 HUD 렌더링
            this.drawHUD();
        }

        // 바닥 격자 돌바닥 타일 렌더링
        drawFloor() {
            const startX = Math.max(0, Math.floor(this.camera.x / 100) * 100);
            const startY = Math.max(0, Math.floor(this.camera.y / 100) * 100);
            const endX = Math.min(this.mapWidth, startX + canvas.width + 100);
            const endY = Math.min(this.mapHeight, startY + canvas.height + 100);

            ctx.strokeStyle = '#1a1426';
            ctx.lineWidth = 1;

            // 바닥 사각 격자 그리드 그리기 (마법 학교 클래식 스톤 플로어 분위기)
            for (let x = startX; x < endX; x += 100) {
                ctx.beginPath();
                ctx.moveTo(x - this.camera.x, startY - this.camera.y);
                ctx.lineTo(x - this.camera.x, endY - this.camera.y);
                ctx.stroke();
            }
            for (let y = startY; y < endY; y += 100) {
                ctx.beginPath();
                ctx.moveTo(startX - this.camera.x, y - this.camera.y);
                ctx.lineTo(endX - this.camera.x, y - this.camera.y);
                ctx.stroke();
            }

            // 사전 배치한 바닥 크랙 타일 무늬 드로잉
            ctx.save();
            this.floorCracks.forEach(crack => {
                if (crack.x > this.camera.x - 50 && crack.x < this.camera.x + canvas.width + 50 &&
                    crack.y > this.camera.y - 50 && crack.y < this.camera.y + canvas.height + 50) {
                    
                    ctx.strokeStyle = `rgba(139, 92, 246, ${crack.opacity})`;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    
                    // 지그재그 크랙 드로잉
                    const drawX = crack.x - this.camera.x;
                    const drawY = crack.y - this.camera.y;
                    ctx.moveTo(drawX, drawY);
                    ctx.lineTo(drawX + Math.cos(crack.rotation) * crack.size * 0.5, drawY + Math.sin(crack.rotation) * crack.size * 0.5);
                    ctx.lineTo(drawX + Math.cos(crack.rotation + 0.5) * crack.size, drawY + Math.sin(crack.rotation + 0.5) * crack.size);
                    ctx.stroke();
                }
            });
            ctx.restore();
        }

        // 마법학교 특수 원형 마법진 데코
        drawFloorDecorations() {
            ctx.save();
            this.magicCircles.forEach(circle => {
                const drawX = circle.x - this.camera.x;
                const drawY = circle.y - this.camera.y;

                // 마법진 발광 아웃라인
                ctx.strokeStyle = 'rgba(124, 58, 237, 0.15)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(drawX, drawY, circle.r, 0, Math.PI * 2);
                ctx.stroke();

                // 안쪽 별 표식 문양 및 데코
                ctx.strokeStyle = 'rgba(124, 58, 237, 0.08)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * Math.PI * 2) / 5;
                    const endAngle = (((i + 2) % 5) * Math.PI * 2) / 5;
                    ctx.moveTo(drawX + Math.cos(angle) * circle.r, drawY + Math.sin(angle) * circle.r);
                    ctx.lineTo(drawX + Math.cos(endAngle) * circle.r, drawY + Math.sin(endAngle) * circle.r);
                }
                ctx.stroke();
            });
            ctx.restore();
        }

        // ====================================================
        // HUD / USER INTERFACE RENDERING
        // ====================================================
        drawHUD() {
            if (this.gameState !== 'playing') return;

            // 1. 좌측 상단 플레이어 프로필 스태츠 (HP 바)
            const leftX = 40;
            const topY = 40;

            // 다크 플레이어 HUD 배경 패널
            ctx.save();
            ctx.fillStyle = 'rgba(18, 14, 28, 0.85)';
            ctx.strokeStyle = 'rgba(139, 92, 246, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(leftX, topY, 280, 85, 10);
            ctx.fill();
            ctx.stroke();

            // 프로필 타이틀
            ctx.fillStyle = '#e2d9f3';
            ctx.font = 'bold 15px "Segoe UI", sans-serif';
            ctx.fillText('PLAYER (마법 훈련생)', leftX + 15, topY + 25);

            // HP 바 본체
            const hpBarW = 250;
            const hpBarH = 16;
            const hpBarX = leftX + 15;
            const hpBarY = topY + 38;

            ctx.fillStyle = 'rgba(30, 27, 46, 0.9)';
            ctx.fillRect(hpBarX, hpBarY, hpBarW, hpBarH);

            const hpRatio = this.player.hp / this.player.maxHp;
            const fillW = hpBarW * hpRatio;
            const hpGrad = ctx.createLinearGradient(hpBarX, hpBarY, hpBarX + hpBarW, hpBarY);
            hpGrad.addColorStop(0, '#059669');
            hpGrad.addColorStop(1, '#10b981');
            ctx.fillStyle = hpGrad;
            ctx.fillRect(hpBarX, hpBarY, fillW, hpBarH);

            // 체력 정보 수치화 텍스트 오버레이
            ctx.fillStyle = '#fff';
            ctx.font = '11px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`${Math.round(this.player.hp)} / ${this.player.maxHp}`, hpBarX + hpBarW/2, hpBarY + 12);
            ctx.restore();

            // 2. 우측 상단 매치 정보 (누적 승수 및 FPS 계측기)
            ctx.save();
            ctx.fillStyle = 'rgba(18, 14, 28, 0.85)';
            ctx.strokeStyle = 'rgba(139, 92, 246, 0.3)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.roundRect(canvas.width - 240, topY, 200, 80, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#a78bfa';
            ctx.font = 'bold 14px "Segoe UI", sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(`누적 승리수: ${this.winCount} 승`, canvas.width - 60, topY + 30);
            
            ctx.fillStyle = '#64748b';
            ctx.font = '12px "Segoe UI", sans-serif';
            ctx.fillText(`FPS: ${this.fps}`, canvas.width - 60, topY + 55);
            ctx.restore();

            // 3. 하단 중앙 플레이어 카드 덱 손패 UI (핵심 카드 시스템 시각화)
            const cardUIWidth = 520;
            const cardUIHeight = 110;
            const cardUIX = (canvas.width - cardUIWidth) / 2;
            const cardUIY = canvas.height - cardUIHeight - 30;

            // 전체 수급 카드 영역 보드
            ctx.save();
            ctx.fillStyle = 'rgba(10, 8, 16, 0.9)';
            ctx.strokeStyle = 'rgba(139, 92, 246, 0.5)';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.roundRect(cardUIX, cardUIY, cardUIWidth, cardUIHeight, 15);
            ctx.fill();
            ctx.stroke();

            // 카드 각각 항목 렌더링 (최대 5장)
            const startCardX = cardUIX + 25;
            const cardSpacing = 95;
            const cardW = 80;
            const cardH = 90;

            for (let i = 0; i < 5; i++) {
                const drawCardX = startCardX + i * cardSpacing;
                const drawCardY = cardUIY + 10;
                const card = this.player.cards[i];
                const isSelected = this.player.selectedCardIdx === i;

                if (card) {
                    // 카드가 존재하는 상태의 렌더링
                    ctx.save();

                    // 선택된 활성 카드 돌출/글로우 효과 배가
                    if (isSelected) {
                        ctx.shadowBlur = 18;
                        ctx.shadowColor = card.glowColor;
                        ctx.translate(0, -6); // 약간 튀어나온 애니메이션
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 3;
                    } else {
                        ctx.strokeStyle = 'rgba(139, 92, 246, 0.3)';
                        ctx.lineWidth = 1.5;
                    }

                    // 카드 본체 베이스
                    const cardGrad = ctx.createLinearGradient(drawCardX, drawCardY, drawCardX, drawCardY + cardH);
                    cardGrad.addColorStop(0, '#1e152e');
                    cardGrad.addColorStop(1, '#110b1a');
                    ctx.fillStyle = cardGrad;
                    
                    ctx.beginPath();
                    ctx.roundRect(drawCardX, drawCardY, cardW, cardH, 8);
                    ctx.fill();
                    ctx.stroke();

                    // 카드 타입 아이콘 / 타이틀
                    ctx.font = '24px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(card.icon, drawCardX + cardW/2, drawCardY + 40);

                    ctx.fillStyle = card.color;
                    ctx.font = 'bold 11px "Segoe UI", sans-serif';
                    ctx.fillText(card.name, drawCardX + cardW/2, drawCardY + 65);

                    ctx.fillStyle = '#94a3b8';
                    ctx.font = '9px "Segoe UI", sans-serif';
                    ctx.fillText(`DMG: ${card.damage}`, drawCardX + cardW/2, drawCardY + 80);

                    // 단축키 표시
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.font = '9px monospace';
                    ctx.fillText(`[${i + 1}]`, drawCardX + cardW/2, drawCardY + 15);

                    ctx.restore();
                } else {
                    // 빈 카드 슬롯 점선 렌더링
                    ctx.save();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
                    ctx.setLineDash([5, 5]);
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.roundRect(drawCardX, drawCardY, cardW, cardH, 8);
                    ctx.stroke();
                    
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
                    ctx.fill();
                    ctx.restore();
                }
            }
            ctx.restore();

            // 4. 상자 획득 가능 안내 말풍선 레이블 (상자에 밀착 시)
            this.chests.forEach(chest => {
                if (chest.active) {
                    const dist = distance(this.player.x, this.player.y, chest.x + chest.w/2, chest.y + chest.h/2);
                    if (dist < 90) {
                        ctx.save();
                        ctx.fillStyle = '#a855f7';
                        ctx.font = 'bold 14px "Segoe UI", sans-serif';
                        ctx.textAlign = 'center';
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = '#a855f7';
                        ctx.fillText('[SPACE] 눌러 상자 열기', chest.x + chest.w/2 - this.camera.x, chest.y - 15 - this.camera.y);
                        ctx.restore();
                    }
                }
            });

            // 5. 손패 전멸 시 마법 획득 독촉 알람
            if (this.player.cards.length === 0) {
                ctx.save();
                ctx.fillStyle = '#f87171';
                ctx.font = 'bold 18px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ef4444';
                ctx.fillText('⚠️ 카드가 부족합니다! 맵에 배치된 상자를 서둘러 파밍하세요!', canvas.width / 2, canvas.height / 2 - 120);
                ctx.restore();
            }
        }
    }

    // ====================================================
    // GAME PROCESS INITIATION (MAIN LOOP)
    // ====================================================
    const game = new Game();

    function gameLoop(timestamp) {
        // FPS 프레임 타임 트래킹
        if (!game.lastFpsUpdateTime) {
            game.lastFpsUpdateTime = timestamp;
        }
        game.frameCount++;

        if (timestamp - game.lastFpsUpdateTime >= 1000) {
            game.fps = game.frameCount;
            game.frameCount = 0;
            game.lastFpsUpdateTime = timestamp;
        }

        // 실시간 연산 업데이트 및 미려한 드로잉 렌더링
        game.update(timestamp);
        game.draw();

        requestAnimationFrame(gameLoop);
    }

    // 루프 실행 구동 시작
    requestAnimationFrame(gameLoop);

</script>
